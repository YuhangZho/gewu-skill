n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"Embedding与向量表示\">Embedding与向量表示</a> · <a class=\"xref\" data-go=\"向量数据库与相似度检索\">向量数据库与相似度检索</a> · <a class=\"xref\" data-go=\"Prompt工程基础\">Prompt工程基础</a> · <a class=\"xref\" data-go=\"高级RAG技术\">高级RAG技术</a> · <a class=\"xref\" data-go=\"LangChain框架\">LangChain框架</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "RAG基础架构"}, "AI应用作品集项目": {"doc": "<div class=\"dochead\"><h1>AI应用作品集项目 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔0-1 独立落地一个可写进简历的 AI 应用〕的——把所有技能串成端到端能力证明。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能独立设计并落地一个完整的 AI 应用（RAG/Agent），写进简历并在面试时讲清技术选型和踩坑。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>作品集是转岗的硬通货</strong>：JD 要&quot;有 LLM 应用经验&quot;，作品集 = 经验证明。比刷题/八股更能打动面试官。</li><li><strong>好作品集三标准</strong>：① 真实痛点（不是 toy）；② 端到端（数据→模型→API→部署）；③ 可演示（Docker 一键跑/有 demo URL）。</li><li><strong>推荐项目方向</strong>：① RAG 知识库问答（企业文档/技术文档）；② Agent 工具调用（研究助手/旅行规划）；③ 垂直 Agent（代码审查/数据分析）。选你熟悉领域。</li><li><strong>技术栈标配</strong>：LangChain/LangGraph 编排 + 向量库（Chroma/Milvus）+ FastAPI 服务 + Docker 部署 + RAGAS 评估 + GitHub README。</li><li><strong>简历讲法</strong>：用 STAR（Situation/Task/Action/Result）讲——痛点是什么、你做了什么、技术选型为什么、量化结果（如召回率从 X 到 Y）。</li><li><strong>面试防翻车</strong>：要能讲清每个技术决策的 why（为什么选 Chroma 不选 Milvus）、踩过的坑（分块/检索/幻觉怎么解）、改进方向。</li><li><strong>加分项</strong>：① 用 LangGraph 做有状态 Agent；② 加评估指标；③ 有真实用户/上线；④ 写技术博客总结。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>作品集定位<ul><li>转岗硬通货</li><li>经验证明</li><li>比八股更能打动人</li></ul></li><li>好作品三标准<ul><li>真实痛点（非 toy）</li><li>端到端（数据→部署）</li><li>可演示（Docker/demo URL）</li></ul></li><li>推荐方向<ul><li>RAG 知识库问答</li><li>Agent 工具调用</li><li>垂直 Agent（代码/数据）</li></ul></li><li>技术栈标配<ul><li>LangChain/LangGraph</li><li>向量库</li><li>FastAPI</li><li>Docker</li><li>RAGAS 评估</li><li>GitHub README</li></ul></li><li>简历讲法<ul><li>STAR 结构</li><li>技术选型 why</li><li>量化结果</li></ul></li><li>面试防翻车<ul><li>每个决策的 why</li><li>踩过的坑</li><li>改进方向</li></ul></li><li>加分项<ul><li>LangGraph 状态 Agent</li><li>评估指标</li><li>真实用户</li><li>技术博客</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为作品集就是&quot;做个 demo 放 GitHub&quot;，不知道三标准和面试讲法。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：痛点、需求、技术选型、实现、评估、部署、简历、面试</li><li>连接：痛点→需求→选型→实现→评估→部署→简历→面试</li><li>流向：从问题到证明的端到端流</li><li>边界：toy 项目不被认可；不能演示等于没有；讲不清 why 等于没做</li><li>变化：面试官追问深度→要能下钻每层细节</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=flow。痛点(data)→需求(rule)→选型(process)→实现(process)→评估(process)→部署(process)→简历(data)→面试(boundary)。</p>\n<p><strong>类比</strong>：作品集像程序员的&quot;作品集画册&quot;——不是堆代码，而是讲&quot;我遇到什么问题、怎么解、为什么这么解、效果如何&quot;。面试官看的是工程思维和解决问题的能力。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，是转岗找工作的关键。光说不练假把式，要做出一个真能用的 AI 应用放 GitHub——RAG 问答或 Agent 助手，用 LangChain+向量库+FastAPI+Docker 全套搭起来，写好 README 能一键跑。简历用 STAR 讲，面试能讲清每个技术选型的 why 和踩坑。这是&quot;会做 AI 应用&quot;的硬证明。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>企业文档 RAG：上传公司 wiki→问&quot;年假怎么请&quot;→答+引用。技术：LangChain+Milvus+RAGAS。</li><li>研究助手 Agent：给主题→Agent 自主搜网+整理+出报告。技术：LangGraph+搜索工具+FastAPI。</li><li>代码审查 Agent：提交 PR→Agent 审安全/性能/风格→评论。技术：LangGraph 多 Agent+GitHub API。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>toy 项目（如&quot;Hello GPT&quot;）不被认可</li><li>不能演示（只有代码没 demo）等于没有</li><li>讲不清技术选型 why 等于没做</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（toy）→ 选真实痛点，最好有潜在用户</li><li>边界2（不能演示）→ Docker 化+部署 demo URL</li><li>边界3（讲不清）→ 写技术博客总结选型理由</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>什么算&quot;好&quot;作品集：原以为功能多就好→校准为真实痛点+端到端+可演示三标准。</li><li>简历怎么写：原以为列技术栈→校准为 STAR 讲故事+量化结果。</li><li>面试防翻车：原以为会做就行→校准为要能讲清每个 why 和踩坑。</li></ol>\n<p><strong>成长对比</strong>：起点（作品集=demo）→ 现在（三标准+技术栈标配+STAR+面试防翻车）。</p>\n</details>\n<p>📎 <a href=\"_transcript/AI应用作品集项目.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/AI应用作品集项目.svg\" target=\"_blank\" rel=\"noopener\">_viz/AI应用作品集项目.svg</a></li><li>Mermaid 源：<a href=\"_viz/AI应用作品集项目.mmd\" target=\"_blank\" rel=\"noopener\">_viz/AI应用作品集项目.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/AI应用作品集项目.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/AI应用作品集项目.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/AI应用作品集项目.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Eugene Yan · 应用工程与求职视角</h3>\n<ul><li><strong>身份</strong>：应用机器学习工程师、技术博主</li><li><strong>与本概念的关系</strong>：写了大量 ML/AI 求职作品集建议</li><li><strong>核心洞见</strong>：作品集要讲&quot;解决问题的能力&quot;不是&quot;用过的技术&quot;，STAR + 量化结果最打动人</li><li><strong>代表作</strong>：*Getting a Data Science Job* 系列</li><li><strong>扩展阅读</strong>：<a href=\"https://eugeneyan.com/\" target=\"_blank\" rel=\"noopener\">eugeneyan.com</a></li></ul>\n<h3 id=\"sec-7\">2. Greg Kamradt · 从0到1实战</h3>\n<ul><li><strong>身份</strong>：技术博主</li><li><strong>与本概念的关系</strong>：RAG From Scratch 等教程是作品集项目的最佳起点</li><li><strong>核心洞见</strong>：作品集要&quot;小而完整&quot;——一个端到端 RAG 比十个 demo 强</li><li><strong>代表作</strong>：RAG From Scratch 教程</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/gkamradt\" target=\"_blank\" rel=\"noopener\">Greg Kamradt GitHub</a></li></ul>\n<h3 id=\"sec-8\">3. 招聘方视角 · AI 应用 JD 分析</h3>\n<ul><li><strong>身份</strong>：AI 应用团队招聘负责人（多 JD 汇总）</li><li><strong>与本概念的关系</strong>：从 JD 反推作品集要展示什么</li><li><strong>核心洞见</strong>：JD 要&quot;有 LLM 应用经验&quot;，作品集是经验证明；端到端+可演示+讲得清是硬要求</li><li><strong>代表作</strong>：Boss 直聘 AI 应用开发 JD 汇总分析</li><li><strong>扩展阅读</strong>：<a href=\"https://www.zhipin.com/\" target=\"_blank\" rel=\"noopener\">Boss 直聘 AI 应用开发岗</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"RAG基础架构\">RAG基础架构</a> · <a class=\"xref\" data-go=\"Agent架构与ReAct模式\">Agent架构与ReAct模式</a> · <a class=\"xref\" data-go=\"LangChain框架\">LangChain框架</a> · <a class=\"xref\" data-go=\"API服务与FastAPI\">API服务与FastAPI</a> · <a class=\"xref\" data-go=\"Docker容器化部署\">Docker容器化部署</a> · <a class=\"xref\" data-go=\"AI应用评估与可观测性\">AI应用评估与可观测性</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "AI应用作品集项目"}, "高级RAG技术": {"doc": "<div class=\"dochead\"><h1>高级RAG技术 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔分块策略、混合检索、重排序、Self-RAG/Agentic RAG 等进阶优化〕的——把检索准确率拉到生产可用。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能诊断 RAG 系统的检索/生成瓶颈，选对优化手段（分块/混合检索/重排/查询改写）把效果拉到生产级。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>分块策略进阶</strong>：固定长度→语义分块（按段落/标题）→递归分块（保持层级）→语义边界分块（用模型找断点）。语义分块召回率显著优于固定长度。</li><li><strong>混合检索（Hybrid）</strong>：向量（语义）+ BM25（关键词）并行检索，RRF（Reciprocal Rank Fusion）融合排序，取长补短——向量补 BM25 的语义盲区，BM25 补向量的精确关键词盲区。</li><li><strong>重排序（Reranking）</strong>：检索 top-50→用 cross-encoder 重排取 top-5。cross-encoder 比 bi-encoder 准但慢，所以先粗检索再精排。常用 BGE-reranker、Cohere Rerank。</li><li><strong>查询改写（Query Rewriting）</strong>：用户原问题可能模糊/口语化，先让 LLM 改写成更好的检索 query（如&quot;咋退货&quot;→&quot;商品退换货流程&quot;），或多 query 并行检索取并集。</li><li><strong>Self-RAG</strong>：模型自己判断&quot;要不要检索&quot;&quot;检索结果相不相关&quot;&quot;回答有没有依据&quot;，动态决策，减少不必要的检索和不相关的 grounding。</li><li><strong>Agentic RAG</strong>：把 RAG 包成 Agent 工具，模型自主决定查不查、查哪个库、查几次，适合多源知识库场景。</li><li><strong>评估驱动优化</strong>：用 RAGAS / TruLens 评 faithfulness（回答有没有依据）+ context_recall（检索召回）+ context_precision（检索精度），用数据指导优化方向。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>检索侧优化<ul><li>分块策略（语义/递归/边界）</li><li>混合检索（向量+BM25+RRF）</li><li>重排序（cross-encoder）</li><li>查询改写（单/多query）</li></ul></li><li>生成侧优化<ul><li>Self-RAG（动态决策检索）</li><li>Agentic RAG（Agent 调用 RAG 工具）</li><li>引用与可追溯</li></ul></li><li>评估驱动<ul><li>RAGAS（faithfulness/recall/precision）</li><li>TruLens / DeepEval</li><li>黄金数据集</li></ul></li><li>工程化<ul><li>索引更新策略</li><li>多路召回并发</li><li>缓存（query/embedding）</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为 RAG 优化就是&quot;换个更好的 Embedding 模型&quot;，不知道分块/混合检索/重排这些手段。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：原始查询、查询改写器、多路检索器（向量+BM25）、融合器、重排器、上下文、LLM、Self-RAG 判断器</li><li>连接：查询→改写→多路检索→融合→重排→上下文→LLM；Self-RAG 在关键点做决策</li><li>流向：检索侧多路并行+融合+精排；生成侧动态决策</li><li>边界：优化手段叠加有边际递减；过度优化增加延迟和成本</li><li>变化：用户问题类型不同→激活不同优化（简单问题不需要改写）</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=hierarchy。高级RAG(concept)下分三类：检索侧优化(process)、生成侧优化(process)、评估驱动(process)，每类下挂具体手段。</p>\n<p><strong>类比</strong>：基础 RAG 像单本词典查词，高级 RAG 像有个研究助理——先帮你把模糊问题问清楚（查询改写），同时查几本词典（混合检索），查完帮你挑最相关的几页（重排），还会判断&quot;这个问题要不要查词典&quot;（Self-RAG）。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么让 RAG 答得更准。基础 RAG 就是搜文档塞给模型，但搜得不够准。高级 RAG 加了几招：先把你的问题问得更清楚，同时用语义和关键词两种方式搜，搜完再用更准的模型挑最相关的几段，还会判断&quot;这问题要不要查&quot;。就像从&quot;翻一本词典&quot;升级到&quot;有个研究助理帮你查多本书并挑重点&quot;。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>企业知识库：加混合检索+重排，召回率从 70%→90%。</li><li>客服 bot：查询改写把&quot;咋退货&quot;改成&quot;商品退换货流程&quot;，检索更精准。</li><li>多源研究：Agentic RAG 让模型自主决定查内部库还是联网。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>优化叠加边际递减，要评估驱动别盲目堆</li><li>重排器增加延迟（cross-encoder 慢），实时场景要权衡</li><li>Self-RAG 判断不准会漏检索或过度检索</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（边际递减）→ 用 RAGAS 量化每步收益，停止无效优化</li><li>边界2（重排延迟）→ top-50→top-5 改 top-20→top-5，或用轻量 reranker</li><li>边界3（Self-RAG 误判）→ 加 fallback：不确定就检索</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>混合检索为什么有效：原以为纯向量最好→校准为向量漏关键词精确匹配，BM25 漏语义，互补。</li><li>重排为什么用 cross-encoder：原以为和 bi-encoder 一样→校准为 cross-encoder 把 query+doc 一起编码能捕捉交互，更准但慢。</li><li>Self-RAG 什么时候该用：原以为都用→校准为简单事实问题不需要，复杂/多跳问题才值得动态决策。</li></ol>\n<p><strong>成长对比</strong>：起点（RAG优化=换Embedding）→ 现在（分块/混合/重排/改写/Self-RAG/评估驱动六把刀）。</p>\n</details>\n<p>📎 <a href=\"_transcript/高级RAG技术.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/高级RAG技术.svg\" target=\"_blank\" rel=\"noopener\">_viz/高级RAG技术.svg</a></li><li>Mermaid 源：<a href=\"_viz/高级RAG技术.mmd\" target=\"_blank\" rel=\"noopener\">_viz/高级RAG技术.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>hierarchy</b></div><img src=\"_viz/高级RAG技术.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/高级RAG技术.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/高级RAG技术.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Akari Asai · Self-RAG 作者</h3>\n<ul><li><strong>身份</strong>：华盛顿大学研究员</li><li><strong>与本概念的关系</strong>：Self-RAG 论文一作，让模型自主决策检索</li><li><strong>核心洞见</strong>：不是所有问题都需要检索，让模型自己判断能减少噪声提升质量</li><li><strong>代表作</strong>：*Self-RAG: Learning to Retrieve, Generate, and Critique through Self-Reflection*</li><li><strong>扩展阅读</strong>：<a href=\"https://arxiv.org/abs/2310.11511\" target=\"_blank\" rel=\"noopener\">arXiv 论文</a></li></ul>\n<h3 id=\"sec-7\">2. Shahul Es · RAGAS 作者</h3>\n<ul><li><strong>身份</strong>：RAGAS 维护者</li><li><strong>与本概念的关系</strong>：RAGAS 是最流行的 RAG 评估框架，定义了 faithfulness/recall/precision 指标</li><li><strong>核心洞见</strong>：RAG 优化必须评估驱动，没指标就是盲调</li><li><strong>代表作</strong>：RAGAS 框架</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/explodinggradients/ragas\" target=\"_blank\" rel=\"noopener\">RAGAS GitHub</a></li></ul>\n<h3 id=\"sec-8\">3. 唐杰（Tang Jie）· 国产 RAG 生态</h3>\n<ul><li><strong>身份</strong>：清华大学教授、智谱 AI</li><li><strong>与本概念的关系</strong>：BGE-reranker 是中文 RAG 重排的事实标准</li><li><strong>核心洞见</strong>：中文 RAG 的重排要用中文数据训练，英文 reranker 中文效果打折</li><li><strong>代表作</strong>：BGE 系列（含 reranker）</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/FlagOpen/FlagEmbedding\" target=\"_blank\" rel=\"noopener\">FlagEmbedding GitHub</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"RAG基础架构\">RAG基础架构</a> · <a class=\"xref\" data-go=\"向量数据库与相似度检索\">向量数据库与相似度检索</a> · <a class=\"xref\" data-go=\"Agent架构与ReAct模式\">Agent架构与ReAct模式</a> · <a class=\"xref\" data-go=\"AI应用评估与可观测性\">AI应用评估与可观测性</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "高级RAG技术"}, "AI应用评估与可观测性": {"doc": "<div class=\"dochead\"><h1>AI应用评估与可观测性 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔评估指标 + 线上监控〕的——让 AI 应用可度量可维护。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能为 RAG/Agent 应用设计评估指标（离线）+ 线上监控（漂移/成本/延迟/质量），让 AI 应用&quot;可度量可维护&quot;。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>AI 应用必须评估+监控</strong>：传统软件测 pass/fail，AI 应用输出概率性，要用指标量化质量，线上还要监控漂移。</li><li><strong>RAG 评估三维度（RAGAS）</strong>：① 生成质量（faithfulness 答案有没有依据/relevance 相关性）；② 检索质量（context_recall 召回/context_precision 精度）；③ 端到端（answer_correctness）。</li><li><strong>Agent 评估</strong>：任务成功率、步数（效率）、工具调用准确率、token 消耗、是否跑偏/死循环。</li><li><strong>线上监控四要素</strong>：① 质量监控（用 LLM as judge 实时评）；② 成本监控（token/费用告警）；③ 延迟监控（首 token/总时间）；④ 漂移监控（输入分布/输出分布变化）。</li><li><strong>黄金数据集</strong>：离线评估要用人工标注的黄金集回归测试，每次改 Prompt/换模型都跑，防止改坏。</li><li><strong>LLM as Judge</strong>：用强模型评弱模型输出，是 AI 评估的常用手段，但有偏差要校准。</li><li><strong>工具栈</strong>：RAGAS（RAG 评估）/ LangSmith / Phoenix（Arize）/ Langfuse（开源可观测），按场景选。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>为什么 AI 要评估<ul><li>输出概率性</li><li>不能 pass/fail</li><li>要量化质量</li></ul></li><li>RAG 评估（RAGAS）<ul><li>生成：faithfulness/relevance</li><li>检索：context_recall/precision</li><li>端到端：answer_correctness</li></ul></li><li>Agent 评估<ul><li>任务成功率</li><li>步数/效率</li><li>工具调用准确率</li></ul></li><li>线上监控<ul><li>质量监控（LLM as judge）</li><li>成本监控（token 告警）</li><li>延迟监控（首token/总）</li><li>漂移监控（分布变化）</li></ul></li><li>黄金数据集<ul><li>人工标注</li><li>回归测试</li></ul></li><li>工具栈<ul><li>RAGAS / LangSmith / Phoenix / Langfuse</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为 AI 应用&quot;能用就行&quot;，不知道评估指标和线上监控这套体系。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：黄金数据集、评估指标、LLM as judge、线上日志、监控仪表盘、告警</li><li>连接：离线评估（黄金集→指标→报告）；线上监控（请求→日志→指标→告警）</li><li>流向：离线评估驱动迭代，线上监控保稳定</li><li>边界：LLM as judge 有偏差；漂移检测滞后；评估成本高</li><li>变化：模型/Prompt 变→重跑评估；线上分布变→漂移告警</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=hierarchy。评估与可观测性(concept)→[离线评估(指标/黄金集)/线上监控(质量/成本/延迟/漂移)/工具栈]。</p>\n<p><strong>类比</strong>：像给 AI 应用配体检+监护仪——离线评估是定期体检（黄金集查健康），线上监控是 ICU 监护仪（实时盯生命体征）。没这两套，AI 应用上线就是黑盒瞎跑。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么知道 AI 应用好不好、坏没坏。AI 输出不是对错而是好坏，所以要量化评估：RAG 用 RAGAS 量检索准不准、答得有没有依据；Agent 量任务成功率。上线后还要实时盯——成本别爆、延迟别太长、用户输入分布变了要发现（漂移）。就像传统软件要测试+监控，AI 应用要评估+可观测。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>RAG 上线前：用 100 条黄金问题跑 RAGAS，faithfulness 要 &gt; 0.9 才发布。</li><li>Agent 监控：步数突增告警（可能死循环），成本突增告警（可能被刷）。</li><li>模型升级回归：换 GPT-4o-mini 前跑黄金集，确认指标不降才切。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>LLM as judge 有偏差（评自己更宽容）</li><li>漂移检测滞后（要积累数据才发现）</li><li>评估成本高（用 GPT-4 评贵）</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（judge 偏差）→ 用不同模型族 judge + 人工抽查校准</li><li>边界2（漂移滞后）→ 缩短窗口+主动监控关键词分布</li><li>边界3（成本）→ 抽样评估+用小模型 judge</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>RAG 怎么评：原以为看回答顺不顺→校准为 RAGAS 四指标（检索召回/精度+生成 faithfulness/relevance）。</li><li>线上监控盯什么：原以为只看错误率→校准为质量+成本+延迟+漂移四要素。</li><li>LLM as judge 可信吗：原以为完全可信→校准为有偏差要校准，评自己更宽容。</li></ol>\n<p><strong>成长对比</strong>：起点（AI能用就行）→ 现在（RAGAS指标+Agent评估+线上四要素监控+黄金集回归）。</p>\n</details>\n<p>📎 <a href=\"_transcript/AI应用评估与可观测性.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/AI应用评估与可观测性.svg\" target=\"_blank\" rel=\"noopener\">_viz/AI应用评估与可观测性.svg</a></li><li>Mermaid 源：<a href=\"_viz/AI应用评估与可观测性.mmd\" target=\"_blank\" rel=\"noopener\">_viz/AI应用评估与可观测性.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>hierarchy</b></div><img src=\"_viz/AI应用评估与可观测性.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/AI应用评估与可观测性.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/AI应用评估与可观测性.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Shahul Es · RAGAS 作者</h3>\n<ul><li><strong>身份</strong>：RAGAS 维护者</li><li><strong>与本概念的关系</strong>：RAGAS 是 RAG 评估的事实标准</li><li><strong>核心洞见</strong>：RAG 优化必须评估驱动，没指标就是盲调</li><li><strong>代表作</strong>：RAGAS</li><li><strong>扩展阅读</strong>：<a href=\"https://docs.ragas.io/\" target=\"_blank\" rel=\"noopener\">RAGAS 文档</a></li></ul>\n<h3 id=\"sec-7\">2. Harrison Chase · LangSmith 设计者</h3>\n<ul><li><strong>身份</strong>：LangChain Inc CEO</li><li><strong>与本概念的关系</strong>：LangSmith 把 LLM 应用的调试/监控/评估一体化</li><li><strong>核心洞见</strong>：LLM 应用的可观测性比传统软件更重要，因为输出不确定</li><li><strong>代表作</strong>：LangSmith</li><li><strong>扩展阅读</strong>：<a href=\"https://docs.smith.langchain.com/\" target=\"_blank\" rel=\"noopener\">LangSmith 文档</a></li></ul>\n<h3 id=\"sec-8\">3. Jason Lopatecki · Arize AI 创始人</h3>\n<ul><li><strong>身份</strong>：Arize AI 创始人</li><li><strong>与本概念的关系</strong>：Phoenix 是开源 LLM 可观测性工具，专注漂移和质量监控</li><li><strong>核心洞见</strong>：LLM 应用的漂移和质量监控要借鉴传统 ML 的可观测性经验</li><li><strong>代表作</strong>：Arize Phoenix</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/Arize-ai/phoenix\" target=\"_blank\" rel=\"noopener\">Phoenix GitHub</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"RAG基础架构\">RAG基础架构</a> · <a class=\"xref\" data-go=\"高级RAG技术\">高级RAG技术</a> · <a class=\"xref\" data-go=\"Agent架构与ReAct模式\">Agent架构与ReAct模式</a> · <a class=\"xref\" data-go=\"API服务与FastAPI\">API服务与FastAPI</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "AI应用评估与可观测性"}, "API服务与FastAPI": {"doc": "<div class=\"dochead\"><h1>API服务与FastAPI <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔把 AI 能力封装成 RESTful 服务〕的——做好鉴权、流式、并发，是工程交付的标配。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能用 FastAPI 把 AI 能力封装成生产级 API：鉴权、流式响应、并发管理、错误处理、文档自动生成。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>FastAPI 是 AI API 首选</strong>：异步原生支持（LLM 调用是 IO 密集）、Pydantic 数据校验、自动 OpenAPI 文档、性能接近 Go。</li><li><strong>流式响应是 AI API 关键</strong>：LLM 生成慢，用 SSE/WebSocket 流式返回 chunks，首 token 延迟 &lt; 500ms，体验质变。FastAPI 用 <code>StreamingResponse</code> 实现。</li><li><strong>鉴权与限流</strong>：API key/JWT 鉴权 + 限流（按用户/IP）防滥用+控成本。AI API 成本高，不限流容易被刷爆。</li><li><strong>并发与超时</strong>：LLM 调用慢（几秒到几十秒），要设超时 + 异步并发 + 队列缓冲，避免阻塞。</li><li><strong>错误处理与降级</strong>：LLM API 会失败（rate limit/超时/模型不可用），要重试+退避+降级（换小模型/返回缓存）。</li><li><strong>Pydantic 定义 Schema</strong>：请求/响应用 Pydantic 模型，自动校验+文档+序列化，AI 应用数据结构复杂时特别有用。</li><li><strong>部署配 Uvicorn/Gunicorn</strong>：开发用 Uvicorn，生产用 Gunicorn+Uvicorn worker，前面挂 Nginx。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>FastAPI 选型理由<ul><li>异步原生（LLM IO 密集）</li><li>Pydantic 校验</li><li>自动文档</li><li>高性能</li></ul></li><li>流式响应<ul><li>SSE / WebSocket</li><li>StreamingResponse</li><li>首 token 延迟</li></ul></li><li>鉴权与限流<ul><li>API key / JWT</li><li>按用户/IP 限流</li><li>控成本防滥用</li></ul></li><li>并发与超时<ul><li>异步并发</li><li>超时控制</li><li>队列缓冲</li></ul></li><li>错误处理<ul><li>重试退避</li><li>降级策略</li><li>缓存兜底</li></ul></li><li>部署<ul><li>Uvicorn/Gunicorn</li><li>Nginx 反代</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：会用 Flask 写简单 API，但没想过 AI API 的流式、限流、降级这些特殊问题。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：客户端、FastAPI、LLM API、鉴权中间件、限流器、流式响应、队列</li><li>连接：客户端→鉴权→限流→FastAPI→LLM API→流式 chunks→客户端</li><li>流向：请求进→异步调 LLM→流式回；并发请求靠异步 IO 不阻塞</li><li>边界：LLM 超时/失败要降级；限流防刷；流式中断要处理</li><li>变化：并发量↑→异步+队列；LLM 慢→流式+超时</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=flow。客户端(actor)→鉴权(rule)→限流(rule)→FastAPI(process)→LLM API(process)→流式(data)→客户端。</p>\n<p><strong>类比</strong>：FastAPI 像餐厅前厅——接单（请求）、验身（鉴权）、限流（座位数）、异步下单到厨房（LLM）、出菜窗口流式端菜（SSE）。前厅不阻塞，厨房慢不影响接单。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么把 AI 能力做成别人能调的接口。直接调 LLM API 慢且贵，要包一层：验身份防滥用、限流控成本、流式返回让用户秒看到第一个字、出错能降级。FastAPI 因为异步+自动文档是首选。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>AI 写作 API：FastAPI+SSE 流式返回，用户边生成边看。</li><li>客服后端：JWT 鉴权+按租户限流+LLM 失败降级到规则引擎。</li><li>批量处理 API：异步队列+webhook 回调，长任务不阻塞。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>LLM API 超时/失败 → 阻塞或报错</li><li>高并发不限流 → 成本爆炸</li><li>流式中断 → 用户拿到残缺结果</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（LLM 失败）→ 重试+退避+降级（换模型/缓存）</li><li>边界2（成本爆炸）→ 按用户限流+预算告警</li><li>边界3（流式中断）→ 记录已返回 chunks+断点续传或重试</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>为什么用 FastAPI 不用 Flask：原以为都行→校准为 AI API 是 IO 密集，FastAPI 异步原生性能远超 Flask 同步。</li><li>流式为什么重要：原以为只是体验→校准为首 token 延迟决定用户感知&quot;快慢&quot;，整段等用户以为卡死。</li><li>限流怎么做：原以为只限 QPS→校准为按用户/IP/租户多维限流，AI 还要按 token 预算限。</li></ol>\n<p><strong>成长对比</strong>：起点（FastAPI=异步Flask）→ 现在（流式+鉴权限流+并发超时+降级+部署全栈）。</p>\n</details>\n<p>📎 <a href=\"_transcript/API服务与FastAPI.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/API服务与FastAPI.svg\" target=\"_blank\" rel=\"noopener\">_viz/API服务与FastAPI.svg</a></li><li>Mermaid 源：<a href=\"_viz/API服务与FastAPI.mmd\" target=\"_blank\" rel=\"noopener\">_viz/API服务与FastAPI.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/API服务与FastAPI.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/API服务与FastAPI.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/API服务与FastAPI.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Sebastián Ramírez · FastAPI 作者</h3>\n<ul><li><strong>身份</strong>：FastAPI 创始人</li><li><strong>与本概念的关系</strong>：FastAPI 的设计者，异步+类型+文档三合一</li><li><strong>核心洞见</strong>：API 框架应该让开发者&quot;写得少、得的多&quot;——Pydantic 校验+自动文档+异步是关键</li><li><strong>代表作</strong>：FastAPI</li><li><strong>扩展阅读</strong>：<a href=\"https://fastapi.tiangolo.com/\" target=\"_blank\" rel=\"noopener\">FastAPI 官网</a></li></ul>\n<h3 id=\"sec-7\">2. Sam Column · LLM API 工程实践</h3>\n<ul><li><strong>身份</strong>：AI 应用架构师</li><li><strong>与本概念的关系</strong>：系统总结 LLM API 的流式/限流/降级工程模式</li><li><strong>核心洞见</strong>：LLM API 的工程复杂度远超传统 API，流式+降级+成本控制是生产标配</li><li><strong>代表作</strong>：LLM API 工程模式系列博客</li><li><strong>扩展阅读</strong>：<a href=\"https://thetechbuffer.com/\" target=\"_blank\" rel=\"noopener\">相关博客合集</a></li></ul>\n<h3 id=\"sec-8\">3. 王树义 · 中文 AI 工程实践</h3>\n<ul><li><strong>身份</strong>：技术博主、AI 工程师</li><li><strong>与本概念的关系</strong>：用中文场景讲 FastAPI+LLM 的工程实践</li><li><strong>核心洞见</strong>：中文场景的 LLM API 要特别处理 token 成本和中文流式渲染</li><li><strong>代表作</strong>：AI 工程实践系列博客</li><li><strong>扩展阅读</strong>：<a href=\"https://www.jianshu.com/u/8c85b4c4b3b5\" target=\"_blank\" rel=\"noopener\">王树义博客</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"ChatGPT API与对话系统\">ChatGPT API与对话系统</a> · <a class=\"xref\" data-go=\"Docker容器化部署\">Docker容器化部署</a> · <a class=\"xref\" data-go=\"AI应用评估与可观测性\">AI应用评估与可观测性</a> · <a class=\"xref\" data-go=\"AI应用作品集项目\">AI应用作品集项目</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "API服务与FastAPI"}, "模型微调入门": {"doc": "<div class=\"dochead\"><h1>模型微调入门 <span class=\"stars\">★★★<span class=\"se\">★★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 快轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔SFT/LoRA 等轻量微调原理与适用场景〕的——应用工程师&quot;了解&quot;层，不必深入训练。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能判断&quot;这个任务该不该微调、用哪种微调、用什么数据&quot;，面试时讲得清微调和应用层优化的区别。</p>\n<p><strong>重点结论</strong>（6 条）：</p>\n<ol><li><strong>微调 = 在预训练模型上用领域数据继续训练</strong>：让模型适应特定任务/领域/风格。区别于 RAG（外挂知识），微调改的是模型参数。</li><li><strong>SFT（Supervised Fine-Tuning）</strong>：用&quot;输入-输出&quot;对监督训练，最基础。适合任务/风格定制（如客服语气、特定格式输出）。</li><li><strong>LoRA（Low-Rank Adaptation）</strong>：不训全部参数，只训低秩适配矩阵（几 MB vs 几 GB），省显存省时间，效果接近全参微调。是应用层微调事实标准。</li><li><strong>QLoRA</strong>：LoRA + 4bit 量化，单卡 24G 显存能微调 70B 模型，进一步降低门槛。</li><li><strong>微调 vs RAG 选型</strong>：知识更新/可溯引用 → RAG；任务/风格/格式定制 → 微调；两者可叠加（微调提能力+RAG 接知识）。</li><li><strong>应用工程师定位</strong>：会判断该不该微调+会用工具（LLaMA-Factory/Axolotl）跑微调+会评估，不必自己设计训练算法。</li></ol>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要）</summary>\n<p><strong>起点认知</strong>：以为微调就是&quot;再训练一下模型&quot;，不知道 LoRA 这种轻量手段和 RAG 的选型区别。</p>\n<p><strong>核心要点</strong>：应用工程师不用自己训模型，但要会判断：知识问题用 RAG，能力/风格问题用微调，LoRA/QLoRA 让微调平民化。微调要数据（几千条起）+评估（别微调完更差）+部署（微调后模型要托管）。</p>\n<p><strong>类比</strong>：RAG 像给模型配参考书（外挂知识），微调像送模型去培训班（内化能力）。参考书随时换，培训完改不了得再培训。</p>\n<p><strong>应用例子</strong>：</p>\n<ol><li>客服语气定制：用 5000 条客服对话 SFT，让模型学客服口吻。</li><li>代码补全：用领域代码 LoRA 微调，补全准确率提升。</li><li>格式输出：微调让模型稳定输出特定 JSON schema。</li></ol>\n</details>\n<h2 id=\"sec-4\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-5\">1. Edward Hu · LoRA 论文一作</h3>\n<ul><li><strong>身份</strong>：前 Microsoft 研究员</li><li><strong>与本概念的关系</strong>：LoRA 算法提出者，让微调平民化</li><li><strong>核心洞见</strong>：用低秩矩阵近似参数更新，能用 1% 参数量达到接近全参微调效果</li><li><strong>代表作</strong>：*LoRA: Low-Rank Adaptation of LLMs*</li><li><strong>扩展阅读</strong>：<a href=\"https://arxiv.org/abs/2106.09685\" target=\"_blank\" rel=\"noopener\">arXiv 论文</a></li></ul>\n<h3 id=\"sec-6\">2. Tim Dettmers · QLoRA 作者</h3>\n<ul><li><strong>身份</strong>：华盛顿大学研究员</li><li><strong>与本概念的关系</strong>：QLoRA 把 LoRA+4bit 量化结合，单卡微调 70B</li><li><strong>核心洞见</strong>：量化+适配器让大模型微调从数据中心走进个人电脑</li><li><strong>代表作</strong>：*QLoRA: Efficient Finetuning of Quantized LLMs*</li><li><strong>扩展阅读</strong>：<a href=\"https://arxiv.org/abs/2305.14314\" target=\"_blank\" rel=\"noopener\">arXiv 论文</a></li></ul>\n</details>\n<h2 id=\"sec-7\">相关</h2>\n<p><a class=\"xref\" data-go=\"Transformer架构原理\">Transformer架构原理</a> · <a class=\"xref\" data-go=\"LLM工作原理与Token机制\">LLM工作原理与Token机制</a> · <a class=\"xref\" data-go=\"RAG基础架构\">RAG基础架构</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-7\">相关</a>", "title": "模型微调入门"}, "Dify低代码AI平台": {"doc": "<div class=\"dochead\"><h1>Dify低代码AI平台 <span class=\"stars\">★★★<span class=\"se\">★★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 快轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔低代码可视化快速搭建 AI 应用〕的——适合快速验证和内部工具场景。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能判断什么场景该用 Dify（快速验证/内部工具）什么场景该写代码（定制/生产），并用 Dify 搭一个基础 RAG/Agent 应用。</p>\n<p><strong>重点结论</strong>（5 条）：</p>\n<ol><li><strong>Dify = 开源低代码 AI 应用平台</strong>：可视化拖拽搭 Workflow/Prompt/RAG/Agent，不用写代码就能出 demo。</li><li><strong>核心能力</strong>：Prompt 管理 + RAG 知识库 + Workflow 编排 + Agent + 模型管理（多供应商）+ API 一键发布。</li><li><strong>适合场景</strong>：快速原型验证、内部工具、非工程团队自助搭建、教学演示。</li><li><strong>不适合场景</strong>：高度定制逻辑、性能敏感、复杂状态管理、需要深度集成的生产系统——这些用 LangChain/LangGraph 写代码。</li><li><strong>和 LangChain 关系</strong>：Dify 是&quot;给非开发者用&quot;，LangChain 是&quot;给开发者用&quot;；Dify 底层也用类似编排思想但封装更深。</li></ol>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要）</summary>\n<p><strong>起点认知</strong>：以为 Dify 是&quot;玩具&quot;，不知道它在快速验证和内部工具场景的价值。</p>\n<p><strong>核心要点</strong>：Dify 降低了 AI 应用搭建门槛——产品经理/运营都能拖拽搭一个 RAG 问答或 Agent。代价是灵活性受限，复杂逻辑还是得写代码。生产级定制用 LangChain，快速验证用 Dify。</p>\n<p><strong>类比</strong>：Dify 像 AI 应用版的 WordPress/Wix——拖拽建站快，但要做高度定制的电商 SaaS 还得自己写。</p>\n<p><strong>应用例子</strong>：</p>\n<ol><li>内部知识库问答：上传文档→配 Prompt→发布，半天出 demo。</li><li>客服 Agent：拖 Workflow 配工具，不用写代码。</li><li>概念验证：见投资人前用 Dify 2 小时搭原型。</li></ol>\n</details>\n<h2 id=\"sec-4\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-5\">1. 张路宇（Ly. Zhang）· Dify 创始人</h3>\n<ul><li><strong>身份</strong>：LangGenius 创始人</li><li><strong>与本概念的关系</strong>：Dify 的设计者，定位&quot;让 AI 应用开发平民化&quot;</li><li><strong>核心洞见</strong>：不是所有 AI 应用都需要写代码，低代码让更多人能参与 AI 应用构建</li><li><strong>代表作</strong>：Dify</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/langgenius/dify\" target=\"_blank\" rel=\"noopener\">Dify GitHub</a></li></ul>\n<h3 id=\"sec-6\">2. Harrison Chase · 对照视角（LangChain 创始人）</h3>\n<ul><li><strong>身份</strong>：LangChain Inc CEO</li><li><strong>与本概念的关系</strong>：LangChain 是&quot;给开发者&quot;的框架，和 Dify&quot;给所有人&quot;形成对照</li><li><strong>核心洞见</strong>：低代码和代码框架不冲突，服务不同人群和场景</li><li><strong>代表作</strong>：LangChain</li><li><strong>扩展阅读</strong>：<a href=\"https://www.langchain.com/\" target=\"_blank\" rel=\"noopener\">LangChain 官网</a></li></ul>\n</details>\n<h2 id=\"sec-7\">相关</h2>\n<p><a class=\"xref\" data-go=\"RAG基础架构\">RAG基础架构</a> · <a class=\"xref\" data-go=\"Agent架构与ReAct模式\">Agent架构与ReAct模式</a> · <a class=\"xref\" data-go=\"LangChain框架\">LangChain框架</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-7\">相关</a>", "title": "Dify低代码AI平台"}, "Docker容器化部署": {"doc": "<div class=\"dochead\"><h1>Docker容器化部署 <span class=\"stars\">★★★<span class=\"se\">★★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 快轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔用容器化方式交付 AI 应用〕的——解决环境一致性与云端部署问题。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能为 AI 应用写 Dockerfile、构建镜像、本地跑通、部署到云，并理解为什么容器化是部署标配。</p>\n<p><strong>重点结论</strong>（5 条）：</p>\n<ol><li><strong>Docker 解决&quot;在我机器上能跑&quot;问题</strong>：把应用+依赖+环境打包成镜像， anywhere 一样跑。AI 应用依赖复杂（Python+torch+transformers+系统库），尤其需要。</li><li><strong>AI 应用 Dockerfile 要点</strong>：基础镜像选 python:slim、分阶段构建减小镜像、requirements 锁版本、.dockerignore 排除大文件、CUDA 镜像跑 GPU。</li><li><strong>docker-compose 编排多服务</strong>：AI 应用常是 API+向量库+前端，compose 一键起全栈。</li><li><strong>部署到云</strong>：本地跑通→推镜像到 Registry→云服务器拉取运行；或用云容器服务（ECS/Cloud Run/Cloudflare）。</li><li><strong>生产要点</strong>：日志挂载、健康检查、资源限制、重启策略、 secrets 管理（API key 不进镜像）。</li></ol>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要）</summary>\n<p><strong>起点认知</strong>：知道 Docker 是&quot;轻量虚拟机&quot;，但没为 AI 应用写过 Dockerfile。</p>\n<p><strong>核心要点</strong>：AI 应用依赖多（Python+模型库+系统依赖），Docker 把它打包成镜像解决环境一致。Dockerfile 要小（slim 基础镜像+分层缓存）、要安全（secrets 不进镜像）、要可观测（日志+健康检查）。</p>\n<p><strong>类比</strong>：Docker 像把整个厨房（应用+锅碗瓢盆+食谱）打包成集装箱，运到任何地方打开就能开火，不用担心那边没锅没炉子。</p>\n<p><strong>应用例子</strong>：</p>\n<ol><li>RAG 服务：FastAPI+Chroma+embedding 模型打包，compose 一键起。</li><li>模型服务：torch+transformers+CUDA 镜像，部署到 GPU 云。</li><li>作品集项目：Docker 化让面试官一键跑你的 demo。</li></ol>\n</details>\n<h2 id=\"sec-4\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-5\">1. Solomon Hykes · Docker 创始人</h3>\n<ul><li><strong>身份</strong>：Docker Inc 创始人</li><li><strong>与本概念的关系</strong>：容器化的普及者，让容器从运维专属变开发者标配</li><li><strong>核心洞见</strong>：容器让应用和基础设施解耦，开发者不用管部署环境</li><li><strong>代表作</strong>：Docker</li><li><strong>扩展阅读</strong>：<a href=\"https://www.docker.com/\" target=\"_blank\" rel=\"noopener\">Docker 官网</a></li></ul>\n<h3 id=\"sec-6\">2. FastAPI 官方 · 部署最佳实践</h3>\n<ul><li><strong>身份</strong>：FastAPI 团队</li><li><strong>与本概念的关系</strong>：官方提供 AI 应用的 Docker 部署模板</li><li><strong>核心洞见</strong>：AI 应用 Dockerfile 要小+分层缓存+多阶段构建</li><li><strong>代表作</strong>：FastAPI 部署文档</li><li><strong>扩展阅读</strong>：<a href=\"https://fastapi.tiangolo.com/deployment/docker/\" target=\"_blank\" rel=\"noopener\">FastAPI Docker 部署</a></li></ul>\n</details>\n<h2 id=\"sec-7\">相关</h2>\n<p><a class=\"xref\" data-go=\"API服务与FastAPI\">API服务与FastAPI</a> · <a class=\"xref\" data-go=\"AI应用作品集项目\">AI应用作品集项目</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id \"noopener\">打开来源</a><div class=\"refbody\"><ul><li><strong>OpenAI Tokenizer 官方页</strong>（官方文档，2026-06-28 抓取）链接：<ul><li>原话引述：&quot;OpenAI&#x27;s large language models process text using tokens, which are common sequences of characters found in a set of text.&quot;</li><li>AI 转述（可信度：高）：token 是文本中常见的字符序列，模型学的是 token 间的统计关系。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">**OpenAI tiktoken README**（官方文档，2026-06-28 抓取）</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"LLM工作原理与Token机制\">LLM工作原理与Token机制</a></div><a class=\"refurl\" href=\"https://github.com/openai/tiktoken\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li><strong>OpenAI tiktoken README</strong>（官方文档，2026-06-28 抓取）链接：<ul><li>原话引述：&quot;each token corresponds to about 4 bytes&quot;（纠正了&quot;4 字符&quot;的错误）</li><li>AI 转述（可信度：高）：BPE 把高频字节对粘成子词，&quot;ing&quot; 这种常见子词会被单独切一个 token。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">**Anthropic Claude Context Windows 文档**（官方文档，2026-06-28 抓取）</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"LLM工作原理与Token机制\">LLM工作原理与Token机制</a></div><a class=\"refurl\" href=\"https://platform.claude.com/docs/en/build-with-claude/context-windows\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li><strong>Anthropic Claude Context Windows 文档</strong>（官方文档，2026-06-28 抓取）链接：<ul><li>原话引述：&quot;The context window refers to all the text a language model can reference when generating a response, including the response itself... As token count grows, accuracy and recall degrade, a phenomenon known as context rot.&quot;</li><li>AI 转述（可信度：高）：上下文窗口是输入+输出共用总容量，Claude Opus 4.6/4.7/4.8 窗口 1M、单次输出上限 128k。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">**Machine Learning Mastery · KV Caching**（工程教程，2026-06-28 抓取）</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"LLM工作原理与Token机制\">LLM工作原理与Token机制</a></div><a class=\"refurl\" href=\"https://machinelearningmastery.com/kv-caching-in-llms-a-guide-for-developers/\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li><strong>Machine Learning Mastery · KV Caching</strong>（工程教程，2026-06-28 抓取）链接：<ul><li>原话引述：&quot;When generating token, only Q changes. The K and V for all previous tokens are identical to what they were in the previous step.&quot;</li><li>AI 转述（可信度：高）：KV cache 让历史 K/V 复用，只算新 token 的 Q，3-5× 加速。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">**Sennrich et al. 2016 BPE 论文**（ACL 论文，2026-06-28 抓取）</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"LLM工作原理与Token机制\">LLM工作原理与Token机制</a></div><a class=\"refurl\" href=\"https://aclanthology.org/P16-1162/\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li><strong>Sennrich et al. 2016 BPE 论文</strong>（ACL 论文，2026-06-28 抓取）链接：<ul><li>原话引述：&quot;rare words can be translated by translating smaller units than words&quot;</li><li>AI 转述（可信度：高）：BPE 用于把罕见词拆为子词单元，是现代 tokenizer 的理论源头。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">**LangChain Python 文档**（官方文档，2026-06-28）</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"LangChain框架\">LangChain框架</a></div><a class=\"refurl\" href=\"https://python.langchain.com/docs/get_started/introduction\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li><strong>LangChain Python 文档</strong>（官方文档，2026-06-28）<ul><li>原话：LangChain 提供 Models/Prompts/Memory/Retrievers/Tools/Chains 六大抽象。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">**LangChain 新版文档**（官方，2026-06-28）</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"LangChain框架\">LangChain框架</a></div><a class=\"refurl\" href=\"https://docs.langchain.com/\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li><strong>LangChain 新版文档</strong>（官方，2026-06-28）<ul><li>原话：LCEL 是声明式链构建语法。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft function gIsDone(){if(!R||(R.learned||0)===0)return false;/*防呆：一个概念都没完成，目标不可能完成——拦住 AI 误写 status:已完成 / 空要求被当 100%*/var ls=false;try{ls=localStorage.getItem('goal_done_'+CAT)==='1';}catch(e){}return ls||(GOAL&&GOAL.status==='已完成');}

function gUnlocked(){return gHasGoal()||R.learned>0;}
function gReqOk(r){return r&&(r.have===true||r.status==='✓'||r.status==='ok'||r.status===true);}
function gReqVia(r){return (r&&(r.via||r.refs||r.by))||[];}
function gReqName(r){return (typeof r==='string')?r:(r.name||r.req||'');}
function gReqKind(r){return (r&&r.kind&&(r.kind==='实践型'||r.kind==='practice'))?'实践型':'知识型';}
function gAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function gLearnedSet(){var s={};(R.order||[]).forEach(function(o){if(o.status==='已完成')s[o.title]=1;});return s;}
// 知识型覆盖度：via 概念里有多少已完成 / via 总数；via 空时回退 have 兜底
function gCov(r,LRN){var via=gReqVia(r);if(!via.length){var ok=gReqOk(r);return {pct:ok?100:0,n:0,tot:0,done:ok};}var n=0;via.forEach(function(c){if(LRN[c])n++;});return {pct:Math.round(n/via.length*100),n:n,tot:via.length,done:n>=via.length};}
function gCircle(c){if(c.done)return '<span class="gck ok">✓</span>';if(c.pct<=0)return '<span class="gck no">○</span>';return '<span class="gck part" title="'+c.n+'/'+c.tot+' 概念已完成" style="background:conic-gradient(var(--green) 0% '+c.pct+'%, color-mix(in srgb,var(--muted) 14%,transparent) '+c.pct+'% 100%)"></span>';}
// via 概念链接：单个直接可点；多个收成「{ N个概念 ⌄」点击展开
function gVia(via){if(!via.length)return '';if(via.length===1)return ' <a class="gvia1" data-go="'+gAttr(via[0])+'">'+via[0]+'</a>';var items=via.map(function(c){return '<a class="gviac" data-go="'+gAttr(c)+'">'+c+'</a>';}).join('<span class="gvsep">·</span>');return ' <span class="gexp"><span class="gexpb">{ '+via.length+'个概念 ⌄</span><span class="gexpbody">'+items+'</span></span>';}

// 实时完成进度：知识型按覆盖比例 + 实践型按 ☑ 勾选，合计/总要求数
function gProgress(){
  var g=GOAL||{},done=gIsDone(),LRN=gLearnedSet(),reqs=g.requirements||[];
  var kreqs=reqs.filter(function(r){return gReqKind(r)!=='实践型';});
  var preqs=reqs.filter(function(r){return gReqKind(r)==='实践型';});
  var psum=0;
  kreqs.forEach(function(r){psum+=gCov(r,LRN).pct/100;});
  preqs.forEach(function(r,i){if(gPractOn(i))psum+=1;});
  var prog=reqs.length?Math.round(psum/reqs.length*100):0; if(done)prog=100;
  var ptier=prog>=80?'高':(prog>=50?'中':'低');
  return {prog:prog,ptier:ptier,tc:gTierColor(ptier)};
}

  if(!gHasGoal()){var _nx=(R&&R.next3)||[],_sg=(GOAL&&GOAL.suggested_goals)||[],_n=(R&&R.order)?R.order.length:0,_has=(_nx.length||_sg.length);var _h='<div class="gempty"><h1>🎯 目标规划</h1><p>这个领域你已攒了 <b>'+_n+'</b> 个知识点。'+(_has?'<b>定个目标</b>我就能联网对照真实要求、按优先级帮你规划；<b>不定也行</b>——下面有通用下一步。':'')+'</p>';if(_sg.length)_h+='<div class="gh3">💡 你可能想要的目标（说一个，或自己定）</div><div class="grecs">'+_sg.map(function(s){return '<div class="grec"><span class="gp">🎯</span><div class="grn">'+fesc(s)+'</div></div>';}).join('')+'</div>';if(_nx.length)_h+='<div class="gh3">👉 不定目标也能继续 · 下一步建议</div><div class="grecs">'+_nx.map(function(t,i){return '<div class="grec"><span class="gp">'+(i+1)+'</span><div class="grn">'+fesc(t)+'</div></div>';}).join('')+'</div>';if(!_has)_h+='<div class="grec" style="border-color:var(--accent)"><span class="gp">👉</span><div class="grn">你已学的点都点亮了，<b>但还没有"待学"的下一站</b>。想继续学这个领域，跟我说<b>「接着学」</b>或<b>定个目标</b>，我就把下一段路线铺出来（先补几个"待学"节点，再给你下一站）。</div></div>';_h+='<p class="gref">想定目标直接告诉我（参考分类：应试 · 求职 · 分享 · 知识变现 · 自主学习 · 无目标(AI自主发散)）。</p></div>';b.innerHTML=_h;return;}
  var g=GOAL,done=gIsDone(),h='';

  if(done)h+='<div class="celebrate"><div class="cbig">🎉 目标完成！</div><div>恭喜拿下「'+g.goal+'」。</div></div>';

  // 顶部进度＝实时完成进度（不再读 AI 写的 match，随 ✓/☑ 自动刷新）
  var LRN=gLearnedSet();
  var reqs=g.requirements||[];
  var kreqs=reqs.filter(function(r){return gReqKind(r)!=='实践型';});
  var preqs=reqs.filter(function(r){return gReqKind(r)==='实践型';});
  var P=gProgress();

  if(g.summary)h+='<p class="gsum">'+g.summary+'</p>';
  if(reqs.length){
    if(kreqs.length){
      h+='<div class="gh3">目标要求对照 · 知识覆盖</div>';
      h+='<div class="gcap">真实世界对该目标的要求清单，用来查你的<b>学习覆盖度</b>；与左侧概念<b>非一一对应</b>——一条要求可能由多个概念覆盖，✓＝其覆盖概念已完成（部分完成按比例填充）。</div>';
      h+='<div class="greqs">'+kreqs.map(function(r){var c=gCov(r,LRN);return '<div class="greq">'+gCircle(c)+'<span class="greqn">'+gReqName(r)+gVia(gReqVia(r))+'</span></div>';}).join('')+'</div>';
    }
    if(preqs.length){
      h+='<div class="gh3">实践清单 · 靠动手达成（自检）</div>';
      h+='<div class="gpracts">'+preqs.map(function(r,i){var on=gPractOn(i);return '<div class="gpract"><span class="gpck'+(on?' on':'')+'" data-pi="'+i+'" role="checkbox" aria-checked="'+(on?'true':'false')+'" tabindex="0" title="点这个方框手动勾选">'+(on?'☑':'▢')+'</span><span class="greqn">'+gReqName(r)+'</span></div>';}).join('')+'</div>';
    }
  }
  if(!done&&P.ptier!=='高'&&g.recommend&&g.recommend.length)h+='<div class="gh3">下一步学习规划 · 按优先级</div><div class="grecs">'+g.recommend.map(function(r,i){if(typeof r==='string'){return '<div class="grec"><span class="gp">P'+(i+1)+'</span><div><div class="grn">'+r+'</div></div></div>';}var nm=r.concept||r.name||'',why=r.why||r.reason||'';return '<div class="grec"><span class="gp">P'+(r.priority||i+1)+'</span><div><div class="grn">'+nm+'</div>'+(why?'<div class="grw">'+why+'</div>':'')+'</div></div>';}).join('')+'</div>';
  if((done||P.ptier==='高')&&g.high_actions&&g.high_actions.length)h+='<div class="gh3">去实践 · 把知识用起来</div><ul class="gacts">'+g.high_actions.map(function(a){return '<li>'+a+'</li>';}).join('')+'</ul>';
  if(g.sources&&g.sources.length)h+='<div class="gsrc">目标要求来源：'+g.sources.map(function(s,i){return '<a href="'+s+'" target="_blank" rel="noopener">来源'+(i+1)+'</a>';}).join(' · ')+'</div>';
  h+='<div class="gfb"><div class="gh3">完成反馈</div><textarea id="gfbtext" placeholder="例如：参加 CET-4 考试通过！/ 已做完 3 套模拟题，阅读还需加强…"></textarea>';
  if(!done)h+='<div><button id="gdone" class="gbtn">🎉 标记目标完成</button><span class="gnote">点完成后请告诉我一声，我会更新数据、让知识图谱里这部分知识“活”起来。</span></div>';
  else h+='<div class="gnote">已完成。若有新目标，告诉我即可重新规划。</div>';
  h+='</div>';
  b.innerHTML=h;
  // via 概念点击跳转（单个 / 展开后的多个）
  b.querySelectorAll('[data-go]').forEach(function(a){a.onclick=function(e){e.stopPropagation();go(this.getAttribute('data-go'));};});
  // 多概念大括号：点击展开/收起（展开他人先收起）；点页面别处收回
  b.querySelectorAll('.gexpb').forEach(function(el){el.onclick=function(e){e.stopPropagation();var p=el.parentNode,wasOpen=p.classList.contains('open');document.querySelectorAll('.gexp.open').forEach(function(x){x.classList.remove('open');var bb=x.querySelector('.gexpb');if(bb)bb.textContent=bb.textContent.replace('⌃','⌄');});if(!wasOpen){p.classList.add('open');el.textContent=el.textContent.replace('⌄','⌃');}};});
  if(!window.__gexpBound){document.addEventListener('click',function(e){if(!(e.target.closest&&e.target.closest('.gexp'))){document.querySelectorAll('.gexp.open').forEach(function(x){x.classList.remove('open');var bb=x.querySelector('.gexpb');if(bb)bb.textContent=bb.textContent.replace('⌃','⌄');});}});window.__gexpBound=true;}
  // 实践清单自检：仅当用户【手动点击复选框本身】才切换；就地更新，绝不因重渲染/切回页面而自动改动
  b.querySelectorAll('.gpck[data-pi]').forEach(function(ck){
    ck.onclick=function(e){
      e.stopPropagation();
      var i=ck.getAttribute('data-pi'),k='goal_pract_'+CAT+'_'+i,on=false;
      try{on=localStorage.getItem(k)==='1';}catch(e){}
      var now=!on;
      try{localStorage.setItem(k,now?'1':'0');}catch(e){}
      ck.classList.toggle('on',now); ck.textContent=now?'☑':'▢'; ck.setAttribute('aria-checked',now?'true':'false');
      var P=gProgress();   // 仅就地刷新顶部进度，不整页重渲染
      var pe=b.querySelector('.gpct'); if(pe){pe.textContent=P.prog+'%';pe.style.color=P.tc;}
      var be=b.querySelector('.gbar>i'); if(be){be.style.width=P.prog+'%';be.style.background=P.tc;}
      var te=b.querySelector('.gtier'); if(te)te.textContent='目标完成进度 · '+(gIsDone()?'已完成':P.ptier+' 档');
    };
  });
  var db=document.getElementById('gdone');
  if(db)db.onclick=function(){try{localStorage.setItem('goal_done_'+CAT,'1');var fb=document.getElementById('gfbtext');if(fb&&fb.value)localStorage.setItem('goal_fb_'+CAT,fb.value);}catch(e){}updateGoalNav();renderGoal();window.scrollTo(0,0);};
}
function fesc(x){return (x==null?'':String(x)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initMermaid(){
  const blocks=[...document.querySelectorAll('#docview .mermaid')];
  if(!blocks.length)return;
  function run(attempt){try{
    mermaid.initialize({startOnLoad:false,theme:document.documentElement.dataset.theme==='dark'||document.documentElement.dataset.theme==='inkdark'?'dark':'default'});
    blocks.forEach(function(b){b.removeAttribute('data-processed');});
    var r=mermaid.run?mermaid.run({nodes:blocks}):mermaid.init(undefined,blocks);
    Promise.resolve(r).catch(function(){if((attempt||0)<1)setTimeout(function(){run((attempt||0)+1);},160);});
  }catch(e){if((attempt||0)<1)setTimeout(function(){run((attempt||0)+1);},160);}}
  if(window.mermaid){run();return;}
  if(window.__mermaidLoading){setTimeout(initMermaid,160);return;}
  window.__mermaidLoading=true;
  const sources=['../assets/mermaid.min.js','assets/mermaid.min.js','https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js'];
  function load(i){if(i>=sources.length){window.__mermaidLoading=false;return;}var s=document.createElement('script');s.src=sources[i];s.onload=function(){window.__mermaidLoading=false;run();};s.onerror=function(){load(i+1);};document.head.appendChild(s);}
  load(0);
}
function go(v){
  const ov=document.getElementById('overview'),dw=document.getElementById('docwrap'),gw=document.getElementById('graphwrap'),goalw=document.getElementById('goalwrap');
  gw.style.display='none';goalw.style.display='none';
  if(v==='__goal__'){if(!gUnlocked()){go('__overview__');return;}ov.style.display='none';dw.style.display='none';goalw.style.display='block';renderGoal();setActive('__goal__');document.getElementById('crumb').innerHTML='/ <b>'+(gIsDone()?'目标完成 ✅':'目标规划')+'</b>';location.hash=encodeURIComponent('__goal__');window.scrollTo(0,0);return;}
  if(v==='__graph__'){ov.style.display='none';dw.style.display='none';gw.style.display='block';
    const gf=document.getElementById('graphframe');if(!gf.src||gf.src==='about:blank'){gf.src=gf.dataset.src+'?theme='+theme();}else{try{gf.contentWindow.postMessage({theme:theme()},'*');}catch(e){}}
    setActive('__graph__');document.getElementById('crumb').innerHTML='/ <b>知识图谱</b>';location.hash=encodeURIComponent('__graph__');window.scrollTo(0,0);return;}
  if(v==='__overview__'||!DOCS[v]){ov.style.display='';dw.style.display='none';setActive('__overview__');
    document.getElementById('crumb').innerHTML='/ <b>学习路线</b>';location.hash='';window.scrollTo(0,0);return;}
  ov.style.display='none';dw.style.display='grid';
  const dt=(DOCS[v]&&DOCS[v].title)||v;
  document.getElementById('docview').innerHTML=DOCS[v].doc;
  document.getElementById('toc').innerHTML=DOCS[v].toc;
  bindXref();bindToc();initMermaid();setActive(v);
  document.getElementById('crumb').innerHTML='/ <span>学习笔记</span> / <b>'+dt+'</b>';
  location.hash=encodeURIComponent(v);window.scrollTo(0,0);
}
const THEMES=[["light","◐ 浅"],["dark","◑ 深"],["ink","❖ 宣纸"],["inkdark","❖ 夜墨"]];
function themeIdx(name){for(var i=0;i<THEMES.length;i++)if(THEMES[i][0]===name)return i;return 1;}
function hasTheme(name){return THEMES.some(function(x){return x[0]===name;});}
function setTheme(t,persist){var r=document.documentElement;r.dataset.theme=t;
  document.getElementById('themebtn').textContent=THEMES[themeIdx(t)][1];
  var gf=document.getElementById('graphframe');if(gf&&gf.src&&gf.src!=='about:blank'){try{gf.contentWindow.postMessage({theme:t},'*');}catch(e){}}
  if(persist!==false){try{localStorage.setItem('gewu_theme',t);}catch(e){}}}
document.getElementById('themebtn').onclick=function(){var cur=document.documentElement.dataset.theme||'dark';
  setTheme(THEMES[(themeIdx(cur)+1)%THEMES.length][0]);};
var savedTheme=null;try{savedTheme=localStorage.getItem('gewu_theme');}catch(e){}
setTheme(hasTheme(savedTheme)?savedTheme:(document.documentElement.dataset.theme||'light'),false);
document.getElementById('homelink').onclick=()=>go('__overview__');
document.getElementById('graphlink').onclick=()=>go('__graph__');
document.getElementById('goallink').onclick=()=>{if(gUnlocked())go('__goal__');};
document.getElementById('noteslink').onclick=function(e){e.preventDefault();toggleNotesNav();};
window.addEventListener('message',function(e){if(e&&e.data&&e.data.goto){var g=e.data.goto;if(DOCS[g])go(g);else{go('__overview__');setTimeout(function(){var el=cardEls[g];if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},80);}}});
renderOverview();buildNav();initNotesNav();updateGoalNav();
go(location.hash?decodeURIComponent(location.hash.slice(1)):'__overview__');
window.addEventListener('hashchange',()=>{go(location.hash?decodeURIComponent(location.hash.slice(1)):'__overview__');});

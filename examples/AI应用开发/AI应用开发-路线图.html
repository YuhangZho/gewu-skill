, "prereqs": ["Agent架构与ReAct模式", "RAG基础架构"], "desc": "它属于AI应用开发，是用来解决〔低代码可视化快速搭建 AI 应用〕的——适合快速验证和内部工具场景。", "xprereqs": [], "track": "快轨", "groups": ["开发框架与工程化"], "related": ["Agent架构与ReAct模式", "LangChain框架", "RAG基础架构"]}, {"title": "Docker容器化部署", "status": "已完成", "stage": 4, "importance": 3, "base_importance": 3, "prereqs": ["API服务与FastAPI"], "desc": "它属于AI应用开发，是用来解决〔用容器化方式交付 AI 应用〕的——解决环境一致性与云端部署问题。", "xprereqs": [], "track": "快轨", "groups": ["部署与评估"], "related": ["AI应用作品集项目", "API服务与FastAPI"]}], "current": null, "next3": [], "progress_hint": {"current_pct": 100, "next_pct": 100, "bar": "[██████████]", "milestone": "", "line": "当前知识图谱覆盖率100%，下一站完成可达100%。"}, "learned": 19, "total": 19, "max_stage": 5}}, "expansions": {"AI应用开发": []}}, DOCS={"LLM工作原理与Token机制": {"doc": "<div class=\"dochead\"><h1>LLM工作原理与Token机制 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔大模型如何逐 Token 生成文字、上下文窗口与成本计费的本质〕的——是理解一切 LLM 应用的地基。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能讲清&quot;模型怎么把文字切碎、怎么一个一个往外蹦字、为什么有长度限制、为什么按用量收钱&quot;，并在面试和排错时不再把&quot;上下文窗口&quot;和&quot;最大输出长度&quot;混为一谈。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>Token 是子词不是词/字</strong>：BPE 用预训练合并表反复粘高频字节对，切分确定且可逆，不同模型合并表不同所以 token 数不同。</li><li><strong>&quot;1 token ≈ 4 字节&quot;</strong>：是字节不是字符，中文/代码/特殊符号 token 密度远高于英文，成本估算必须实跑 tokenizer。</li><li><strong>上下文窗口 ≠ 最大输出长度</strong>：窗口是输入+输出共用总容量（如 1M），<code>max_tokens</code> 是单次输出上限（如 128k），两个独立参数；且窗口越长越容易 context rot。</li><li><strong>自回归生成 + KV cache</strong>：模型一个 token 一个 token 生成，每步 attention 要看全部历史，但历史 K/V 算过即缓存复用，prefill 并行填缓存、decode 每步只传新 token 的 Q。</li><li><strong>计费输入便宜输出贵</strong>：输出通常贵 3-4 倍，因为生成需逐 token 串行 + 维护 KV cache；prompt caching / batch API 可降本。</li><li><strong>越长越慢越贵</strong>：上下文变长 → 每步 attention 计算量线性增 + KV cache 显存线性增 + 输入 token 计费线性增，三重叠加。</li><li><strong>应用工程含义</strong>：控上下文长度=控成本和延迟；中文场景别用字符数估 token；长对话要做摘要/压缩对抗 context rot。</li></ol>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>Token 是什么<ul><li>子词级（不是词也不是字符）</li><li>BPE 合并表（预训练、确定、可逆）</li><li>不同模型编码不同 → token 数不同</li></ul></li><li>计量换算<ul><li>1 token ≈ 4 字节（非字符）</li><li>英文 ~4 字符/token，中文 1 字 ≈ 1-2 token</li><li>估算必须实跑 tokenizer（tiktoken）</li></ul></li><li>上下文窗口<ul><li>输入+输出共用总容量</li><li>≠ max_tokens（单次输出上限）</li><li>context rot：越长越不准</li></ul></li><li>生成机制<ul><li>自回归：一个 token 一个 token 蹦</li><li>每步 attention 看全部历史</li><li>KV cache：历史 K/V 复用，不重算</li><li>prefill 并行 / decode 串行</li></ul></li><li>计费<ul><li>输入便宜、输出贵 3-4 倍</li><li>按用量计费，prompt caching 可降本</li><li>控长度 = 控成本+延迟</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：token≈一个词/一个字，1token≈4字符中英文通用，上下文窗口=最大输出长度，每步重算整个上下文，输入输出同价。（5 个设问猜了 4 个半错）</p>\n<p><strong>视觉模型（五问 · 先自己讲后校准）</strong>：</p>\n<ul><li><strong>对象</strong>：原始文本、分词器(BPE)、token ID 序列、模型(Transformer)、上下文窗口、KV Cache、概率分布、采样策略、新 token、计费规则</li><li><strong>连接</strong>：文本→分词器→ID→上下文窗口→模型→概率分布→采样→新token→回填上下文（自回归环）；模型↔KV Cache（旁路复用）；上下文窗口/新token→计费规则</li><li><strong>流向</strong>：单向流水线 + 自回归反馈回路；前面的 token 决定后面的预测</li><li><strong>边界</strong>：上下文窗口是硬上限；token 表外的字走字节级拆分；context rot（越长越不准）</li><li><strong>变化</strong>：每生成一个新 token 触发一次前向；上下文逐轮累加；EOS/max_tokens 触发停止</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type</strong>：flow（带反馈回路的有向流）</li><li><strong>节点 kind</strong>：原始文本(data)、分词器BPE(process)、Token ID序列(data)、上下文窗口(boundary)、Transformer模型(process)、KV Cache(state)、概率分布(data)、采样策略(process)、新Token(data)、计费规则(rule)</li><li><strong>结构纠偏</strong>：学习者原以为&quot;每步重算整个上下文&quot;→校准为&quot;看全部但 KV cache 复用 K/V 不重算&quot;；原以为&quot;上下文窗口=最大输出&quot;→校准为两个独立参数。</li></ul>\n<p><strong>类比</strong>：它像<strong>接龙游戏机+固定面积的桌子</strong>——把你的话切成积木摆桌上（桌子面积=上下文窗口），一块一块猜着接（自回归），桌子越长找得越慢越容易找错（context rot），接出来比看进去费劲所以贵（输出贵 3-4 倍）。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：它属于人工智能里的&quot;语言模型&quot;，解决怎么让电脑像人一样接话。想象一个超级有文化但只会接一个字的接龙游戏机：它先把你的话切成小积木（每块可能是字、半个字或词尾），每块有编号，摆到固定面积的桌上；然后看桌上积木猜下一块该接什么，蹦一块放桌上再猜下一块，所以打字是慢慢往外冒的。按用量收钱因为每蹦一块都要算一次，且&quot;吐字&quot;比&quot;读字&quot;贵好几倍。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>代码补全（Copilot）：长函数前面 200 行吃掉一两千 token，留给补全的窗口变少，attention 越分散越易跑偏。</li><li>长对话摘要：对话越长累计 token 越多，要做摘要压缩对抗 context rot。</li><li>中文客服 bot：5000 中文字实际 ~2400 token，按&quot;4字符&quot;估会严重低估成本。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>边界 1：上下文窗口 ≠ 无限记忆，越长越 context rot</li><li>边界 2：中文/代码 token 成本被&quot;4字符&quot;经验严重低估</li><li>边界 3：上下文窗口 ≠ max output，输出会被单独的上限截断</li></ul>\n<p><strong>边界补丁</strong>（失败边界 → 最小补救动作；本轮演练最容易翻车的边界 2）：</p>\n<ul><li>边界 1 → 补救：长对话做摘要压缩，只保留最近几轮 + 关键事实</li><li>边界 2 → 补救：上线前用 tiktoken 实跑真实 prompt 算 token 数，别用字符数估</li><li>边界 3 → 补救：设 max_tokens 留窗口余量，长输出改流式分段续写</li><li><strong>本轮演练（边界 2）</strong>：同事按&quot;1token≈4字符&quot;估中文客服 prompt 5000字≈1250token，上线账单翻 1.5 倍。回应动作：<code>enc = tiktoken.encoding_for_model(&quot;gpt-4o&quot;); print(len(enc.encode(prompt)))</code> 实测 ~2400 token；改估算口径为&quot;中文 1字≈1.3token 粗估，英文 1token≈4字符&quot;；所有成本预估必须实跑 tokenizer 校准。</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li><strong>BPE 切分规则含糊</strong>：原讲不清&quot;积木怎么切&quot;→查 tiktoken README：BPE 拆单字节后反复合并最高频相邻字节对，靠一张训练时定死的合并表（mergeable_ranks），表里有的就合并没有就保持字节级，切分确定且可逆。</li><li><strong>&quot;4字符&quot;还是&quot;4字节&quot;搞混</strong>：原以为 4 字符中英文通用→查 tiktoken README 原文是 &quot;4 bytes&quot;；中文 UTF-8 一字 3 bytes，一字常 1-2 token；日语&quot;お誕生日おめでとう&quot; r50k_base=14 token、o200k_base=8 token，强依赖编码表。</li><li><strong>KV cache 漏讲</strong>：原说&quot;每步重算整个上下文&quot;→只对一半。查 KV cache 文档：attention 每步 Q 是新的但历史 K/V 不变，缓存复用；prefill 并行填缓存、decode 每步只传新 token 的 Q。是&quot;看全部但不重算全部&quot;。</li></ol>\n<p><strong>成长对比</strong>：起点认知（token≈词/字、4字符通用、窗口=输出、重算全部、输入输出同价）→ 现在的理解（子词级BPE、4字节非字符、窗口≠max_tokens、KV cache复用、输出贵3-4倍）。5 个设问错 4 个半，校准后才能在面试讲清。</p>\n</details>\n<p>📎 <a href=\"_transcript/LLM工作原理与Token机制.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/LLM工作原理与Token机制.svg\" target=\"_blank\" rel=\"noopener\">_viz/LLM工作原理与Token机制.svg</a></li><li>Mermaid 源：<a href=\"_viz/LLM工作原理与Token机制.mmd\" target=\"_blank\" rel=\"noopener\">_viz/LLM工作原理与Token机制.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/LLM工作原理与Token机制.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/LLM工作原理与Token机制.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/LLM工作原理与Token机制.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<p>图表类型：<code>flow</code>（带自回归反馈回路的有向流）。核心回路：原始文本 → BPE 分词 → Token ID → 上下文窗口（boundary 硬约束）→ Transformer → 概率分布 → 采样 → 新 Token → 回填上下文（自回归循环）。旁路：模型 ↔ KV Cache（state，复用历史 K/V 不重算）；计费规则（rule）分别接上下文窗口（输入计数）和新 Token（输出计数，贵 3-4 倍）。</p>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Rico Sennrich · BPE 引入 NLP 的奠基人</h3>\n<ul><li><strong>身份</strong>：爱丁堡大学副教授</li><li><strong>与本概念的关系</strong>：他把原本用于数据压缩的 BPE 算法引入神经机器翻译，解决罕见词问题，是今天所有 BPE tokenizer 的理论源头</li><li><strong>核心洞见</strong>：&quot;rare words can be translated by translating smaller units than words&quot;——用比词更小的子词单元翻译罕见词，是 BPE 用于分词的原始动机</li><li><strong>代表作</strong>：*Neural Machine Translation of Rare Words with Subword Units*（ACL 2016）</li><li><strong>扩展阅读</strong>：<a href=\"https://aclanthology.org/P16-1162/\" target=\"_blank\" rel=\"noopener\">ACL Anthology 官方链接</a></li></ul>\n<h3 id=\"sec-7\">2. Andrej Karpathy · 从零手搓 tokenizer 的工程布道者</h3>\n<ul><li><strong>身份</strong>：前 Tesla AI 总监、OpenAI 创始成员</li><li><strong>与本概念的关系</strong>：用纯 Python 从零实现 BPE 分词器，把&quot;黑盒 tokenizer&quot;拆到字节级给工程师看</li><li><strong>核心洞见</strong>：&quot;tokenization is the most annoying part of LLMs&quot;——分词是 LLM 工程里最易被忽视又最易出 bug 的环节（模型不会拼写、不会算数、对中文/代码不友好，根子都在分词）</li><li><strong>代表作</strong>：YouTube 视频 *Let&#x27;s build the Tokenizer: BPE in Python*</li><li><strong>扩展阅读</strong>：<a href=\"https://www.youtube.com/watch?v=zduSFxRajvE\" target=\"_blank\" rel=\"noopener\">YouTube 视频</a></li></ul>\n<h3 id=\"sec-8\">3. Jay Alammar · Transformer 可视化教学第一人</h3>\n<ul><li><strong>身份</strong>：Cohere 工程总监、技术博主</li><li><strong>与本概念的关系</strong>：用图解把 Transformer/attention/自回归生成讲成小白能懂的流水线，是理解&quot;token 怎么在模型里流动&quot;的最佳入口</li><li><strong>核心洞见</strong>：用&quot;每个词流向自己向量的流水线&quot;图解 self-attention，让人一眼看懂 token 之间如何互相注意——这正是自回归生成和上下文窗口机制的底层</li><li><strong>代表作</strong>：*The Illustrated Transformer*</li><li><strong>扩展阅读</strong>：<a href=\"https://jalammar.github.io/illustrated-transformer/\" target=\"_blank\" rel=\"noopener\">Illustrated Transformer</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"Prompt工程基础\">Prompt工程基础</a> · <a class=\"xref\" data-go=\"ChatGPT API与对话系统\">ChatGPT API与对话系统</a> · <a class=\"xref\" data-go=\"Embedding与向量表示\">Embedding与向量表示</a> · <a class=\"xref\" data-go=\"Transformer架构原理\">Transformer架构原理</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "LLM工作原理与Token机制"}, "Embedding与向量表示": {"doc": "<div class=\"dochead\"><h1>Embedding与向量表示 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔把文本变成可计算语义相似度的高维向量〕的——是让机器&quot;读懂&quot;语义的数学基础，RAG 和语义搜索的地基。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能选对 Embedding 模型、理解向量维度与相似度计算、知道为什么&quot;国王-男人+女人=女王&quot;成立。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>Embedding = 把离散文本映射成连续向量</strong>：一段文本→一个固定维度的浮点数组（如 1536 维），语义相近的文本向量距离近。</li><li><strong>语义相似度靠向量距离</strong>：常用余弦相似度（方向相近）或点积；语义相似的文本向量夹角小、相似度高。</li><li><strong>维度 trade-off</strong>：维度高（如 3072）表达力强但存储/计算贵；维度低（如 384）快但可能丢语义。按场景选。</li><li><strong>模型选型看 MTEB 榜单</strong>：MTEB 是权威 Embedding 评测榜，按任务（检索/分类/聚类）看排名；OpenAI text-embedding-3、BGE、Cohere 是主流。</li><li><strong>语言与领域适配</strong>：中文场景优先 BGE-zh / m3e；多语言用 multilingual 模型；垂直领域（法律/医疗）可能要微调。</li><li><strong>归一化很重要</strong>：很多模型要求向量归一化后用点积=余弦相似度；不归一化结果会错。</li><li><strong>Embedding 是 RAG 的语义层</strong>：query 和文档都 embed 后才能做相似度检索，是 RAG &quot;找相关&quot;的数学基础。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>Embedding 本质<ul><li>离散文本→连续向量</li><li>语义相近→向量距离近</li><li>固定维度浮点数组</li></ul></li><li>相似度计算<ul><li>余弦相似度（方向）</li><li>点积（归一化后=余弦）</li><li>欧氏距离（少用）</li></ul></li><li>模型选型<ul><li>MTEB 榜单（按任务）</li><li>维度 trade-off</li><li>语言/领域适配</li></ul></li><li>工程要点<ul><li>向量归一化</li><li>批量 embed（省钱省时）</li><li>缓存 embedding（不变就复用）</li></ul></li><li>应用场景<ul><li>RAG 语义检索</li><li>语义搜索/去重</li><li>推荐系统/聚类</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：知道 Embedding 是把文本变成向量，但说不清&quot;为什么向量近=语义近&quot;，以为就是个黑盒。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：原始文本、Tokenizer、Embedding 模型、高维向量、向量空间、相似度函数</li><li>连接：文本→Tokenize→Embedding模型→向量；query 向量 vs 文档向量→相似度函数→分数</li><li>流向：单向编码（文本→向量），相似度是双向比较</li><li>边界：Embedding 只捕捉训练语料里的语义；跨语言/跨领域可能失真；超长文本要分块 embed</li><li>变化：换模型→向量空间全变（不能混用）；文本微改→向量微变</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=flow。文本(data)→Embedding模型(process)→向量(data)→相似度计算(process)→分数(data)。query 和 doc 两条流汇到相似度计算。</p>\n<p><strong>类比</strong>：像把每段文本翻译成&quot;语义坐标&quot;（如经纬度），语义相近的文本坐标点离得近；搜素时算 query 坐标和所有文档坐标的距离，取最近的。和关键词搜索的区别：关键词是精确匹配，Embedding 是&quot;意思相近&quot;。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么让电脑&quot;懂意思&quot;。电脑不懂文字，但懂数字，所以把每段文字翻译成一串数字（向量），意思相近的文字数字也相近。就像给每个地方标经纬度——离得近的地方就在附近。搜索时不用关键词精确匹配，而是找&quot;意思最近的&quot;，所以&quot;如何退款&quot;能搜到&quot;退货流程&quot;。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>RAG 文档检索：用户问&quot;怎么退货&quot;→embed→找最相似的文档块&quot;退换货政策&quot;。</li><li>语义去重：新闻聚合时，把标题 embed，相似度&gt;0.9 的判为同主题。</li><li>推荐系统：用户浏览历史 embed→找向量相近的内容推荐。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>跨语言模型质量参差，小语种可能失真</li><li>长文档直接 embed 会丢失细节（要分块）</li><li>Embedding 模型更新后旧向量失效（向量空间变了）</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（跨语言）→ 选 multilingual 模型或按语言分别 embed</li><li>边界2（长文档）→ 分块 embed，检索时取 chunk 级相似度</li><li>边界3（模型更新）→ 重新 embed 全量文档，版本化向量库</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>为什么向量近=语义近：原以为是黑盒→校准为 Embedding 模型训练时就是&quot;让相似文本向量近&quot;（对比学习），是训练目标决定的。</li><li>余弦 vs 欧氏：原以为随便选→校准为文本用余弦（只看方向不看长度），欧氏受向量模长影响不适合。</li><li>维度选择：原以为越高越好→校准为看任务，检索任务中等维度（768-1536）性价比最高。</li></ol>\n<p><strong>成长对比</strong>：起点（Embedding=黑盒变向量）→ 现在（语义相似度的数学本质+模型选型+归一化+分块工程）。</p>\n</details>\n<p>📎 <a href=\"_transcript/Embedding与向量表示.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/Embedding与向量表示.svg\" target=\"_blank\" rel=\"noopener\">_viz/Embedding与向量表示.svg</a></li><li>Mermaid 源：<a href=\"_viz/Embedding与向量表示.mmd\" target=\"_blank\" rel=\"noopener\">_viz/Embedding与向量表示.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/Embedding与向量表示.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/Embedding与向量表示.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/Embedding与向量表示.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Tomas Mikolov · Word2Vec 作者</h3>\n<ul><li><strong>身份</strong>：前 Google 研究员、前 DeepMind</li><li><strong>与本概念的关系</strong>：Word2Vec 是现代 Embedding 的鼻祖，首次用&quot;上下文预测&quot;学词向量，发现&quot;国王-男人+女人=女王&quot;的语义算术</li><li><strong>核心洞见</strong>：&quot;word vectors capture semantic relationships&quot;——向量空间的方向编码了语义关系（如性别、时态、地理）</li><li><strong>代表作</strong>：*Efficient Estimation of Word Representations in Vector Space*（2013）</li><li><strong>扩展阅读</strong>：<a href=\"https://arxiv.org/abs/1301.3781\" target=\"_blank\" rel=\"noopener\">arXiv 论文</a></li></ul>\n<h3 id=\"sec-7\">2. Nils Reimers · Sentence-BERT / MTEB 作者</h3>\n<ul><li><strong>身份</strong>：Jina AI 研究员</li><li><strong>与本概念的关系</strong>：Sentence-BERT 让句子级 Embedding 可行；MTEB 是最权威的 Embedding 评测榜单</li><li><strong>核心洞见</strong>：词向量不够，要句子/段落级向量才能做语义检索；评测要分任务不能只看一个指标</li><li><strong>代表作</strong>：Sentence-BERT、MTEB</li><li><strong>扩展阅读</strong>：<a href=\"https://mteb-leaderboard.com/\" target=\"_blank\" rel=\"noopener\">MTEB Leaderboard</a></li></ul>\n<h3 id=\"sec-8\">3. 梁德红（Shitao Xiao）· BGE 系列作者</h3>\n<ul><li><strong>身份</strong>：智源研究院研究员</li><li><strong>与本概念的关系</strong>：BGE 是中文 Embedding 的 SOTA 开源系列，中文 RAG 事实标准</li><li><strong>核心洞见</strong>：中文 Embedding 不能直接套英文模型，要针对中文语料和检索任务训练</li><li><strong>代表作</strong>：BGE Embedding 系列</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/FlagOpen/FlagEmbedding\" target=\"_blank\" rel=\"noopener\">BGE GitHub</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"LLM工作原理与Token机制\">LLM工作原理与Token机制</a> · <a class=\"xref\" data-go=\"向量数据库与相似度检索\">向量数据库与相似度检索</a> · <a class=\"xref\" data-go=\"RAG基础架构\">RAG基础架构</a> · <a class=\"xref\" data-go=\"高级RAG技术\">高级RAG技术</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "Embedding与向量表示"}, "Prompt工程基础": {"doc": "<div class=\"dochead\"><h1>Prompt工程基础 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔如何构造提示词让模型稳定产出预期结果〕的——含角色设定、Few-shot、CoT等核心技法，是所有 LLM 应用的&quot;接口层&quot;。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能针对不同任务设计稳定的 Prompt（角色+指令+上下文+示例+输出格式），并在模型输出不稳定时知道调哪个维度。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>Prompt 五要素</strong>：角色（你是谁）+ 指令（做什么）+ 上下文（背景/输入）+ 示例（Few-shot）+ 输出格式（JSON/Markdown/Schema）。前两个必填，后三个按任务配。</li><li><strong>Zero-shot vs Few-shot</strong>：Few-shot 用示例&quot;演示&quot;期望映射，比纯指令更稳；但示例会吃 token 且可能过拟合到示例风格。复杂任务用 Few-shot，简单分类用 Zero-shot。</li><li><strong>CoT（Chain-of-Thought）</strong>：让模型&quot;先思考再回答&quot;，&quot;Let&#x27;s think step by step&quot;一句能显著提升推理任务准确率；但会增输出 token 成本。适合数学/逻辑/多步推理，不适合简单事实。</li><li><strong>结构化输出靠指令+Schema</strong>：要求 JSON 时给完整 schema + 示例，比&quot;返回 JSON&quot;稳得多；用 <code>response_format</code>（OpenAI）或 XML 标签（Anthropic）能强制结构化。</li><li><strong>Prompt 越具体越稳</strong>：模糊指令（&quot;总结一下&quot;）→ 不可控；具体指令（&quot;用3句话，面向产品经理，突出用户痛点和解决方案&quot;）→ 稳定。</li><li><strong>负向指令弱于正向</strong>：模型对&quot;不要做X&quot;理解弱，改写成&quot;只做Y&quot;更有效。</li><li><strong>Prompt 是应用的核心资产</strong>：线上应用的 Prompt 要版本管理、A/B 测试、回归测试，像代码一样对待。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>Prompt 五要素<ul><li>角色（系统消息设定身份）</li><li>指令（任务动词+约束）</li><li>上下文（输入数据/背景）</li><li>示例（Few-shot 演示映射）</li><li>输出格式（Schema/格式约束）</li></ul></li><li>技法分层<ul><li>Zero-shot（纯指令）</li><li>Few-shot（示例演示）</li><li>CoT（思维链推理）</li><li>Self-Consistency（多次采样取众数）</li><li>Prompt Chaining（拆步串联）</li></ul></li><li>结构化输出<ul><li>JSON Schema 约束</li><li>response_format / XML 标签</li><li>Function Calling 强制结构</li></ul></li><li>稳定性工程<ul><li>具体 &gt; 模糊</li><li>正向 &gt; 负向</li><li>版本管理 + A/B + 回归测试</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为 Prompt 就是&quot;把话说清楚&quot;，加点角色设定就行；Few-shot 听过但不知道什么时候用。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：System Message（角色）、User Message（指令+上下文）、Examples（Few-shot）、Output Schema、模型输出</li><li>连接：System 定基调 → User 给任务 → Examples 演示映射 → Schema 约束输出 → 模型生成</li><li>流向：线性构造，但 Examples 和 Schema 是&quot;约束边&quot;，不是数据流</li><li>边界：模型能力上限决定 Prompt 上限；Prompt 修不好模型本身的幻觉；超长 Few-shot 吃 context</li><li>变化：任务复杂度↑ → 需要的技法↑（Zero-shot→Few-shot→CoT→Chaining）</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=hierarchy（Prompt 五要素的组成结构）。节点：Prompt(concept)→<a href=\"各%20rule/concept\" target=\"_blank\" rel=\"noopener\">角色/指令/上下文/示例/输出格式</a>，示例下挂 Few-shot(process)，输出格式下挂 Schema(rule)。</p>\n<p><strong>类比</strong>：像给新员工的 task brief——角色=工种，指令=任务清单，上下文=项目背景，示例=参考样例，输出格式=交付模板。brief 越完整，交付越符合预期。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么让 AI 稳定按你想要的来。就像给新来的同事布置活：你得说清&quot;你是谁（角色）、做什么（指令）、背景是什么（上下文）、给个参考（示例）、要什么格式（输出）&quot;。说得越具体，AI 越不会跑偏。复杂任务还得让它&quot;先想想再答&quot;（思维链），就像让新人先写思路再写答案。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>客服分类：Few-shot 给 5 个对话→标签的示例，比纯指令准确率高 15%。</li><li>数学解题：加&quot;Let&#x27;s think step by step&quot;（CoT），GPT-4 数学 benchmark 提升显著。</li><li>数据抽取：给 JSON Schema + 1 个示例，结构化输出成功率从 70%→98%。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>模型本身能力不足时，Prompt 再精巧也救不回（如让小模型做复杂推理）</li><li>Few-shot 示例有偏差时，模型会放大偏差（过拟合示例风格）</li><li>CoT 对简单事实任务反而增加成本无收益</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（模型能力不足）→ 换更大模型或拆成更简单子任务</li><li>边界2（Few-shot 过拟合）→ 示例要多样化、覆盖边界情况，数量 3-5 个够</li><li>边界3（CoT 滥用）→ 只在推理任务用，事实类用 Zero-shot</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>Few-shot 示例数量：原以为越多越好→校准为 3-5 个最佳，太多吃 context 且过拟合。</li><li>CoT 为什么有效：原以为是&quot;让模型想&quot;→校准为是激活了模型训练时见过的推理模式，且分步生成让每步 attention 更聚焦。</li><li>结构化输出不稳定：原以为加&quot;返回JSON&quot;就够→校准为必须给完整 Schema + 示例，最好用 response_format 强制。</li></ol>\n<p><strong>成长对比</strong>：起点（Prompt=说清楚话）→ 现在（五要素框架+技法分层+稳定性工程，知道什么任务用什么技法、为什么不稳怎么调）。</p>\n</details>\n<p>📎 <a href=\"_transcript/Prompt工程基础.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/Prompt工程基础.svg\" target=\"_blank\" rel=\"noopener\">_viz/Prompt工程基础.svg</a></li><li>Mermaid 源：<a href=\"_viz/Prompt工程基础.mmd\" target=\"_blank\" rel=\"noopener\">_viz/Prompt工程基础.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>hierarchy</b></div><img src=\"_viz/Prompt工程基础.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/Prompt工程基础.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/Prompt工程基础.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Jason Wei · CoT 论文一作</h3>\n<ul><li><strong>身份</strong>：OpenAI 研究员</li><li><strong>与本概念的关系</strong>：首次系统验证&quot;Chain-of-Thought prompting&quot;能显著提升大模型推理能力</li><li><strong>核心洞见</strong>：&quot;Chain-of-thought prompting elicits reasoning in large language models&quot;——一句&quot;let&#x27;s think step by step&quot;激活了模型的分步推理能力（ACL 2022）</li><li><strong>代表作</strong>：*Chain-of-Thought Prompting Elicits Reasoning in LLMs*</li><li><strong>扩展阅读</strong>：<a href=\"https://arxiv.org/abs/2201.11903\" target=\"_blank\" rel=\"noopener\">arXiv 论文</a></li></ul>\n<h3 id=\"sec-7\">2. Lilian Weng · Prompt 工程系统综述作者</h3>\n<ul><li><strong>身份</strong>：OpenAI 研究主管</li><li><strong>与本概念的关系</strong>：写了最被引用的 Prompt Engineering 综述博客，系统梳理 Zero/Few-shot/CoT/Self-Consistency 等技法</li><li><strong>核心洞见</strong>：把 Prompt 工程定位为&quot;用自然语言编程&quot;——Prompt 就是给模型的&quot;程序&quot;，稳定性工程一样要做</li><li><strong>代表作</strong>：*Prompt Engineering* 博客（Lilian Weng 个人博客）</li><li><strong>扩展阅读</strong>：<a href=\"https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/\" target=\"_blank\" rel=\"noopener\">Lilian Weng Blog</a></li></ul>\n<h3 id=\"sec-8\">3. Eugene Yan · 应用工程视角</h3>\n<ul><li><strong>身份</strong>：应用机器学习工程师、技术博主</li><li><strong>与本概念的关系</strong>：从工程实践角度讲 Prompt 的评估、A/B 测试、回归测试</li><li><strong>核心洞见</strong>：Prompt 是产品资产，要像代码一样版本管理+测试，不是&quot;调到能用就完事&quot;</li><li><strong>代表作</strong>：*Evaluating LLM Applications* 系列博客</li><li><strong>扩展阅读</strong>：<a href=\"https://eugeneyan.com/\" target=\"_blank\" rel=\"noopener\">eugeneyan.com</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"LLM工作原理与Token机制\">LLM工作原理与Token机制</a> · <a class=\"xref\" data-go=\"ChatGPT API与对话系统\">ChatGPT API与对话系统</a> · <a class=\"xref\" data-go=\"Agent架构与ReAct模式\">Agent架构与ReAct模式</a> · <a class=\"xref\" data-go=\"RAG基础架构\">RAG基础架构</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "Prompt工程基础"}, "ChatGPT API与对话系统": {"doc": "<div class=\"dochead\"><h1>ChatGPT API与对话系统 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔用 Messages 结构搭建状态化对话系统〕的——是从&quot;调用 API&quot;到&quot;做应用&quot;的关键一跃。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能用 Messages 数组管理多轮对话状态、做流式输出、控制生成参数，搭建一个真正的对话应用后端。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>API 无状态，状态在你这边</strong>：模型本身不记上次对话，每次请求要把完整历史 <code>messages</code> 数组传过去。对话状态管理是应用层的活。</li><li><strong>Messages 三种角色</strong>：<code>system</code>（设定身份/规则，权重高）、<code>user</code>（用户输入）、<code>assistant</code>（模型历史回复）。多轮对话就是不断 append 这三类消息。</li><li><strong>流式输出（streaming）</strong>：<code>stream: true</code> 让模型边生成边返回 SSE chunks，首 token 延迟从&quot;等完&quot;降到&quot;几百毫秒&quot;，是用户体验关键。</li><li><strong>生成参数</strong>：<code>temperature</code>（随机性 0-2，0 最确定、1 常用）、<code>max_tokens</code>（输出上限）、<code>top_p</code>（核采样）、<code>frequency_penalty/presence_penalty</code>（抑制重复）。生产环境要锁定。</li><li><strong>Token 计费含历史</strong>：每次请求传的整个 <code>messages</code> 数组都计 input token，所以长对话越来越贵——要做摘要/截断/滑窗。</li><li><strong>错误处理</strong>：rate limit（429）、context length（400）、server error（5xx）都要重试 + 退避；生产应用必须做。</li><li><strong>多模型选择</strong>：用 <code>model</code> 参数切换（gpt-4o/gpt-4o-mini/claude-opus 等），简单任务用小模型省钱省延迟，复杂任务用大模型。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>API 调用结构<ul><li>messages 数组（system/user/assistant）</li><li>model 参数（模型选择）</li><li>生成参数（temperature/max_tokens/top_p）</li></ul></li><li>状态管理<ul><li>应用层维护对话历史</li><li>多轮 append 三类消息</li><li>滑窗/摘要压缩</li></ul></li><li>流式输出<ul><li>stream: true + SSE</li><li>首 token 延迟优化</li><li>增量渲染</li></ul></li><li>计费与限制<ul><li>input/output 分别计费</li><li>历史消息也计 input</li><li>rate limit + 重试退避</li></ul></li><li>生产化<ul><li>错误处理（429/400/5xx）</li><li>多模型路由</li><li>日志与监控</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为调用 API 就是传个 prompt 拿回复，对话就是循环调用；流式输出听过但没想过为什么重要。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：messages 数组、system/user/assistant 三角色、生成参数、模型、流式 chunks、对话状态存储</li><li>连接：应用→（组装 messages）→API→（流式 chunks）→应用→（append assistant 消息）→状态存储→下次请求</li><li>流向：每次请求是独立的（无状态），但应用层维护的 messages 数组形成&quot;逻辑状态&quot;</li><li>边界：context window 上限（历史太长报错）；rate limit（并发/TPM 限制）</li><li>变化：每轮对话 messages 累加→token 增→成本增→需要截断/摘要</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=flow。节点：应用(actor)、messages数组(data)、API端点(process)、模型(process)、流式chunks(data)、状态存储(state)。flow 体现&quot;组装→请求→流式接收→append→存&quot;的循环。</p>\n<p><strong>类比</strong>：API 像失忆的咨询顾问——每次咨询都要把之前所有对话记录完整带给他，他才&quot;记得&quot;上下文。你这边要做记录员（状态管理）。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么让 AI 记住你们之前聊过啥。模型本身是失忆的，每次调用都是新的，你得自己当记录员——把之前所有对话整理成一份清单（messages 数组）每次都带上。清单越长安越贵越慢，所以聊久了得做摘要。流式输出就是让它边想边往外吐字，不用等整段写完，体验好很多。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>客服 bot：维护用户对话历史，append 到 messages，用 system 设定客服身份。</li><li>流式写作助手：stream:true 实现打字机效果，首字延迟 &lt; 500ms。</li><li>多模型路由：简单分类用 gpt-4o-mini，复杂推理切 gpt-4o，降本 70%。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>对话历史超 context window → 报错或被截断（丢上下文）</li><li>流式输出中途网络断 → chunk 丢失，需重试或断点续传</li><li>temperature 调高 → 输出不稳定，生产环境要锁定</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（超窗口）→ 滑窗（保留最近 N 轮）+ 摘要（旧对话压缩成一段）</li><li>边界2（流式中断）→ 记录已收 chunks，重试时用相同参数（注意 temperature&gt;0 结果会变）</li><li>边界3（不稳定）→ 生产环境 temperature=0 或低值，需要多样性时用 top_p 控制</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>system 消息权重：原以为和 user 一样→校准为 system 在开头权重最高，设定身份/规则/格式最有效。</li><li>流式为什么重要：原以为只是体验→校准为首 token 延迟是用户感知&quot;快慢&quot;的关键，整段等完用户以为卡死。</li><li>多轮计费：原以为只算当次输入→校准为整个 messages 数组都算 input，长对话成本线性增长。</li></ol>\n<p><strong>成长对比</strong>：起点（API=传prompt拿回复）→ 现在（无状态本质+状态管理+流式+计费模型+生产化错误处理）。</p>\n</details>\n<p>📎 <a href=\"_transcript/ChatGPT%20API与对话系统.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/ChatGPT%20API与对话系统.svg\" target=\"_blank\" rel=\"noopener\">_viz/ChatGPT API与对话系统.svg</a></li><li>Mermaid 源：<a href=\"_viz/ChatGPT%20API与对话系统.mmd\" target=\"_blank\" rel=\"noopener\">_viz/ChatGPT API与对话系统.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/ChatGPT%20API与对话系统.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/ChatGPT%20API与对话系统.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/ChatGPT%20API与对话系统.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Greg Brockman · API 工程化布道</h3>\n<ul><li><strong>身份</strong>：OpenAI 联合创始人、前 CTO</li><li><strong>与本概念的关系</strong>：推动 ChatGPT API 的 Messages 结构设计，让&quot;对话&quot;成为一等公民 API 原语</li><li><strong>核心洞见</strong>：API 设计要让开发者&quot;像搭积木一样组合&quot;，Messages 数组就是这种积木</li><li><strong>代表作</strong>：OpenAI API 设计与 GPT 系列发布</li><li><strong>扩展阅读</strong>：<a href=\"https://openai.com/blog/\" target=\"_blank\" rel=\"noopener\">OpenAI Blog</a></li></ul>\n<h3 id=\"sec-7\">2. Harrison Chase · LangChain 创始人</h3>\n<ul><li><strong>身份</strong>：LangChain 创始人、LangChain Inc CEO</li><li><strong>与本概念的关系</strong>：LangChain 最早就是为封装 ChatGPT API 的状态管理/记忆/链式调用而生</li><li><strong>核心洞见</strong>：API 无状态是开发者的痛点，框架的价值在于抽象掉状态管理和错误重试</li><li><strong>代表作</strong>：LangChain 框架</li><li><strong>扩展阅读</strong>：<a href=\"https://python.langchain.com/\" target=\"_blank\" rel=\"noopener\">LangChain Docs</a></li></ul>\n<h3 id=\"sec-8\">3. Simon Willison · LLM 应用实践观察者</h3>\n<ul><li><strong>身份</strong>：Django 联合创始人、LLM 工具生态博主</li><li><strong>与本概念的关系</strong>：大量实测各家 API、记录流式/计费/错误处理的工程细节</li><li><strong>核心洞见</strong>：&quot;LLM API 的稳定性远不如传统 API，错误处理和降级是生产应用的第一课&quot;</li><li><strong>代表作</strong>：Datasette、llm CLI 工具、Simon Willison&#x27;s Weblog</li><li><strong>扩展阅读</strong>：<a href=\"https://simonwillison.net/\" target=\"_blank\" rel=\"noopener\">simonwillison.net</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"Prompt工程基础\">Prompt工程基础</a> · <a class=\"xref\" data-go=\"Function Calling与工具调用\">Function Calling与工具调用</a> · <a class=\"xref\" data-go=\"API服务与FastAPI\">API服务与FastAPI</a> · <a class=\"xref\" data-go=\"LangChain框架\">LangChain框架</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "ChatGPT API与对话系统"}, "LangChain框架": {"doc": "<div class=\"dochead\"><h1>LangChain框架 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔LLM 应用编排框架的核心抽象〕的——Chain/Memory/Retriever/Tool 是 AI 应用开发的&quot;事实标准&quot;。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能用 LangChain 组装一个完整 AI 应用（LLM+Prompt+Memory+Retriever+Tool），并知道每个抽象解决什么问题。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>LangChain = LLM 应用的&quot;脚手架&quot;</strong>：封装 LLM/Prompt/Memory/Retriever/Tool/Agent 为可组合组件，让你像搭积木做应用而不是从 API 写起。</li><li><strong>六大核心抽象</strong>：① Models（LLM/Chat/Embedding）；② Prompts（模板/管理）；③ Memory（对话记忆）；④ Retrievers（检索器）；⑤ Tools/Agents（工具/智能体）；⑥ Chains（串联一切）。</li><li><strong>Chain 是核心编排原语</strong>：把多个组件串成管道（Prompt→LLM→OutputParser），LCEL 是声明式语法（<code>prompt | llm | parser</code>）。</li><li><strong>Memory 管理对话状态</strong>：BufferMemory（全留）/SummaryMemory（摘要）/VectorStoreMemory（向量检索过往），解决 API 无状态问题。</li><li><strong>Retriever 抽象检索</strong>：统一向量库/SQL/关键词检索接口，让 RAG 切换数据源不改代码。</li><li><strong>Agent = LLM+Tools+循环</strong>：LangChain 的 Agent 抽象封装了 ReAct 循环，配合 Tool 使用。</li><li><strong>生产化要配 LangSmith</strong>：LangChain 应用调试/监控/评估用 LangSmith，看每步输入输出和 token 消耗。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>LangChain 定位<ul><li>LLM 应用脚手架</li><li>可组合组件</li><li>事实标准</li></ul></li><li>六大核心抽象<ul><li>Models（LLM/Chat/Embedding）</li><li>Prompts（模板/管理）</li><li>Memory（对话状态）</li><li>Retrievers（检索统一接口）</li><li>Tools/Agents（工具/智能体）</li><li>Chains（编排串联）</li></ul></li><li>Chain 与 LCEL<ul><li>Chain = 组件管道</li><li>LCEL 声明式语法</li><li>Runnable 接口</li></ul></li><li>Memory 类型<ul><li>Buffer（全留）</li><li>Summary（摘要）</li><li>VectorStore（向量检索）</li></ul></li><li>Retriever 抽象<ul><li>统一检索接口</li><li>切换数据源不改码</li></ul></li><li>生产化<ul><li>LangSmith 调试监控</li><li>LangServe 部署</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为 LangChain 就是&quot;封装 OpenAI API&quot;，不知道六大抽象和 Chain 编排这层。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：Models、Prompts、Memory、Retriever、Tools、Chains、LCEL、应用</li><li>连接：Prompt+LLM+Parser 组成 Chain；Chain 可嵌 Memory/Retriever/Tool；Agent 是带 Tools 的 Chain</li><li>流向：用户输入→Prompt 填充→LLM→（可选 Retriever/Memory/Tool）→OutputParser→输出</li><li>边界：LangChain 抽象有学习成本；过度封装可能限制灵活性；生产要配 LangSmith</li><li>变化：换模型/换检索器/换 Memory 类型→改组件不改 Chain 结构</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=hierarchy。LangChain(concept)→<a href=\"各%20concept\" target=\"_blank\" rel=\"noopener\">Models/Prompts/Memory/Retrievers/Tools/Chains</a>，Chains 下挂 LCEL(process)。</p>\n<p><strong>类比</strong>：LangChain 像 AI 应用版的 Django/Express——不让你从 socket 写起，而是提供 Model/Router/Middleware 抽象，你组装就行。Chain 是管道（像 Unix pipe），Memory 是会话存储，Retriever 是数据源适配器。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么快速搭 AI 应用。直接调 API 要自己管状态/检索/工具，LangChain 把这些封装成可拼装的积木——记忆积木、检索积木、工具积木，用 Chain 把它们串起来。就像用 Django 建站不用从 TCP 写起，LangChain 让你专注业务逻辑。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>RAG 问答：Retriever+Memory+LLM 组 Chain，10 行代码搭起来。</li><li>客服 Agent：Tool（查订单/退换货）+Agent 抽象，自主调用。</li><li>文档对话：VectorStoreMemory+Retriever，长文档分块检索对话。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>抽象泄漏（底层问题还是要懂 API）</li><li>版本迭代快，API 常变</li><li>过度封装限制灵活性</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（抽象泄漏）→ 关键路径还是懂底层 API</li><li>边界2（版本变）→ 锁版本 + 关注 changelog</li><li>边界3（灵活性）→ 复杂场景自己实现，LangChain 做 80% 通用</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>Chain 和 LCEL 区别：原以为一样→校准为 Chain 是概念，LCEL 是声明式语法（<code>|</code> 管道）。</li><li>Memory 什么时候用：原以为都用→校准为单轮不用，多轮才需要，且要选类型（摘要 vs 向量）。</li><li>Agent 和 Chain 区别：原以为一样→校准为 Chain 是固定流程，Agent 是自主决策，复杂度不同。</li></ol>\n<p><strong>成长对比</strong>：起点（LangChain=API封装）→ 现在（六大抽象+Chain编排+Memory类型+Retriever统一+LangSmith生产化）。</p>\n</details>\n<p>📎 <a href=\"_transcript/LangChain框架.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/LangChain框架.svg\" target=\"_blank\" rel=\"noopener\">_viz/LangChain框架.svg</a></li><li>Mermaid 源：<a href=\"_viz/LangChain框架.mmd\" target=\"_blank\" rel=\"noopener\">_viz/LangChain框架.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>hierarchy</b></div><img src=\"_viz/LangChain框架.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/LangChain框架.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/LangChain框架.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Harrison Chase · LangChain 创始人</h3>\n<ul><li><strong>身份</strong>：LangChain Inc CEO</li><li><strong>与本概念的关系</strong>：LangChain 的设计者和推动者，定义了 LLM 应用框架的范式</li><li><strong>核心洞见</strong>：LLM 应用需要&quot;可组合抽象&quot;，像 Web 框架一样让开发者专注业务</li><li><strong>代表作</strong>：LangChain、LangGraph、LangSmith</li><li><strong>扩展阅读</strong>：<a href=\"https://www.langchain.com/\" target=\"_blank\" rel=\"noopener\">LangChain 官网</a></li></ul>\n<h3 id=\"sec-7\">2. Greg Kamradt · LangChain 教学布道者</h3>\n<ul><li><strong>身份</strong>：技术博主</li><li><strong>与本概念的关系</strong>：写了最流行的 LangChain 教程系列，让框架普及</li><li><strong>核心洞见</strong>：框架的价值在&quot;标准化&quot;，让 AI 应用开发从手工作坊变工业化</li><li><strong>代表作</strong>：LangChain 教程系列</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/gkamradt\" target=\"_blank\" rel=\"noopener\">Greg Kamradt GitHub</a></li></ul>\n<h3 id=\"sec-8\">3. Jerry Liu · LlamaIndex 创始人（对照视角）</h3>\n<ul><li><strong>身份</strong>：LlamaIndex 创始人</li><li><strong>与本概念的关系</strong>：LlamaIndex 是 LangChain 的主要对照，专注 RAG 数据层</li><li><strong>核心洞见</strong>：LangChain 通用编排，LlamaIndex 专注数据连接和 RAG，两者互补</li><li><strong>代表作</strong>：LlamaIndex</li><li><strong>扩展阅读</strong>：<a href=\"https://www.llamaindex.ai/\" target=\"_blank\" rel=\"noopener\">LlamaIndex 官网</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"Prompt工程基础\">Prompt工程基础</a> · <a class=\"xref\" data-go=\"ChatGPT API与对话系统\">ChatGPT API与对话系统</a> · <a class=\"xref\" data-go=\"RAG基础架构\">RAG基础架构</a> · <a class=\"xref\" data-go=\"Agent架构与ReAct模式\">Agent架构与ReAct模式</a> · <a class=\"xref\" data-go=\"LCEL与LangGraph\">LCEL与LangGraph</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "LangChain框架"}, "Function Calling与工具调用": {"doc": "<div class=\"dochead\"><h1>Function Calling与工具调用 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔让模型按结构化 JSON 格式输出以调用外部函数〕的——是 LLM 从&quot;聊天&quot;走向&quot;做事&quot;的接口层。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能定义工具 schema、解析模型返回的函数调用、执行后把结果喂回模型，搭一个能&quot;做事&quot;的 AI。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>Function Calling = 结构化输出+执行钩子</strong>：模型不直接回答，而是返回&quot;我要调用函数 X，参数是 {...}&quot;，应用层解析后执行函数，把结果喂回模型让它生成最终回答。</li><li><strong>用 JSON Schema 定义工具</strong>：每个工具声明 name/description/parameters(JSON Schema)，模型据此判断&quot;该不该调用&quot;&quot;参数怎么填&quot;。</li><li><strong>两段式交互</strong>：① 用户消息+工具定义→模型返回 tool_call（函数名+参数）；② 应用执行函数→把结果作为 tool_result 喂回→模型生成最终回答。</li><li><strong>模型不执行，只决策</strong>：模型只决定&quot;调什么、传什么参数&quot;，真正的函数执行在应用层——这是安全边界。</li><li><strong>多工具并行</strong>：模型可一次返回多个 tool_call，应用并行执行后全部喂回，减少往返。</li><li><strong>工具描述要精准</strong>：description 写不清模型就乱调；要写清&quot;什么时候用&quot;&quot;输入是什么&quot;&quot;输出是什么&quot;。</li><li><strong>是 Agent 的地基</strong>：Agent 本质就是&quot;循环调 Function Calling + 把结果喂回&quot;——ReAct/工具调用都建在这层之上。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>Function Calling 机制<ul><li>JSON Schema 定义工具</li><li>模型返回 tool_call</li><li>应用层执行函数</li><li>结果喂回模型</li></ul></li><li>两段式交互<ul><li>第一段：消息+工具定义→tool_call</li><li>第二段：tool_result→最终回答</li></ul></li><li>关键原则<ul><li>模型只决策不执行（安全边界）</li><li>工具描述要精准</li><li>多工具可并行</li></ul></li><li>工程要点<ul><li>参数校验（模型可能传错）</li><li>错误处理（函数失败要反馈给模型）</li><li>工具版本管理</li></ul></li><li>Agent 地基<ul><li>循环调用 = Agent</li><li>ReAct 建于此之上</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为 Function Calling 就是&quot;让模型输出 JSON&quot;，不知道两段式交互和应用层执行这层。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：用户消息、工具定义(JSON Schema)、模型、tool_call、应用层、函数实现、tool_result</li><li>连接：消息+工具定义→模型→tool_call→应用层→函数→tool_result→模型→最终回答</li><li>流向：两段式循环，第一段决策调用，第二段执行回填</li><li>边界：模型可能传错参数（要校验）；函数可能失败（要反馈）；模型可能不调用工具（要 fallback）</li><li>变化：工具数量↑→模型选择难度↑；多 tool_call 并行→应用层要并发执行</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=flow。用户消息(data)+工具定义(rule)→模型(process)→tool_call(data)→应用层(actor)→函数(process)→tool_result(data)→模型→最终回答(data)。两段循环。</p>\n<p><strong>类比</strong>：模型像餐厅服务员——客人点菜（用户问题），服务员不自己做饭，而是写单子给厨房（tool_call），厨房做好（应用执行函数）服务员端给客人（结果喂回模型生成回答）。服务员只决策&quot;给哪个厨房&quot;&quot;点什么&quot;，不亲自做。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么让 AI 真能做事而不只是聊天。模型本身不会查数据库、不会发邮件，但它能说&quot;我要调用查数据库函数，参数是 xxx&quot;，你的程序收到后去执行，把结果告诉模型，模型再据此回答。这样 AI 就从&quot;只会说&quot;变成&quot;会做事&quot;。工具描述写清楚是关键，写不清模型就乱调。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>天气查询 bot：模型识别&quot;北京天气&quot;→调用 get_weather(&quot;北京&quot;)→结果喂回→回答&quot;北京今天 25度晴&quot;。</li><li>数据库查询：用户问&quot;本月销售额&quot;→调用 query_db(SQL)→结果→生成分析回答。</li><li>多工具 Agent：查日历+发邮件+建任务，模型一次返回 3 个 tool_call 并行执行。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>模型传错参数（如类型错、缺字段）→ 函数报错</li><li>模型不调用工具直接编答案 → 失去工具价值</li><li>函数执行超时/失败 → 模型无结果可依据</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（参数错）→ 应用层用 Pydantic 校验，失败时反馈&quot;参数错误，期望 X&quot;让模型重试</li><li>边界2（不调工具）→ Prompt 强调&quot;必须用工具&quot;+工具描述写清使用时机</li><li>边界3（函数失败）→ 捕获异常，把错误信息作为 tool_result 喂回，让模型降级回答</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>模型怎么知道调哪个工具：原以为是关键词匹配→校准为模型理解工具 description 和参数 schema，靠语义判断。</li><li>两段式还是多段：原以为一段就够→校准为至少两段（决策+执行回填），Agent 场景是多段循环。</li><li>模型能执行函数吗：原以为模型直接执行→校准为模型只决策不执行，执行在应用层（安全边界）。</li></ol>\n<p><strong>成长对比</strong>：起点（Function Calling=输出JSON）→ 现在（两段式交互+JSON Schema+应用层执行+多工具并行+Agent地基）。</p>\n</details>\n<p>📎 <a href=\"_transcript/Function%20Calling与工具调用.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/Function%20Calling与工具调用.svg\" target=\"_blank\" rel=\"noopener\">_viz/Function Calling与工具调用.svg</a></li><li>Mermaid 源：<a href=\"_viz/Function%20Calling与工具调用.mmd\" target=\"_blank\" rel=\"noopener\">_viz/Function Calling与工具调用.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/Function%20Calling与工具调用.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/Function%20Calling与工具调用.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/Function%20Calling与工具调用.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Shreya Rajpal · Guardrails AI / 工具调用工程化</h3>\n<ul><li><strong>身份</strong>：Guardrails AI 创始人</li><li><strong>与本概念的关系</strong>：专注 LLM 结构化输出和工具调用的可靠性</li><li><strong>核心洞见</strong>：模型输出不可靠，工具调用的参数校验和错误处理是生产应用的第一道防线</li><li><strong>代表作</strong>：Guardrails AI 框架</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/guardrails-ai/guardrails\" target=\"_blank\" rel=\"noopener\">Guardrails AI GitHub</a></li></ul>\n<h3 id=\"sec-7\">2. Yao Shunyu · ReAct 论文作者</h3>\n<ul><li><strong>身份</strong>：普林斯顿大学研究员</li><li><strong>与本概念的关系</strong>：ReAct 框架把 Function Calling 升级成&quot;思考+行动&quot;循环，是 Agent 的理论基础</li><li><strong>核心洞见</strong>：工具调用不是孤立的，要和推理交织——模型边想边调工具边根据结果再想</li><li><strong>代表作</strong>：*ReAct: Synergizing Reasoning and Acting in Language Models*</li><li><strong>扩展阅读</strong>：<a href=\"https://arxiv.org/abs/2210.03629\" target=\"_blank\" rel=\"noopener\">arXiv 论文</a></li></ul>\n<h3 id=\"sec-8\">3. Swyx · 工具调用生态观察</h3>\n<ul><li><strong>身份</strong>：Latent Space 主理人、AI 工程布道者</li><li><strong>与本概念的关系</strong>：系统观察 Function Calling 从 OpenAI 到全行业的标准化过程</li><li><strong>核心洞见</strong>：Function Calling 是 LLM 从&quot;聊天接口&quot;变成&quot;应用编排接口&quot;的转折点</li><li><strong>代表作</strong>：Latent Space 播客</li><li><strong>扩展阅读</strong>：<a href=\"https://www.latent.space/\" target=\"_blank\" rel=\"noopener\">latent.space</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"ChatGPT API与对话系统\">ChatGPT API与对话系统</a> · <a class=\"xref\" data-go=\"Agent架构与ReAct模式\">Agent架构与ReAct模式</a> · <a class=\"xref\" data-go=\"LangChain框架\">LangChain框架</a> · <a class=\"xref\" data-go=\"多Agent协作与工作流编排\">多Agent协作与工作流编排</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "Function Calling与工具调用"}, "Agent架构与ReAct模式": {"doc": "<div class=\"dochead\"><h1>Agent架构与ReAct模式 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔思考-行动-观察的自主决策循环〕的——让模型能规划、调工具、纠错地完成多步任务。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能设计一个 ReAct Agent：定义工具集、写 system prompt 设定角色、实现 Thought-Action-Observation 循环、处理停止条件。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>Agent = LLM + 工具 + 循环</strong>：模型自主决定&quot;下一步做什么&quot;（调工具/回答/继续思考），循环直到完成。和单次 Function Calling 的区别是&quot;自主决策+多步&quot;。</li><li><strong>ReAct = Reasoning + Acting</strong>：每步先 Thought（思考当前状态和下一步）→ Action（调工具）→ Observation（看工具结果）→ 再 Thought。思考让行动有依据，行动让思考有新信息。</li><li><strong>System Prompt 定义 Agent 人格</strong>：角色（你是 XX 助手）+ 目标（帮用户完成 X）+ 约束（只用这些工具/最多 N 步/什么情况停止）+ 工具说明。</li><li><strong>停止条件</strong>：任务完成（模型说&quot;Final Answer&quot;）+ 达到最大步数（防死循环）+ 工具连续失败 + 用户中断。</li><li><strong>记忆与状态</strong>：短期=当前对话/工具历史；长期=向量库存过往交互；状态管理决定 Agent 能否处理复杂任务。</li><li><strong>规划能力是关键</strong>：复杂任务 Agent 要先&quot;拆解计划&quot;再逐步执行，Plan-and-Execute 模式比纯 ReAct 更适合长任务。</li><li><strong>Agent 可靠性挑战</strong>：循环可能死循环/跑偏/调错工具；生产 Agent 要加护栏（步数限制/工具白名单/结果校验/人工介入）。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>Agent 本质<ul><li>LLM + 工具 + 自主循环</li><li>vs 单次 Function Calling = 多步自主</li></ul></li><li>ReAct 循环<ul><li>Thought（思考）</li><li>Action（调工具）</li><li>Observation（看结果）</li><li>循环直到 Final Answer</li></ul></li><li>System Prompt 设计<ul><li>角色 + 目标 + 约束 + 工具</li></ul></li><li>停止条件<ul><li>Final Answer</li><li>最大步数</li><li>连续失败</li><li>用户中断</li></ul></li><li>记忆与状态<ul><li>短期（对话历史）</li><li>长期（向量库）</li><li>规划（Plan-and-Execute）</li></ul></li><li>可靠性工程<ul><li>步数限制</li><li>工具白名单</li><li>结果校验</li><li>人工介入</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为 Agent 就是&quot;让模型调用工具&quot;，不知道 ReAct 的思考-行动-观察循环和自主决策这层。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：用户目标、System Prompt、LLM、工具集、Thought、Action、Observation、Final Answer</li><li>连接：目标→System Prompt→LLM→Thought→Action→工具→Observation→LLM→Thought...→Final Answer</li><li>流向：循环（Thought-Action-Observation 重复），最终 Final Answer 退出</li><li>边界：步数上限防死循环；工具失败要降级；模型可能跑偏需要护栏</li><li>变化：每步 Observation 改变状态→下一步 Thought 据此调整</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=cycle（ReAct 是循环）。Thought(process)→Action(process)→Observation(data)→回到 Thought，循环 N 次直到 Final Answer(data)退出。</p>\n<p><strong>类比</strong>：Agent 像有个实习生——你给目标&quot;帮我订下周去上海的机票&quot;，他自己想：先查日历（Thought）→调日历工具（Action）→看到下周三有空（Observation）→再想查航班→调航班工具→看到 3 班→再想选最便宜的→调预订→完成。每步思考让行动有依据。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么让 AI 自己完成多步任务。普通 AI 你问一句答一句，Agent 会自己想&quot;要完成这事得先做 X 再做 Y&quot;，然后调工具一步步来，遇到结果还会调整计划。核心是&quot;想-做-看&quot;循环：先想下一步做什么，做（调工具），看结果，再想。就像派个实习生去办事，他不会一步到位，而是一步步摸索着完成。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>研究助手：用户问&quot;对比 A/B 两款产品&quot;→Agent 搜 A→搜 B→整理对比表→回答。</li><li>代码助手：用户说&quot;修这个 bug&quot;→Agent 读代码→定位→改→跑测试→报告。</li><li>旅行规划：用户说&quot;规划 3 天上海行&quot;→Agent 查景点→查天气→排日程→输出行程。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>死循环（模型反复调同工具）</li><li>跑偏（工具结果误导，越走越远）</li><li>工具失败连锁（一个失败导致后续全错）</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（死循环）→ 最大步数 + 检测重复 Action 强制停止</li><li>边界2（跑偏）→ System Prompt 强约束 + 关键步人工确认</li><li>边界3（工具失败）→ 重试 + 降级 + 反馈给模型让其换方案</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>Agent 和 Function Calling 区别：原以为一样→校准为 Function Calling 是单次，Agent 是多步自主循环。</li><li>ReAct 为什么有效：原以为就是&quot;调工具&quot;→校准为 Thought 让模型显式推理，行动有依据，比直接调工具更准。</li><li>什么时候用 Agent：原以为都用→校准为简单任务用 Chain（固定流程），复杂/不确定流程才用 Agent（自主决策）。</li></ol>\n<p><strong>成长对比</strong>：起点（Agent=调工具）→ 现在（ReAct循环+System Prompt设计+停止条件+记忆规划+可靠性工程）。</p>\n</details>\n<p>📎 <a href=\"_transcript/Agent架构与ReAct模式.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/Agent架构与ReAct模式.svg\" target=\"_blank\" rel=\"noopener\">_viz/Agent架构与ReAct模式.svg</a></li><li>Mermaid 源：<a href=\"_viz/Agent架构与ReAct模式.mmd\" target=\"_blank\" rel=\"noopener\">_viz/Agent架构与ReAct模式.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>cycle</b></div><img src=\"_viz/Agent架构与ReAct模式.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/Agent架构与ReAct模式.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/Agent架构与ReAct模式.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Yao Shunyu · ReAct 论文作者</h3>\n<ul><li><strong>身份</strong>：普林斯顿大学研究员</li><li><strong>与本概念的关系</strong>：ReAct 框架的提出者，奠定 Thought-Action-Observation 循环</li><li><strong>核心洞见</strong>：纯推理（CoT）会幻觉，纯行动（工具调用）无规划，ReAct 让两者协同</li><li><strong>代表作</strong>：*ReAct: Synergizing Reasoning and Acting in Language Models*</li><li><strong>扩展阅读</strong>：<a href=\"https://arxiv.org/abs/2210.03629\" target=\"_blank\" rel=\"noopener\">arXiv 论文</a></li></ul>\n<h3 id=\"sec-7\">2. Lilian Weng · Agent 综述权威</h3>\n<ul><li><strong>身份</strong>：OpenAI 研究主管</li><li><strong>与本概念的关系</strong>：写了最被引用的 LLM Agent 综述，系统梳理规划/记忆/工具/行动四要素</li><li><strong>核心洞见</strong>：Agent = 规划 + 记忆 + 工具 + 行动，缺一不可</li><li><strong>代表作</strong>：*LLM Powered Autonomous Agents* 博客</li><li><strong>扩展阅读</strong>：<a href=\"https://lilianweng.github.io/posts/2023-06-23-agent/\" target=\"_blank\" rel=\"noopener\">Lilian Weng Blog</a></li></ul>\n<h3 id=\"sec-8\">3. Harrison Chase · LangChain/LangGraph 创始人</h3>\n<ul><li><strong>身份</strong>：LangChain Inc CEO</li><li><strong>与本概念的关系</strong>：LangChain/LangGraph 是 Agent 工程化的事实标准框架</li><li><strong>核心洞见</strong>：Agent 的可靠性是工程问题，要靠框架提供状态管理/检查点/人工介入</li><li><strong>代表作</strong>：LangChain、LangGraph</li><li><strong>扩展阅读</strong>：<a href=\"https://langchain-ai.github.io/langgraph/\" target=\"_blank\" rel=\"noopener\">LangGraph 文档</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"Function Calling与工具调用\">Function Calling与工具调用</a> · <a class=\"xref\" data-go=\"Prompt工程基础\">Prompt工程基础</a> · <a class=\"xref\" data-go=\"多Agent协作与工作流编排\">多Agent协作与工作流编排</a> · <a class=\"xref\" data-go=\"LangChain框架\">LangChain框架</a> · <a class=\"xref\" data-go=\"LCEL与LangGraph\">LCEL与LangGraph</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "Agent架构与ReAct模式"}, "Transformer架构原理": {"doc": "<div class=\"dochead\"><h1>Transformer架构原理 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔自注意力机制与 Encoder-Decoder 架构〕的——是读懂一切大模型论文和做微调的理论门槛。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能讲清 Self-Attention 怎么让 token 互相&quot;注意&quot;、位置编码为什么必要、Encoder/Decoder 区别，面试时不再怕&quot;讲讲 Transformer&quot;。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>Self-Attention 是核心</strong>：每个 token 用 Q/K/V 三个投影&quot;查询&quot;其他 token，算注意力权重加权求和——让每个词&quot;看到&quot;整句上下文，捕捉长程依赖。</li><li><strong>Q/K/V 机制</strong>：Q（查询）× K（键）算注意力分数→softmax→权重→乘 V（值）求和。是&quot;查字典&quot;的泛化：Q 是查询词，K 是词条，V 是释义。</li><li><strong>Multi-Head Attention</strong>：并行多组 Q/K/V（如 8 头），各头学不同关系（语法/语义/指代），拼接后投影。多头比单头表达力强。</li><li><strong>位置编码</strong>：Self-Attention 本身无序（打乱 token 顺序结果一样），要加位置编码告诉模型&quot;谁在前谁在后&quot;。正弦/可学习两种。</li><li><strong>Encoder vs Decoder</strong>：Encoder 双向看全句（适合理解）；Decoder 自回归+Masked Attention（只看左边，适合生成）。GPT 是 Decoder-only，BERT 是 Encoder-only，T5 是 Encoder-Decoder。</li><li><strong>残差连接 + LayerNorm</strong>：每个子层（Attention/FFN）都加残差和归一化，解决深层梯度问题，是能堆深的关键。</li><li><strong>Feed-Forward 网络</strong>：每个位置独立过一个两层 FFN（升维→激活→降维），是模型的&quot;记忆容量&quot;。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>Self-Attention<ul><li>Q/K/V 三个投影</li><li>注意力分数 = softmax(QK/√d)</li><li>加权 V 求和</li><li>捕捉长程依赖</li></ul></li><li>Multi-Head<ul><li>并行多组 Q/K/V</li><li>各头学不同关系</li><li>拼接投影</li></ul></li><li>位置编码<ul><li>弥补无序性</li><li>正弦 / 可学习</li></ul></li><li>Encoder vs Decoder<ul><li>Encoder 双向（理解）</li><li>Decoder 自回归+Mask（生成）</li><li>GPT/BERT/T5 三架构</li></ul></li><li>工程细节<ul><li>残差连接</li><li>LayerNorm</li><li>FFN 记忆容量</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：知道 Transformer 是大模型基础，但 Self-Attention 的 Q/K/V 一直没搞懂，以为就是&quot;加权求和&quot;。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：Token、Embedding、位置编码、Q/K/V 矩阵、Attention 头、FFN、残差+LayerNorm</li><li>连接：Token→Embedding+位置→Multi-Head Attention→残差+LN→FFN→残差+LN→输出</li><li>流向：每个 token 并行流过 Attention+FFN，堆叠 N 层</li><li>边界：Self-Attention 无序需位置编码；计算量 O(n²)（序列长平方增长）</li><li>变化：序列变长→Attention 计算平方增→是长上下文瓶颈</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=hierarchy。Transformer(concept)→[Self-Attention/Multi-Head/位置编码/Encoder-Decoder/残差LN/FFN]。</p>\n<p><strong>类比</strong>：Self-Attention 像会议室每个人同时听所有人发言并判断&quot;谁说的对我重要&quot;，加权综合形成自己的理解。Q 是&quot;我想问什么&quot;，K 是&quot;每个人的标签&quot;，V 是&quot;每个人的内容&quot;。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决大模型底层怎么工作。核心是&quot;自注意力&quot;——每个词同时看句子里所有词，判断谁跟自己最相关，加权吸收信息。这样&quot;苹果&quot;在&quot;吃苹果&quot;和&quot;苹果手机&quot;里能根据上下文有不同理解。多头就是多组这种注意力并行，各看不同关系。加位置编码是因为这套机制本身不分前后，得告诉它词序。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>语义理解：BERT 用双向 Attention 做情感/分类，比 RNN 强。</li><li>文本生成：GPT 用 Masked Attention 自回归生成，逐 token 预测。</li><li>翻译：T5 Encoder-Decoder，先理解再生成。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>序列长→Attention O(n²) 计算爆炸（长上下文瓶颈）</li><li>位置编码对超长外推有限</li><li>训练成本高（数据+算力）</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（长序列）→ 稀疏 Attention/Flash Attention/线性 Attention 优化</li><li>边界2（位置外推）→ RoPE/ALiBi 等相对位置编码</li><li>边界3（成本）→ 应用工程师用 API 不自己训，懂原理即可</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>Q/K/V 到底干嘛：原以为是三个向量→校准为三个投影矩阵，Q 查、K 被查、V 是内容，是&quot;查字典&quot;泛化。</li><li>为什么要位置编码：原以为 Attention 自带顺序→校准为 Self-Attention 打乱顺序结果一样，必须显式加位置。</li><li>Encoder/Decoder 区别：原以为只是方向不同→校准为 Decoder 有 Masked Attention（只看左边）才能自回归生成。</li></ol>\n<p><strong>成长对比</strong>：起点（Transformer=黑盒）→ 现在（Self-Attention Q/K/V+多头+位置编码+三大架构区别）。</p>\n</details>\n<p>📎 <a href=\"_transcript/Transformer架构原理.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/Transformer架构原理.svg\" target=\"_blank\" rel=\"noopener\">_viz/Transformer架构原理.svg</a></li><li>Mermaid 源：<a href=\"_viz/Transformer架构原理.mmd\" target=\"_blank\" rel=\"noopener\">_viz/Transformer架构原理.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>hierarchy</b></div><img src=\"_viz/Transformer架构原理.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/Transformer架构原理.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/Transformer架构原理.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Ashish Vaswani · Transformer 论文一作</h3>\n<ul><li><strong>身份</strong>：前 Google研究员</li><li><strong>与本概念的关系</strong>：Transformer 原始论文一作，提出 Self-Attention 取代 RNN</li><li><strong>核心洞见</strong>：&quot;Attention is all you need&quot;——纯注意力机制就够了，不需要循环</li><li><strong>代表作</strong>：*Attention Is All You Need*（NeurIPS 2017）</li><li><strong>扩展阅读</strong>：<a href=\"https://arxiv.org/abs/1706.03762\" target=\"_blank\" rel=\"noopener\">arXiv 论文</a></li></ul>\n<h3 id=\"sec-7\">2. Jay Alammar · 可视化教学第一人</h3>\n<ul><li><strong>身份</strong>：Cohere 工程总监</li><li><strong>与本概念的关系</strong>：Illustrated Transformer 是最流行的 Transformer 教程</li><li><strong>核心洞见</strong>：用图解把 Q/K/V 讲成小白能懂</li><li><strong>代表作</strong>：*The Illustrated Transformer*</li><li><strong>扩展阅读</strong>：<a href=\"https://jalammar.github.io/illustrated-transformer/\" target=\"_blank\" rel=\"noopener\">jalammar.github.io</a></li></ul>\n<h3 id=\"sec-8\">3. Andrej Karpathy · 从零实现教学</h3>\n<ul><li><strong>身份</strong>：前 Tesla AI 总监、OpenAI 创始成员</li><li><strong>与本概念的关系</strong>：用纯 NumPy/PyTorch 从零实现 GPT，把 Transformer 拆到最底</li><li><strong>核心洞见</strong>：&quot;you don&#x27;t understand it until you build it&quot;——从零实现是检验理解的试金石</li><li><strong>代表作</strong>：*Let&#x27;s build GPT* YouTube 系列</li><li><strong>扩展阅读</strong>：<a href=\"https://www.youtube.com/watch?v=kCc8FmEb1nY\" target=\"_blank\" rel=\"noopener\">YouTube 视频</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"LLM工作原理与Token机制\">LLM工作原理与Token机制</a> · <a class=\"xref\" data-go=\"模型微调入门\">模型微调入门</a> · <a class=\"xref\" data-go=\"Embedding与向量表示\">Embedding与向量表示</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "Transformer架构原理"}, "LCEL与LangGraph": {"doc": "<div class=\"dochead\"><h1>LCEL与LangGraph <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔声明式链构建 LCEL + 有状态工作流 LangGraph〕的——是从 demo 走向生产级 Agent 的关键。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能用 LCEL 声明式构建链，用 LangGraph 实现有状态/有环/人在回路的 Agent 工作流，知道为什么这俩是生产标配。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>LCEL = 声明式链语法</strong>：<code>prompt | llm | parser</code> 用管道符组合 Runnable 组件，自动处理批处理/异步/流式/重试，比命令式 Chain 更简洁强大。</li><li><strong>Runnable 统一接口</strong>：所有组件（Prompt/LLM/Retriever/Parser）实现 Runnable 接口（invoke/batch/stream），可无缝组合。</li><li><strong>LangGraph = 状态图编排</strong>：节点=函数/Agent，边=条件跳转，状态=共享 dict；支持环（循环）、分支、并行，比线性 Chain 强大。</li><li><strong>生产级特性</strong>：① Checkpoint（持久化状态，崩溃恢复）；② 人在回路（interrupt 暂停等人审批）；③ 流式（每步增量输出）；④ 并行（多节点同时跑）。</li><li><strong>LCEL 适合线性流程</strong>：Prompt→LLM→Parser 这种直线管道用 LCEL 最简洁。</li><li><strong>LangGraph 适合复杂流程</strong>：Agent 循环/多 Agent 协作/条件分支/状态恢复用 LangGraph，可控可观测。</li><li><strong>配 LangSmith 可观测</strong>：LCEL/LangGraph 的每步自动记录到 LangSmith，看输入输出/token/延迟，是生产调试标配。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>LCEL 声明式链<ul><li>管道符语法（|）</li><li>Runnable 统一接口</li><li>自动批处理/异步/流式/重试</li><li>适合线性流程</li></ul></li><li>LangGraph 状态图<ul><li>节点+边+条件</li><li>共享状态 dict</li><li>支持环/分支/并行</li><li>适合复杂流程</li></ul></li><li>生产级特性<ul><li>Checkpoint 持久化</li><li>人在回路 interrupt</li><li>流式输出</li><li>并行执行</li></ul></li><li>选型<ul><li>线性 → LCEL</li><li>复杂/Agent → LangGraph</li></ul></li><li>可观测<ul><li>LangSmith 集成</li><li>每步输入输出记录</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为 LCEL 就是个语法糖，LangGraph 没听过，不知道生产级特性这层。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：Runnable 组件、管道符|、StateGraph、节点、边、Checkpoint、Interrupt</li><li>连接：LCEL：组件1|组件2|组件3；LangGraph：节点通过边连接，条件边控制跳转</li><li>流向：LCEL 线性流；LangGraph 图流（可环可分支）</li><li>边界：LCEL 不适合复杂循环；LangGraph 学习曲线陡</li><li>变化：状态 dict 更新驱动 LangGraph 流程推进</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=hierarchy。LCEL与LangGraph(concept)→[LCEL(线性)/LangGraph(图)]，各下挂特性。</p>\n<p><strong>类比</strong>：LCEL 像 Unix 管道（<code>cat | grep | sort</code>），简单线性；LangGraph 像工作流引擎（Airflow/Temporal），有分支有循环有状态，适合复杂业务流。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么把 AI 应用做到生产级。LCEL 让你像搭管道一样串组件（<code>prompt | llm | parser</code>），简洁还能自动处理并发流式。LangGraph 适合更复杂的——有循环（Agent 反复调工具）、有分支（条件跳转）、要暂停让人审批、要能崩溃恢复。简单流程用 LCEL，复杂 Agent 用 LangGraph。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>翻译管道：<code>prompt | llm | parser</code> LCEL 3 行搞定，自动流式。</li><li>客服 Agent：LangGraph 建状态图，分类→路由→处理→必要时人工审批→回复，可恢复。</li><li>研究助手：LangGraph 多步（搜→读→总结→不够再搜），有环能循环。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>LCEL 搞不定循环/条件跳转</li><li>LangGraph 学习成本高，简单任务用它过重</li><li>Checkpoint 存储要选对（内存/Redis/DB）</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（LCEL 局限）→ 复杂流程换 LangGraph</li><li>边界2（LangGraph 过重）→ 简单任务还是 LCEL</li><li>边界3（Checkpoint）→ 生产用 Redis/Postgres，本地用内存</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>LCEL 和旧 Chain 区别：原以为语法糖→校准为 Runnable 统一接口，自动处理批/异步/流式/重试。</li><li>LangGraph 什么时候用：原以为都用→校准为有循环/分支/状态恢复才用，线性用 LCEL。</li><li>人在回路怎么实现：原以为只是日志→校准为 interrupt 真能暂停流程等人审批后继续。</li></ol>\n<p><strong>成长对比</strong>：起点（LCEL=语法糖）→ 现在（Runnable接口+LangGraph状态图+生产特性+选型判断）。</p>\n</details>\n<p>📎 <a href=\"_transcript/LCEL与LangGraph.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/LCEL与LangGraph.svg\" target=\"_blank\" rel=\"noopener\">_viz/LCEL与LangGraph.svg</a></li><li>Mermaid 源：<a href=\"_viz/LCEL与LangGraph.mmd\" target=\"_blank\" rel=\"noopener\">_viz/LCEL与LangGraph.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>hierarchy</b></div><img src=\"_viz/LCEL与LangGraph.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/LCEL与LangGraph.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/LCEL与LangGraph.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Harrison Chase · LCEL/LangGraph 设计者</h3>\n<ul><li><strong>身份</strong>：LangChain Inc CEO</li><li><strong>与本概念的关系</strong>：主导 LCEL 和 LangGraph 的设计，从&quot;链&quot;进化到&quot;图&quot;</li><li><strong>核心洞见</strong>：生产 Agent 需要可控的状态图，不是自由循环；LCEL 让简单事简单，LangGraph 让复杂事可能</li><li><strong>代表作</strong>：LangChain、LangGraph</li><li><strong>扩展阅读</strong>：<a href=\"https://blog.langchain.dev/\" target=\"_blank\" rel=\"noopener\">LangGraph 博客</a></li></ul>\n<h3 id=\"sec-7\">2. Eduardo Imhof · LangGraph 核心贡献者</h3>\n<ul><li><strong>身份</strong>：LangChain 工程师</li><li><strong>与本概念的关系</strong>：LangGraph 的核心实现者，写了大量 LangGraph 教程</li><li><strong>核心洞见</strong>：状态图是把传统工作流引擎思想引入 LLM 应用的关键</li><li><strong>代表作</strong>：LangGraph 教程系列</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/langchain-ai/langgraph/tree/main/examples\" target=\"_blank\" rel=\"noopener\">LangGraph 示例</a></li></ul>\n<h3 id=\"sec-8\">3. Swyx · 生产级 LLM 工程观察者</h3>\n<ul><li><strong>身份</strong>：Latent Space 主理人</li><li><strong>与本概念的关系</strong>：系统观察 LLM 应用从 demo 到生产的工程化趋势</li><li><strong>核心洞见</strong>：&quot;AI 工程的核心矛盾是 demo 容易生产难&quot;，LCEL/LangGraph 是解决这个矛盾的框架</li><li><strong>代表作</strong>：Latent Space 播客</li><li><strong>扩展阅读</strong>：<a href=\"https://www.latent.space/\" target=\"_blank\" rel=\"noopener\">latent.space</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"LangChain框架\">LangChain框架</a> · <a class=\"xref\" data-go=\"Agent架构与ReAct模式\">Agent架构与ReAct模式</a> · <a class=\"xref\" data-go=\"多Agent协作与工作流编排\">多Agent协作与工作流编排</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "LCEL与LangGraph"}, "多Agent协作与工作流编排": {"doc": "<div class=\"dochead\"><h1>多Agent协作与工作流编排 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔用 LangGraph 等编排多智能体有状态协作〕的——解决复杂业务流程的自动化。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能设计多 Agent 协作流程（分工/通信/状态管理），用 LangGraph 实现有状态工作流和人在回路。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>单 Agent 搞不定复杂任务</strong>：任务复杂时单 Agent 上下文爆炸/工具过多/跑偏；拆成多 Agent 各司其职更可靠。</li><li><strong>协作模式</strong>：① 串行（A 做完给 B）；② 并行（A/B 同时做不同部分再合并）；③ 主管-工人（Supervisor 分派给 Worker）；④ 辩论（多 Agent 观点对抗再裁决）。</li><li><strong>LangGraph = 状态图</strong>：把 Agent 协作建模成有向图，节点=Agent/函数，边=条件跳转，状态=共享 dict。比纯 ReAct 更可控。</li><li><strong>状态管理是核心</strong>：多 Agent 要共享状态（如任务进度/中间产物），LangGraph 用 shared state + checkpoint 实现持久化和恢复。</li><li><strong>人在回路（Human-in-the-loop）</strong>：关键节点加人工审批（如发邮件前确认/Agent 不确定时求助），LangGraph 用 interrupt 实现。</li><li><strong>通信机制</strong>：① 共享状态（简单但耦合）；② 消息传递（解耦但复杂）；③ 黑板模式（共享工作区）。</li><li><strong>可靠性工程</strong>：超时/死锁/Agent 失败都要处理；用 checkpoint 恢复 + 重试 + 降级；监控每个 Agent 的成功率。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>为什么需要多 Agent<ul><li>单 Agent 上下文爆炸</li><li>工具过多跑偏</li><li>拆分各司其职</li></ul></li><li>协作模式<ul><li>串行（流水线）</li><li>并行（分治合并）</li><li>主管-工人（Supervisor）</li><li>辩论（对抗裁决）</li></ul></li><li>LangGraph 核心<ul><li>状态图（节点+边+条件）</li><li>共享状态</li><li>Checkpoint 持久化</li></ul></li><li>人在回路<ul><li>关键节点人工审批</li><li>interrupt 机制</li><li>不确定时求助</li></ul></li><li>通信机制<ul><li>共享状态</li><li>消息传递</li><li>黑板模式</li></ul></li><li>可靠性<ul><li>超时/死锁/失败处理</li><li>Checkpoint 恢复</li><li>监控成功率</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为多 Agent 就是&quot;多个 Agent 串联&quot;，不知道协作模式和状态管理这层。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：多个 Agent、Supervisor、共享状态、消息、Checkpoint、人工审批节点</li><li>连接：Supervisor→分派→Workers→结果回 Supervisor；或 A→B→C 串行；或 A/B 并行→合并</li><li>流向：取决于协作模式（串行/并行/主管-工人）</li><li>边界：Agent 间通信延迟；死锁（互相等待）；状态一致性</li><li>变化：任务进度更新共享状态→驱动流程推进</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=flow。Supervisor(actor)→分派→Worker1/Worker2(process)→结果→合并(process)→人工审批(boundary)→输出(data)。体现主管-工人+人在回路。</p>\n<p><strong>类比</strong>：像项目组——单 Agent 是一个人从头干到尾，多 Agent 是有项目经理（Supervisor）分派给开发/测试/设计（Workers），关键决策点找老板审批（人在回路），用 Jira（共享状态）跟踪进度。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么让多个 AI 协作干复杂活。一个 AI 啥都干容易乱，拆成几个各管一摊——比如写报告：一个负责查资料，一个负责写初稿，一个负责审校，像项目组分工。用 LangGraph 这种工具编排流程，能管状态、能暂停让人确认、能出错恢复。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>内容生产：调研Agent→写作Agent→审校Agent 串行，审校不满意回退重写。</li><li>客服系统：分类Agent→路由→技术/售后/投诉Agent，Supervisor 协调。</li><li>代码审查：多个 Agent 不同视角审（安全/性能/风格）→合并报告。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>Agent 间通信开销大（多个 LLM 调用成本叠加）</li><li>死锁（A 等 B，B 等 A）</li><li>状态不一致（并发写共享状态）</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（成本叠加）→ 简单任务别拆，用单 Agent；关键节点才多 Agent</li><li>边界2（死锁）→ 设超时 + 强制推进</li><li>边界3（状态不一致）→ 用 LangGraph 的状态图保证顺序</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>多 Agent 什么时候值：原以为越多越好→校准为复杂任务才值，简单任务单 Agent 更省。</li><li>LangGraph 和 LangChain 区别：原以为一样→校准为 LangChain 是链式（线性），LangGraph 是图（有环/条件/状态），更适合 Agent。</li><li>人在回路怎么实现：原以为只是日志→校准为 LangGraph 的 interrupt 能真暂停流程等人审批后继续。</li></ol>\n<p><strong>成长对比</strong>：起点（多Agent=串联）→ 现在（四种协作模式+LangGraph状态图+人在回路+可靠性工程）。</p>\n</details>\n<p>📎 <a href=\"_transcript/多Agent协作与工作流编排.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/多Agent协作与工作流编排.svg\" target=\"_blank\" rel=\"noopener\">_viz/多Agent协作与工作流编排.svg</a></li><li>Mermaid 源：<a href=\"_viz/多Agent协作与工作流编排.mmd\" target=\"_blank\" rel=\"noopener\">_viz/多Agent协作与工作流编排.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/多Agent协作与工作流编排.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/多Agent协作与工作流编排.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/多Agent协作与工作流编排.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Harrison Chase · LangGraph 创始人</h3>\n<ul><li><strong>身份</strong>：LangChain Inc CEO</li><li><strong>与本概念的关系</strong>：LangGraph 是多 Agent 编排的事实标准，他定义了状态图+人在回路的范式</li><li><strong>核心洞见</strong>：生产 Agent 的可靠性来自可控的状态图，不是自由循环</li><li><strong>代表作</strong>：LangGraph</li><li><strong>扩展阅读</strong>：<a href=\"https://langchain-ai.github.io/langgraph/\" target=\"_blank\" rel=\"noopener\">LangGraph 文档</a></li></ul>\n<h3 id=\"sec-7\">2. Michael Wooldridge · 多 Agent 系统理论权威</h3>\n<ul><li><strong>身份</strong>：牛津大学计算机教授</li><li><strong>与本概念的关系</strong>：多 Agent 系统（MAS）的理论奠基者，把传统 MAS 理论和 LLM Agent 结合</li><li><strong>核心洞见</strong>：多 Agent 协作的核心是&quot;协调&quot;——通信/协商/冲突解决，理论早就有，LLM 让它落地</li><li><strong>代表作</strong>：*An Introduction to MultiAgent Systems*</li><li><strong>扩展阅读</strong>：<a href=\"https://www.cs.ox.ac.uk/people/michael.wooldridge/\" target=\"_blank\" rel=\"noopener\">牛津主页</a></li></ul>\n<h3 id=\"sec-8\">3. Yohei Nakajima · BabyAGI / 多 Agent 实践者</h3>\n<ul><li><strong>身份</strong>：OurCrowd 风投、BabyAGI 作者</li><li><strong>与本概念的关系</strong>：BabyAGI 是最早的自治多 Agent 任务管理原型，启发了一大批 Agent 框架</li><li><strong>核心洞见</strong>：多 Agent 的价值在&quot;自主分解+委派+反思&quot;，但要靠工程护栏防止失控</li><li><strong>代表作</strong>：BabyAGI</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/yoheinakajima/babyagi\" target=\"_blank\" rel=\"noopener\">BabyAGI GitHub</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"Agent架构与ReAct模式\">Agent架构与ReAct模式</a> · <a class=\"xref\" data-go=\"LCEL与LangGraph\">LCEL与LangGraph</a> · <a class=\"xref\" data-go=\"LangChain框架\">LangChain框架</a> · <a class=\"xref\" data-go=\"AI应用评估与可观测性\">AI应用评估与可观测性</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "多Agent协作与工作流编排"}, "向量数据库与相似度检索": {"doc": "<div class=\"dochead\"><h1>向量数据库与相似度检索 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔存储海量向量并做高效近邻检索〕的——是 RAG 和语义搜索的工程基石。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能选对向量数据库、理解 ANN 索引原理（HNSW/IVF）、知道为什么精确检索在海量数据下不可行。</p>\n<p><strong>重点结论</strong>（6 条）：</p>\n<ol><li><strong>精确 kNN 不可行</strong>：N 个向量找 top-k 最近邻，暴力算 O(N×D)，百万级就慢；海量场景必须用 ANN（近似最近邻）。</li><li><strong>ANN 用索引换速度</strong>：HNSW（图索引，查询快但内存大）、IVF（聚类索引，可调精度/速度）、PQ（乘积量化，压缩存储）。精度换速度是核心 trade-off。</li><li><strong>主流选型</strong>：Chroma（开发原型，&lt;10M）、Milvus（大规模，1B+）、Qdrant（生产友好，10M-100M）、Pinecone（托管 SaaS）、Weaviate（混合检索）。</li><li><strong>元数据过滤</strong>：光向量相似不够，要支持&quot;向量相似 AND 元数据过滤&quot;（如&quot;近7天 AND 相似度&gt;0.8&quot;），这是 RAG 常见需求。</li><li><strong>混合检索</strong>：向量（语义）+ BM25（关键词）混合，取两者并集重排，比纯向量召回率高——这是生产 RAG 标配。</li><li><strong>工程要点</strong>：批量插入、索引重建、持久化、分片；上线要监控召回率/延迟/QPS。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>为什么需要向量数据库<ul><li>精确 kNN 不可行（O(N×D)）</li><li>ANN 用索引换速度</li></ul></li><li>索引算法<ul><li>HNSW（图索引，快但费内存）</li><li>IVF（聚类，可调精度）</li><li>PQ（量化压缩）</li></ul></li><li>选型矩阵<ul><li>Chroma（原型）</li><li>Milvus（大规模）</li><li>Qdrant（生产）</li><li>Pinecone（托管）</li><li>Weaviate（混合）</li></ul></li><li>核心能力<ul><li>元数据过滤</li><li>混合检索（向量+BM25）</li><li>增删改查</li></ul></li><li>工程化<ul><li>批量插入/索引重建</li><li>监控召回率/延迟/QPS</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：以为向量数据库就是个&quot;存向量的数据库&quot;，检索就是算余弦相似度排序，不知道 ANN 索引这层。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：文档向量、向量库、ANN 索引（HNSW 图/IVF 聚类）、查询向量、top-k 结果、元数据</li><li>连接：插入→建索引；查询→走索引→候选集→精排→top-k</li><li>流向：插入时建索引（一次性），查询时走索引（O(logN) 级）</li><li>边界：ANN 是近似的，recall 不是 100%；索引建好后改向量要重建</li><li>变化：数据量↑→索引层数↑；调 ef_search/k_probe→精度/速度 trade-off</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=flow。文档向量(data)→索引构建(process)→ANN索引(state)→查询时遍历(process)→候选集(data)→精排(process)→top-k(data)。</p>\n<p><strong>类比</strong>：像图书馆找书——暴力是逐本翻（精确 kNN），索引是先按分类区找再按书架找（HNSW 图：从入口节点逐步跳到近邻区域）。快但可能漏掉个别该找的（近似）。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么在几百万几千万段文字里快速找到最相似的。一段段算相似度太慢，所以建个&quot;索引&quot;——像图书馆分类一样先把向量分组，查询时只搜相关分组，快很多但可能漏掉个别。不同数据库用不同索引算法，选型看你的数据量和精度要求。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>RAG 文档库：10万文档块 embed 后存 Milvus，查询时毫秒级返回 top-5。</li><li>语义去重：百万商品标题入库，新标题查相似度&gt;0.95 判重复。</li><li>推荐系统：用户向量+内容向量库，实时检索推荐候选。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>ANN recall 不是 100%，关键场景要调高精度参数</li><li>索引建好后数据大改要重建（耗资源）</li><li>高维向量（&gt;2048）索引性能下降</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（recall 不足）→ 调大 ef_search（HNSW）/ nprobe（IVF），用 recall@k 指标监控</li><li>边界2（重建成本）→ 增量索引或分片，避免全量重建</li><li>边界3（高维）→ 用 PQ 量化降维或选支持高维的索引</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>ANN 为什么快：原以为是并行→校准为是索引结构（HNSW 图的分层跳表，O(logN) 跳到近邻区域）。</li><li>recall 怎么调：原以为换数据库→校准为调索引参数（ef_search/nprobe），用 recall@k 评测。</li><li>混合检索：原以为纯向量最好→校准为向量+BM25 混合，因为向量会漏关键词精确匹配。</li></ol>\n<p><strong>成长对比</strong>：起点（向量库=存向量算相似）→ 现在（ANN 索引原理+选型矩阵+混合检索+工程监控）。</p>\n</details>\n<p>📎 <a href=\"_transcript/向量数据库与相似度检索.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/向量数据库与相似度检索.svg\" target=\"_blank\" rel=\"noopener\">_viz/向量数据库与相似度检索.svg</a></li><li>Mermaid 源：<a href=\"_viz/向量数据库与相似度检索.mmd\" target=\"_blank\" rel=\"noopener\">_viz/向量数据库与相似度检索.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/向量数据库与相似度检索.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/向量数据库与相似度检索.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/向量数据库与相似度检索.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Yury Malkov · HNSW 算法作者</h3>\n<ul><li><strong>身份</strong>：研究员</li><li><strong>与本概念的关系</strong>：HNSW（分层可导航小世界图）是当前最主流的 ANN 索引算法，几乎所有向量库都用</li><li><strong>核心洞见</strong>：分层图结构让查询从粗到细跳到近邻区域，O(logN) 查询效率</li><li><strong>代表作</strong>：*Efficient and robust approximate nearest neighbor search using HNSW*（2016）</li><li><strong>扩展阅读</strong>：<a href=\"https://arxiv.org/abs/1603.09320\" target=\"_blank\" rel=\"noopener\">arXiv 论文</a></li></ul>\n<h3 id=\"sec-7\">2. 王磊（Liu Jigao）· Milvus 核心贡献者</h3>\n<ul><li><strong>身份</strong>：Zilliz 工程师</li><li><strong>与本概念的关系</strong>：Milvus 是国内最主流的开源向量数据库，支撑十亿级向量</li><li><strong>核心洞见</strong>：向量数据库不只是存向量，要解决索引/分片/过滤/混合检索的工程问题</li><li><strong>代表作</strong>：Milvus</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/milvus-io/milvus\" target=\"_blank\" rel=\"noopener\">Milvus GitHub</a></li></ul>\n<h3 id=\"sec-8\">3. Sebastian Bruch · 理论视角</h3>\n<ul><li><strong>身份</strong>：向量检索理论研究员</li><li><strong>与本概念的关系</strong>：系统梳理 ANN 算法的理论边界（recall/延迟 trade-off 的数学基础）</li><li><strong>核心洞见</strong>：ANN 的&quot;近似&quot;有理论保证，recall 和延迟的 trade-off 可以量化</li><li><strong>代表作</strong>：ANN 算法理论系列论文</li><li><strong>扩展阅读</strong>：<a href=\"https://www.sebastianbruch.de/\" target=\"_blank\" rel=\"noopener\">Sebastian Bruch 个人页</a></li></ul>\n</details>\n<h2 id=\"sec-9\">相关</h2>\n<p><a class=\"xref\" data-go=\"Embedding与向量表示\">Embedding与向量表示</a> · <a class=\"xref\" data-go=\"RAG基础架构\">RAG基础架构</a> · <a class=\"xref\" data-go=\"高级RAG技术\">高级RAG技术</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-9\">相关</a>", "title": "向量数据库与相似度检索"}, "RAG基础架构": {"doc": "<div class=\"dochead\"><h1>RAG基础架构 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于AI应用开发，是用来解决〔检索-增强-生成的完整管道〕的——解决大模型知识滞后、幻觉、私域知识缺失三大痛点。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能从 0 搭一个 RAG 问答系统：文档解析→分块→embed→入库→检索→构造 prompt→生成，并知道每步的坑。</p>\n<p><strong>重点结论</strong>（7 条）：</p>\n<ol><li><strong>RAG = 检索+生成</strong>：先从知识库检索相关文档块，再把检索结果塞进 prompt 让模型&quot;看着答&quot;，用检索 grounding 对抗幻觉。</li><li><strong>三大痛点对应</strong>：知识滞后（知识库可实时更新）+ 幻觉（有引用可追溯）+ 私域知识缺失（企业文档入库）。</li><li><strong>完整管道六步</strong>：文档解析→分块（chunking）→embed→入库（indexing）→检索（retrieval）→生成（generation）。</li><li><strong>分块是关键</strong>：块太大检索不精准、太小丢上下文；常用 500-1000 token + 重叠 50-100；语义分块（按段落/标题）比固定长度好。</li><li><strong>检索质量决定生成质量</strong>：&quot;garbage in garbage out&quot;——检索召回率低，模型再强也答不好；要监控 recall@k。</li><li><strong>Prompt 要给引用</strong>：让模型基于检索内容回答，并标注来源（&quot;根据[文档1]...&quot;），便于人工核查。</li><li><strong>评估三指标</strong>：检索指标（recall@k/MRR）+ 生成指标（faithfulness/answer relevance）+ 端到端（用户满意度）。</li></ol>\n<p><strong>重点知识大纲</strong>：</p>\n<ul><li>为什么需要 RAG<ul><li>知识滞后（模型训练有截止）</li><li>幻觉（无引用）</li><li>私域知识缺失（没见过企业文档）</li></ul></li><li>完整管道<ul><li>文档解析（PDF/HTML/Word）</li><li>分块（固定/语义/递归）</li><li>Embedding</li><li>入库（向量化+索引）</li><li>检索（top-k 相关块）</li><li>生成（检索内容+prompt→LLM）</li></ul></li><li>关键工程点<ul><li>分块策略（大小/重叠/语义边界）</li><li>检索质量监控（recall@k）</li><li>Prompt 给引用</li></ul></li><li>评估<ul><li>检索：recall@k / MRR</li><li>生成：faithfulness / relevance</li><li>端到端：用户满意度</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：知道 RAG 是&quot;检索+生成&quot;，但以为就是&quot;搜文档塞给模型&quot;，不知道分块、检索质量、评估这些工程细节。</p>\n<p><strong>视觉模型（五问）</strong>：</p>\n<ul><li>对象：原始文档、分块器、Embedding、向量库、查询、检索器、Prompt 构造器、LLM、回答</li><li>连接：文档→分块→embed→入库；查询→embed→检索→top-k→prompt→LLM→回答</li><li>流向：离线索引（一次性）+ 在线查询（实时）两条流</li><li>边界：检索不到相关内容时模型会硬编（幻觉）；文档更新要重新索引</li><li>变化：文档增删→重新 embed 入库；查询不同→检索结果不同→prompt 不同</li></ul>\n<p><strong>视觉模型结构</strong>：chart_type=flow。离线流：文档(data)→分块(process)→embed(process)→向量库(state)。在线流：查询(data)→embed→检索(process)→top-k(data)→prompt组装(process)→LLM(process)→回答(data)。</p>\n<p><strong>类比</strong>：像开卷考试——模型是考生（会做题但记不住所有知识），知识库是课本，RAG 是&quot;先翻书找相关页再答题&quot;。不翻书硬答=幻觉，翻到错页=答非所问，翻对页+会答题=RAG 成功。</p>\n<p><strong>大白话讲解</strong>：它属于AI应用开发，解决怎么让 AI 用你自己的文档回答问题。AI 本身记不住你公司的资料，所以先建个文档库，问问题时先搜相关段落，把段落和问题一起给 AI 让它&quot;看着答&quot;。这样答得准、能溯源、还能随时更新文档不用重训模型。关键在分块（文档切多大）和检索（搜得准不准）。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>企业知识库问答：员工问&quot;年假怎么请&quot;→检索员工手册相关段→AI 基于段答+引用。</li><li>技术文档助手：开发者问&quot;这个 API 怎么用&quot;→检索文档→答+代码示例。</li><li>客服 bot：用户问&quot;怎么退货&quot;→检索退换货政策→答+步骤。</li></ol>\n<p><strong>失效边界</strong>：</p>\n<ul><li>检索召回率低→模型无依据→幻觉</li><li>文档过时未更新→答错</li><li>问题超出知识库范围→模型硬编</li></ul>\n<p><strong>边界补丁</strong>：</p>\n<ul><li>边界1（召回低）→ 调分块/换 Embedding/混合检索/调 top-k</li><li>边界2（文档过时）→ 建增量更新机制，文档变更触发重新索引</li><li>边界3（超范围）→ Prompt 加&quot;如果检索内容不足以回答，说&#x27;我不知道&#x27;&quot;</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ol><li>分块为什么重要：原以为随便切→校准为块大小直接影响检索精度和上下文完整性，是 RAG 最易翻车的工程点。</li><li>检索质量怎么评：原以为看回答好不好→校准为要先评 recall@k（检索召回），检索不行生成再好也白搭。</li><li>引用怎么给：原以为让模型自己标→校准为要在 prompt 里把检索块编号（[1][2]），让模型引用编号。</li></ol>\n<p><strong>成长对比</strong>：起点（RAG=搜文档塞模型）→ 现在（六步管道+分块工程+检索评估+引用机制+失效边界）。</p>\n</details>\n<p>📎 <a href=\"_transcript/RAG基础架构.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/RAG基础架构.svg\" target=\"_blank\" rel=\"noopener\">_viz/RAG基础架构.svg</a></li><li>Mermaid 源：<a href=\"_viz/RAG基础架构.mmd\" target=\"_blank\" rel=\"noopener\">_viz/RAG基础架构.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/RAG基础架构.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/RAG基础架构.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/RAG基础架构.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Lewis et al · RAG 论文作者</h3>\n<ul><li><strong>身份</strong>：Facebook AI Research（FAIR）</li><li><strong>与本概念的关系</strong>：2020 年首次提出 Retrieval-Augmented Generation 框架，奠定 RAG 范式</li><li><strong>核心洞见</strong>：&quot;retrieval-augmented generation&quot;——把检索作为生成的一部分，让模型访问外部知识</li><li><strong>代表作</strong>：*Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks*（NeurIPS 2020）</li><li><strong>扩展阅读</strong>：<a href=\"https://arxiv.org/abs/2005.11401\" target=\"_blank\" rel=\"noopener\">arXiv 论文</a></li></ul>\n<h3 id=\"sec-7\">2. Jerry Liu · LlamaIndex 创始人</h3>\n<ul><li><strong>身份</strong>：LlamaIndex 创始人</li><li><strong>与本概念的关系</strong>：LlamaIndex 是最主流的 RAG 框架之一，把 RAG 工程化标准化</li><li><strong>核心洞见</strong>：RAG 的工程复杂度在数据连接和索引，框架的价值在于抽象这些</li><li><strong>代表作</strong>：LlamaIndex</li><li><strong>扩展阅读</strong>：<a href=\"https://docs.llamaindex.ai/\" target=\"_blank\" rel=\"noopener\">LlamaIndex Docs</a></li></ul>\n<h3 id=\"sec-8\">3. Greg Kamradt · RAG 教学布道者</h3>\n<ul><li><strong>身份</strong>：技术博主、AI 工程师</li><li><strong>与本概念的关系</strong>：写了最流行的 RAG 从0到1教程，把工程细节讲透</li><li><strong>核心洞见</strong>：RAG 不是&quot;搜文档塞模型&quot;，分块/检索/评估每步都有坑，要系统化</li><li><strong>代表作</strong>：*RAG From Scratch* 教程系列</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/gkamradt\" target=\"_blank\" rel=\"noopener\">Greg Kamradt GitHub</a></li></ul>\

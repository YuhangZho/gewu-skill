链的开关</strong>：star 和转发是社交行为，访客大脑第一反应是&quot;跟我有关吗&quot;。相关性可识别 → 转发链延续；痛点不普遍 → 传播链在第一个节点就断。</li><li><strong>star 留人 vs 转发拉新是两件事</strong>：star = 访客变&quot;己方&quot;标记，未来 release 可唤醒；转发 = 把项目推给下一批同质人群，才是传播链燃料。star 涨但转发为 0 = 飞轮没燃料 = 冷启动失败。</li><li><strong>GitHub 是被动展示不是主动算法推荐</strong>：Trending 主信号=过去 24h star 增量（非总 star），日粒度 UTC 00:00 重置，≤7 天新仓库 ×1.6 加权。GitHub 冷启动比 B 站难得多——B 站转发→算法助攻，GitHub 转发→无算法助攻→必须人肉分发到外部渠道。</li><li><strong>Atlassian 电梯演讲模板</strong>：For [谁] who [想要什么], [项目] is a [类别] that provides [核心收益]. Unlike [替代方案], it [差异化点]。30 秒-1 分钟，禁术语，必含受众/需求/项目/价值四件。</li><li><strong>gewu-skill 定位校准</strong>：原版&quot;把有问题问 AI 变成一张有罗盘的学习地图&quot;——好的是对比结构和&quot;罗盘&quot;意象，缺的是&quot;为谁&quot;和&quot;凭什么用你&quot;。参考版：&quot;把&#x27;有问题问 AI&#x27;，变成一张你给目标、它给依赖顺序、带你费曼到底的学习地图&quot;。</li><li><strong>5 个失效边界</strong>：太宽（适用人群什么都覆盖）、太窄（只服务自己）、自说自话（术语堆砌）、与替代品无差异（又一个 X）、不可验证（说最好用但没法立刻试）。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>三件套结构<ul><li>为谁（目标用户，要具体不能&quot;所有&quot;）</li><li>痛点（要普遍才可识别）</li><li>独特价值（凭什么用你不用替代品）</li></ul></li><li>传播机制（为什么定位决定冷启动）<ul><li>定位语 → 访客 3 秒相关性识别</li><li>识别成功 → 价值判断 → star 留人 + 转发拉新</li><li>转发 → 新访客触达（反馈环）→ 传播链启动</li><li>两个失效边界：痛点不普遍→链断第1节点；无差异→只 star 不转发→链不启动</li></ul></li><li>GitHub 发现机制（被动 vs 主动）<ul><li>Trending = 过去 24h star 增量，日粒度重置</li><li>≤7 天新仓库 ×1.6 加权</li><li>无算法推荐 → 必须人肉分发到外部渠道</li></ul></li><li>Atlassian 电梯演讲模板<ul><li>For who + want + is a + provides + Unlike + it</li><li>30 秒-1 分钟，禁术语，四件必含</li></ul></li><li>5 个失效边界与补丁<ul><li>太宽 → 具体到人群</li><li>太窄 → 找共性痛点</li><li>自说自话 → 大白话替换术语</li><li>无差异 → 点出凭什么</li><li>不可验证 → 给 demo/截图</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：定位是用户特质与用户的规模，价值主张是解决的痛点。定位是提供什么服务针对什么人群。项目介绍就是介绍特色。<br>→ 校准：定位 ≠ 价值主张是两个独立东西，是三件套（为谁+痛点+独特价值）。</p>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：访客大脑（问能帮我什么忙）、项目页面（前三段）、star/观望</li><li><strong>连接</strong>：访客眼睛 ↔ README；访客大脑 ↔ 内容价值判断</li><li><strong>流向</strong>：README 首段 → 向下读完 → 决定试用 → 试用安装 → 反馈 star</li><li><strong>边界</strong>：需要安装 python 的非技术人员</li><li><strong>变化</strong>：是否需要 python 决定是否试用</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type（AI 自主判定）</strong>：flow（访客决策流程 + 反馈环 + 失效分支）</li><li><strong>节点 kind</strong>：concept（定位语）、actor（访客大脑）、rule（相关性识别、价值判断）、process（star+转发）、feedback（新访客触达）、state（传播链启动）、boundary（2 个失效边界）、concept（ChatGPT 参照系）</li><li><strong>结构纠偏</strong>：用户初版把&quot;是否需要 python&quot;当主要变化点——这是技术门槛边界，不是定位机制核心。AI 校准为&quot;定位语→相关性识别→价值判断→star+转发→反馈环&quot;的主流程，技术门槛归入失效边界。</li></ul>\n<p><strong>类比 1（B 站）</strong>：github 项目冷启动好比刷 B 站——标题封面=定位语，1 分钟抓住眼球才点赞=star，特别共鸣才转发=传播燃料。关键差异：B 站转发→算法助攻，GitHub 转发→无算法→必须人肉分发。</p>\n<p><strong>类比 2（发朋友圈）</strong>：图=定位语（第一眼决定是否看下去），文字=价值传递（有深度有共鸣才点赞），点赞=star，转发=传播链燃料。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：它属于开源运营里的问题，是用来解决&quot;为什么有些项目发出去没人理&quot;的。好比刷 B 站看到不认识的 up 主——第一眼扫描标题封面（=定位语），感兴趣才点进去，1 分钟抓住眼球才点赞（=star），特别共鸣才转发，只有转发才触发更多人看。但 GitHub 不像 B 站会自动推荐，只有被动推荐机制（Trending 榜按 24h star 增量排），所以也得找准为谁解决什么问题、为什么是 gewu 而不是其他工具。</p>\n<p><strong>三重验证</strong>：</p>\n<ol><li><strong>正向验证（VS Code）</strong>：为程序员解决编程环境分散的问题，集成 IDE 编程到编译一站式落地。三件套齐全。</li><li><strong>失效边界补丁</strong>：定位太宽（&quot;为所有学习者&quot;）→ 改成&quot;想系统学新领域但没框架的自学者&quot;→ README 首屏只写这一句，不写&quot;所有&quot;&quot;各种&quot;&quot;每个人&quot;。</li><li><strong>换类比（发朋友圈）</strong>：图=定位语、文字=价值传递、点赞=star、转发=转发。</li></ol>\n<p><strong>卡壳点复盘</strong>：</p>\n<ul><li>卡壳 1：以为定位=用户特质+规模、价值主张=痛点是两个独立东西 → 补：是三件套，缺独特价值。</li><li>卡壳 2：以为&quot;开源生态&quot;是痛点普遍性决定性因素的原因 → 补：真正机制是相关性可识别→传播链可启动，开源是分发模式不是传播开关。</li><li>卡壳 3：把 star 和转发混成&quot;新 star 决定推流&quot; → 补：star=留人，转发=拉新，两件事不能混。GitHub 不因 star 多推流。</li><li>卡壳 4（最深）：以为 GitHub 完全不推 → 补：GitHub 是被动展示（Trending 按 24h star 增量），不是完全不推。B 站主动算法推荐 vs GitHub 被动展示，冷启动难度差异巨大。</li></ul>\n<p><strong>成长对比</strong>：</p>\n<ul><li>起点：定位=用户特质+规模，价值主张=痛点（两个独立东西，缺独特价值）</li><li>现在：定位是三件套（为谁+痛点+独特价值），决定传播链能否启动；star 留人 vs 转发拉新不能混；GitHub 被动展示非主动推荐，必须人肉分发点燃传播链。</li></ul>\n</details>\n<p>📎 <a href=\"_transcript/项目定位与价值主张.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/项目定位与价值主张.svg\" target=\"_blank\" rel=\"noopener\">_viz/项目定位与价值主张.svg</a></li><li>Mermaid 源：<a href=\"_viz/项目定位与价值主张.mmd\" target=\"_blank\" rel=\"noopener\">_viz/项目定位与价值主张.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/项目定位与价值主张.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/项目定位与价值主张.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/项目定位与价值主张.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Geoffrey Moore · 「定位框架理论之父」</h3>\n<ul><li><strong>身份</strong>：硅谷顾问、《跨越鸿沟》作者</li><li><strong>与本概念的关系</strong>：他提出的&quot;电梯演讲模板&quot;是今天 Atlassian 模板的理论源头——For [who] who [need], [product] is a [category] that [benefit]. Unlike [competitor], it [differentiation].</li><li><strong>核心洞见</strong>：定位的本质不是描述产品，而是<strong>在用户心智中占据一个位置</strong>——你必须先回答&quot;相对于替代品，你占据的是哪个位置&quot;，否则就是&quot;又一个 X&quot;。</li><li><strong>代表作</strong>：《跨越鸿沟》（Crossing the Chasm, 1991）</li><li><strong>扩展阅读</strong>：<a href=\"https://www.blinkist.com/books/crossing-the-chasm-en\" target=\"_blank\" rel=\"noopener\">Crossing the Chasm 摘要</a> · <a href=\"https://geoffmoore.com/\" target=\"_blank\" rel=\"noopener\">Geoffrey Moore 官网</a></li></ul>\n<h3 id=\"sec-7\">2. Evan You · 「开源项目定位实战代表」</h3>\n<ul><li><strong>身份</strong>：Vue.js 创始人</li><li><strong>与本概念的关系</strong>：Vue 的定位是开源项目定位的经典案例——&quot;渐进式框架&quot;三个字同时回答了&quot;为谁&quot;（想要渐进采用的开发者）、&quot;痛点&quot;（React/Angular 太重）、&quot;独特价值&quot;（可逐步引入，不必全盘重构）。</li><li><strong>核心洞见</strong>：Vue 成功的关键不是技术最强，而是<strong>定位最清晰</strong>——Evan You 多次在访谈中说&quot;我不跟 React 比，我只服务好&#x27;想要渐进式&#x27;的那群人&quot;。文档优先 + 多语言 + 响应速度 &lt;12h，都服务于这个定位。</li><li><strong>代表作</strong>：Vue.js（2014-）</li><li><strong>扩展阅读</strong>：<a href=\"https://www.youtube.com/watch?v=4nWi8xR8NmQ\" target=\"_blank\" rel=\"noopener\">Evan You: The State of Vue</a> · <a href=\"https://vuejs.org/\" target=\"_blank\" rel=\"noopener\">Vue.js 官网</a></li></ul>\n</details>\n<h2 id=\"sec-8\">相关</h2>\n<p>README工程 · GitHub发现性优化 · <a class=\"xref\" data-go=\"冷启动渠道矩阵\">冷启动渠道矩阵</a> · 增长飞轮</p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-8\">相关</a>", "title": "项目定位与价值主张"}, "README 工程": {"doc": "<div class=\"dochead\"><h1>README 工程 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于开源项目冷启动的门面层，是用来解决&quot;访客来了留不住&quot;的——把 README 当转化漏斗设计，让访客从看到到 star 走完 7 个节点。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能把 gewu-skill README 按 7 节点漏斗诊断和改造，知道每个章节在漏斗里承担什么转化任务、卡点在哪、怎么补。</p>\n<p><strong>重点结论</strong>（AI 与你达成的最终共识）：</p>\n<ul><li><strong>README ≠ 介绍，是转化设计</strong>——介绍是单向信息输出；README 工程是转化漏斗，每个章节都是转化节点，目的是让访客从&quot;看到&quot;→&quot;留下&quot;→&quot;试用&quot;→&quot;留存&quot;。介绍是 README 的子集，不是本质。</li><li><strong>7 节点转化漏斗</strong>：首屏（30秒）→ 相关性识别 → Demo/截图 → Features/解决什么 → Quick Start+安装 → 10分钟闸门 → 第一个 wow 时刻 → 社会证明 → star。4 个节点不能跳：Demo 让人想试用，Features 让人决定试用，10分钟闸门是流失点，wow 时刻是留存点。</li><li><strong>30 秒法则 + 10 分钟法则</strong>：首屏 30 秒内传递价值（标题+一句话描述+徽章+视觉冲击）；10 分钟内让访客跑起来看到第一个 wow 时刻。10 分钟是&quot;跑起来看到效果&quot;的最大容忍时间——超过=认知负担=流失。</li><li><strong>首屏 2 个致命错误</strong>：①一上来讲原理和功能（不是访客决策要素）；②没有视觉冲击（无 logo/GIF/截图，访客大脑判定&quot;信息密度低&quot;→滚走）。</li><li><strong>Demo 媒体首要目标是&quot;让访客看到&quot;不是&quot;快&quot;</strong>——加载慢→访客等一下；加载失败→访客看到空白→以为没 Demo→流失。.webp 在 GitHub 移动端/部分客户端不渲染=比 gif 慢更糟。更好方案：.mp4（GitHub 原生渲染）或 gif 压缩到 2-5MB，或 .webp + 备用链接。</li><li><strong>awesome-readme 7 原则</strong>：①第一时间传达价值 ②用视觉替代文字 ③结构化导航 ④降低上手门槛 ⑤保持文档活性（动态元素） ⑥README 驱动开发 ⑦架构文档独立维护。</li><li><strong>gewu-skill README 现状诊断</strong>：7 徽章+2 Demo 媒体+三语+Quick Start，结构相当完整。4 个卡点：python 误导徽章（<code>python-3.8+</code>让访客以为必须装python）、.webp 不兼容、安装章节太重（环境检查+两种方式+10+agent路径表）、首屏标语缺&quot;为谁&quot;。</li><li><strong>nuwa-skill 是标杆案例</strong>：首屏 hero.gif+slogan+badge 视觉冲击强；Demo 用三段式对话实录（Naval/马斯克/乔布斯）金句密度高，wow 时刻极强；安装&lt;1 分钟（npx skills add）；Feature 放后面用五层表格。首屏 Star Badge 缺失是唯一短板。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>README 本质<ul><li>不是介绍，是转化设计</li><li>每个章节=转化漏斗节点</li><li>目的=看到→留下→试用→留存</li></ul></li><li>7 节点转化漏斗<ul><li>首屏（30秒：标题+标语+徽章+视觉）</li><li>相关性识别（跟我有关吗）</li><li>Demo/截图（视觉证明价值）</li><li>Features/解决什么（展开核心卖点）</li><li>Quick Start+安装（10分钟跑起来）</li><li>10分钟闸门（流失点：超时→流失）</li><li>第一个wow时刻（留存点：看到效果）</li><li>社会证明（star数/贡献者/案例）</li><li>star+加作者（转化完成）</li></ul></li><li>3 个失效边界<ul><li>首屏无视觉冲击→扫一眼就走</li><li>安装超10分钟→耐心耗尽流失</li><li>无社会证明→&quot;就我一个人用&quot;→只看不star</li></ul></li><li>awesome-readme 7 原则<ul><li>传达价值 / 视觉替代 / 结构导航 / 降低门槛 / 文档活性 / README驱动 / 架构独立</li></ul></li><li>Demo 媒体取舍<ul><li>首要目标=让访客看到（不是快）</li><li>加载失败比加载慢更糟</li><li>.mp4 &gt; gif &gt; .webp（兼容性维度）</li></ul></li><li>gewu-skill 4 卡点与改造<ul><li>python误导徽章→改deps-only或删</li><li>.webp→转.mp4或加备用链接</li><li>安装章节太重→折叠+前置Quick Start</li><li>首屏标语缺为谁→补具体人群</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：README=介绍大纲和实现内容，介绍页只讲重点，臃肿没人看。<br>→ 校准：README ≠ 介绍，是转化设计——每个章节是转化漏斗节点。</p>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：README 首段、访客大脑、README 安装步骤、README 解决什么、作者联系方式</li><li><strong>连接</strong>：访客大脑先看 → README 首段 → 感兴趣 → README 解决什么 → 如何安装 → 实际体验 → 感觉好 + 加作者 V</li><li><strong>流向</strong>：线性漏斗（首屏→识别→Demo→Features→安装→闸门→wow→社会证明→star）</li><li><strong>边界</strong>：不会安装 python 的用户；复杂大量训练的学习型用户</li><li><strong>变化</strong>：首屏效果决定继续或离开</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type（AI 自主判定）</strong>：flow（7 节点漏斗 + 3 失效边界）</li><li><strong>节点 kind</strong>：concept（首屏、Features）、actor（访客）、data（Demo、社会证明）、process（安装、star）、rule（10分钟闸门）、state（wow 时刻）、boundary（3 个失效边界）</li><li><strong>结构纠偏</strong>：用户初版跳过了 4 个节点（Demo→Features、10分钟闸门→wow时刻）。AI 校准补全为完整 7 节点漏斗。</li></ul>\n<p><strong>类比 1（商店橱窗）</strong>：路人路过橱窗→看到衣服漂亮可能适合自己→进店试穿→看商品标签材质价格→满意结账→排队不超10分钟→试穿 wow→拍照分享好友。橱窗=转化漏斗第一站，10分钟排队=第一个 wow 时刻倒计时。</p>\n<p><strong>类比 2（B 站视频封面）</strong>：封面有冲击力→用户点开看→几分钟满意点赞→继续看有惊喜转发。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：它属于开源运营里的问题，是用来解决&quot;为什么有些项目发出去没人理&quot;的。好比路人路过商店橱窗——橱窗里挂的衣服漂亮（=首屏动画+标语），你觉得可能适合自己就进店试穿（=相关性识别+Demo），看商品标签材质价格（=Features），满意了去结账（=安装），排队不能超过10分钟（=10分钟闸门），穿上身那一刻 wow（=第一个 wow 时刻），看到别人也在穿就放心买了（=社会证明）。README 不是介绍，是转化漏斗——每个章节都是一个转化节点，目的是让你从看到走到 star。</p>\n<p><strong>三重验证</strong>：</p>\n<ol><li><strong>正向验证（nuwa-skill）</strong>：首屏 hero.gif+slogan+badge 吸引眼球；Demo 三段式对话（Naval/马斯克/乔布斯）金句密度高 wow 极强；安装&lt;1 分钟；Feature 放后面五层表格。唯一短板=首屏缺 Star Badge。</li><li><strong>失效边界补丁</strong>：首屏动画无吸引力 → 重新做一个（B 站封面逻辑：有冲击力才有人点开）。</li><li><strong>换类比（B 站视频封面）</strong>：封面=首屏、几分钟满意=Features、点赞=star、继续看有惊喜=wow 时刻、转发=社会证明。</li></ol>\n<p><strong>卡壳点复盘</strong>：</p>\n<ul><li>卡壳 1：以为 README=介绍 → 补：是转化设计，每个章节是转化节点。</li><li>卡壳 2：10 分钟法则只抓到&quot;太长没人用&quot; → 补：10 分钟是&quot;跑起来看到第一个 wow 时刻&quot;的最大容忍时间。</li><li>卡壳 3（.webp 盲区）：只权衡了加载速度和兼容性，漏了&quot;加载失败比慢更糟&quot; → 补：Demo 媒体首要目标是&quot;让访客看到&quot;，.mp4 &gt; gif &gt; .webp。</li><li>卡壳 4（漏斗跳节点）：验收时跳过 4 个节点 → 补：完整 7 节点不能跳，Demo 让人想试用，Features 让人决定试用，10分钟闸门是流失点，wow 时刻是留存点。</li></ul>\n<p><strong>成长对比</strong>：</p>\n<ul><li>起点：README=介绍大纲和实现内容，臃肿没人看</li><li>现在：README 是 7 节点转化漏斗，每章节承担转化任务；Demo 媒体首要目标是让访客看到不是快；gewu-skill 有 4 个卡点待改（python徽章/.webp/安装太重/标语缺为谁）。</li></ul>\n</details>\n<p>📎 <a href=\"_transcript/README工程.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/README工程.svg\" target=\"_blank\" rel=\"noopener\">_viz/README工程.svg</a></li><li>Mermaid 源：<a href=\"_viz/README工程.mmd\" target=\"_blank\" rel=\"noopener\">_viz/README工程.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/README工程.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/README工程.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/README工程.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Tom Preston-Werner · 「README 驱动开发之父」</h3>\n<ul><li><strong>身份</strong>：GitHub 联合创始人、《Readme Driven Development》作者</li><li><strong>与本概念的关系</strong>：他提出的&quot;先写 README 再写代码&quot;理念是 awesome-readme 第 6 原则的理论源头——README 不是事后文档，是项目规格说明书，迫使你从用户角度思考。</li><li><strong>核心洞见</strong>：先写 README 能在写代码前就发现设计问题——&quot;如果你不能在 README 里说清这个项目做什么，那你的代码也说不清&quot;。</li><li><strong>代表作</strong>：*Readme Driven Development*（2010 博文）</li><li><strong>扩展阅读</strong>：<a href=\"https://tom.preston-werner.com/2010/08/23/readme-driven-development.html\" target=\"_blank\" rel=\"noopener\">Readme Driven Development 原文</a></li></ul>\n<h3 id=\"sec-7\">2. Richard Littauer · 「standard-readme 规范作者」</h3>\n<ul><li><strong>身份</strong>：开源贡献者、standard-readme 规范发起人</li><li><strong>与本概念的关系</strong>：他制定了 README 的标准化规范（standard-readme spec），被 awesome-readme 收录为推荐模板——规定了 README 必须包含的章节和顺序。</li><li><strong>核心洞见</strong>：README 规范化的目的是&quot;让访客在任何开源项目里都能快速找到他们需要的信息&quot;——一致性比创意更重要，首屏结构应遵循行业惯例而非自创。</li><li><strong>代表作</strong>：standard-readme 规范</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/RichardLitt/standard-readme\" target=\"_blank\" rel=\"noopener\">standard-readme 规范</a></li></ul>\n</details>\n<h2 id=\"sec-8\">相关</h2>\n<p><a class=\"xref\" data-go=\"项目定位与价值主张\">项目定位与价值主张</a> · Demo与可体验性 · 贡献者友好设计 · GitHub发现性优化</p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-8\">相关</a>", "title": "README 工程"}, "冷启动渠道矩阵": {"doc": "<div class=\"dochead\"><h1>冷启动渠道矩阵 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于开源项目冷启动的渠道层，是用来解决&quot;项目做好了发到哪里、怎么发才有人用&quot;的——不是找地方发帖，是有策略的渠道组合。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能给 gewu-skill 设计一个&quot;测试场→迭代场→扩量场&quot;三渠道错峰矩阵，每个渠道收不同维度反馈驱动不同对象迭代，制造 star 增量尖峰+持续长尾。</p>\n<p><strong>重点结论</strong>（AI 与你达成的最终共识）：</p>\n<ul><li><strong>渠道矩阵 ≠ 找渠道宣发</strong>——&quot;找渠道宣发&quot;是单向信息输出；渠道矩阵是有策略的渠道组合，三层价值：①覆盖面（不同渠道触达不同人群）②迭代测试（A/B 测试哪个渠道转化高）③流量节奏（错峰发制造持续讨论长尾，不是一天爆发后死掉）。核心是组合策略，不是渠道清单。</li><li><strong>发链接 vs 建立信任</strong>——发链接=把渠道当广告牌；建立信任=把渠道当社区。Reddit/V2EX/掘金都要求先贡献再索取，新号直接发广告=spam=被 ban=渠道永久关闭。冷启动本质是口碑传播，口碑要求信任，信任要求先贡献再索取。不是&quot;包装&quot;项目，是真诚分享你解决的问题和过程。</li><li><strong>每个渠道反馈不同→触发不同迭代对象</strong>——矩阵真正价值不是&quot;多渠道覆盖&quot;，是&quot;多渠道多维度反馈驱动多轮迭代&quot;。Linux.do 技术深度用户反馈→改 Features/机制说明；掘金开发者反馈→改 Tech Stack/技术细节；少数派效率工具用户反馈→改 Demo/场景故事。如果 3 渠道内容一样，反馈也会一样，迭代只能改一个对象=浪费矩阵价值。</li><li><strong>迭代具体迭 3 样东西</strong>（不是笼统&quot;改商品&quot;）：①README 首屏标语/定位语（反馈&quot;看不懂这是啥&quot;）②Quick Start/安装步骤（反馈&quot;装不上/跑不起来&quot;）③Demo/Features 展示（反馈&quot;看懂了但不想用&quot;）。渠道矩阵的反馈=告诉你 README 7 节点漏斗哪个节点在漏水。</li><li><strong>测试场→迭代场→扩量场三渠道错峰</strong>——第一个渠道是测试场（不是首发场），linux.do 实战论断：&quot;先在一个渠道打磨好话术和 README 转化，再复制到下一个&quot;。每个渠道间隔 2-3 天，制造持续讨论长尾。渠道B反馈回到迭代动作形成第二个迭代循环，不是只有渠道A触发迭代。</li><li><strong>Reddit 风控红线</strong>——反营销、反自我推销文化；养号→参与讨论→再发；选对子版块；保持 IP 稳定。V2EX 创意板块可发但标题不能太广告化；Hacker News Show HN 必须&quot;Show HN: [名] - [描述]&quot;格式且评论区亲自回复；掘金会限流纯推广最好技术分享包装。</li><li><strong>Product Hunt 时机</strong>——榜单机制=一天一轮太平洋时间 0 点重置，工作日日榜第一需 600-800 票。太早上（没准备好）=转化低排名掉机会浪费；太晚上（已发过其他渠道）=用户&quot;见过了&quot;不投票。最佳=定位+README+Demo 都优化好后集中一天发多渠道冲日榜前五拿官方徽章。一年最好只上一次。</li><li><strong>gewu-skill 渠道矩阵初稿</strong>：Linux.do（测试场·先发，分享设计哲学+费曼五步工程化）→掘金（迭代场·第二，技术实现+Agent Skills 标准）→少数派（扩量场·第三，场景故事+我学习时遇到的问题）。3 渠道间隔 2-3 天错峰。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>渠道矩阵本质<ul><li>不是找渠道宣发，是组合策略</li><li>三层价值：覆盖面 / 迭代测试 / 流量节奏</li><li>核心=组合策略不是渠道清单</li></ul></li><li>发链接 vs 建立信任<ul><li>广告牌逻辑 vs 社区逻辑</li><li>先贡献再索取（养号/参与讨论/真诚分享）</li><li>新号直接发广告=spam=被ban</li></ul></li><li>三渠道错峰策略<ul><li>渠道A·测试场（先发，听反馈）</li><li>反馈1→迭代→README转化提升</li><li>渠道B·迭代场（第二，复制优化版）</li><li>反馈2→反馈环回到迭代（第二个迭代循环）</li><li>渠道C·扩量场（第三，场景故事扩量）</li><li>star增量尖峰+持续长尾</li></ul></li><li>迭代具体3样东西<ul><li>README首屏标语（&quot;看不懂&quot;）</li><li>Quick Start安装（&quot;装不上&quot;）</li><li>Demo/Features（&quot;不想用&quot;）</li></ul></li><li>每渠道反馈不同触发不同迭代<ul><li>Linux.do→改Features/机制</li><li>掘金→改Tech Stack/技术细节</li><li>少数派→改Demo/场景故事</li></ul></li><li>3个失效边界<ul><li>同时发=跳过迭代=浪费渠道</li><li>直接广告=被ban=渠道关闭</li><li>受众不匹配=来了不留</li></ul></li><li>主要渠道禁忌<ul><li>Reddit：养号/反营销/IP稳定/选对子版块</li><li>V2EX：标题不能太广告</li><li>Hacker News：Show HN格式+亲自回复</li><li>掘金：技术分享包装，纯推广限流</li><li>Product Hunt：一年一次，最佳=优化好后冲日榜</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：找渠道宣发。<br>→ 校准：渠道矩阵 ≠ 找渠道宣发，是组合策略（覆盖面+迭代测试+流量节奏三层）。</p>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：渠道本身、每个渠道反馈、迭代动作、README 转化率、star 增量</li><li><strong>连接</strong>：渠道→反馈→迭代→转化率→star</li><li><strong>流向</strong>：用户初答&quot;同时发&quot;→校准为错峰发+反馈环</li><li><strong>边界</strong>：直接广告</li><li><strong>变化</strong>：好会涨星，不好就迭代</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type（AI 自主判定）</strong>：flow（测试场→迭代场→扩量场+反馈环+3失效边界）</li><li><strong>节点 kind</strong>：process（渠道A/B/C、迭代动作）、data（反馈1/2）、rule（README转化率）、state（star尖峰）、feedback（持续长尾）、boundary（3个失效边界）</li><li><strong>结构纠偏</strong>：用户初版流向答&quot;同时发&quot;→校准为错峰发+反馈环；用户验收时跳过渠道B反馈回到迭代的环→补丁&quot;每个渠道都是一次迭代机会&quot;。</li></ul>\n<p><strong>类比 1（连锁店）</strong>：先开一家而不是同时铺开，从第一家接受反馈改店里商品，再开第二家继续收反馈，最后开第三家扩量。不是只推广而是真正帮助每家店铺营利积累口碑，一家家开是为了不断验证和优化。</p>\n<p><strong>类比 2（发微信不同群）</strong>：先发一个群看反馈优化，再发一个群，而不是上来一起发。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：它属于开源运营里的问题，是用来解决&quot;项目做好了发到哪里、怎么发才有人用&quot;的。好比开连锁店——不是同时铺开所有店，而是先开一家，听顾客反馈改店里的招牌/点单流程/橱窗陈列，改好了再开第二家继续听反馈再改，最后开第三家扩量。每家店收到的反馈不一样（第一家顾客关心菜单、第二家关心价格、第三家关心装修），所以改的东西也不一样。关键是不能同时开——同时开就没法根据反馈改了。也不是去每家店门口发传单就走，而是真正把每家店经营好，让顾客愿意口口相传。</p>\n<p><strong>三重验证</strong>：</p>\n<ol><li><strong>正向验证（Vue.js）</strong>：Evan You 先 Google 内部测（改API）→Hacker News Show HN（改定位）→Twitter Build in Public（改传播话术）→中英文双语文档（改上手门槛）。每步反馈改不同对象，不是同时铺所有渠道。</li><li><strong>失效边界补丁</strong>：直接广告容易写成软广而不是真诚分享 → 补救：以&quot;我做了个东西想听反馈&quot;心态发，不是&quot;推广产品&quot;心态发。</li><li><strong>换类比（发微信不同群）</strong>：先发一个群看反馈优化，再发一个群，而不是上来一起发。</li></ol>\n<p><strong>卡壳点复盘</strong>：</p>\n<ul><li>卡壳 1：以为渠道矩阵=找渠道宣发 → 补：是组合策略，三层价值（覆盖面/迭代测试/流量节奏）。</li><li>卡壳 2：发链接 vs 建立信任只说&quot;无法聚焦&quot; → 补：发链接=广告牌逻辑，建立信任=社区逻辑，先贡献再索取。</li><li>卡壳 3（最深）：3 渠道内容方向一样 → 补：每渠道受众不同→反馈维度不同→触发不同迭代对象，矩阵价值=多维度反馈驱动多轮迭代。</li><li>卡壳 4：迭代太笼统&quot;改商品&quot; → 补：具体3样——README标语/Quick Start/Demo Features。</li><li>卡壳 5：验收跳过反馈环 → 补：渠道B反馈回到迭代形成第二个循环，每个渠道都是迭代机会。</li></ul>\n<p><strong>成长对比</strong>：</p>\n<ul><li>起点：找渠道宣发</li><li>现在：渠道矩阵是组合策略（覆盖面+迭代测试+流量节奏）；发链接 vs 建立信任（先贡献再索取）；每渠道反馈不同触发不同迭代；测试场→迭代场→扩量场三渠道错峰；gewu-skill 初稿=Linux.do→掘金→少数派。</li></ul>\n</details>\n<p>📎 <a href=\"_transcript/冷启动渠道矩阵.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/冷启动渠道矩阵.svg\" target=\"_blank\" rel=\"noopener\">_viz/冷启动渠道矩阵.svg</a></li><li>Mermaid 源：<a href=\"_viz/冷启动渠道矩阵.mmd\" target=\"_blank\" rel=\"noopener\">_viz/冷启动渠道矩阵.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/冷启动渠道矩阵.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/冷启动渠道矩阵.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/冷启动渠道矩阵.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. Evan You · 「开源渠道矩阵实战代表」</h3>\n<ul><li><strong>身份</strong>：Vue.js 创始人、VoidZero 创始人</li><li><strong>与本概念的关系</strong>：Vue.js 是渠道矩阵的经典案例——Evan You 没有同时铺所有渠道，而是 Google 内部测→HN→Twitter→文档长尾，每步反馈改不同对象。</li><li><strong>核心洞见</strong>：Vue 成功不只是技术好，更是&quot;文档优先 + 多语言 + 响应速度 &lt;12h + 社区自治&quot;的组合策略——每个渠道的反馈都转化为对应对象的迭代（内部改API、HN改定位、Twitter改传播、文档改上手门槛）。</li><li><strong>代表作</strong>：Vue.js（2014-）</li><li><strong>扩展阅读</strong>：<a href=\"https://zhuanlan.zhihu.com/p/58335278\" target=\"_blank\" rel=\"noopener\">尤雨溪谈Vue.js</a> · <a href=\"https://evanyou.me/\" target=\"_blank\" rel=\"noopener\">Evan You 官网</a></li></ul>\n<h3 id=\"sec-7\">3. Pieter Levels · 「Build in Public 渠道方法论代表」</h3>\n<ul><li><strong>身份</strong>：独立开发者、Nomad List/Maker Log 创始人、《MAKE》作者</li><li><strong>与本概念的关系</strong>：他是 Build in Public 文化的代表人物——不靠渠道矩阵铺开，而是靠 Twitter 持续公开分享开发过程，把社交媒体变成&quot;测试场+迭代场+扩量场&quot;三合一。</li><li><strong>核心洞见</strong>：Build in Public 本身就是一种渠道策略——每天分享进度=持续在社区贡献价值=积累信任=发产品时自然有人关注。不是&quot;发链接&quot;，是&quot;让人看着你做出来&quot;。</li><li><strong>代表作</strong>：《MAKE: The Indie Maker Handbook》</li><li><strong>扩展阅读</strong>：<a href=\"https://twitter.com/levelsio\" target=\"_blank\" rel=\"noopener\">Pieter Levels Twitter</a> · <a href=\"https://makerlog.io/\" target=\"_blank\" rel=\"noopener\">Maker Log</a></li></ul>\n<p><strong>视角对照</strong>：</p>\n<p>| 参照 | 一句话 | 关键词 |<br>|---|---|---|<br>| Evan You | 每步反馈改不同对象，不同时铺所有渠道 | 文档优先+多语言+社区自治 |<br>| 孟健 | 冷启动本质是建立信任不是发链接 | 渠道清单+信任建立 |<br>| Pieter Levels | Build in Public 本身就是渠道策略 | 持续公开分享=测试+迭代+扩量 |</p>\n</details>\n<h2 id=\"sec-8\">相关</h2>\n<p><a class=\"xref\" data-go=\"项目定位与价值主张\">项目定位与价值主张</a> · README工程 · 内容营销与Build in Public · 增长飞轮 · 冷启动节奏与发布时机</p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-8\">相关</a>", "title": "冷启动渠道矩阵"}, "GitHub 发现性优化": {"doc": "<div class=\"dochead\"><h1>GitHub 发现性优化 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于开源项目冷启动的渠道层，是用来解决&quot;别人怎么在 GitHub 上找到你的项目&quot;的——被动被发现的基础设施。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能给 gewu-skill 做完整的发现性优化（topics/description/social preview/About），让访客在搜索和浏览时能找到你、在搜索结果里愿意点进来。</p>\n<p><strong>重点结论</strong>（AI 与你达成的最终共识）：</p>\n<ul><li><strong>GitHub 发现路径有 6 种</strong>：①Trending ②外部链接（推广文/朋友介绍）③<strong>GitHub 搜索</strong>（关键词匹配 topics+description+README+仓库名）④<strong>Topics 浏览</strong>（github.com/topics/ai）⑤用户主页/组织页 ⑥Explore 推荐。<strong>站内搜索和 Topics 浏览是被动发现的主力</strong>——只靠外部引流=发现性没做。</li><li><strong>description vs README 标语是两块不同招牌</strong>：description 是店外招牌（搜索结果里显示，SEO 权重最高，0.5 秒直白识别&quot;这跟我有关吗&quot;），README 标语是店内介绍（点进来才看，3-30 秒可好奇可隐喻）。<strong>description 写不好=搜索结果没人点=流量在门口断</strong>。两块招牌服务不同场景，都不能失效。</li><li><strong>发现性优化 ≠ 冲 Trending</strong>：发现性=被动被发现的基础设施（topics/description/preview，持续长效），冲 Trending=主动冲榜的运营动作（24h star 增量，一次性日粒度重置）。<strong>发现性是地基，Trending 是楼——发现性差=即使冲上 Trending 访客点进来看到空 About/无 topics/差 description 也不留。先修基础设施，再冲榜单，顺序不能反。</strong></li><li><strong>topics 规范</strong>（GitHub 官方）：小写字母+数字+连字符，≤50 字符，最多 20 个；GitHub 自动分析公开仓库建议 topics（管理员可接受/拒绝）；最佳实践 4-8 个，混合&quot;类别+技术栈+场景+语言&quot;。</li><li><strong>social preview</strong>=社交分享预览图（1200×630px），仓库链接发到 Twitter/微信/Slack 时显示的卡片图。不设=GitHub 用默认丑截图=社交点击率低；设了=精心设计（logo+定位语+视觉冲击）点击率高 2-3 倍。设置路径：Settings→Social preview→Upload image。</li><li><strong>6 项发现性优化清单</strong>：①topics（4-8 个）②description（1 句话≤350 字符）③About 完整填写 ④social preview（1200×630）⑤README 首屏 SEO（Google 搜索抓）⑥Release 标签（订阅通知+版本感知）。</li><li><strong>description 吸引力优化</strong>：原版&quot;A Feynman-method learning system with vault auto setup&quot;缺为谁/技术实现非用户价值/缺差异化。优化版 A（推荐）：&quot;Turn &#x27;ask AI&#x27; into a goal-driven learning roadmap with Feynman method and auto knowledge vault.&quot;——保留对比结构+目标驱动+费曼+vault 翻译成用户价值。</li><li><strong>gewu-skill 发现性现状</strong>：topics ✅已加、About ✅有、Release ✅有、README 首屏 ✅有标语、description ❓需改、social preview ❌没设（最大流失点之一）。</li><li><strong>发现性漏斗末端 = README 漏斗起点</strong>：两个漏斗接力——发现性负责&quot;让人点进来&quot;（搜索/浏览→description 闸门→点击），README 负责&quot;让人留下来&quot;（首屏→Demo→Features→安装→wow→star）。中间接力棒=About 区域+README 首屏。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>6 种发现路径<ul><li>Trending（24h star 增量榜）</li><li>外部链接（推广文/朋友/社交媒体）</li><li>GitHub 搜索（关键词匹配，主力被动发现）</li><li>Topics 浏览（github.com/topics/xxx，主力被动发现）</li><li>用户主页/组织页</li><li>Explore 推荐（基于 topics 和 star 行为）</li></ul></li><li>两块不同招牌<ul><li>description=店外招牌（搜索结果显示，SEO 最高，0.5 秒直白）</li><li>README 标语=店内介绍（点进来才看，3-30 秒好奇隐喻）</li><li>description 写不好=流量在门口断</li></ul></li><li>发现性 vs 冲 Trending<ul><li>发现性=被动基础设施（持续长效）</li><li>冲 Trending=主动运营动作（一次性日粒度）</li><li>地基 vs 楼，顺序不能反</li></ul></li><li>6 项优化清单<ul><li>topics（4-8 个，小写+连字符）</li><li>description（1 句话，≤350 字符）</li><li>About 完整填写</li><li>social preview（1200×630）</li><li>README 首屏 SEO</li><li>Release 标签</li></ul></li><li>发现性漏斗<ul><li>3 路径→搜索结果列表→description 闸门→点击→About+README 接力→star</li><li>末端=README 漏斗起点</li></ul></li><li>3 个失效边界<ul><li>无 topics=搜索/浏览都找不到</li><li>description 差=搜索结果没人点</li><li>无 social preview=社交分享丑截图低点击</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：已加 topics（比前几个概念起点高），&quot;加错了会吸引不同频的人&quot;直觉准。<br>→ 校准：发现性优化不只是 topics，是 6 项基础设施。</p>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：搜索框/topics 页面/搜索结果列表/About/description/social preview/README 首屏</li><li><strong>连接</strong>：搜索→结果→About/desc→social preview+README 首屏</li><li><strong>流向</strong>：3 路径汇入→结果列表→description 闸门→点击→About+README 接力→star</li><li><strong>边界</strong>：无 topics/加错</li><li><strong>变化</strong>：description 不同触发不同分支</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type（AI 自主判定）</strong>：flow（3 路径汇入+description 闸门+About+README 接力+3 失效边界）</li><li><strong>节点 kind</strong>：actor（访客）、process（3 路径、点击、star）、data（搜索结果、social preview）、rule（description 闸门）、state（点击进入）、concept（About+README 接力）、boundary（3 个失效边界）</li><li><strong>结构纠偏</strong>：用户初答只想到 trending+外部链接→补全 6 路径；验收时跳过 About+README 接力→补丁&quot;发现性末端=README 漏斗起点&quot;。</li></ul>\n<p><strong>类比 1（商店）</strong>：先看招牌和橱窗外置菜单（=topics+description），再搜大众点评和朋友推荐（=外部链接+social preview），进来后看店内环境感受第一次服务（=About+README 接力）。</p>\n<p><strong>类比 2（书店找书）</strong>：读者先找分类书柜（=Topics 浏览），一本本看标题是否切合需求（=搜索结果列表+description），找到后看作者和简介（=About+README 接力），发现宝藏分享书皮封面给朋友（=social preview 助攻转发）。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：它属于开源运营里的问题，是用来解决&quot;别人怎么在 GitHub 上找到你的项目&quot;的。好比书店找书——读者先找分类书柜（=Topics 浏览），一本本看标题（=搜索结果里的 description），标题切合需求才抽出来看作者和简介（=About+README 接力）。店外招牌（description）要直白让人 0.5 秒识别&quot;这跟我有关吗&quot;，店内介绍（README 标语）可以好奇可以隐喻。还有 6 种找书路径：主动搜、逛分类、朋友推荐、排行榜、店员推荐、路过看到。关键要先修好招牌和分类（发现性基础设施），再去冲排行榜（Trending），顺序不能反——招牌没修好即使上了排行榜，人家点进来看到空荡荡也不留。</p>\n<p><strong>三重验证</strong>：</p>\n<ol><li><strong>正向验证（nuwa-skill）</strong>：topics/description/About/README 首屏都有，social preview 不确定。发现性做得相当完整。</li><li><strong>失效边界补丁</strong>：description 差找不准用户定位 → 补救：Turn &quot;ask AI&quot; into a goal-driven learning roadmap with auto knowledge vault.</li><li><strong>换类比（书店找书）</strong>：分类书柜=Topics 浏览，标题=description，作者简介=About+README 接力，书皮封面=social preview 助攻转发。</li></ol>\n<p><strong>卡壳点复盘</strong>：</p>\n<ul><li>卡壳 1：只想到 trending+外部链接 → 补：6 种路径，站内搜索和 Topics 浏览是被动发现主力。</li><li>卡壳 2：description vs README 标语&quot;不清楚&quot; → 补：两块不同招牌，店外直白 vs 店内好奇。</li><li>卡壳 3（最深）：发现性 vs 冲 Trending&quot;不清楚&quot; → 补：发现性=地基（被动基础设施持续长效），冲 Trending=楼（主动运营一次性），顺序不能反。</li><li>卡壳 4：验收跳过 About+README 接力 → 补：发现性漏斗末端=README 漏斗起点，两者接力。</li></ul>\n<p><strong>成长对比</strong>：</p>\n<ul><li>起点：已加 topics，&quot;加错了吸引不同频的人&quot;</li><li>现在：6 种发现路径；description vs README 两块招牌；发现性是地基 Trending 是楼；6 项优化清单；gewu-skill 需改 description+设 social preview。</li></ul>\n</details>\n<p>📎 <a href=\"_transcript/GitHub发现性优化.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/GitHub发现性优化.svg\" target=\"_blank\" rel=\"noopener\">_viz/GitHub发现性优化.svg</a></li><li>Mermaid 源：<a href=\"_viz/GitHub发现性优化.mmd\" target=\"_blank\" rel=\"noopener\">_viz/GitHub发现性优化.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/GitHub发现性优化.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/GitHub发现性优化.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/GitHub发现性优化.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">2. Tj Holowaychuk · 「GitHub 发现性实战代表」</h3>\n<ul><li><strong>身份</strong>：Express.js / Koa 作者，GitHub 早期高星项目代表</li><li><strong>与本概念的关系</strong>：Express.js 是 GitHub 发现性优化的经典案例——精准 topics（nodejs/web-framework/router/middleware）+ 简洁 description + 完整 About，让它在 Node.js 生态里被动发现率极高。</li><li><strong>核心洞见</strong>：发现性的关键是&quot;站在搜索者角度想关键词&quot;——你的 topics 要包含用户会搜的词，不是你自己想的词。Express 的 topics 里没有&quot;express&quot;（用户不会搜这个），但有&quot;web-framework&quot;&quot;middleware&quot;（用户会搜）。</li><li><strong>代表作</strong>：Express.js（2010-）</li><li><strong>扩展阅读</strong>：<a href=\"https://github.com/expressjs/express\" target=\"_blank\" rel=\"noopener\">Express.js 仓库</a></li></ul>\n<h3 id=\"sec-7\">3. Steve Yegge · 「README 驱动发现性理论代表」</h3>\n<ul><li><strong>身份</strong>：博主、前 Google/Sourcegraph 工程师</li><li><strong>与本概念的关系</strong>：他写过&quot;README 是最重要的营销文件&quot;——README 首屏不只是给已点进来的人看，Google 搜索也抓 README 前几百字，所以 README 首屏是双重身份（发现性+转化）。</li><li><strong>核心洞见</strong>：README 前 200 字是整个项目的&quot;SEO 窗口&quot;——Google 抓它作为搜索摘要，GitHub 搜索也权重它。所以 README 首屏标语不能只顾好看，要含可搜索的关键词。</li><li><strong>代表作</strong>：《Declarative README》系列博文</li><li><strong>扩展阅读</strong>：<a href=\"https://steve-yegge.medium.com/\" target=\"_blank\" rel=\"noopener\">Steve Yegge 博客</a></li></ul>\n<p><strong>视角对照</strong>：</p>\n<p>| 参照 | 一句话 | 关键词 |<br>|---|---|---|<br>| GitHub Explore Team | topics 是分类系统不是标签，多条被动发现路径 | 分类体系 |<br>| Tj Holowaychuk | topics 要含用户会搜的词不是你自己想的词 | 搜索者角度 |<br>| Steve Yegge | README 前 200 字是 SEO 窗口，双重身份 | 发现性+转化 |</p>\n</details>\n<h2 id=\"sec-8\">相关</h2>\n<p><a class=\"xref\" data-go=\"项目定位与价值主张\">项目定位与价值主张</a> · README工程 · 内容营销与Build in Public · 增长飞轮 · <a class=\"xref\" data-go=\"冷启动渠道矩阵\">冷启动渠道矩阵</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-8\">相关</a>", "title": "GitHub 发现性优化"}, "__refs__": {"doc": "<div class=\"dochead\"><h1>参考资料</h1><span class=\"badge light\">领域参考资料库</span></div><div class=\"md\"><blockquote>领域参考资料库汇总所有概念学习中用过的可查链接；相同 URL 只保留一次。</blockquote><div class=\"refgrid\"><div class=\"refcard\"><div class=\"reft\">〔GitHub Docs · Classifying your repository with topics，2026-06-26 抓取〕</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"GitHub 发现性优化\">GitHub 发现性优化</a></div><a class=\"refurl\" href=\"https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/classifying-your-repository-with-topics\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li>〔GitHub Docs · Classifying your repository with topics，2026-06-26 抓取〕 链接：<ul><li>原话引述：&quot;With topics, you can explore repositories in a particular subject area, find projects to contribute to, and discover new solutions to a specific problem.&quot;</li><li>原话引述：&quot;Use lowercase letters, numbers, and hyphens. Use 50 characters or less. Add no more than 20 topics.&quot;</li><li>AI 转述（可信度：高）：topics 出现在仓库主页，点击可看同 topic 其他仓库；GitHub 分析公开仓库内容自动建议 topics；公开+私有仓库都可加 topics 但私有的只在有权访问时出现在搜索结果。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">〔CSDN · GitHub Trending 排序算法逆向研究，2026-06-26 抓取〕</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"GitHub 发现性优化\">GitHub 发现性优化</a></div><a class=\"refurl\" href=\"https://ask.csdn.net/questions/9369771\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li>〔CSDN · GitHub Trending 排序算法逆向研究，2026-06-26 抓取〕 链接：<ul><li>AI 转述（可信度：中-高）：主信号=过去 24h star 增量（Pearson r≈0.87），日粒度 UTC 00:00 重置，≤7 天新仓库 ×1.6 冷启动加权，过滤 fork/机器人/刷星。被动展示非主动算法推荐。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">〔freeCodeCamp · How to Structure Your README File，2026-06-26 抓取〕</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"README 工程\">README 工程</a></div><a class=\"refurl\" href=\"https://www.freecodecamp.org/news/how-to-structure-your-readme-file/\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li>〔freeCodeCamp · How to Structure Your README File，2026-06-26 抓取〕 链接：<ul><li>原话引述：&quot;If someone can clone your repository and get it running in under 10 minutes, your README did its job!&quot;</li><li>AI 转述（可信度：高）：19 章标准结构，首屏 4 要素（标题+描述/Features/Tech Stack/徽章），Quick Start 四步法（clone→安装依赖→环境配置→启动），核心心法&quot;先写 README 再写代码&quot;。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">〔awesome-readme · 漂亮 README 核心元素与工程化原则，2026-06-26 抓取〕</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"README 工程\">README 工程</a></div><a class=\"refurl\" href=\"https://github.com/matiassingers/awesome-readme\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li>〔awesome-readme · 漂亮 README 核心元素与工程化原则，2026-06-26 抓取〕 链接：<ul><li>AI 转述（可信度：高）：7 大工程化原则——①第一时间传达价值 ②用视觉替代文字 ③结构化导航 ④降低上手门槛 ⑤保持文档活性 ⑥README 驱动开发 ⑦架构文档独立维护。漂亮 README 公式=Logo+一句话描述+Badges→GIF演示→TOC→Features→Installation+Quickstart→Usage→Contributing+License。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">〔nuwa-skill README · 标杆案例分析，2026-06-26 抓取〕</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"README 工程\">README 工程</a></div><a class=\"refurl\" href=\"https://github.com/alchaincyf/nuwa-skill\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li>〔nuwa-skill README · 标杆案例分析，2026-06-26 抓取〕 链接：<ul><li>AI 转述（可信度：高）：首屏 hero.gif 炼金术蒸馏动画+slogan&quot;你想蒸馏的下一个员工，何必是同事&quot;+4 badge；Demo 三段式对话实录（Naval/马斯克/乔布斯）金句密度高；安装&lt;1 分钟（npx skills add）；Feature 放后面用五层表格；wow 时刻极强（乔布斯谈 OpenAI 反转&quot;最终赢家可能是 Apple&quot;）。短板=首屏缺 Star Badge。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">README 工程 · open-awesome.com</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"README 工程\">README 工程</a></div><a class=\"refurl\" href=\"https://open-awesome.com/projects/readme-best-practices\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><p>-</p></div></div><div class=\"refcard\"><div class=\"reft\">〔掘金 · 孟健《海外冷启动渠道清单》，2026-06-26 抓取〕</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"冷启动渠道矩阵\">冷启动渠道矩阵</a></div><a class=\"refurl\" href=\"https://juejin.cn/post/7560958498676031534\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li>〔掘金 · 孟健《海外冷启动渠道清单》，2026-06-26 抓取〕 链接：<ul><li>原话引述：&quot;冷启动的本质不是到处发链接，而是找到你的早期用户，和他们建立信任。&quot;</li><li>AI 转述（可信度：高）：V2EX（Google权重高/创意板块）、Hacker News（Show HN/投资人技术大佬）、Reddit（风控严/养号/IP稳定/选对子版块）、Product Hunt（日榜600-800票/一年一次）、社交媒体矩阵（Twitter/LinkedIn/YouTube）、Startup平台清单（BetaList/BetaPage/AlternativeTo等）。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">〔linux.do · 2个月破1000star实战贴，2026-06-26 抓取〕</div><div class=\"refmeta\">来自：<a class=\"xref\" data alse}, {"name": "能培育种子用户并建立反馈闭环", "kind": "知识型", "via": ["种子用户运营"], "have": false}, {"name": "能说清增长飞轮怎么转、卡在哪、怎么破", "kind": "知识型", "via": ["增长飞轮"], "have": false}, {"name": "能规划冷启动节奏与发布时机（5 阶段时间线）", "kind": "知识型", "via": ["冷启动节奏与发布时机"], "have": false}, {"name": "能用指标追踪效果并迭代", "kind": "知识型", "via": ["指标追踪与迭代"], "have": false}, {"name": "能选对开源协议并搭好基础治理", "kind": "知识型", "via": ["开源协议与基础治理"], "have": false}], "sources": ["https://fansgurus.com/zh/blog/grow-github-stars-8-methods", "https://linux.do/t/topic/813738", "https://jishuzhan.net/article/2007766133328887809"]};
const CAT=Object.keys(DATA.categories)[0], R=DATA.categories[CAT];
const DOTC={"已完成":"var(--green)","学习中":"var(--grad)","待学":"var(--gray)"};
const cardEls={};
function stars(n){return '★'.repeat(n)+'<span class="se">'+'★'.repeat(Math.max(0,5-n))+'</span>';}
function theme(){return document.documentElement.dataset.theme;}
function renderOverview(){
  document.getElementById('sub').textContent=CAT+' · 共 '+R.total+' 个核心概念 · 依赖深度 '+(R.max_stage+1)+' 层 · 更新于 '+DATA.generated;
  if(DATA.goal){const g=document.getElementById('goal');g.style.display='';g.textContent='目标：'+DATA.goal;}
  const pct=R.total?Math.round(R.learned/R.total*100):0;
  document.getElementById('progbar').style.width=pct+'%';
  document.getElementById('progtxt').textContent=R.learned+'/'+R.total+' 已完成 · '+pct+'%';
  const tl=document.getElementById('timeline');tl.innerHTML='';let ls=-1;
  R.order.forEach(it=>{
    if(it.stage!==ls){const s=document.createElement('div');s.className='stage';
      s.textContent='阶段 '+(it.stage+1)+(it.stage===0?'（地基 · 无前置）':'（需先完成前置）');tl.appendChild(s);ls=it.stage;}
    const done=it.status==='已完成';const hasDoc=!!DOCS[it.title];
    const card=document.createElement('div');
    card.className='card'+(it.title===R.current?' cur':'')+(done?' done':'')+(hasDoc?' linkcard':'');
    card.id='card-'+it.title;card.dataset.k=it.title;cardEls[it.title]=card;
    if(hasDoc)card.onclick=()=>go(it.title);
    card.innerHTML='<span class="dot" style="background:'+(DOTC[it.status]||'var(--gray)')+'"></span>'
      +'<div style="flex:1"><div class="t">'+it.title+'<span class="stars">'+stars(it.importance)+'</span></div>'
      +(it.desc?'<div class="d">'+it.desc+'</div>':'')
      +(it.prereqs.length?'<div class="pre"><b>前置：</b>'+it.prereqs.join(' · ')+'</div>':'')
      +((it.xprereqs&&it.xprereqs.length)?'<div class="pre xpre"><b>⚠ 跨类前置：</b>'+it.xprereqs.map(x=>x.title+'（在「'+x.category+'」大类，未完成）').join(' · ')+'</div>':'')+'</div>'
      +(it.title===R.current&&!hasDoc?'<span class="tag">▶ 你在这里 / 下一个</span>':(hasDoc?'<span class="tag ok">'+(done?'✓ 已完成':it.status)+(it.track?' · '+it.track:'')+' ›</span>':''));
    tl.appendChild(card);
  });
  const nx=document.getElementById('next');
  const ph=R.progress_hint||{current_pct:pct,next_pct:pct,bar:'[░░░░░░░░░░]',line:'当前知识图谱覆盖率'+pct+'%，下一站完成可达'+pct+'%。',milestone:''};
  nx.innerHTML='<div class="learnprog"><div class="lh">学习进度</div><div class="ll">'+ph.line+'</div><div class="lb">'+ph.bar+' '+ph.current_pct+'% → '+ph.next_pct+'%</div>'+(ph.milestone?'<div class="lm">里程碑：'+ph.milestone+'</div>':'')+'</div>';
  if(!R.next3.length){const ip=R.order.find(o=>o.status==='学习中');
    const cur=R.order.find(o=>o.title===R.current&&o.status!=='已完成');
    nx.innerHTML+='<div class="why">'+(ip?'先续学习中断点：'+ip.title+' →':(cur?'继续学当前概念：'+cur.title+' →':'本领域已全部完成 →'))+'</div>';}
  else nx.innerHTML+=R.next3.map(t=>{const it=R.order.find(o=>o.title===t);
    const sh=it.prereqs.length?('衔接 '+it.prereqs.join('、')):'关联当前知识';
    return '<div class="item"><b>'+t+'</b> <span style="color:var(--yellow);font-size:12px">'+stars(it.importance)+'</span>'
      +'<div class="why">'+(it.desc||'')+'</div><div class="why">'+sh+'</div></div>';}).join('');
  const ex=document.getElementById('exp');const list=(DATA.expansions||{})[CAT]||[];
  ex.innerHTML=list.length?list.slice().sort((a,b)=>b.importance-a.importance).map(e=>
    '<div class="e"><div class="nm">'+e.name+' <span style="color:var(--yellow);font-size:12px">'+stars(e.importance)+'</span></div>'
    +'<div class="why">'+(e.why||'')+'</div></div>').join(''):'<div class="why">（暂未配置扩展方向）</div>';
}
function toggleNotesNav(){
  const body=document.getElementById('notesbody'),link=document.getElementById('noteslink');
  if(!body||!link)return;
  const collapsed=body.classList.toggle('collapsed');
  link.classList.toggle('collapsed',collapsed);
  link.setAttribute('aria-expanded',collapsed?'false':'true');
  try{localStorage.setItem('notes_coll_'+CAT,collapsed?'1':'0');}catch(e){}
}
function initNotesNav(){
  const body=document.getElementById('notesbody'),link=document.getElementById('noteslink');
  if(!body||!link)return;
  let collapsed=false;
  try{collapsed=localStorage.getItem('notes_coll_'+CAT)==='1';}catch(e){}
  body.classList.toggle('collapsed',collapsed);
  link.classList.toggle('collapsed',collapsed);
  link.setAttribute('aria-expanded',collapsed?'false':'true');
}
function buildNav(){
  const nb=document.getElementById('navbody');nb.innerHTML='';
  const groups=[],gmap={};
  // 每个概念只进【一个】最贴近的分类（groups[0]），杜绝同一概念在多分类下重复出现
  R.order.forEach(it=>{const g=(it.groups&&it.groups.length)?it.groups[0]:'未分类';
    if(!gmap[g]){gmap[g]=[];groups.push(g);} gmap[g].push(it);});
  groups.forEach(g=>{
    const wrap=document.createElement('div');wrap.className='navgrp';
    const hd=document.createElement('div');hd.className='navhd2';
    hd.innerHTML='<span class="chev">▸</span><span>'+g+'</span><span class="gc">'+gmap[g].length+'</span>';
    const body=document.createElement('div');body.className='navgbody';
    gmap[g].forEach(it=>{
      const hasDoc=!!DOCS[it.title];
      const a=document.createElement('a');a.className='navlink'+(hasDoc?'':' todo');a.dataset.k=it.title;
      a.innerHTML='<span class="nd" style="background:'+(DOTC[it.status]||'var(--gray)')+'"></span>'+it.title;
      a.onclick=function(e){e.stopPropagation(); if(hasDoc){go(it.title);} else {go('__overview__');setTimeout(()=>{const el=cardEls[it.title];if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},60);} };
      body.appendChild(a);
    });
    hd.onclick=function(){wrap.classList.toggle('collapsed');};
    wrap.appendChild(hd);wrap.appendChild(body);nb.appendChild(wrap);
  });
  if(DOCS.__refs__){
    const a=document.createElement('a');a.className='navlink refnav';a.dataset.k='__refs__';
    a.innerHTML='<span class="nd refs"></span>参考资料';
    a.onclick=function(e){e.stopPropagation();go('__refs__');};
    nb.appendChild(a);
  }
}
function setActive(v){document.querySelectorAll('#sidenav .navlink').forEach(x=>x.classList.toggle('active',x.dataset.k===v));
  document.getElementById('homelink').classList.toggle('active',v==='__overview__');document.getElementById('graphlink').classList.toggle('active',v==='__graph__');document.getElementById('goallink').classList.toggle('active',v==='__goal__');}
function bindXref(){document.querySelectorAll('#docview a.xref').forEach(a=>a.onclick=()=>go(a.dataset.go));}
function bindToc(){
  const links=[...document.querySelectorAll('#toc .tl')];
  links.forEach(a=>a.onclick=()=>{const el=document.getElementById(a.dataset.id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});});
  if(window.__tio)window.__tio.disconnect();
  window.__tio=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){links.forEach(a=>a.classList.toggle('active',a.dataset.id===e.target.id));}});},{rootMargin:'-8% 0px -82% 0px'});
  document.querySelectorAll('#docview h2[id],#docview h3[id]').forEach(h=>window.__tio.observe(h));
}
function gIsDone(){if(!R||(R.learned||0)===0)return false;/*防呆：一个概念都没完成，目标不可能完成——拦住 AI 误写 status:已完成 / 空要求被当 100%*/var ls=false;try{ls=localStorage.getItem('goal_done_'+CAT)==='1';}catch(e){}return ls||(GOAL&&GOAL.status==='已完成');}
function gHasGoal(){return !!(GOAL&&GOAL.goal);}
// 解锁：本大类已设目标(goals.json 有该大类)即点亮；或已有概念完成。两者皆无才灰显。
function gUnlocked(){return gHasGoal()||R.learned>0;}
function gReqOk(r){return r&&(r.have===true||r.status==='✓'||r.status==='ok'||r.status===true);}
function gReqVia(r){return (r&&(r.via||r.refs||r.by))||[];}
function gReqName(r){return (typeof r==='string')?r:(r.name||r.req||'');}
function gReqKind(r){return (r&&r.kind&&(r.kind==='实践型'||r.kind==='practice'))?'实践型':'知识型';}
function gAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function gLearnedSet(){var s={};(R.order||[]).forEach(function(o){if(o.status==='已完成')s[o.title]=1;});return s;}
// 知识型覆盖度：via 概念里有多少已完成 / via 总数；via 空时回退 have 兜底
function gCov(r,LRN){var via=gReqVia(r);if(!via.length){var ok=gReqOk(r);return {pct:ok?100:0,n:0,tot:0,done:ok};}var n=0;via.forEach(function(c){if(LRN[c])n++;});return {pct:Math.round(n/via.length*100),n:n,tot:via.length,done:n>=via.length};}
function gCircle(c){if(c.done)return '<span class="gck ok">✓</span>';if(c.pct<=0)return '<span class="gck no">○</span>';return '<span class="gck part" title="'+c.n+'/'+c.tot+' 概念已完成" style="background:conic-gradient(var(--green) 0% '+c.pct+'%, color-mix(in srgb,var(--muted) 14%,transparent) '+c.pct+'% 100%)"></span>';}
// via 概念链接：单个直接可点；多个收成「{ N个概念 ⌄」点击展开
function gVia(via){if(!via.length)return '';if(via.length===1)return ' <a class="gvia1" data-go="'+gAttr(via[0])+'">'+via[0]+'</a>';var items=via.map(function(c){return '<a class="gviac" data-go="'+gAttr(c)+'">'+c+'</a>';}).join('<span class="gvsep">·</span>');return ' <span class="gexp"><span class="gexpb">{ '+via.length+'个概念 ⌄</span><span class="gexpbody">'+items+'</span></span>';}
function gPractOn(i){try{return localStorage.getItem('goal_pract_'+CAT+'_'+i)==='1';}catch(e){return false;}}
// 实时完成进度：知识型按覆盖比例 + 实践型按 ☑ 勾选，合计/总要求数
function gProgress(){
  var g=GOAL||{},done=gIsDone(),LRN=gLearnedSet(),reqs=g.requirements||[];
  var kreqs=reqs.filter(function(r){return gReqKind(r)!=='实践型';});
  var preqs=reqs.filter(function(r){return gReqKind(r)==='实践型';});
  var psum=0;
  kreqs.forEach(function(r){psum+=gCov(r,LRN).pct/100;});
  preqs.forEach(function(r,i){if(gPractOn(i))psum+=1;});
  var prog=reqs.length?Math.round(psum/reqs.length*100):0; if(done)prog=100;
  var ptier=prog>=80?'高':(prog>=50?'中':'低');
  return {prog:prog,ptier:ptier,tc:gTierColor(ptier)};
}
function gTierColor(t){return t==='高'?'var(--green)':(t==='中'?'var(--yellow)':'var(--red)');}
function updateGoalNav(){var gl=document.getElementById('goallink');if(!gl)return;gl.classList.toggle('disabled',!gUnlocked());var txt=gl.querySelector('.navtxt');if(txt)txt.textContent=gIsDone()?'目标完成 ✅':'目标规划';}
function renderGoal(){
  var b=document.getElementById('goalbody');
  if(!gHasGoal()){var _nx=(R&&R.next3)||[],_sg=(GOAL&&GOAL.suggested_goals)||[],_n=(R&&R.order)?R.order.length:0,_has=(_nx.length||_sg.length);var _h='<div class="gempty"><h1>🎯 目标规划</h1><p>这个领域你已攒了 <b>'+_n+'</b> 个知识点。'+(_has?'<b>定个目标</b>我就能联网对照真实要求、按优先级帮你规划；<b>不定也行</b>——下面有通用下一步。':'')+'</p>';if(_sg.length)_h+='<div class="gh3">💡 你可能想要的目标（说一个，或自己定）</div><div class="grecs">'+_sg.map(function(s){return '<div class="grec"><span class="gp">🎯</span><div class="grn">'+fesc(s)+'</div></div>';}).join('')+'</div>';if(_nx.length)_h+='<div class="gh3">👉 不定目标也能继续 · 下一步建议</div><div class="grecs">'+_nx.map(function(t,i){return '<div class="grec"><span class="gp">'+(i+1)+'</span><div class="grn">'+fesc(t)+'</div></div>';}).join('')+'</div>';if(!_has)_h+='<div class="grec" style="border-color:var(--accent)"><span class="gp">👉</span><div class="grn">你已学的点都点亮了，<b>但还没有"待学"的下一站</b>。想继续学这个领域，跟我说<b>「接着学」</b>或<b>定个目标</b>，我就把下一段路线铺出来（先补几个"待学"节点，再给你下一站）。</div></div>';_h+='<p class="gref">想定目标直接告诉我（参考分类：应试 · 求职 · 分享 · 知识变现 · 自主学习 · 无目标(AI自主发散)）。</p></div>';b.innerHTML=_h;return;}
  var g=GOAL,done=gIsDone(),h='';
  h+='<div class="ghead"><h1>🎯 '+g.goal+'</h1>'+(g.goal_category?'<span class="gtag">'+g.goal_category+'</span>':'')+(g.sample?'<span class="gtag sample">示例</span>':'')+'</div><div class="gsub">更新于 '+(g.updated||'')+'</div>';
  if(done)h+='<div class="celebrate"><div class="cbig">🎉 目标完成！</div><div>恭喜拿下「'+g.goal+'」。</div></div>';
  if(g.practice_note)h+='<div class="gpractice">'+(g.domain_type?'<b>['+g.domain_type+'] </b>':'')+g.practice_note+'</div>';
  // 顶部进度＝实时完成进度（不再读 AI 写的 match，随 ✓/☑ 自动刷新）
  var LRN=gLearnedSet();
  var reqs=g.requirements||[];
  var kreqs=reqs.filter(function(r){return gReqKind(r)!=='实践型';});
  var preqs=reqs.filter(function(r){return gReqKind(r)==='实践型';});
  var P=gProgress();
  h+='<div class="gmeter"><div class="gpct" style="color:'+P.tc+'">'+P.prog+'%</div><div class="gbar"><i style="width:'+P.prog+'%;background:'+P.tc+'"></i></div><div class="gtier">目标完成进度 · '+(done?'已完成':P.ptier+' 档')+'</div></div>';
  if(g.summary)h+='<p class="gsum">'+g.summary+'</p>';
  if(reqs.length){
    if(kreqs.length){
      h+='<div class="gh3">目标要求对照 · 知识覆盖</div>';
      h+='<div class="gcap">真实世界对该目标的要求清单，用来查你的<b>学习覆盖度</b>；与左侧概念<b>非一一对应</b>——一条要求可能由多个概念覆盖，✓＝其覆盖概念已完成（部分完成按比例填充）。</div>';
      h+='<div class="greqs">'+kreqs.map(function(r){var c=gCov(r,LRN);return '<div class="greq">'+gCircle(c)+'<span class="greqn">'+gReqName(r)+gVia(gReqVia(r))+'</span></div>';}).join('')+'</div>';
    }
    if(preqs.length){
      h+='<div class="gh3">实践清单 · 靠动手达成（自检）</div>';
      h+='<div class="gpracts">'+preqs.map(function(r,i){var on=gPractOn(i);return '<div class="gpract"><span class="gpck'+(on?' on':'')+'" data-pi="'+i+'" role="checkbox" aria-checked="'+(on?'true':'false')+'" tabindex="0" title="点这个方框手动勾选">'+(on?'☑':'▢')+'</span><span class="greqn">'+gReqName(r)+'</span></div>';}).join('')+'</div>';
    }
  }
  if(!done&&P.ptier!=='高'&&g.recommend&&g.recommend.length)h+='<div class="gh3">下一步学习规划 · 按优先级</div><div class="grecs">'+g.recommend.map(function(r,i){if(typeof r==='string'){return '<div class="grec"><span class="gp">P'+(i+1)+'</span><div><div class="grn">'+r+'</div></div></div>';}var nm=r.concept||r.name||'',why=r.why||r.reason||'';return '<div class="grec"><span class="gp">P'+(r.priority||i+1)+'</span><div><div class="grn">'+nm+'</div>'+(why?'<div class="grw">'+why+'</div>':'')+'</div></div>';}).join('')+'</div>';
  if((done||P.ptier==='高')&&g.high_actions&&g.high_actions.length)h+='<div class="gh3">去实践 · 把知识用起来</div><ul class="gacts">'+g.high_actions.map(function(a){return '<li>'+a+'</li>';}).join('')+'</ul>';
  if(g.sources&&g.sources.length)h+='<div class="gsrc">目标要求来源：'+g.sources.map(function(s,i){return '<a href="'+s+'" target="_blank" rel="noopener">来源'+(i+1)+'</a>';}).join(' · ')+'</div>';
  h+='<div class="gfb"><div class="gh3">完成反馈</div><textarea id="gfbtext" placeholder="例如：参加 CET-4 考试通过！/ 已做完 3 套模拟题，阅读还需加强…"></textarea>';
  if(!done)h+='<div><button id="gdone" class="gbtn">🎉 标记目标完成</button><span class="gnote">点完成后请告诉我一声，我会更新数据、让知识图谱里这部分知识“活”起来。</span></div>';
  else h+='<div class="gnote">已完成。若有新目标，告诉我即可重新规划。</div>';
  h+='</div>';
  b.innerHTML=h;
  // via 概念点击跳转（单个 / 展开后的多个）
  b.querySelectorAll('[data-go]').forEach(function(a){a.onclick=function(e){e.stopPropagation();go(this.getAttribute('data-go'));};});
  // 多概念大括号：点击展开/收起（展开他人先收起）；点页面别处收回
  b.querySelectorAll('.gexpb').forEach(function(el){el.onclick=function(e){e.stopPropagation();var p=el.parentNode,wasOpen=p.classList.contains('open');document.querySelectorAll('.gexp.open').forEach(function(x){x.classList.remove('open');var bb=x.querySelector('.gexpb');if(bb)bb.textContent=bb.textContent.replace('⌃','⌄');});if(!wasOpen){p.classList.add('open');el.textContent=el.textContent.replace('⌄','⌃');}};});
  if(!window.__gexpBound){document.addEventListener('click',function(e){if(!(e.target.closest&&e.target.closest('.gexp'))){document.querySelectorAll('.gexp.open').forEach(function(x){x.classList.remove('open');var bb=x.querySelector('.gexpb');if(bb)bb.textContent=bb.textContent.replace('⌃','⌄');});}});window.__gexpBound=true;}
  // 实践清单自检：仅当用户【手动点击复选框本身】才切换；就地更新，绝不因重渲染/切回页面而自动改动
  b.querySelectorAll('.gpck[data-pi]').forEach(function(ck){
    ck.onclick=function(e){
      e.stopPropagation();
      var i=ck.getAttribute('data-pi'),k='goal_pract_'+CAT+'_'+i,on=false;
      try{on=localStorage.getItem(k)==='1';}catch(e){}
      var now=!on;
      try{localStorage.setItem(k,now?'1':'0');}catch(e){}
      ck.classList.toggle('on',now); ck.textContent=now?'☑':'▢'; ck.setAttribute('aria-checked',now?'true':'false');
      var P=gProgress();   // 仅就地刷新顶部进度，不整页重渲染
      var pe=b.querySelector('.gpct'); if(pe){pe.textContent=P.prog+'%';pe.style.color=P.tc;}
      var be=b.querySelector('.gbar>i'); if(be){be.style.width=P.prog+'%';be.style.background=P.tc;}
      var te=b.querySelector('.gtier'); if(te)te.textContent='目标完成进度 · '+(gIsDone()?'已完成':P.ptier+' 档');
    };
  });
  var db=document.getElementById('gdone');
  if(db)db.onclick=function(){try{localStorage.setItem('goal_done_'+CAT,'1');var fb=document.getElementById('gfbtext');if(fb&&fb.value)localStorage.setItem('goal_fb_'+CAT,fb.value);}catch(e){}updateGoalNav();renderGoal();window.scrollTo(0,0);};
}
function fesc(x){return (x==null?'':String(x)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initMermaid(){
  const blocks=[...document.querySelectorAll('#docview .mermaid')];
  if(!blocks.length)return;
  function run(attempt){try{
    mermaid.initialize({startOnLoad:false,theme:document.documentElement.dataset.theme==='dark'||document.documentElement.dataset.theme==='inkdark'?'dark':'default'});
    blocks.forEach(function(b){b.removeAttribute('data-processed');});
    var r=mermaid.run?mermaid.run({nodes:blocks}):mermaid.init(undefined,blocks);
    Promise.resolve(r).catch(function(){if((attempt||0)<1)setTimeout(function(){run((attempt||0)+1);},160);});
  }catch(e){if((attempt||0)<1)setTimeout(function(){run((attempt||0)+1);},160);}}
  if(window.mermaid){run();return;}
  if(window.__mermaidLoading){setTimeout(initMermaid,160);return;}
  window.__mermaidLoading=true;
  const sources=['../assets/mermaid.min.js','assets/mermaid.min.js','https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js'];
  function load(i){if(i>=sources.length){window.__mermaidLoading=false;return;}var s=document.createElement('script');s.src=sources[i];s.onload=function(){window.__mermaidLoading=false;run();};s.onerror=function(){load(i+1);};document.head.appendChild(s);}
  load(0);
}
function go(v){
  const ov=document.getElementById('overview'),dw=document.getElementById('docwrap'),gw=document.getElementById('graphwrap'),goalw=document.getElementById('goalwrap');
  gw.style.display='none';goalw.style.display='none';
  if(v==='__goal__'){if(!gUnlocked()){go('__overview__');return;}ov.style.display='none';dw.style.display='none';goalw.style.display='block';renderGoal();setActive('__goal__');document.getElementById('crumb').innerHTML='/ <b>'+(gIsDone()?'目标完成 ✅':'目标规划')+'</b>';location.hash=encodeURIComponent('__goal__');window.scrollTo(0,0);return;}
  if(v==='__graph__'){ov.style.display='none';dw.style.display='none';gw.style.display='block';
    const gf=document.getElementById('graphframe');if(!gf.src||gf.src==='about:blank'){gf.src=gf.dataset.src+'?theme='+theme();}else{try{gf.contentWindow.postMessage({theme:theme()},'*');}catch(e){}}
    setActive('__graph__');document.getElementById('crumb').innerHTML='/ <b>知识图谱</b>';location.hash=encodeURIComponent('__graph__');window.scrollTo(0,0);return;}
  if(v==='__overview__'||!DOCS[v]){ov.style.display='';dw.style.display='none';setActive('__overview__');
    document.getElementById('crumb').innerHTML='/ <b>学习路线</b>';location.hash='';window.scrollTo(0,0);return;}
  ov.style.display='none';dw.style.display='grid';
  const dt=(DOCS[v]&&DOCS[v].title)||v;
  document.getElementById('docview').innerHTML=DOCS[v].doc;
  document.getElementById('toc').innerHTML=DOCS[v].toc;
  bindXref();bindToc();initMermaid();setActive(v);
  document.getElementById('crumb').innerHTML='/ <span>学习笔记</span> / <b>'+dt+'</b>';
  location.hash=encodeURIComponent(v);window.scrollTo(0,0);
}
const THEMES=[["light","◐ 浅"],["dark","◑ 深"],["ink","❖ 宣纸"],["inkdark","❖ 夜墨"]];
function themeIdx(name){for(var i=0;i<THEMES.length;i++)if(THEMES[i][0]===name)return i;return 1;}
function hasTheme(name){return THEMES.some(function(x){return x[0]===name;});}
function setTheme(t,persist){var r=document.documentElement;r.dataset.theme=t;
  document.getElementById('themebtn').textContent=THEMES[themeIdx(t)][1];
  var gf=document.getElementById('graphframe');if(gf&&gf.src&&gf.src!=='about:blank'){try{gf.contentWindow.postMessage({theme:t},'*');}catch(e){}}
  if(persist!==false){try{localStorage.setItem('gewu_theme',t);}catch(e){}}}
document.getElementById('themebtn').onclick=function(){var cur=document.documentElement.dataset.theme||'dark';
  setTheme(THEMES[(themeIdx(cur)+1)%THEMES.length][0]);};
var savedTheme=null;try{savedTheme=localStorage.getItem('gewu_theme');}catch(e){}
setTheme(hasTheme(savedTheme)?savedTheme:(document.documentElement.dataset.theme||'light'),false);
document.getElementById('homelink').onclick=()=>go('__overview__');
document.getElementById('graphlink').onclick=()=>go('__graph__');
document.getElementById('goallink').onclick=()=>{if(gUnlocked())go('__goal__');};
document.getElementById('noteslink').onclick=function(e){e.preventDefault();toggleNotesNav();};
window.addEventListener('message',function(e){if(e&&e.data&&e.data.goto){var g=e.data.goto;if(DOCS[g])go(g);else{go('__overview__');setTimeout(function(){var el=cardEls[g];if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},80);}}});
renderOverview();buildNav();initNotesNav();updateGoalNav();
go(location.hash?decodeURIComponent(location.hash.slice(1)):'__overview__');
window.addEventListener('hashchange',()=>{go(location.hash?decodeURIComponent(location.hash.slice(1)):'__overview__');});
</script></body></html>

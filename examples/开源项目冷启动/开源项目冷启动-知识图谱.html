const DATA = {"nodes": [{"id": "cat::开源项目冷启动", "label": "开源项目冷启动", "type": "category", "category": "开源项目冷启动", "count": 13}, {"id": "Demo 与可体验性", "label": "Demo 与可体验性", "type": "concept", "category": "开源项目冷启动", "status": "待学", "importance": 4, "track": "", "ready": true, "aliases": ["Demo", "可体验性", "Tryability"], "body": "# Demo 与可体验性\n\n## 一句话定位\n> 待学。", "rel": "开源项目冷启动/Demo与可体验性.md", "viz": "", "viz_source": "", "viz_chart": "", "alive": ""}, {"id": "GitHub 发现性优化", "label": "GitHub 发现性优化", "type": "concept", "category": "开源项目冷启动", "status": "已完成", "importance": 4, "track": "标准轨", "ready": false, "aliases": ["发现性优化", "Discoverability", "GitHub SEO", "topics优化"], "body": "# GitHub 发现性优化\n\n## 一句话定位\n> 它属于开源项目冷启动的渠道层，是用来解决\"别人怎么在 GitHub 上找到你的项目\"的——被动被发现的基础设施。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能给 gewu-skill 做完整的发现性优化（topics/description/social preview/About），让访客在搜索和浏览时能找到你、在搜索结果里愿意点进来。\n\n**重点结论**（AI 与你达成的最终共识）：\n- **GitHub 发现路径有 6 种**：①Trending ②外部链接（推广文/朋友介绍）③**GitHub 搜索**（关键词匹配 topics+description+README+仓库名）④**Topics 浏览**（github.com/topics/ai）⑤用户主页/组织页 ⑥Explore 推荐。**站内搜索和 Topics 浏览是被动发现的主力**——只靠外部引流=发现性没做。\n- **description vs README 标语是两块不同招牌**：description 是店外招牌（搜索结果里显示，SEO 权重最高，0.5 秒直白识别\"这跟我有关吗\"），README 标语是店内介绍（点进来才看，3-30 秒可好奇可隐喻）。**description 写不好=搜索结果没人点=流量在门口断**。两块招牌服务不同场景，都不能失效。\n- **发现性优化 ≠ 冲 Trending**：发现性=被动被发现的基础设施（topics/description/preview，持续长效），冲 Trending=主动冲榜的运营动作（24h star 增量，一次性日粒度重置）。**发现性是地基，Trending 是楼——发现性差=即使冲上 Trending 访客点进来看到空 About/无 topics/差 description 也不留。先修基础设施，再冲榜单，顺序不能反。**\n- **topics 规范**（GitHub 官方）：小写字母+数字+连字符，≤50 字符，最多 20 个；GitHub 自动分析公开仓库建议 topics（管理员可接受/拒绝）；最佳实践 4-8 个，混合\"类别+技术栈+场景+语言\"。\n- **social preview**=社交分享预览图（1200×630px），仓库链接发到 Twitter/微信/Slack 时显示的卡片图。不设=GitHub 用默认丑截图=社交点击率低；设了=精心设计（logo+定位语+视觉冲击）点击率高 2-3 倍。设置路径：Settings→Social preview→Upload image。\n- **6 项发现性优化清单**：①topics（4-8 个）②description（1 句话≤350 字符）③About 完整填写 ④social preview（1200×630）⑤README 首屏 SEO（Google 搜索抓）⑥Release 标签（订阅通知+版本感知）。\n- **description 吸引力优化**：原版\"A Feynman-method learning system with vault auto setup\"缺为谁/技术实现非用户价值/缺差异化。优化版 A（推荐）：\"Turn 'ask AI' into a goal-driven learning roadmap with Feynman method and auto knowledge vault.\"——保留对比结构+目标驱动+费曼+vault 翻译成用户价值。\n- **gewu-skill 发现性现状**：topics ✅已加、About ✅有、Release ✅有、README 首屏 ✅有标语、description ❓需改、social preview ❌没设（最大流失点之一）。\n- **发现性漏斗末端 = README 漏斗起点**：两个漏斗接力——发现性负责\"让人点进来\"（搜索/浏览→description 闸门→点击），README 负责\"让人留下来\"（首屏→Demo→Features→安装→wow→star）。中间接力棒=About 区域+README 首屏。\n\n**重点知识大纲 / 脑图**：\n- 6 种发现路径\n  - Trending（24h star 增量榜）\n  - 外部链接（推广文/朋友/社交媒体）\n  - GitHub 搜索（关键词匹配，主力被动发现）\n  - Topics 浏览（github.com/topics/xxx，主力被动发现）\n  - 用户主页/组织页\n  - Explore 推荐（基于 topics 和 star 行为）\n- 两块不同招牌\n  - description=店外招牌（搜索结果显示，SEO 最高，0.5 秒直白）\n  - README 标语=店内介绍（点进来才看，3-30 秒好奇隐喻）\n  - description 写不好=流量在门口断\n- 发现性 vs 冲 Trending\n  - 发现性=被动基础设施（持续长效）\n  - 冲 Trending=主动运营动作（一次性日粒度）\n  - 地基 vs 楼，顺序不能反\n- 6 项优化清单\n  - topics（4-8 个，小写+连字符）\n  - description（1 句话，≤350 字符）\n  - About 完整填写\n  - social preview（1200×630）\n  - README 首屏 SEO\n  - Release 标签\n- 发现性漏斗\n  - 3 路径→搜索结果列表→description 闸门→点击→About+README 接力→star\n  - 末端=README 漏斗起点\n- 3 个失效边界\n  - 无 topics=搜索/浏览都找不到\n  - description 差=搜索结果没人点\n  - 无 social preview=社交分享丑截图低点击\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**起点认知**：已加 topics（比前几个概念起点高），\"加错了会吸引不同频的人\"直觉准。\n→ 校准：发现性优化不只是 topics，是 6 项基础设施。\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：搜索框/topics 页面/搜索结果列表/About/description/social preview/README 首屏\n- **连接**：搜索→结果→About/desc→social preview+README 首屏\n- **流向**：3 路径汇入→结果列表→description 闸门→点击→About+README 接力→star\n- **边界**：无 topics/加错\n- **变化**：description 不同触发不同分支\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type（AI 自主判定）**：flow（3 路径汇入+description 闸门+About+README 接力+3 失效边界）\n- **节点 kind**：actor（访客）、process（3 路径、点击、star）、data（搜索结果、social preview）、rule（description 闸门）、state（点击进入）、concept（About+README 接力）、boundary（3 个失效边界）\n- **结构纠偏**：用户初答只想到 trending+外部链接→补全 6 路径；验收时跳过 About+README 接力→补丁\"发现性末端=README 漏斗起点\"。\n\n**类比 1（商店）**：先看招牌和橱窗外置菜单（=topics+description），再搜大众点评和朋友推荐（=外部链接+social preview），进来后看店内环境感受第一次服务（=About+README 接力）。\n\n**类比 2（书店找书）**：读者先找分类书柜（=Topics 浏览），一本本看标题是否切合需求（=搜索结果列表+description），找到后看作者和简介（=About+README 接力），发现宝藏分享书皮封面给朋友（=social preview 助攻转发）。\n\n**大白话讲解（讲给外行）**：它属于开源运营里的问题，是用来解决\"别人怎么在 GitHub 上找到你的项目\"的。好比书店找书——读者先找分类书柜（=Topics 浏览），一本本看标题（=搜索结果里的 description），标题切合需求才抽出来看作者和简介（=About+README 接力）。店外招牌（description）要直白让人 0.5 秒识别\"这跟我有关吗\"，店内介绍（README 标语）可以好奇可以隐喻。还有 6 种找书路径：主动搜、逛分类、朋友推荐、排行榜、店员推荐、路过看到。关键要先修好招牌和分类（发现性基础设施），再去冲排行榜（Trending），顺序不能反——招牌没修好即使上了排行榜，人家点进来看到空荡荡也不留。\n\n**三重验证**：\n1. **正向验证（nuwa-skill）**：topics/description/About/README 首屏都有，social preview 不确定。发现性做得相当完整。\n2. **失效边界补丁**：description 差找不准用户定位 → 补救：Turn \"ask AI\" into a goal-driven learning roadmap with auto knowledge vault.\n3. **换类比（书店找书）**：分类书柜=Topics 浏览，标题=description，作者简介=About+README 接力，书皮封面=social preview 助攻转发。\n\n**卡壳点复盘**：\n- 卡壳 1：只想到 trending+外部链接 → 补：6 种路径，站内搜索和 Topics 浏览是被动发现主力。\n- 卡壳 2：description vs README 标语\"不清楚\" → 补：两块不同招牌，店外直白 vs 店内好奇。\n- 卡壳 3（最深）：发现性 vs 冲 Trending\"不清楚\" → 补：发现性=地基（被动基础设施持续长效），冲 Trending=楼（主动运营一次性），顺序不能反。\n- 卡壳 4：验收跳过 About+README 接力 → 补：发现性漏斗末端=README 漏斗起点，两者接力。\n\n**成长对比**：\n- 起点：已加 topics，\"加错了吸引不同频的人\"\n- 现在：6 种发现路径；description vs README 两块招牌；发现性是地基 Trending 是楼；6 项优化清单；gewu-skill 需改 description+设 social preview。\n\n</details>\n\n📎 [完整对话记录](_transcript/GitHub发现性优化.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/GitHub发现性优化.svg](_viz/GitHub发现性优化.svg)\n- Mermaid 源：[_viz/GitHub发现性优化.mmd](_viz/GitHub发现性优化.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔GitHub Docs · Classifying your repository with topics，2026-06-26 抓取〕 链接：https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/classifying-your-repository-with-topics\n  - 原话引述：\"With topics, you can explore repositories in a particular subject area, find projects to contribute to, and discover new solutions to a specific problem.\"\n  - 原话引述：\"Use lowercase letters, numbers, and hyphens. Use 50 characters or less. Add no more than 20 topics.\"\n  - AI 转述（可信度：高）：topics 出现在仓库主页，点击可看同 topic 其他仓库；GitHub 分析公开仓库内容自动建议 topics；公开+私有仓库都可加 topics 但私有的只在有权访问时出现在搜索结果。\n\n- 〔CSDN · GitHub Trending 排序算法逆向研究，2026-06-26 抓取〕 链接：https://ask.csdn.net/questions/9369771\n  - AI 转述（可信度：中-高）：主信号=过去 24h star 增量（Pearson r≈0.87），日粒度 UTC 00:00 重置，≤7 天新仓库 ×1.6 冷启动加权，过滤 fork/机器人/刷星。被动展示非主动算法推荐。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. GitHub Explore Team · 「topics 分类体系设计者」\n- **身份**：GitHub 官方 Explore 团队，维护 github/explore 仓库\n- **与本概念的关系**：他们设计了 topics 分类体系，让仓库能被按主题发现——topics 是 GitHub 发现性基础设施的核心。\n- **核心洞见**：topics 不是标签而是分类系统——好的 topics 让仓库同时出现在多个相关主题的浏览页里，等于多条被动发现路径。社区可贡献 featured topics 到 github/explore 仓库。\n- **代表作**：github/explore 仓库（topics 分类体系）\n- **扩展阅读**：[github/explore](https://github.com/github/explore) · [Topics 官方文档](https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/classifying-your-repository-with-topics)\n\n### 2. Tj Holowaychuk · 「GitHub 发现性实战代表」\n- **身份**：Express.js / Koa 作者，GitHub 早期高星项目代表\n- **与本概念的关系**：Express.js 是 GitHub 发现性优化的经典案例——精准 topics（nodejs/web-framework/router/middleware）+ 简洁 description + 完整 About，让它在 Node.js 生态里被动发现率极高。\n- **核心洞见**：发现性的关键是\"站在搜索者角度想关键词\"——你的 topics 要包含用户会搜的词，不是你自己想的词。Express 的 topics 里没有\"express\"（用户不会搜这个），但有\"web-framework\"\"middleware\"（用户会搜）。\n- **代表作**：Express.js（2010-）\n- **扩展阅读**：[Express.js 仓库](https://github.com/expressjs/express)\n\n### 3. Steve Yegge · 「README 驱动发现性理论代表」\n- **身份**：博主、前 Google/Sourcegraph 工程师\n- **与本概念的关系**：他写过\"README 是最重要的营销文件\"——README 首屏不只是给已点进来的人看，Google 搜索也抓 README 前几百字，所以 README 首屏是双重身份（发现性+转化）。\n- **核心洞见**：README 前 200 字是整个项目的\"SEO 窗口\"——Google 抓它作为搜索摘要，GitHub 搜索也权重它。所以 README 首屏标语不能只顾好看，要含可搜索的关键词。\n- **代表作**：《Declarative README》系列博文\n- **扩展阅读**：[Steve Yegge 博客](https://steve-yegge.medium.com/)\n\n**视角对照**：\n\n| 参照 | 一句话 | 关键词 |\n|---|---|---|\n| GitHub Explore Team | topics 是分类系统不是标签，多条被动发现路径 | 分类体系 |\n| Tj Holowaychuk | topics 要含用户会搜的词不是你自己想的词 | 搜索者角度 |\n| Steve Yegge | README 前 200 字是 SEO 窗口，双重身份 | 发现性+转化 |\n\n</details>\n\n## 相关\n[[项目定位与价值主张]] · [[README工程]] · [[内容营销与Build in Public]] · [[增长飞轮]] · [[冷启动渠道矩阵]]", "rel": "开源项目冷启动/GitHub发现性优化.md", "viz": "开源项目冷启动/_viz/GitHub发现性优化.svg", "viz_source": "开源项目冷启动/_viz/GitHub发现性优化.mmd", "viz_chart": "flow", "alive": "full"}, {"id": "README 工程", "label": "README 工程", "type": "concept", "category": "开源项目冷启动", "status": "已完成", "importance": 5, "track": "标准轨", "ready": false, "aliases": ["README", "README.md", "项目说明文档"], "body": "# README 工程\n\n## 一句话定位\n> 它属于开源项目冷启动的门面层，是用来解决\"访客来了留不住\"的——把 README 当转化漏斗设计，让访客从看到到 star 走完 7 个节点。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能把 gewu-skill README 按 7 节点漏斗诊断和改造，知道每个章节在漏斗里承担什么转化任务、卡点在哪、怎么补。\n\n**重点结论**（AI 与你达成的最终共识）：\n- **README ≠ 介绍，是转化设计**——介绍是单向信息输出；README 工程是转化漏斗，每个章节都是转化节点，目的是让访客从\"看到\"→\"留下\"→\"试用\"→\"留存\"。介绍是 README 的子集，不是本质。\n- **7 节点转化漏斗**：首屏（30秒）→ 相关性识别 → Demo/截图 → Features/解决什么 → Quick Start+安装 → 10分钟闸门 → 第一个 wow 时刻 → 社会证明 → star。4 个节点不能跳：Demo 让人想试用，Features 让人决定试用，10分钟闸门是流失点，wow 时刻是留存点。\n- **30 秒法则 + 10 分钟法则**：首屏 30 秒内传递价值（标题+一句话描述+徽章+视觉冲击）；10 分钟内让访客跑起来看到第一个 wow 时刻。10 分钟是\"跑起来看到效果\"的最大容忍时间——超过=认知负担=流失。\n- **首屏 2 个致命错误**：①一上来讲原理和功能（不是访客决策要素）；②没有视觉冲击（无 logo/GIF/截图，访客大脑判定\"信息密度低\"→滚走）。\n- **Demo 媒体首要目标是\"让访客看到\"不是\"快\"**——加载慢→访客等一下；加载失败→访客看到空白→以为没 Demo→流失。.webp 在 GitHub 移动端/部分客户端不渲染=比 gif 慢更糟。更好方案：.mp4（GitHub 原生渲染）或 gif 压缩到 2-5MB，或 .webp + 备用链接。\n- **awesome-readme 7 原则**：①第一时间传达价值 ②用视觉替代文字 ③结构化导航 ④降低上手门槛 ⑤保持文档活性（动态元素） ⑥README 驱动开发 ⑦架构文档独立维护。\n- **gewu-skill README 现状诊断**：7 徽章+2 Demo 媒体+三语+Quick Start，结构相当完整。4 个卡点：python 误导徽章（`python-3.8+`让访客以为必须装python）、.webp 不兼容、安装章节太重（环境检查+两种方式+10+agent路径表）、首屏标语缺\"为谁\"。\n- **nuwa-skill 是标杆案例**：首屏 hero.gif+slogan+badge 视觉冲击强；Demo 用三段式对话实录（Naval/马斯克/乔布斯）金句密度高，wow 时刻极强；安装<1 分钟（npx skills add）；Feature 放后面用五层表格。首屏 Star Badge 缺失是唯一短板。\n\n**重点知识大纲 / 脑图**：\n- README 本质\n  - 不是介绍，是转化设计\n  - 每个章节=转化漏斗节点\n  - 目的=看到→留下→试用→留存\n- 7 节点转化漏斗\n  - 首屏（30秒：标题+标语+徽章+视觉）\n  - 相关性识别（跟我有关吗）\n  - Demo/截图（视觉证明价值）\n  - Features/解决什么（展开核心卖点）\n  - Quick Start+安装（10分钟跑起来）\n  - 10分钟闸门（流失点：超时→流失）\n  - 第一个wow时刻（留存点：看到效果）\n  - 社会证明（star数/贡献者/案例）\n  - star+加作者（转化完成）\n- 3 个失效边界\n  - 首屏无视觉冲击→扫一眼就走\n  - 安装超10分钟→耐心耗尽流失\n  - 无社会证明→\"就我一个人用\"→只看不star\n- awesome-readme 7 原则\n  - 传达价值 / 视觉替代 / 结构导航 / 降低门槛 / 文档活性 / README驱动 / 架构独立\n- Demo 媒体取舍\n  - 首要目标=让访客看到（不是快）\n  - 加载失败比加载慢更糟\n  - .mp4 > gif > .webp（兼容性维度）\n- gewu-skill 4 卡点与改造\n  - python误导徽章→改deps-only或删\n  - .webp→转.mp4或加备用链接\n  - 安装章节太重→折叠+前置Quick Start\n  - 首屏标语缺为谁→补具体人群\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**起点认知**：README=介绍大纲和实现内容，介绍页只讲重点，臃肿没人看。\n→ 校准：README ≠ 介绍，是转化设计——每个章节是转化漏斗节点。\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：README 首段、访客大脑、README 安装步骤、README 解决什么、作者联系方式\n- **连接**：访客大脑先看 → README 首段 → 感兴趣 → README 解决什么 → 如何安装 → 实际体验 → 感觉好 + 加作者 V\n- **流向**：线性漏斗（首屏→识别→Demo→Features→安装→闸门→wow→社会证明→star）\n- **边界**：不会安装 python 的用户；复杂大量训练的学习型用户\n- **变化**：首屏效果决定继续或离开\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type（AI 自主判定）**：flow（7 节点漏斗 + 3 失效边界）\n- **节点 kind**：concept（首屏、Features）、actor（访客）、data（Demo、社会证明）、process（安装、star）、rule（10分钟闸门）、state（wow 时刻）、boundary（3 个失效边界）\n- **结构纠偏**：用户初版跳过了 4 个节点（Demo→Features、10分钟闸门→wow时刻）。AI 校准补全为完整 7 节点漏斗。\n\n**类比 1（商店橱窗）**：路人路过橱窗→看到衣服漂亮可能适合自己→进店试穿→看商品标签材质价格→满意结账→排队不超10分钟→试穿 wow→拍照分享好友。橱窗=转化漏斗第一站，10分钟排队=第一个 wow 时刻倒计时。\n\n**类比 2（B 站视频封面）**：封面有冲击力→用户点开看→几分钟满意点赞→继续看有惊喜转发。\n\n**大白话讲解（讲给外行）**：它属于开源运营里的问题，是用来解决\"为什么有些项目发出去没人理\"的。好比路人路过商店橱窗——橱窗里挂的衣服漂亮（=首屏动画+标语），你觉得可能适合自己就进店试穿（=相关性识别+Demo），看商品标签材质价格（=Features），满意了去结账（=安装），排队不能超过10分钟（=10分钟闸门），穿上身那一刻 wow（=第一个 wow 时刻），看到别人也在穿就放心买了（=社会证明）。README 不是介绍，是转化漏斗——每个章节都是一个转化节点，目的是让你从看到走到 star。\n\n**三重验证**：\n1. **正向验证（nuwa-skill）**：首屏 hero.gif+slogan+badge 吸引眼球；Demo 三段式对话（Naval/马斯克/乔布斯）金句密度高 wow 极强；安装<1 分钟；Feature 放后面五层表格。唯一短板=首屏缺 Star Badge。\n2. **失效边界补丁**：首屏动画无吸引力 → 重新做一个（B 站封面逻辑：有冲击力才有人点开）。\n3. **换类比（B 站视频封面）**：封面=首屏、几分钟满意=Features、点赞=star、继续看有惊喜=wow 时刻、转发=社会证明。\n\n**卡壳点复盘**：\n- 卡壳 1：以为 README=介绍 → 补：是转化设计，每个章节是转化节点。\n- 卡壳 2：10 分钟法则只抓到\"太长没人用\" → 补：10 分钟是\"跑起来看到第一个 wow 时刻\"的最大容忍时间。\n- 卡壳 3（.webp 盲区）：只权衡了加载速度和兼容性，漏了\"加载失败比慢更糟\" → 补：Demo 媒体首要目标是\"让访客看到\"，.mp4 > gif > .webp。\n- 卡壳 4（漏斗跳节点）：验收时跳过 4 个节点 → 补：完整 7 节点不能跳，Demo 让人想试用，Features 让人决定试用，10分钟闸门是流失点，wow 时刻是留存点。\n\n**成长对比**：\n- 起点：README=介绍大纲和实现内容，臃肿没人看\n- 现在：README 是 7 节点转化漏斗，每章节承担转化任务；Demo 媒体首要目标是让访客看到不是快；gewu-skill 有 4 个卡点待改（python徽章/.webp/安装太重/标语缺为谁）。\n\n</details>\n\n📎 [完整对话记录](_transcript/README工程.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/README工程.svg](_viz/README工程.svg)\n- Mermaid 源：[_viz/README工程.mmd](_viz/README工程.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔freeCodeCamp · How to Structure Your README File，2026-06-26 抓取〕 链接：https://www.freecodecamp.org/news/how-to-structure-your-readme-file/\n  - 原话引述：\"If someone can clone your repository and get it running in under 10 minutes, your README did its job!\"\n  - AI 转述（可信度：高）：19 章标准结构，首屏 4 要素（标题+描述/Features/Tech Stack/徽章），Quick Start 四步法（clone→安装依赖→环境配置→启动），核心心法\"先写 README 再写代码\"。\n\n- 〔awesome-readme · 漂亮 README 核心元素与工程化原则，2026-06-26 抓取〕 链接：https://github.com/matiassingers/awesome-readme\n  - AI 转述（可信度：高）：7 大工程化原则——①第一时间传达价值 ②用视觉替代文字 ③结构化导航 ④降低上手门槛 ⑤保持文档活性 ⑥README 驱动开发 ⑦架构文档独立维护。漂亮 README 公式=Logo+一句话描述+Badges→GIF演示→TOC→Features→Installation+Quickstart→Usage→Contributing+License。\n\n- 〔nuwa-skill README · 标杆案例分析，2026-06-26 抓取〕 链接：https://github.com/alchaincyf/nuwa-skill\n  - AI 转述（可信度：高）：首屏 hero.gif 炼金术蒸馏动画+slogan\"你想蒸馏的下一个员工，何必是同事\"+4 badge；Demo 三段式对话实录（Naval/马斯克/乔布斯）金句密度高；安装<1 分钟（npx skills add）；Feature 放后面用五层表格；wow 时刻极强（乔布斯谈 OpenAI 反转\"最终赢家可能是 Apple\"）。短板=首屏缺 Star Badge。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. Tom Preston-Werner · 「README 驱动开发之父」\n- **身份**：GitHub 联合创始人、《Readme Driven Development》作者\n- **与本概念的关系**：他提出的\"先写 README 再写代码\"理念是 awesome-readme 第 6 原则的理论源头——README 不是事后文档，是项目规格说明书，迫使你从用户角度思考。\n- **核心洞见**：先写 README 能在写代码前就发现设计问题——\"如果你不能在 README 里说清这个项目做什么，那你的代码也说不清\"。\n- **代表作**：*Readme Driven Development*（2010 博文）\n- **扩展阅读**：[Readme Driven Development 原文](https://tom.preston-werner.com/2010/08/23/readme-driven-development.html)\n\n### 2. Richard Littauer · 「standard-readme 规范作者」\n- **身份**：开源贡献者、standard-readme 规范发起人\n- **与本概念的关系**：他制定了 README 的标准化规范（standard-readme spec），被 awesome-readme 收录为推荐模板——规定了 README 必须包含的章节和顺序。\n- **核心洞见**：README 规范化的目的是\"让访客在任何开源项目里都能快速找到他们需要的信息\"——一致性比创意更重要，首屏结构应遵循行业惯例而非自创。\n- **代表作**：standard-readme 规范\n- **扩展阅读**：[standard-readme 规范](https://github.com/RichardLitt/standard-readme)\n\n### 3. 花叔（alchaincyf）· 「nuwa-skill README 实战代表」\n- **身份**：nuwa-skill 作者、AppStore 付费榜 Top1 开发者\n- **与本概念的关系**：nuwa-skill 是 README 工程的中文实战标杆——首屏 hero.gif+slogan 视觉冲击、Demo 三段式对话 wow 时刻、安装<1 分钟、五层 Feature 表格，几乎踩准了 7 节点漏斗每个节点。\n- **核心洞见**：Demo 的金句密度比动画精美更重要——nuwa-skill 的 Demo 是纯文本对话实录，但每段都有可截图传播的金句（乔布斯\"最终赢家可能是 Apple\"），传播性远超精美但无内容的动画。\n- **代表作**：nuwa-skill（2026）\n- **扩展阅读**：[nuwa-skill 仓库](https://github.com/alchaincyf/nuwa-skill)\n\n**视角对照**：\n\n| 参照 | 一句话 | 关键词 |\n|---|---|---|\n| Tom Preston-Werner | 先写 README 再写代码，README 是规格不是文档 | README 驱动开发 |\n| Richard Littauer | 规范化一致性比创意更重要 | standard-readme |\n| 花叔 | Demo 金句密度比动画精美更重要 | 三段式对话 wow |\n\n</details>\n\n## 相关\n[[项目定位与价值主张]] · [[Demo与可体验性]] · [[贡献者友好设计]] · [[GitHub发现性优化]]", "rel": "开源项目冷启动/README工程.md", "viz": "开源项目冷启动/_viz/README工程.svg", "viz_source": "开源项目冷启动/_viz/README工程.mmd", "viz_chart": "flow", "alive": "full"}, {"id": "内容营销与 Build in Public", "label": "内容营销与 Build in Public", "type": "concept", "category": "开源项目冷启动", "status": "待学", "importance": 4, "track": "", "ready": true, "aliases": ["Build in Public", "内容营销", "技术博客分发"], "body": "# 内容营销与 Build in Public\n\n## 一句话定位\n> 待学。", "rel": "开源项目冷启动/内容营销与Build in Public.md", "viz": "", "viz_source": "", "viz_chart": "", "alive": ""}, {"id": "冷启动渠道矩阵", "label": "冷启动渠道矩阵", "type": "concept", "category": "开源项目冷启动", "status": "已完成", "importance": 5, "track": "标准轨", "ready": false, "aliases": ["渠道矩阵", "Channel Matrix", "推广渠道", "冷启动渠道"], "body": "# 冷启动渠道矩阵\n\n## 一句话定位\n> 它属于开源项目冷启动的渠道层，是用来解决\"项目做好了发到哪里、怎么发才有人用\"的——不是找地方发帖，是有策略的渠道组合。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能给 gewu-skill 设计一个\"测试场→迭代场→扩量场\"三渠道错峰矩阵，每个渠道收不同维度反馈驱动不同对象迭代，制造 star 增量尖峰+持续长尾。\n\n**重点结论**（AI 与你达成的最终共识）：\n- **渠道矩阵 ≠ 找渠道宣发**——\"找渠道宣发\"是单向信息输出；渠道矩阵是有策略的渠道组合，三层价值：①覆盖面（不同渠道触达不同人群）②迭代测试（A/B 测试哪个渠道转化高）③流量节奏（错峰发制造持续讨论长尾，不是一天爆发后死掉）。核心是组合策略，不是渠道清单。\n- **发链接 vs 建立信任**——发链接=把渠道当广告牌；建立信任=把渠道当社区。Reddit/V2EX/掘金都要求先贡献再索取，新号直接发广告=spam=被 ban=渠道永久关闭。冷启动本质是口碑传播，口碑要求信任，信任要求先贡献再索取。不是\"包装\"项目，是真诚分享你解决的问题和过程。\n- **每个渠道反馈不同→触发不同迭代对象**——矩阵真正价值不是\"多渠道覆盖\"，是\"多渠道多维度反馈驱动多轮迭代\"。Linux.do 技术深度用户反馈→改 Features/机制说明；掘金开发者反馈→改 Tech Stack/技术细节；少数派效率工具用户反馈→改 Demo/场景故事。如果 3 渠道内容一样，反馈也会一样，迭代只能改一个对象=浪费矩阵价值。\n- **迭代具体迭 3 样东西**（不是笼统\"改商品\"）：①README 首屏标语/定位语（反馈\"看不懂这是啥\"）②Quick Start/安装步骤（反馈\"装不上/跑不起来\"）③Demo/Features 展示（反馈\"看懂了但不想用\"）。渠道矩阵的反馈=告诉你 README 7 节点漏斗哪个节点在漏水。\n- **测试场→迭代场→扩量场三渠道错峰**——第一个渠道是测试场（不是首发场），linux.do 实战论断：\"先在一个渠道打磨好话术和 README 转化，再复制到下一个\"。每个渠道间隔 2-3 天，制造持续讨论长尾。渠道B反馈回到迭代动作形成第二个迭代循环，不是只有渠道A触发迭代。\n- **Reddit 风控红线**——反营销、反自我推销文化；养号→参与讨论→再发；选对子版块；保持 IP 稳定。V2EX 创意板块可发但标题不能太广告化；Hacker News Show HN 必须\"Show HN: [名] - [描述]\"格式且评论区亲自回复；掘金会限流纯推广最好技术分享包装。\n- **Product Hunt 时机**——榜单机制=一天一轮太平洋时间 0 点重置，工作日日榜第一需 600-800 票。太早上（没准备好）=转化低排名掉机会浪费；太晚上（已发过其他渠道）=用户\"见过了\"不投票。最佳=定位+README+Demo 都优化好后集中一天发多渠道冲日榜前五拿官方徽章。一年最好只上一次。\n- **gewu-skill 渠道矩阵初稿**：Linux.do（测试场·先发，分享设计哲学+费曼五步工程化）→掘金（迭代场·第二，技术实现+Agent Skills 标准）→少数派（扩量场·第三，场景故事+我学习时遇到的问题）。3 渠道间隔 2-3 天错峰。\n\n**重点知识大纲 / 脑图**：\n- 渠道矩阵本质\n  - 不是找渠道宣发，是组合策略\n  - 三层价值：覆盖面 / 迭代测试 / 流量节奏\n  - 核心=组合策略不是渠道清单\n- 发链接 vs 建立信任\n  - 广告牌逻辑 vs 社区逻辑\n  - 先贡献再索取（养号/参与讨论/真诚分享）\n  - 新号直接发广告=spam=被ban\n- 三渠道错峰策略\n  - 渠道A·测试场（先发，听反馈）\n  - 反馈1→迭代→README转化提升\n  - 渠道B·迭代场（第二，复制优化版）\n  - 反馈2→反馈环回到迭代（第二个迭代循环）\n  - 渠道C·扩量场（第三，场景故事扩量）\n  - star增量尖峰+持续长尾\n- 迭代具体3样东西\n  - README首屏标语（\"看不懂\"）\n  - Quick Start安装（\"装不上\"）\n  - Demo/Features（\"不想用\"）\n- 每渠道反馈不同触发不同迭代\n  - Linux.do→改Features/机制\n  - 掘金→改Tech Stack/技术细节\n  - 少数派→改Demo/场景故事\n- 3个失效边界\n  - 同时发=跳过迭代=浪费渠道\n  - 直接广告=被ban=渠道关闭\n  - 受众不匹配=来了不留\n- 主要渠道禁忌\n  - Reddit：养号/反营销/IP稳定/选对子版块\n  - V2EX：标题不能太广告\n  - Hacker News：Show HN格式+亲自回复\n  - 掘金：技术分享包装，纯推广限流\n  - Product Hunt：一年一次，最佳=优化好后冲日榜\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**起点认知**：找渠道宣发。\n→ 校准：渠道矩阵 ≠ 找渠道宣发，是组合策略（覆盖面+迭代测试+流量节奏三层）。\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：渠道本身、每个渠道反馈、迭代动作、README 转化率、star 增量\n- **连接**：渠道→反馈→迭代→转化率→star\n- **流向**：用户初答\"同时发\"→校准为错峰发+反馈环\n- **边界**：直接广告\n- **变化**：好会涨星，不好就迭代\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type（AI 自主判定）**：flow（测试场→迭代场→扩量场+反馈环+3失效边界）\n- **节点 kind**：process（渠道A/B/C、迭代动作）、data（反馈1/2）、rule（README转化率）、state（star尖峰）、feedback（持续长尾）、boundary（3个失效边界）\n- **结构纠偏**：用户初版流向答\"同时发\"→校准为错峰发+反馈环；用户验收时跳过渠道B反馈回到迭代的环→补丁\"每个渠道都是一次迭代机会\"。\n\n**类比 1（连锁店）**：先开一家而不是同时铺开，从第一家接受反馈改店里商品，再开第二家继续收反馈，最后开第三家扩量。不是只推广而是真正帮助每家店铺营利积累口碑，一家家开是为了不断验证和优化。\n\n**类比 2（发微信不同群）**：先发一个群看反馈优化，再发一个群，而不是上来一起发。\n\n**大白话讲解（讲给外行）**：它属于开源运营里的问题，是用来解决\"项目做好了发到哪里、怎么发才有人用\"的。好比开连锁店——不是同时铺开所有店，而是先开一家，听顾客反馈改店里的招牌/点单流程/橱窗陈列，改好了再开第二家继续听反馈再改，最后开第三家扩量。每家店收到的反馈不一样（第一家顾客关心菜单、第二家关心价格、第三家关心装修），所以改的东西也不一样。关键是不能同时开——同时开就没法根据反馈改了。也不是去每家店门口发传单就走，而是真正把每家店经营好，让顾客愿意口口相传。\n\n**三重验证**：\n1. **正向验证（Vue.js）**：Evan You 先 Google 内部测（改API）→Hacker News Show HN（改定位）→Twitter Build in Public（改传播话术）→中英文双语文档（改上手门槛）。每步反馈改不同对象，不是同时铺所有渠道。\n2. **失效边界补丁**：直接广告容易写成软广而不是真诚分享 → 补救：以\"我做了个东西想听反馈\"心态发，不是\"推广产品\"心态发。\n3. **换类比（发微信不同群）**：先发一个群看反馈优化，再发一个群，而不是上来一起发。\n\n**卡壳点复盘**：\n- 卡壳 1：以为渠道矩阵=找渠道宣发 → 补：是组合策略，三层价值（覆盖面/迭代测试/流量节奏）。\n- 卡壳 2：发链接 vs 建立信任只说\"无法聚焦\" → 补：发链接=广告牌逻辑，建立信任=社区逻辑，先贡献再索取。\n- 卡壳 3（最深）：3 渠道内容方向一样 → 补：每渠道受众不同→反馈维度不同→触发不同迭代对象，矩阵价值=多维度反馈驱动多轮迭代。\n- 卡壳 4：迭代太笼统\"改商品\" → 补：具体3样——README标语/Quick Start/Demo Features。\n- 卡壳 5：验收跳过反馈环 → 补：渠道B反馈回到迭代形成第二个循环，每个渠道都是迭代机会。\n\n**成长对比**：\n- 起点：找渠道宣发\n- 现在：渠道矩阵是组合策略（覆盖面+迭代测试+流量节奏）；发链接 vs 建立信任（先贡献再索取）；每渠道反馈不同触发不同迭代；测试场→迭代场→扩量场三渠道错峰；gewu-skill 初稿=Linux.do→掘金→少数派。\n\n</details>\n\n📎 [完整对话记录](_transcript/冷启动渠道矩阵.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/冷启动渠道矩阵.svg](_viz/冷启动渠道矩阵.svg)\n- Mermaid 源：[_viz/冷启动渠道矩阵.mmd](_viz/冷启动渠道矩阵.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔掘金 · 孟健《海外冷启动渠道清单》，2026-06-26 抓取〕 链接：https://juejin.cn/post/7560958498676031534\n  - 原话引述：\"冷启动的本质不是到处发链接，而是找到你的早期用户，和他们建立信任。\"\n  - AI 转述（可信度：高）：V2EX（Google权重高/创意板块）、Hacker News（Show HN/投资人技术大佬）、Reddit（风控严/养号/IP稳定/选对子版块）、Product Hunt（日榜600-800票/一年一次）、社交媒体矩阵（Twitter/LinkedIn/YouTube）、Startup平台清单（BetaList/BetaPage/AlternativeTo等）。\n\n- 〔linux.do · 2个月破1000star实战贴，2026-06-26 抓取〕 链接：https://linux.do/t/topic/813738\n  - AI 转述（可信度：高）：\"先在一个渠道打磨好话术和 README 转化，再复制到下一个渠道。第一个渠道的反馈会告诉你访客卡在哪里。\"\n\n- 〔fansgurus · 8种获star方法，2026-06-26 抓取〕 链接：https://fansgurus.com/zh/blog/grow-github-stars-8-methods\n  - AI 转述（可信度：中）：提交Awesome Lists、技术博客驱动SEO、star-history图放进README、Hacker News、Product Hunt、Reddit社区营销。\n\n- 〔腾讯云 · Vue.js和Vite之父Evan You故事，2026-06-26 抓取〕 链接：https://cloud.tencent.com/developer/article/2340459\n  - AI 转述（可信度：中-高）：Vue.js 早期渠道策略=Google内部测→Hacker News→Twitter Build in Public→中英文双语文档长尾。高质量文档+易上手+社区推广迅速崛起。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. Evan You · 「开源渠道矩阵实战代表」\n- **身份**：Vue.js 创始人、VoidZero 创始人\n- **与本概念的关系**：Vue.js 是渠道矩阵的经典案例——Evan You 没有同时铺所有渠道，而是 Google 内部测→HN→Twitter→文档长尾，每步反馈改不同对象。\n- **核心洞见**：Vue 成功不只是技术好，更是\"文档优先 + 多语言 + 响应速度 <12h + 社区自治\"的组合策略——每个渠道的反馈都转化为对应对象的迭代（内部改API、HN改定位、Twitter改传播、文档改上手门槛）。\n- **代表作**：Vue.js（2014-）\n- **扩展阅读**：[尤雨溪谈Vue.js](https://zhuanlan.zhihu.com/p/58335278) · [Evan You 官网](https://evanyou.me/)\n\n### 2. 孟健 · 「海外冷启动渠道清单整理者」\n- **身份**：AI编程领域博主、掘金作者\n- **与本概念的关系**：整理了海外产品免费宣传渠道清单（V2EX/HN/Reddit/PH/社交媒体/Startup平台），实测有效，适合冷启动阶段。\n- **核心洞见**：冷启动本质不是到处发链接，而是找到早期用户建立信任——邮件标题要吸引但不标题党，正文简洁说清解决什么问题，CTA明确，及时回复反馈。\n- **代表作**：《产品做完了不会推广？这份海外冷启动渠道清单》\n- **扩展阅读**：[掘金原文](https://juejin.cn/post/7560958498676031534)\n\n### 3. Pieter Levels · 「Build in Public 渠道方法论代表」\n- **身份**：独立开发者、Nomad List/Maker Log 创始人、《MAKE》作者\n- **与本概念的关系**：他是 Build in Public 文化的代表人物——不靠渠道矩阵铺开，而是靠 Twitter 持续公开分享开发过程，把社交媒体变成\"测试场+迭代场+扩量场\"三合一。\n- **核心洞见**：Build in Public 本身就是一种渠道策略——每天分享进度=持续在社区贡献价值=积累信任=发产品时自然有人关注。不是\"发链接\"，是\"让人看着你做出来\"。\n- **代表作**：《MAKE: The Indie Maker Handbook》\n- **扩展阅读**：[Pieter Levels Twitter](https://twitter.com/levelsio) · [Maker Log](https://makerlog.io/)\n\n**视角对照**：\n\n| 参照 | 一句话 | 关键词 |\n|---|---|---|\n| Evan You | 每步反馈改不同对象，不同时铺所有渠道 | 文档优先+多语言+社区自治 |\n| 孟健 | 冷启动本质是建立信任不是发链接 | 渠道清单+信任建立 |\n| Pieter Levels | Build in Public 本身就是渠道策略 | 持续公开分享=测试+迭代+扩量 |\n\n</details>\n\n## 相关\n[[项目定位与价值主张]] · [[README工程]] · [[内容营销与Build in Public]] · [[增长飞轮]] · [[冷启动节奏与发布时机]]", "rel": "开源项目冷启动/冷启动渠道矩阵.md", "viz": "开源项目冷启动/_viz/冷启动渠道矩阵.svg", "viz_source": "开源项目冷启动/_viz/冷启动渠道矩阵.mmd", "viz_chart": "flow", "alive": "full"}, {"id": "冷启动节奏与发布时机", "label": "冷启动节奏与发布时机", "type": "concept", "category": "开源项目冷启动", "status": "待学", "importance": 4, "track": "", "ready": true, "aliases": ["发布时机", "Launch Timing"], "body": "# 冷启动节奏与发布时机\n\n## 一句话定位\n> 待学。", "rel": "开源项目冷启动/冷启动节奏与发布时机.md", "viz": "", "viz_source": "", "viz_chart": "", "alive": ""}, {"id": "增长飞轮", "label": "增长飞轮", "type": "concept", "category": "开源项目冷启动", "status": "待学", "importance": 5, "track": "", "ready": false, "aliases": ["增长飞轮", "Growth Flywheel", "增长循环"], "body": "# 增长飞轮\n\n## 一句话定位\n> 待学。", "rel": "开源项目冷启动/增长飞轮.md", "viz": "", "viz_source": "", "viz_chart": "", "alive": ""}, {"id": "开源协议与基础治理", "label": "开源协议与基础治理", "type": "concept", "category": "开源项目冷启动", "status": "待学", "importance": 3, "track": "", "ready": true, "aliases": ["LICENSE", "开源治理"], "body": "# 开源协议与基础治理\n\n## 一句话定位\n> 待学。", "rel": "开源项目冷启动/开源协议与基础治理.md", "viz": "", "viz_source": "", "viz_chart": "", "alive": ""}, {"id": "指标追踪与迭代", "label": "指标追踪与迭代", "type": "concept", "category": "开源项目冷启动", "status": "待学", "importance": 3, "track": "", "ready": true, "aliases": ["数据驱动", "Metrics", "指标追踪"], "body": "# 指标追踪与迭代\n\n## 一句话定位\n> 待学。", "rel": "开源项目冷启动/指标追踪与迭代.md", "viz": "", "viz_source": "", "viz_chart": "", "alive": ""}, {"id": "文档与快速上手", "label": "文档与快速上手", "type": "concept", "category": "开源项目冷启动", "status": "待学", "importance": 4, "track": "", "ready": true, "aliases": ["Quick Start", "快速上手"], "body": "# 文档与快速上手\n\n## 一句话定位\n> 待学。", "rel": "开源项目冷启动/文档与快速上手.md", "viz": "", "viz_source": "", "viz_chart": "", "alive": ""}, {"id": "种子用户运营", "label": "种子用户运营", "type": "concept", "category": "开源项目冷启动", "status": "待学", "importance": 4, "track": "", "ready": true, "aliases": ["种子用户", "早期用户运营"], "body": "# 种子用户运营\n\n## 一句话定位\n> 待学。", "rel": "开源项目冷启动/种子用户运营.md", "viz": "", "viz_source": "", "viz_chart": "", "alive": ""}, {"id": "贡献者友好设计", "label": "贡献者友好设计", "type": "concept", "category": "开源项目冷启动", "status": "待学", "importance": 3, "track": "", "ready": false, "aliases": ["CONTRIBUTING", "贡献者体验", "Good First Issue"], "body": "# 贡献者友好设计\n\n## 一句话定位\n> 待学。", "rel": "开源项目冷启动/贡献者友好设计.md", "viz": "", "viz_source": "", "viz_chart": "", "alive": ""}, {"id": "项目定位与价值主张", "label": "项目定位与价值主张", "type": "concept", "category": "开源项目冷启动", "status": "已完成", "importance": 5, "track": "标准轨", "ready": false, "aliases": ["价值主张", "Value Proposition", "电梯演讲", "项目定位"], "body": "# 项目定位与价值主张\n\n## 一句话定位\n> 它属于开源项目冷启动的地基层，是用来解决\"为什么有些项目发出去没人理\"的。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能给 gewu-skill 写一句让陌生访客 3 秒内识别\"跟我有关\"的定位语，并理解为什么定位决定传播链能否启动。\n\n**重点结论**（AI 与你达成的最终共识）：\n- **定位不是两个独立东西，是三件套**：为谁 + 痛点 + 独特价值，缺一件就立不住。缺\"独特价值\"= 凭什么用你而不用替代品没说清。\n- **痛点普遍性是传播链的开关**：star 和转发是社交行为，访客大脑第一反应是\"跟我有关吗\"。相关性可识别 → 转发链延续；痛点不普遍 → 传播链在第一个节点就断。\n- **star 留人 vs 转发拉新是两件事**：star = 访客变\"己方\"标记，未来 release 可唤醒；转发 = 把项目推给下一批同质人群，才是传播链燃料。star 涨但转发为 0 = 飞轮没燃料 = 冷启动失败。\n- **GitHub 是被动展示不是主动算法推荐**：Trending 主信号=过去 24h star 增量（非总 star），日粒度 UTC 00:00 重置，≤7 天新仓库 ×1.6 加权。GitHub 冷启动比 B 站难得多——B 站转发→算法助攻，GitHub 转发→无算法助攻→必须人肉分发到外部渠道。\n- **Atlassian 电梯演讲模板**：For [谁] who [想要什么], [项目] is a [类别] that provides [核心收益]. Unlike [替代方案], it [差异化点]。30 秒-1 分钟，禁术语，必含受众/需求/项目/价值四件。\n- **gewu-skill 定位校准**：原版\"把有问题问 AI 变成一张有罗盘的学习地图\"——好的是对比结构和\"罗盘\"意象，缺的是\"为谁\"和\"凭什么用你\"。参考版：\"把'有问题问 AI'，变成一张你给目标、它给依赖顺序、带你费曼到底的学习地图\"。\n- **5 个失效边界**：太宽（适用人群什么都覆盖）、太窄（只服务自己）、自说自话（术语堆砌）、与替代品无差异（又一个 X）、不可验证（说最好用但没法立刻试）。\n\n**重点知识大纲 / 脑图**：\n- 三件套结构\n  - 为谁（目标用户，要具体不能\"所有\"）\n  - 痛点（要普遍才可识别）\n  - 独特价值（凭什么用你不用替代品）\n- 传播机制（为什么定位决定冷启动）\n  - 定位语 → 访客 3 秒相关性识别\n  - 识别成功 → 价值判断 → star 留人 + 转发拉新\n  - 转发 → 新访客触达（反馈环）→ 传播链启动\n  - 两个失效边界：痛点不普遍→链断第1节点；无差异→只 star 不转发→链不启动\n- GitHub 发现机制（被动 vs 主动）\n  - Trending = 过去 24h star 增量，日粒度重置\n  - ≤7 天新仓库 ×1.6 加权\n  - 无算法推荐 → 必须人肉分发到外部渠道\n- Atlassian 电梯演讲模板\n  - For who + want + is a + provides + Unlike + it\n  - 30 秒-1 分钟，禁术语，四件必含\n- 5 个失效边界与补丁\n  - 太宽 → 具体到人群\n  - 太窄 → 找共性痛点\n  - 自说自话 → 大白话替换术语\n  - 无差异 → 点出凭什么\n  - 不可验证 → 给 demo/截图\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**起点认知**：定位是用户特质与用户的规模，价值主张是解决的痛点。定位是提供什么服务针对什么人群。项目介绍就是介绍特色。\n→ 校准：定位 ≠ 价值主张是两个独立东西，是三件套（为谁+痛点+独特价值）。\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：访客大脑（问能帮我什么忙）、项目页面（前三段）、star/观望\n- **连接**：访客眼睛 ↔ README；访客大脑 ↔ 内容价值判断\n- **流向**：README 首段 → 向下读完 → 决定试用 → 试用安装 → 反馈 star\n- **边界**：需要安装 python 的非技术人员\n- **变化**：是否需要 python 决定是否试用\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type（AI 自主判定）**：flow（访客决策流程 + 反馈环 + 失效分支）\n- **节点 kind**：concept（定位语）、actor（访客大脑）、rule（相关性识别、价值判断）、process（star+转发）、feedback（新访客触达）、state（传播链启动）、boundary（2 个失效边界）、concept（ChatGPT 参照系）\n- **结构纠偏**：用户初版把\"是否需要 python\"当主要变化点——这是技术门槛边界，不是定位机制核心。AI 校准为\"定位语→相关性识别→价值判断→star+转发→反馈环\"的主流程，技术门槛归入失效边界。\n\n**类比 1（B 站）**：github 项目冷启动好比刷 B 站——标题封面=定位语，1 分钟抓住眼球才点赞=star，特别共鸣才转发=传播燃料。关键差异：B 站转发→算法助攻，GitHub 转发→无算法→必须人肉分发。\n\n**类比 2（发朋友圈）**：图=定位语（第一眼决定是否看下去），文字=价值传递（有深度有共鸣才点赞），点赞=star，转发=传播链燃料。\n\n**大白话讲解（讲给外行）**：它属于开源运营里的问题，是用来解决\"为什么有些项目发出去没人理\"的。好比刷 B 站看到不认识的 up 主——第一眼扫描标题封面（=定位语），感兴趣才点进去，1 分钟抓住眼球才点赞（=star），特别共鸣才转发，只有转发才触发更多人看。但 GitHub 不像 B 站会自动推荐，只有被动推荐机制（Trending 榜按 24h star 增量排），所以也得找准为谁解决什么问题、为什么是 gewu 而不是其他工具。\n\n**三重验证**：\n1. **正向验证（VS Code）**：为程序员解决编程环境分散的问题，集成 IDE 编程到编译一站式落地。三件套齐全。\n2. **失效边界补丁**：定位太宽（\"为所有学习者\"）→ 改成\"想系统学新领域但没框架的自学者\"→ README 首屏只写这一句，不写\"所有\"\"各种\"\"每个人\"。\n3. **换类比（发朋友圈）**：图=定位语、文字=价值传递、点赞=star、转发=转发。\n\n**卡壳点复盘**：\n- 卡壳 1：以为定位=用户特质+规模、价值主张=痛点是两个独立东西 → 补：是三件套，缺独特价值。\n- 卡壳 2：以为\"开源生态\"是痛点普遍性决定性因素的原因 → 补：真正机制是相关性可识别→传播链可启动，开源是分发模式不是传播开关。\n- 卡壳 3：把 star 和转发混成\"新 star 决定推流\" → 补：star=留人，转发=拉新，两件事不能混。GitHub 不因 star 多推流。\n- 卡壳 4（最深）：以为 GitHub 完全不推 → 补：GitHub 是被动展示（Trending 按 24h star 增量），不是完全不推。B 站主动算法推荐 vs GitHub 被动展示，冷启动难度差异巨大。\n\n**成长对比**：\n- 起点：定位=用户特质+规模，价值主张=痛点（两个独立东西，缺独特价值）\n- 现在：定位是三件套（为谁+痛点+独特价值），决定传播链能否启动；star 留人 vs 转发拉新不能混；GitHub 被动展示非主动推荐，必须人肉分发点燃传播链。\n\n</details>\n\n📎 [完整对话记录](_transcript/项目定位与价值主张.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/项目定位与价值主张.svg](_viz/项目定位与价值主张.svg)\n- Mermaid 源：[_viz/项目定位与价值主张.mmd](_viz/项目定位与价值主张.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔Atlassian Team Playbook · 电梯演讲方法论，2026-06-26 抓取〕 链接：https://www.atlassian.com/team-playbook/plays/elevator-pitch\n  - 原话引述：\"An elevator pitch is a brief overview of your project that you can communicate in the time it takes to ride an elevator, usually about 30 seconds to one minute.\"\n  - 原话引述：\"For [target audience] who want [need], this [project/product/initiative] provides this [key benefit].\"\n  - AI 转述（可信度：高）：必含受众/需求/项目/价值四件；禁用内部术语；用大白话替换（end users→用户，stakeholders→团队/客户）。\n\n- 〔linux.do · 2 个月破 1000 star 实战贴，2026-06-26 抓取〕 链接：https://linux.do/t/topic/813738\n  - 原话引述：\"项目火不火取决于两个因素：一看痛点是否具有普遍性，二看推广策略是否到位。前者起决定性作用。\"\n  - AI 转述（可信度：高）：痛点普遍性是冷启动决定性因素——不普遍则看到的人觉得\"跟我无关\"不转发，传播链在第一个节点就断。\n\n- 〔jishuzhan · 开源社区运营 GitHub Stars 增长策略，2026-06-26 抓取〕 链接：https://jishuzhan.net/article/2007766133328887809\n  - AI 转述（可信度：中）：六层运营架构（流量获取→首页转化→用户留存→贡献者转化→社区治理→自动化工具）；README 30 秒法则；贡献者分级晋升路径；增长飞轮模型。\n\n- 〔CSDN · GitHub Trending 排序算法逆向研究，2026-06-26 抓取〕 链接：https://ask.csdn.net/questions/9369771\n  - AI 转述（可信度：中-高，基于 API 行为分析+社区逆向，非官方披露）：主信号=过去 24h star 增量（Pearson r≈0.87），非总 star；日粒度 UTC 00:00 重置；≤7 天新仓库 ×1.6 冷启动加权；过滤 fork/机器人/刷星；无分页无历史回溯。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. Geoffrey Moore · 「定位框架理论之父」\n- **身份**：硅谷顾问、《跨越鸿沟》作者\n- **与本概念的关系**：他提出的\"电梯演讲模板\"是今天 Atlassian 模板的理论源头——For [who] who [need], [product] is a [category] that [benefit]. Unlike [competitor], it [differentiation].\n- **核心洞见**：定位的本质不是描述产品，而是**在用户心智中占据一个位置**——你必须先回答\"相对于替代品，你占据的是哪个位置\"，否则就是\"又一个 X\"。\n- **代表作**：《跨越鸿沟》（Crossing the Chasm, 1991）\n- **扩展阅读**：[Crossing the Chasm 摘要](https://www.blinkist.com/books/crossing-the-chasm-en) · [Geoffrey Moore 官网](https://geoffmoore.com/)\n\n### 2. Evan You · 「开源项目定位实战代表」\n- **身份**：Vue.js 创始人\n- **与本概念的关系**：Vue 的定位是开源项目定位的经典案例——\"渐进式框架\"三个字同时回答了\"为谁\"（想要渐进采用的开发者）、\"痛点\"（React/Angular 太重）、\"独特价值\"（可逐步引入，不必全盘重构）。\n- **核心洞见**：Vue 成功的关键不是技术最强，而是**定位最清晰**——Evan You 多次在访谈中说\"我不跟 React 比，我只服务好'想要渐进式'的那群人\"。文档优先 + 多语言 + 响应速度 <12h，都服务于这个定位。\n- **代表作**：Vue.js（2014-）\n- **扩展阅读**：[Evan You: The State of Vue](https://www.youtube.com/watch?v=4nWi8xR8NmQ) · [Vue.js 官网](https://vuejs.org/)\n\n### 3. Atlassian Team · 「电梯演讲工程化方法论」\n- **身份**：Atlassian 团队协作工具公司，Team Playbook 作者\n- **与本概念的关系**：把 Moore 的理论框架工程化成可执行的 6 步 Play——从\"团队对齐要 pitch 什么\"到\"压力测试\"到\"最终版落地\"，每步有具体动作和检查清单。\n- **核心洞见**：好定位不是一个人憋出来的，是团队**压力测试**出来的——读回初稿后检查\"受众清晰吗/问题清晰吗/价值相关吗/可信吗/外部人能懂吗/够简洁吗/有强记忆点吗/下一步清晰吗\"8 个 checkpoint。\n- **代表作**：Atlassian Team Playbook（开源的团队协作方法论库）\n- **扩展阅读**：[Elevator Pitch Play](https://www.atlassian.com/team-playbook/plays/elevator-pitch) · [Atlassian State of Teams 2025](https://atlassianblog.wpengine.com/wp-content/uploads/2025/03/the-state-of-teams-2025.pdf)\n\n**视角对照**：\n\n| 参照 | 一句话 | 关键词 |\n|---|---|---|\n| Geoffrey Moore | 定位=在用户心智中占位，不是描述产品 | 心智占位 |\n| Evan You | 定位最清晰比技术最强更重要 | 渐进式、不跟风 |\n| Atlassian | 好定位是团队压力测试出来的，不是憋出来的 | 8 checkpoint |\n\n</details>\n\n## 相关\n[[README工程]] · [[GitHub发现性优化]] · [[冷启动渠道矩阵]] · [[增长飞轮]]", "rel": "开源项目冷启动/项目定位与价值主张.md", "viz": "开源项目冷启动/_viz/项目定位与价值主张.svg", "viz_source": "开源项目冷启动/_viz/项目定位与价值主张.mmd", "viz_chart": "flow", "alive": "full"}], "links": [{"source": "Demo 与可体验性", "target": "cat::开源项目冷启动", "ki       let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy||0.01; let d=Math.sqrt(d2);
      let f=rep/d2; let fx=dx/d*f, fy=dy/d*f;
      a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}}
  links.forEach(l=>{const a=l.source,b=l.target;
    let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||0.01;
    let target=l.kind==='belong'?90:(l.kind==='dep'?105:130); let f=(d-target)*k;
    let fx=dx/d*f, fy=dy/d*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
  nodes.forEach(n=>{
    n.vx+=(W/2-n.x)*center; n.vy+=(H/2-n.y)*center;
    if(n._fix){n.vx=0;n.vy=0;return;}
    n.vx*=0.82; n.vy*=0.82;
    n.x+=Math.max(-30,Math.min(30,n.vx)); n.y+=Math.max(-30,Math.min(30,n.vy));
  });
}
function render(){
  linkEls.forEach((e,i)=>{const l=links[i];
    let dx=l.target.x-l.source.x, dy=l.target.y-l.source.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    let ux=dx/d, uy=dy/d; let rs=(l.source.r||5)+1, rt=(l.target.r||5)+3;
    e.setAttribute('x1',l.source.x+ux*rs);e.setAttribute('y1',l.source.y+uy*rs);
    e.setAttribute('x2',l.target.x-ux*rt);e.setAttribute('y2',l.target.y-uy*rt);});
  nodeEls.forEach(g=>{const n=g._node; g.setAttribute('transform',`translate(${n.x},${n.y})`);});
}
let alpha=420;
function loop(){ if(alpha>0){for(let s=0;s<2;s++)tick(); alpha--; } render(); requestAnimationFrame(loop);}
loop();

// 视图变换（平移/缩放）
let tx=0,ty=0,scale=1;
function applyT(){scene.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);}
svg.addEventListener('wheel',e=>{e.preventDefault();
  const f=e.deltaY<0?1.12:0.89; const mx=e.offsetX, my=e.offsetY;
  tx=mx-(mx-tx)*f; ty=my-(my-ty)*f; scale*=f; applyT();},{passive:false});

// 拖动：节点 vs 背景
let drag=null, dragNode=null, moved=false;
svg.addEventListener('mousedown',e=>{
  const g=e.target.closest('.node');
  if(g){dragNode=g._node; dragNode._fix=true; moved=false;}
  else{drag={x:e.clientX-tx,y:e.clientY-ty}; svg.classList.add('dragging');}
});
window.addEventListener('mousemove',e=>{
  if(dragNode){const p=screenToScene(e); dragNode.x=p.x; dragNode.y=p.y; alpha=Math.max(alpha,60); moved=true;}
  else if(drag){tx=e.clientX-drag.x; ty=e.clientY-drag.y; applyT();}
});
window.addEventListener('mouseup',e=>{
  if(dragNode){ if(!moved){openNode(dragNode);} dragNode._fix=false; dragNode=null;}
  drag=null; svg.classList.remove('dragging');
});
function screenToScene(e){const r=svg.getBoundingClientRect();
  return {x:(e.clientX-r.left-tx)/scale, y:(e.clientY-r.top-ty)/scale};}

// 高亮邻居
const adj={}; nodes.forEach(n=>adj[n.id]=new Set([n.id]));
links.forEach(l=>{adj[l.source.id].add(l.target.id);adj[l.target.id].add(l.source.id);});
function focus(id){
  nodeEls.forEach(g=>{const n=g._node; const on=!id||adj[id].has(n.id);
    g.classList.toggle('dim',!on); g.classList.toggle('hl',!!id&&on);});
  linkEls.forEach((e,i)=>{const l=links[i]; const on=!id||(adj[id].has(l.source.id)&&adj[id].has(l.target.id)&&(l.source.id===id||l.target.id===id));
    e.classList.toggle('dim',!on);});
}

// 笔记面板
const panel=document.getElementById('panel'), pbody=document.getElementById('panelbody');
document.getElementById('close').onclick=()=>{panel.classList.remove('open');focus(null);};
const panelResizer=document.getElementById('panelresizer');
function panelBounds(){
  const vw=window.innerWidth||document.documentElement.clientWidth||1200;
  const minGraph=220;
  return {min:320,max:Math.max(360,vw-minGraph)};
}
function setPanelWidth(px){
  const b=panelBounds();
  const w=Math.max(b.min,Math.min(b.max,Math.round(px)));
  panel.style.setProperty('--panel-width',w+'px');
  try{localStorage.setItem('graph_panel_width',String(w));}catch(e){}
  W=svg.clientWidth;H=svg.clientHeight;alpha=Math.max(alpha,60);
}
try{const saved=parseInt(localStorage.getItem('graph_panel_width')||'',10);if(saved)setPanelWidth(saved);}catch(e){}
panelResizer.addEventListener('mousedown',function(e){
  e.preventDefault();e.stopPropagation();
  panelResizer.classList.add('dragging');
  const move=function(ev){setPanelWidth((window.innerWidth||document.documentElement.clientWidth)-ev.clientX);};
  const up=function(){panelResizer.classList.remove('dragging');window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
  window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
});
panelResizer.addEventListener('touchstart',function(e){
  if(!e.touches||!e.touches.length)return;
  e.preventDefault();e.stopPropagation();
  panelResizer.classList.add('dragging');
  const move=function(ev){if(ev.touches&&ev.touches.length)setPanelWidth((window.innerWidth||document.documentElement.clientWidth)-ev.touches[0].clientX);};
  const up=function(){panelResizer.classList.remove('dragging');window.removeEventListener('touchmove',move);window.removeEventListener('touchend',up);window.removeEventListener('touchcancel',up);};
  window.addEventListener('touchmove',move,{passive:false});window.addEventListener('touchend',up);window.addEventListener('touchcancel',up);
},{passive:false});
function mdToHtml(md){
  if(!md) return '<p style="color:var(--muted)">（这个概念还没完成——用费曼引导器学一遍吧）</p>';
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let out=[], inList=false;
  md.split('\n').forEach(line=>{
    let l=esc(line);
    l=l.replace(/\[\[([^\]|]+?)(?:\|[^\]]+)?\]\]/g,(m,p1)=>`<a data-jump="${p1.trim()}">${p1.trim()}</a>`);
    l=l.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
    if(/^##\s+/.test(line)){out.push('<h2>'+l.replace(/^##\s+/,'')+'</h2>');}
    else if(/^#\s+/.test(line)){/*skip title*/}
    else if(/^>\s?/.test(line)){out.push('<blockquote>'+l.replace(/^&gt;\s?/,'')+'</blockquote>');}
    else if(/^\s*[-*]\s+/.test(line)){out.push('<div>• '+l.replace(/^\s*[-*]\s+/,'')+'</div>');}
    else if(line.trim()===''){out.push('');}
    else{out.push('<p>'+l+'</p>');}
  });
  return out.join('\n');
}
function openNode(n){
  if(n.type==='category'){ focus(n.id);
    const members=nodes.filter(x=>x.type==='concept'&&x.category===n.category)
      .map(x=>`<a data-jump="${x.label}">${x.label}</a>`).join(' · ');
    pbody.innerHTML=`<button id="close2" style="float:right;border:none;background:none;color:var(--muted);font-size:20px;cursor:pointer">×</button>
      <h1>${n.label}</h1><div class="badge">大类</div><div class="badge">${n.count} 个概念</div>
      <div class="md"><p>${members||'（暂无概念）'}</p></div>`;
  }else{
    focus(n.id);
    pbody.innerHTML=`<button id="close2" style="float:right;border:none;background:none;color:var(--muted);font-size:20px;cursor:pointer">×</button>
      <h1>${n.label}</h1>
      <div class="badge" style="border-color:${catColor[n.category]};color:${catColor[n.category]}">${n.category}</div>
      <div class="badge">${n.status||''}${n.track?' · '+n.track:''}</div>
      ${(n.aliases&&n.aliases.length)?'<div class="badge">'+n.aliases.join(' / ')+'</div>':''}
      ${(n.viz||n.viz_source)?'<div style="margin:8px 0 12px"><a href="'+((DATA.prefix||'')+(n.viz||n.viz_source))+'" target="_blank" style="display:inline-block;color:var(--accent);border:1px solid var(--accent);border-radius:8px;padding:5px 12px;text-decoration:none;font-weight:600">▶ 知识图解 / Knowledge Diagram</a></div>':''}
      ${window.self!==window.top?'<div style="margin:0 0 12px"><a data-open="'+n.label+'" style="display:inline-block;cursor:pointer;color:var(--accent);border:1px solid var(--accent);border-radius:8px;padding:5px 12px;text-decoration:none;font-weight:600">📖 在知识站打开</a></div>':''}
      <div class="md">${mdToHtml(n.body)}</div>`;
  }
  panel.classList.add('open');
  pbody.querySelectorAll('[data-jump]').forEach(a=>a.onclick=()=>{const t=byId[a.dataset.jump]; if(t)openNode(t);});
  pbody.querySelectorAll('[data-open]').forEach(a=>a.onclick=()=>{try{parent.postMessage({goto:a.dataset.open},'*');}catch(e){}});
  const c2=document.getElementById('close2'); if(c2)c2.onclick=()=>{panel.classList.remove('open');focus(null);};
}

// 搜索
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase(); if(!q){focus(null);return;}
  nodeEls.forEach(g=>{const n=g._node;
    const hit=n.label.toLowerCase().includes(q)||(n.aliases||[]).some(a=>a.toLowerCase().includes(q));
    g.classList.toggle('dim',!hit); g.classList.toggle('hl',hit);});
  linkEls.forEach(e2=>e2.classList.add('dim'));
});

// 图例 + 元信息
document.getElementById('legend').innerHTML=DATA.categories.map(c=>`<span><i style="background:${catColor[c]}"></i>${c}</span>`).join('')
  +'　|　'+Object.entries(STATUSRING).map(([k,v])=>`<span><i style="background:transparent;border:2px solid ${v}"></i>${k}</span>`).join('')
  +'　|　<span>⇢ 依赖</span><span>— 关联</span><span>· 大小=重要度</span>';
document.getElementById('meta').textContent=`${nodes.filter(n=>n.type==='concept').length} 概念 · ${DATA.categories.length} 大类 · 更新于 ${DATA.generated}`;
window.addEventListener('resize',()=>{W=svg.clientWidth;H=svg.clientHeight;alpha=Math.max(alpha,80);});
const THEMES=[["light","◐ 浅"],["dark","◑ 深"],["ink","❖ 宣纸"],["inkdark","❖ 夜墨"]];
function themeIdx(name){for(var i=0;i<THEMES.length;i++)if(THEMES[i][0]===name)return i;return 1;}
function applyPalette(){buildPalette();
  nodeEls.forEach(function(g){var n=g._node;
    if(n.type==='category')n._c.style.fill=catColor[n.category];
    else n._c.style.stroke=(STATUSRING[n.status]||'var(--ring)');});
  var li=document.querySelectorAll('#legend i'),k=0;
  DATA.categories.forEach(function(c){if(li[k])li[k].style.background=catColor[c];k++;});
  Object.keys(STATUSRING).forEach(function(s){if(li[k])li[k].style.borderColor=STATUSRING[s];k++;});}
function applyTheme(name){document.documentElement.dataset.theme=name;applyPalette();
  document.getElementById('themebtn').textContent=THEMES[themeIdx(name)][1];}
document.getElementById('themebtn').onclick=function(){
  var cur=document.documentElement.dataset.theme||'dark';
  applyTheme(THEMES[(themeIdx(cur)+1)%THEMES.length][0]);};
applyTheme(document.documentElement.dataset.theme||'dark');
</script></body></html>

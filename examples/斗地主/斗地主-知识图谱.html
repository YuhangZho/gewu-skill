const DATA = {"nodes": [{"id": "cat::斗地主", "label": "斗地主", "type": "category", "category": "斗地主", "count": 13}, {"id": "农民配合策略", "label": "农民配合策略", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 4, "track": "标准轨", "ready": false, "aliases": ["农民配合"], "body": "# 农民配合策略\n\n## 一句话定位\n> 它属于角色策略，是用来解决「两个农民怎么分工——谁顶、谁送、谁跑——把地主的牌权和牌力一起耗光」的。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能用「算顶送跑」四大核心技巧 + 上下家差异化策略 + 反向出牌法，把两个农民拧成一股绳，让地主空有牌权却打不出手。\n\n**重点结论**（只收 AI 与你达成的最终共识，3–7 条；筛掉反复出现、一开始没做好后被推翻的）：\n- 农民获胜公式 = 顶（拦路）+ 送（接力）+ 跑（冲刺）三位一体，缺一项都会被地主各个击破。\n- 算牌三要素：算准地主单牌过到几 + 地主下家单牌过到几 + 地主手上没有过的小对；记 7 和 10 是顺子关键张。\n- 顶牌铁律：地主上家必须顶牌（单不过 10 双不过 6），用 10 以上散牌顶，首发单张优先出 A 暴露大牌分布。\n- 送牌三步骤：找准定位（牌难跑就送队友 / 队友难就送你跑）→ 配合队友 → 送对牌型（知道队友需要什么、地主没有什么）。\n- 跑牌三技巧：抢先上手（比地主先出 2）+ 炸弹该拆就拆（双王牌不好时果断拆）+ 注意整体牌型（拿到炸弹后留小单 / 对）。\n- 反向出牌法：地主出单你出对、地主出对你出单，打乱地主节奏；不压自己人铁律——地主不要队友的牌时不压（除非能一手跑完）。\n- 信号传递三技巧：出牌要权（出 6/7 = 渴望拿牌权）+ 推磨子（拿权后出小对子试探）+ 让牌信号（辅助出大牌后出小牌）。\n- 特殊牌局：地主剩 1 张 → 出非单张牌型转移牌权；地主剩 2 张 → 坚持出单逼拆牌。\n\n**重点知识大纲 / 脑图**（用缩进嵌套＝树状脑图，一眼看清骨架；对照结构用 Markdown 表格，不单独做 `chart_type`）：\n- 角色分工\n  - 上家：顶牌（拦路）\n  - 下家：抢牌权 + 跑牌\n  - 两人共同：送牌接力\n- 算牌三要素\n  - 地主单牌过到几\n  - 地主下家单牌过到几\n  - 地主没过的小对\n- 顶牌铁律\n  - 单不过 10\n  - 双不过 6\n  - 首发 A 暴露分布\n- 送牌三步\n  - 找准定位\n  - 配合队友\n  - 送对牌型\n- 跑牌三技巧\n  - 抢先上手\n  - 炸弹该拆就拆\n  - 整体牌型\n- 反向出牌 + 信号\n  - 反向出牌打乱节奏\n  - 不压自己人\n  - 出 6/7 要权\n  - 推磨子试探\n- 特殊牌局\n  - 地主剩 1 张：转牌权\n  - 地主剩 2 张：出单逼拆\n（结构复杂时，由 `model.json` + `scripts/render_viz.py` 生成 `_viz/农民配合策略.mmd` / `_viz/农民配合策略.svg`，不要手写图。）\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：地主上家、地主下家、地主、牌权、关键张（7/10/A/2/王）。\n- **连接**：上家 ↔ 地主（顶牌拦截）；下家 ↔ 地主（抢牌权）；上家 ↔ 下家（送牌接力）。\n- **流向**：算牌 → 顶 / 送 / 跑 分工执行 → 信号传递 → 收尾。\n- **边界**：队友能一手跑完时打破「不压自己人」；地主剩 1/2 张时切换特殊牌局逻辑。\n- **变化**：地主剩余张数决定配合模式（多张 = 常规配合；1 张 = 转牌权；2 张 = 逼拆）。\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type（AI 自主判定，用户不输入）**：flow\n- **节点 kind**：actor（上家/下家/地主）、process（算/顶/送/跑）、rule（不压自己人）、boundary（特殊牌局）\n- **结构纠偏**：用户原想画成「顶→送→跑」线性流程，AI 校准为「算牌前置 + 顶送跑并列三路 + 信号贯穿」——三者不是先后而是同时由不同角色承担。\n\n**类比**：它像「接力赛跑 + 篮球场挡拆配合」，因为顶 = 第一棒拦路（挡拆）、送 = 传递接力棒、跑 = 最后一棒冲刺；任何一棒掉链子整队就输。\n\n**大白话讲解（讲给外行）**：你和一个队友打地主，俩人得有分工。坐在地主上家的人负责「挡」——地主出什么你都用大牌压住，别让他舒服过小牌，单张不出过 10、对子不出过 6。坐在地主下家的人负责「跑」——抢到出牌权就往出冲，能跑多快跑多快。俩人之间还要互相「送」——你知道队友缺什么牌型就出什么，地主没什么你就出什么。配合时记着：地主只剩 1 张时别出单张（出对子或三张转移牌权），地主剩 2 张时死命出单张逼他拆牌。最重要的是别和队友抢牌——地主都不要的牌你也别压，除非你能一把跑完。\n\n**三个应用例子**：\n1. 你是地主上家，地主首发单张 4。你手里有 K、A、2——按「单不过 10」铁律必须用 A 或 2 顶（用 K 不够顶），首选 A 暴露大牌分布，省下 2 给关键节点。\n2. 你是地主下家，队友（上家）出小对子 33。地主不要，你手里有 44、55——按「不压自己人」铁律不要压（除非能一手跑完），让队友继续出牌。\n3. 地主剩 2 张，你是上家刚拿到牌权。按「地主剩 2 张出单逼拆」规则出单张，逼地主拆对子或拆王炸——即便你出的单张很小，地主也得拆大牌压。\n\n**失效边界**：这个概念在什么情况下不适用 / 会出错？\n- 队友明确能一手跑完时，「不压自己人」失效——该让路就让路，别挡队友。\n- 地主剩 1 张时还出单张 = 直接送地主赢，必须切到「出非单张转移牌权」。\n- 自己手牌极差（无大牌无炸弹）时强行「跑」会拖累队友，应转入纯辅助模式只顶不跑。\n\n**边界补丁**（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：\n- 边界 1（地主剩 1 张还出单张送赢）→ 补救动作：地主剩 1 张时拿到牌权一律出对子 / 三张 / 顺子等非单张牌型，把牌权转给队友或逼地主接不上；自己手里若只有单张则优先出最大的单张（如 2 或 A）让队友判断你没有非单张。\n- 边界 2（队友能一手跑完你还压）→ 补救动作：每次出牌前先看队友剩余张数，队友剩 ≤ 4 张且你判断其牌型完整时，一律 pass 让路；除非地主主动出牌且你不压就会让地主跑掉，才考虑压一次再转牌权给队友。\n- 本轮演练：地主剩 1 张，你是上家拿到牌权，手里有单 5 和对 88。错误出单 5（地主直接走完），正确出对 88 转牌权——即便地主有对子能压，也消耗了地主一张大牌。\n\n**卡壳点复盘**：学的过程中哪里卡住、哪里曾经含糊带过？补上后的正确理解是什么？\n- 卡壳点：「不压自己人」一开始被理解成「绝对不压队友」，结果错过队友能跑完时的让路时机。\n- 正确理解：「不压自己人」前提是「队友不能一手跑完」；队友能跑完时反而要主动让路，这才是真配合。\n\n**成长对比**：起点认知「农民就是各打各的、谁抢到牌权谁跑」→ 现在的理解「农民是分工明确的接力赛，顶送跑 + 信号 + 特殊牌局规则缺一不可」。\n\n</details>\n\n📎 [完整对话记录](_transcript/农民配合策略.jsonl)\n\n## 视觉模型图\n（标准轨/深轨默认生成。AI 写 `_viz/农民配合策略.model.json`，脚本生成 `.mmd`，有 `mmdc` 时生成 `.svg`；网页端无 SVG 时用 Mermaid 客户端兜底。）\n- 打开图：[_viz/农民配合策略.svg](_viz/农民配合策略.svg)\n- Mermaid 源：[_viz/农民配合策略.mmd](_viz/农民配合策略.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔18183·高手进阶秘籍，2025-09-01 抓取〕 链接：<https://www.18183.com/xxpd/yxzx/8788869.html>\n  - 原话引述：「真正进阶之道在于掌握记牌、算牌的精妙艺术与农民间默契无间的配合，这些才是将运气转化为胜势的关键。」\n  - AI 转述（可信度：中）：该文系统化提出「记牌 + 算牌 + 配合」三位一体框架，本笔记「算顶送跑」四要素即在此基础上把「配合」拆细为顶/送/跑三条执行路径。\n\n- 〔抖音·老陈教记牌 第13集，2026-03-06 抓取〕 链接：<https://www.douyin.com/video/7614037454362842185>\n  - 原话引述：「学会这套记牌思路，农民盘盘把地主斗。」\n  - AI 转述（可信度：中）：视频重点演示农民间如何通过记关键张（7、10、A、2）判断队友需要的牌型与地主的断张，本笔记「算牌三要素 + 送对牌型」源自该方法论。\n\n- 〔搜狐·斗地主特训营 第二期，2025-12-05 抓取〕 链接：<https://www.sohu.com/a/961863130_122518837>\n  - 原话引述：「打下不打上，堵死下家王。」\n  - AI 转述（可信度：中）：从地主视角反推农民配合——农民必须利用「地主会打下不上」的规律，由下家抢牌权、上家做顶牌拦截，形成「反向出牌 + 接力」配合。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 老陈教记牌 · 〔实战工程派〕\n- **身份**：抖音「老陈教记牌」账号主理人，专注农民视角的记牌 + 配合工程化教学。\n- **与本概念的关系**：本笔记「算牌三要素」直接对应老陈的记牌方法论，他是把「算牌」从口号变成可执行流程的代表人物。\n- **核心洞见**：农民配合的根不在默契而在算牌——算准地主单牌过到几，下家就该送单；算准地主没过的小对，上家就该顶对（AI 归纳 · 待核实）。\n- **代表作**：抖音《老陈教记牌》系列短视频\n- **扩展阅读**：[老陈教记牌·农民配合视频](https://www.douyin.com/video/7614037454362842185)\n\n### 2. 18183 攻略组 · 〔教学派〕\n- **身份**：18183 游戏门户攻略编辑团队，长期产出系统化斗地主教程。\n- **与本概念的关系**：本笔记「顶送跑三位一体」的教学结构参考 18183 攻略风格，便于新手从「各打各的」过渡到分工配合。\n- **核心洞见**：农民胜率的核心在「不让地主舒服」——上家顶、下家抢、两人接力送，三件事任何一件做不到位都是给地主送牌权（AI 归纳 · 待核实）。\n- **代表作**：《斗地主高手进阶秘籍：记牌、算牌与农民配合的终极心法》\n- **扩展阅读**：[18183·高手进阶秘籍](https://www.18183.com/xxpd/yxzx/8788869.html)\n\n### 3. 巅峰斗地主 · 〔数据量化派〕\n- **身份**：B站/抖音斗地主实战 UP 主，擅长用胜率统计拆解农民配合的期望收益。\n- **与本概念的关系**：本笔记「不压自己人铁律」和「特殊牌局规则」背后有数据支撑——巅峰斗地主的统计表明，农民乱压队友的牌平均拉低胜率 18–25 个百分点（AI 归纳 · 待核实）。\n- **核心洞见**：农民配合不是「感觉」而是「期望值」——每次压队友牌前先算「我压了之后能否一手跑完」，不能一手跑完的压牌都是负期望（AI 归纳 · 待核实）。\n- **代表作**：B站《斗地主胜率统计学》系列视频\n- **扩展阅读**：[斗地主特训营·打下不打上](https://www.sohu.com/a/961863130_122518837)\n\n</details>\n\n## 相关\n[[出牌顺序规划]] · [[记牌技巧]] · [[单牌控制与过牌时机]] · [[炸弹使用时机]] · [[地主出牌策略]]", "rel": "斗地主/农民配合策略.md", "viz": "", "viz_source": "斗地主/_viz/农民配合策略.mmd", "viz_chart": "flow", "alive": "full"}, {"id": "出牌顺序规划", "label": "出牌顺序规划", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 5, "track": "标准轨", "ready": false, "aliases": ["拆牌", "牌路规划"], "body": "# 出牌顺序规划\n\n## 一句话定位\n> 它属于〔斗地主·出牌战术〕，是用来解决〔一手 17 张牌拆成几个轮次、按什么顺序出才能用最少手数走完且不被压死〕的——从凭感到有规划的分水岭。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能在拿到牌后 3 秒内识别完整牌型，并按\"拆后总手数 < 拆前 + 拆出牌型有回手机制 + 保留大牌炸弹压场\"三原则规划出牌顺序，把 17 张牌控制在 5–7 手走完。\n\n**重点结论**（只收 AI 与你达成的最终共识）：\n- 拆牌三原则缺一不可：手数减少原则（拆后总手数必须 < 拆前）+ 回手牌原则（拆出的牌型要有回手机制）+ 控场优先原则（保留大牌和炸弹用于压场）。三者是 AND 关系，任一不满足就不拆。\n- 5–7 手走完 17 张是拆牌成功的硬指标；8–10 手就是手数失控，必输。\n- 三大经典拆法：拆对补单（拆中等对子补单牌缺口）/ 拆三补缺（拆三张补顺子缺张）/ 拆炸保控（拆小炸成四带二保大牌控场）。\n- 结构保留黄金比：2 炸 + 1 顺 + 2 对 + 3 单 ≈ 17 张，是控场型牌型的理想骨架。\n- 3 秒内识别完整牌型是高手门槛——拿到牌先扫断张、再看大牌分布、最后定骨架。\n- 角色差异化：地主大胆主动拆长顺打节奏；农民协同拆牌 + 送牌辅助队友。\n- 类比\"做饭食材分拣\"：先按菜式分组（拆牌），再按烹饪顺序下锅（出牌顺序）。\n\n**重点知识大纲 / 脑图**：\n- 拆牌三原则（决策门槛）\n  - 手数减少原则：拆后手数 < 拆前\n  - 回手牌原则：拆出牌型有回手\n  - 控场优先原则：保留大牌 + 炸弹\n- 三大经典拆法\n  - 拆对补单（拆中等对子补单牌）\n  - 拆三补缺（拆三张补顺子缺张）\n  - 拆炸保控（拆小炸成四带二）\n- 结构黄金比\n  - 2 炸 + 1 顺 + 2 对 + 3 单 = 17 张\n- 手数评估\n  - 5–7 手 = 成功\n  - 8–10 手 = 失控\n- 角色差异\n  - 地主：主动拆长顺打节奏\n  - 农民：协同拆牌 + 送牌\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：17 张手牌、牌型组合、手数、大牌/炸弹、角色\n- **连接**：牌型 → 手数；拆法 → 手数变化；角色 → 拆法选择\n- **流向**：拿到牌 → 扫断张 → 定骨架 → 拆牌三原则校验 → 定出牌顺序\n- **边界**：手数 ≥ 8 必拆减手；缺回手牌不拆；缺控场牌不拆\n- **变化**：随出牌进程，手数动态变化，需重新规划\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type（AI 自主判定）**：flow\n- **节点 kind**：process（流程）/ rule（原则）/ data（手数）/ boundary（边界）/ concept（拆法）\n- **结构纠偏**：用户原以为\"拆牌=把对子拆成单牌\"，AI 校准为\"主动打破牌型结构换取灵活性与控制力\"，本质是手数 + 回手 + 控场三原则联合决策。\n\n**类比**：它像做饭前的食材分拣——先把冰箱里的食材按菜式分组（拆牌成牌型），再按烹饪先后顺序下锅（出牌顺序）；分拣错了，再好的食材也做不出一桌菜。\n\n**大白话讲解（讲给外行）**：斗地主每人 17 张牌，不能一张一张出，得把牌分成几组（牌型）一组一组出。比如 34567 是一组顺子，555 带一张 3 是一组三带一，每组就是\"一手\"。怎么分才能让总手数最少、不会被对手压死、还能保住大牌压场？这就是拆牌。三原则是：①拆完手数得变少；②拆出去的那组得有\"回手机会\"（自己能再接回出牌权）；③得留大牌和炸弹用来最后压场。5–7 手走完 17 张就是高手，8–10 手就是新手乱拆。\n\n**三个应用例子**：\n1. **拆对补单**：手牌 KK + 散牌 3、5、7、9。KK 拆成两张 K 单出，能压对手单牌拿回出牌权，比留着 KK 被对手 AA 压死强。\n2. **拆三补缺**：手牌 777 + 34568。777 拆掉，3+4+5+6+7+7+7 组成 34567 顺子 + 77 对子，手数减少且顺子有回手机会。\n3. **拆炸保控**：手牌 3333 + 大王 + 2。3333 拆成四带二（3333 带大王 + 2），保留单张控制权，避免后期没大牌。\n\n**失效边界**：对手有王炸时拆牌压不住（必须先诱出王炸再拆）；自己单牌过多（≥ 5 张）且无大牌时拆牌无意义（直接送小单等队友）；残局阶段（每人 ≤ 4 张）拆牌三原则失效，按残局算法走。\n\n**边界补丁**（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：\n- 边界 1（对手有王炸）→ 补救动作：先连续出单牌逼对手拆王，再启动拆牌规划。\n- 边界 2（单牌过多无大牌）→ 补救动作：放弃拆牌规划，改为\"送小牌 + 留一张大牌防偷跑\"。\n- 本轮演练：边界 1——模拟地主出小王逼农民出大王，再启动拆对补单。\n\n**卡壳点复盘**：一开始以为\"拆牌 = 减少手数\"，忽略回手牌原则——拆出顺子后被对手炸弹压死，没法回手。补上后理解：拆牌三原则是 AND 关系，不是 OR。\n\n**成长对比**：起点认知\"拆牌就是把对子拆成单牌出\" → 现在的理解\"拆牌是手数 + 回手 + 控场三原则联合决策，目标是 5–7 手走完 17 张且保留控场能力\"。\n\n</details>\n\n📎 [完整对话记录](_transcript/出牌顺序规划.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/出牌顺序规划.svg](_viz/出牌顺序规划.svg)\n- Mermaid 源：[_viz/出牌顺序规划.mmd](_viz/出牌顺序规划.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔18183 休闲频道·攻略文章，2026-01-09〕 链接：<https://www.18183.com/xxpd/yxzx/8856353.html>\n  - 原话引述：「拆牌出顺子后，如果新产生的单牌数量比原先更少，则拆解是合理的；反之，若单牌越拆越多，则需谨慎。」\n  - 原话引述：「张数回手——即在拆牌时确保有牌能收回出牌权。」\n  - 原话引述：「7 和 10 这两张关键牌……10 出干净意味着 56789 顺子最大，7 出干净则可能形成牌型断层。」\n  - AI 转述（可信度：高）：拆牌三原则中\"手数减少\"和\"回手牌\"两条在此文有明确论述；\"控场优先\"由多源综合归纳。\n\n- 〔pokerguidepro·攻略文章，2025-12-23〕 链接：<https://pokerguidepro.com/classic-poker/doudizhu-card-splitting-strategy-guide>\n  - AI 转述（可信度：中）：地主与农民拆牌时机差异、炸弹是否拆开的判断标准与本文\"拆炸保控\"相互印证。\n\n- 〔258game.cc·攻略文章，2025-08-24〕 链接：<https://258game.cc/news/782.html>\n  - AI 转述（可信度：中）：拆牌 5 个实战精髓中明确指出\"硬拆王炸压小顺子\"是常见错误，与控场优先原则一致。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 掘开 · 〔JJ 斗地主官方解说〕\n- **身份**：JJ 斗地主官方赛事解说、JJDC 冠军杯长期评论员\n- **与本概念的关系**：解说数百场职业赛事，对\"拆牌手数\"在顶级对局中的决定性作用有最直接的实战观察。\n- **核心洞见**：职业选手的拆牌差异在毫厘——同样 17 张牌，顶级地主能压到 5 手，普通选手 7 手；多出的 2 手就是胜负差。AI 整理·待核实。\n- **代表作**：JJ 斗地主冠军挑战赛解说系列\n- **扩展阅读**：[JJ 斗地主冠军杯-百度百科](https://baike.baidu.com/item/JJ%E6%96%97%E5%9C%B0%E4%B8%BB%E5%86%A0%E5%86%9B%E6%9D%AF/23381677) · [JJ 斗地主官方直播间](https://live.bilibili.com/22021983)\n\n### 2. 祁先生 · 〔民间防炸高手，\"天之骄子\"〕\n- **身份**：抖音/视频平台斗地主教学博主，以防炸策略闻名\n- **与本概念的关系**：拆牌中\"拆炸保控\"是反向操作——本概念解决何时拆炸、祁先生解决如何防对手藏炸，互为镜像。\n- **核心洞见**：拆牌前先判断对手是否藏炸，比拆牌本身更重要——拆错时机，再好的拆法也输。AI 整理·待核实。\n- **代表作**：祁先生斗地主防炸教学系列\n- **扩展阅读**：[祁先生防炸策略-搜狐报道](https://www.sohu.com/a/810004753_121798711)\n\n### 3. CSDN 博主·weixin_30955617 · 〔数学/博弈论视角〕\n- **身份**：CSDN 技术博主，从数学期望角度分析斗地主\n- **与本概念的关系**：把\"拆牌手数\"翻译成\"数学期望\"——每拆一次牌都是一次期望值计算，控场牌是方差控制。\n- **核心洞见**：拆牌不是确定性决策而是期望值决策——保留炸弹 = 保留方差控制权，拆炸换手数 = 用方差换期望。原话引述：「炸弹的数学期望与实战博弈需要联合计算。」\n- **代表作**：《从概率到策略：斗地主中炸弹的数学期望与实战博弈分析》\n- **扩展阅读**：[CSDN 博客原文](https://blog.csdn.net/weixin_30955617/article/details/98605776)\n\n</details>\n\n## 相关\n[[基础牌型与大小规则]] · [[手牌强度评估]] · [[单牌控制与过牌时机]] · [[炸弹使用时机]] · [[地主出牌策略]] · [[农民配合策略]] · [[反直觉陷阱与常见错误]]", "rel": "斗地主/出牌顺序规划.md", "viz": "斗地主/_viz/出牌顺序规划.svg", "viz_source": "斗地主/_viz/出牌顺序规划.mmd", "viz_chart": "flow", "alive": "full"}, {"id": "加倍与抢地主决策", "label": "加倍与抢地主决策", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 4, "track": "标准轨", "ready": false, "aliases": ["翻倍决策"], "body": "# 加倍与抢地主决策\n\n## 一句话定位\n> 它属于叫牌决策（欢乐斗地主版本特色），是用来解决「抢不抢地主、明不明牌、要不要赌春天」这类翻倍时机的——欢乐版与普通版最大差异就在翻倍机制，决策错了高倍场可能一局输光所有积累。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你能判断欢乐版每一种翻倍时机的代价收益比，知道什么牌力档位才考虑抢地主（≥8 分）、什么时候才敢明牌（极强档）、如何避免被春天反春双倍收割——保住欢乐场胜率不再因翻倍翻车。\n\n**重点结论**（AI 与你的最终共识）：\n- **欢乐版翻倍四件套**：抢地主翻倍（每抢一次 ×2）、明牌翻倍（×2 或 ×3，看平台）、炸弹翻倍（每出 1 炸 ×2）、春天/反春天翻倍（×2）——四项叠加可达 16-32 倍底分，翻倍时机决策直接决定输放大。\n- **抢地主代价收益分析**：抢地主 = 已有叫分基础 + 抢后翻倍风险 vs 拿到 3 张底牌收益。**牌力 ≥8 分且结构完整才考虑抢**；5-7 分灰色地带绝不抢（翻倍后负 EV 急剧放大）；抢地主制下阈值比叫分制更高。\n- **明牌翻倍时机铁律**：**牌力极强档（≥8 分）才考虑明牌翻倍，中档以下绝不**——明牌后农民配合信息透明，地主出牌路线全暴露，牌力不够等于送双倍。明牌是\"我已经赢定了只想要更多倍数\"的确认动作，不是\"赌一把\"动作。\n- **春天/反春天判断**：地主春天（地主出完所有牌，农民一张未出）×2；反春天（地主仅出第一手，农民接管出完，地主再未出牌）×2。**春天是低概率事件**，不应强求——为追求春天而改变出牌节奏反而翻车。\n- **抢地主 vs 叫分制策略差异**：抢地主制下已有叫分基础，抢后翻倍是叠加风险，需更高牌力门槛；叫分制下 1→2→3 分递增，决策节奏不同。\n- **高倍场保守原则**：底分已高的场次（如底分 3 已被叫），翻倍叠加后输放极大，应进一步上调抢/明牌阈值，宁可少赢别多输。\n- **3 条核心铁律**：① 抢地主需 ≥8 分；② 明牌需极强档；③ 不为追春天改节奏。\n\n**重点知识大纲 / 脑图**：\n- 欢乐版翻倍四件套\n  - 抢地主翻倍（每抢 ×2）\n  - 明牌翻倍（×2 或 ×3，平台差异）\n  - 炸弹翻倍（每出 1 炸 ×2）\n  - 春天/反春天翻倍（×2）\n  - 叠加可达 16-32 倍底分\n- 抢地主决策\n  - 代价：已有叫分基础 + 抢后翻倍风险\n  - 收益：拿到 3 张底牌 + 翻倍收益\n  - 阈值：≥8 分且结构完整才抢\n  - 5-7 分灰色地带绝不抢\n  - 抢地主制 vs 叫分制阈值差异\n- 明牌翻倍时机\n  - 极强档（≥8 分）才考虑明牌\n  - 中档以下绝不\n  - 明牌 = 赢定确认，不是赌一把\n  - 明牌后农民配合信息透明\n- 春天/反春天判断\n  - 地主春天：农民一张未出 ×2\n  - 反春天：地主仅出一手 ×2\n  - 低概率事件，不强求\n  - 不为追春天改节奏\n- 高倍场保守原则\n  - 底分高时上调抢/明牌阈值\n  - 宁可少赢别多输\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**起点认知**：「欢乐版翻倍就是抢地主和明牌，有牌就抢就明」——无阈值概念，凭大牌直觉。\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：抢地主时机、明牌时机、炸弹数、春天/反春天状态\n- **连接**：抢地主↔牌力阈值；明牌↔牌力极强档；春天↔出牌节奏；炸弹↔翻倍叠加\n- **流向**：发牌→叫牌→抢评估→明牌评估→出牌→结算查春天\n- **边界**：中档牌力抢/明、为追春天改节奏、高倍场仍激进\n- **变化**：每个翻倍动作都是离散状态切换（不抢→抢、不明→明、正常→春天）\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type**：state（翻倍动作是离散状态切换：待叫牌→有人叫→抢评估→抢/不抢→明牌评估→明/不明→结算→春天/反春天，状态机清晰）\n- **节点 kind**：state(各离散状态)、boundary(评估节点)、rule(触发条件)\n- **结构纠偏**：用户初版想用 flow（流程），AI 校准为 state——抢/不抢、明/不明、春天/反春天都是离散状态切换而非线性流程，状态机更适合表达\"触发条件→状态跳转\"的对应关系。\n\n**类比**：它像**德州扑克的 all-in 时机决策**——all-in 翻倍是有成本的（抢地主翻倍 = 已下注翻倍，明牌 = 信息暴露翻倍），不是\"有牌就 all-in\"，而是 EV 计算后只在胜率足够高时才 all-in。欢乐版抢/明牌同理：只在牌力极强档（≥8 分）才考虑翻倍动作，中档硬翻等于负 EV 赌博。\n\n**大白话讲解（讲给外行）**：欢乐斗地主比普通版多了几种翻倍机会，每翻一倍输赢都翻一倍，所以决策错了损失放大。第一种是**抢地主翻倍**——别人叫了 1 分你可以抢，抢了底分翻倍但风险也翻倍，**只有牌力 8 分以上才抢**，5-7 分别抢（抢了输双倍）；第二种是**明牌翻倍**——当地主后可以选择明牌（把手牌亮给农民看），底分再翻倍，**只有极强档（8 分以上）才明牌**，中档牌力明牌等于自杀（农民看到你牌后配合得天衣无缝）；第三种是**炸弹翻倍**——每出一个炸弹全场翻倍，这是被动的不用决策；第四种是**春天/反春天翻倍**——地主春天（农民一张没出）或反春天（地主只出一手）结算再翻倍，这是低概率事件，**别为了追春天故意改出牌节奏**，反而会翻车。一句话：抢和明是主动翻倍动作，只在极强档才做；春天是被动结果，不强求。\n\n**三个应用例子**：\n1. **极强档明牌**：叫地主后手牌大王+小王+2 张 2+对 A+5 顺子，点力 11 分、结构完整 → 明牌翻倍（赢面 90%+，要更多倍数）\n2. **灰色地带不抢**：上家叫 1 分，自己手牌小王+1 张 2+对 K+散牌 5 张，点力 5 分 → 不抢（抢了输双倍负 EV）\n3. **避免反春天**：地主首手出单张被农民压，之后被农民连出长顺子+飞机，地主再无牌权 → 反春天 ×2 结算（应在首手出绝对控制牌稳权）\n\n**失效边界 / 不适用场景**：\n- **中档牌力抢地主**：5-7 分抢地主，翻倍后负 EV 急剧放大，胜率掉至 30% 以下\n- **中档牌力明牌**：明牌后农民配合信息透明，地主出牌路线全暴露，等于送双倍\n- **为追春天改节奏**：故意留小牌想最后清场，反而被农民配合卡死，春天没打成反输\n- **高倍场仍激进**：底分已高（如 3 分被叫），翻倍叠加后输放可达 24-32 倍，常规阈值不适用\n\n**边界补丁**（失败场景 → 补救动作）：\n- **中档抢地主翻车**（点力 6 分抢了，翻倍后输面大）→ 补救：出牌阶段优先打乱农民配合，用炸弹换牌权速战速决，争取先出完减少翻倍叠加\n- **明牌后被农民配合卡死**（明牌后农民看到牌路线精准拦截）→ 补救：出牌时故意出非常规路线（如先出绝对控制牌再出小牌），打乱农民预期\n- **为追春天改节奏翻车**（留小牌想最后清场反而被卡）→ 补救：记住\"春天是低概率事件不强求\"，按最优出牌节奏打，春天来了就来了，不来不强求\n- **本轮演练**：叫地主后手牌大王+2 张 2+对 A+对 K+5 顺子，点力 9 分 → 按铁律可明牌（极强档），明牌后正常出牌赢，验证\"极强档明牌 +EV\"\n\n**卡壳点复盘**：\n- **核心卡壳**：「为什么明牌翻倍是确认动作不是赌一把？」→ 补：明牌后农民看到你全部手牌，配合信息完全透明——农民知道你缺什么牌、有什么控制牌、出牌路线是什么。这种信息劣势下，只有牌力极强（≥8 分，赢面 80%+）才能撑住透明化的代价；中档牌力明牌后，农民配合精准拦截，地主胜率从 50% 暴跌到 20% 以下，明牌翻倍不是\"赌一把\"而是\"送双倍\"。\n- **次要盲区**：最初以为春天是常见可以追 → 补：春天是低概率事件（农民全程不出牌极罕见），强行留小牌追春天反而被卡死，得不偿失。\n- **三重验证**：① 极强档明牌例（点力 11+结构完整）→ 明牌 +EV ✓ ② 灰色不抢例（点力 5+散牌）→ 不抢 +EV ✓ ③ 反春天翻车例（首手失权）→ 应出绝对控制牌 ✓，三维阈值一致\n\n**成长对比**：起点「欢乐版有牌就抢就明，翻倍越多越好」→ 现在「抢/明只在极强档（≥8 分），春天不强求，高倍场保守，翻倍时机是 EV 决策不是赌博」。\n\n</details>\n\n📎 [完整对话记录](_transcript/加倍与抢地主决策.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/加倍与抢地主决策.svg](_viz/加倍与抢地主决策.svg)\n- Mermaid 源：[_viz/加倍与抢地主决策.mmd](_viz/加倍与抢地主决策.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔知乎·欢乐斗地主具体的翻倍规则，2026-06-27 抓取〕 链接：https://www.zhihu.com/question/291251308\n  - 原话引述：「印象里是明牌 3 倍，叫牌时第一个叫地主不加倍，之后每有一次抢地主则 2 倍。然后和普通三人斗地主一样，春天 2 倍，出一次炸弹 2 倍」\n  - AI 转述（可信度：中）：欢乐斗地主翻倍四件套——明牌 ×3、抢地主 ×2（每次）、春天 ×2、炸弹 ×2，叠加可达 16-32 倍；这是用户对欢乐版翻倍机制的实践总结\n\n- 〔百度百科·春天（斗地主规则术语），2026-06-27 抓取〕 链接：https://baike.baidu.com/item/%E6%98%A5%E5%A4%A9/18773372\n  - 原话引述：「当地主先出牌，一直到地主把牌出完了农民全都没出过牌，就说地主春天了；当地主出了一次牌，农民任意一方开始出牌，直到一方出完牌，地主都没再次出牌，就说农民春天了，也叫反春或反春天」；「春天在结算时通常视为'一炸'或具有额外倍数奖励（如两番）」；「春天与反春在斗地主游戏中属于低概率事件」\n  - 可信度：高（百科类，规则定义与多方资料一致）\n\n- 〔Wikiwand 维基百科·斗地主词条，2026-06-27 抓取〕 链接：https://www.wikiwand.com/zh-cn/%E6%96%97%E5%9C%B0%E4%B8%BB\n  - 原话引述：「确定庄家后，防守方可选择是否对庄家进行底分加倍，庄家之后也可选择是否再加倍。最终加倍结果为本轮对局底分」；「若在一轮对局中庄家牌张全出，且防守方未出一张，则称为庄家春天。结算分值时得分翻倍」；「打出后得分翻倍」（指炸弹与王炸）\n  - 可信度：高（维基百科，依据国家体育总局官方规则）\n\n- 〔搜狐·斗地主叫分制和抢地主制区别，2026-06-27 抓取〕 链接：https://www.sohu.com/a/956932041_122565828\n  - AI 转述（可信度：中）：叫分制与抢地主制是两种主流确定地主方式，抢地主制下抢后翻倍风险陡增，需更高牌力门槛；策略应据此调整\n  - 原话引述：「牌型越集中成型，越适合争地主。地主角色必须承担推牌责任，牌力不足时强行争地主反而被动」\n\n- 〔xtechtools·斗地主记分规则完全指南，2026-06-27 抓取〕 链接：https://xtechtools.com/guides/doudizhu-score/\n  - AI 转述（可信度：中）：底分/倍数/春天反春的完整记分规则——倍数叠加公式为 底分 × 2^(炸弹数+是否春天+是否反春+加倍次数)，抢地主与明牌是欢乐版特有的主动翻倍动作\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 腾讯欢乐斗地主运营团队 · 「欢乐版翻倍机制设计方」\n- **身份**：腾讯互娱《QQ 欢乐斗地主》产品运营团队，2009 年起举办线上赛事覆盖 14 省 70 城\n- **与本概念的关系**：欢乐版的抢地主/明牌/春天翻倍机制由这类平台方设计并标准化，理解其倍数设计背后的\"刺激度与留存率平衡\"逻辑，有助于玩家反向推导最优翻倍时机\n- **核心洞见**：「翻倍机制设计的本质是放大单局情绪波动以提升留存——但平台方通过海量对局数据发现，长期胜率高的玩家共性是'主动翻倍动作保守，被动翻倍（炸弹）不抗拒'，这与 EV 决策理论一致。」（AI 归纳 · 基于平台运营数据规律，待核实）\n- **代表作**：《QQ 欢乐斗地主》（2009-）\n- **扩展阅读**：[欢乐斗地主翻倍规则知乎讨论](https://www.zhihu.com/question/291251308) · [斗地主记分规则完全指南](https://xtechtools.com/guides/doudizhu-score/)\n\n### 2. 徐晓轶 · 「剩余牌手数理论提出者」\n- **身份**：IT 工程师、知乎专栏作者，用蚁群算法研究斗地主牌型整理\n- **与本概念的关系**：他的\"剩余牌手数\"理论为抢地主决策提供了量化基础——抢地主翻倍后，剩余牌手数累加是否为负（不耗炸续控）决定了抢牌后能否真正兑现翻倍收益；正剩余手数抢牌等于赌输\n- **核心洞见**：「斗地主的关键就是争夺牌权；剩余牌手数反映的是这手牌需要消耗掉自己多少炸弹才能得到打出去的机会。」——抢地主翻倍后牌权争夺更激烈，剩余牌手数累加为正时抢牌等于\"翻倍赌输\"。（原话引述自知乎专栏）\n- **代表作**：知乎专栏《斗地主之用蚁群算法整理牌型》系列（2017）\n- **扩展阅读**：[如何进行牌力估计](https://zhuanlan.zhihu.com/p/27592272) · [几个关键点的处理](https://zhuanlan.zhihu.com/p/27699650)\n\n### 3. 博弈论视角 · 「翻倍时机 EV 决策框架」\n- **身份**：博弈论与决策理论体系，以冯·诺依曼《博弈论与经济行为》为奠基\n- **与本概念的关系**：翻倍时机本质是不完全信息博弈下的 EV 决策——抢/明牌的主动翻倍是\"加注\"行为，EV 公式为 EV = 胜率 × 翻倍收益 - (1-胜率) × 翻倍损失，只有胜率 >50% 时翻倍才 +EV\n- **核心洞见**：「主动翻倍（抢/明牌）的 EV 决策公式：EV = P(胜) × 收益 × 倍数 - P(负) × 损失 × 倍数；当 P(胜) < 50% 时（中档牌力），翻倍动作放大负 EV，应弃；当 P(胜) > 80% 时（极强档），翻倍动作放大正 EV，应做。这就是'极强档才抢才明，中档绝不'的数学根源。」（AI 归纳 · 基于 EV 决策理论应用于欢乐版翻倍）\n- **代表作**：冯·诺依曼《博弈论与经济行为》（1944）\n- **扩展阅读**：[德州扑克数学基础：EV 期望值计算完全指南](https://www.geecegto.com/blog/poker-math-basics-ev-calculation-guide) · [德州扑克基础教程：EV 是所有决策理论的基石](https://zhuanlan.zhihu.com/p/93436759)\n\n</details>\n\n## 相关\n[[叫地主决策]] · [[手牌强度评估]]", "rel": "斗地主/加倍与抢地主决策.md", "viz": "斗地主/_viz/加倍与抢地主决策.svg", "viz_source": "斗地主/_viz/加倍与抢地主决策.mmd", "viz_chart": "state", "alive": "full"}, {"id": "单牌控制与过牌时机", "label": "单牌控制与过牌时机", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 4, "track": "标准轨", "ready": false, "aliases": ["过牌"], "body": "# 单牌控制与过牌时机\n\n## 一句话定位\n> 它属于〔斗地主·出牌战术〕，是用来解决〔每一手单牌该出小牌探路、用大牌压、还是忍着过牌〕的——单牌是斗地主最高频出现的牌型，过牌决策直接决定出牌权归属。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能根据手牌结构、对手出牌节奏、剩余牌力，在 2 秒内判断当前这一手单牌是\"探路/压牌/过牌/收尾\"哪个状态，并把出牌权用在最该用的地方。\n\n**重点结论**（只收 AI 与你达成的最终共识）：\n- 单牌控制四状态：探路（开局出小单探虚实）→ 压牌（关键牌权或对手将跑完时用大牌压）→ 过牌（手牌结构未成型或留作回手时忍着不要）→ 收尾（残局用大牌锁死出牌权）。状态间靠触发条件切换。\n- 出小单探路的两个时机：开局探虚实（看对手顶牌反应推断牌型）；手中单牌多时先送单（避免后期被小单拖累）。\n- 必须压牌的两个时机：关键牌权时（输了这手就再没出牌权）；对手将跑完时（不压就输）。\n- 必须忍着过牌的两个时机：手牌结构未成型（过早暴露大牌意图）；留作回手（这大牌是后续回合的回手牌）。\n- \"打下不上\"对地主的意义：地主出单牌，下家农民顶牌压住，上家农民不要——把出牌权留给下家继续压制，避免大牌互相消耗。\n- 农民顶牌口诀：单不过 10、双不过 6——地主出单牌农民顶到 10 以上的 K/A/2；地主出对子农民顶到 6 以上的对子。给地主留小牌跑不掉。\n- 过牌信号传递：故意不要 = 暗示队友\"我这门牌型不需要\"或\"我有大牌等回手\"。队友要学会迎合。\n\n**重点知识大纲 / 脑图**：\n- 四状态机\n  - 探路：开局送小单\n  - 压牌：关键牌权/对手将跑\n  - 过牌：未成型/留回手\n  - 收尾：残局锁权\n- 触发条件\n  - 出小单：开局探虚实 / 单牌多\n  - 必压：关键牌权 / 对手将跑\n  - 必忍：未成型 / 留回手\n- 角色差异化\n  - 地主：打下不上（下家压上家放）\n  - 顶门农民：单不过 10 双不过 6\n  - 下手农民：顺势跑牌\n- 信号系统\n  - 故意不要 = 暗示队友\n  - 顶牌 = 明示大牌分布\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：单牌、出牌权、对手出牌节奏、手牌结构、角色\n- **连接**：手牌结构 → 是否忍；对手节奏 → 是否压；角色 → 顶/跑/打\n- **流向**：每手单牌都进入四状态机之一，靠触发条件切换\n- **边界**：残局（≤4 张）单牌决策转为残局算法；队友将跑完时强制压\n- **变化**：随出牌进程，\"压/过\"成本动态变化\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type**：state\n- **节点 kind**：state（四状态）\n- **结构纠偏**：用户原以为过牌就是\"不要\"，AI 校准为\"过牌是主动放弃当轮以换取后续回手\"，是有策略意图的弃权。\n\n**类比**：它像足球的中场控制——单牌是中场传球，探路是试探性长传，压牌是关键拦截，过牌是有意让球权等队友落位，收尾是绝杀前的控球。\n\n**大白话讲解（讲给外行）**：斗地主出单牌时你有 4 个选择。①出小牌探路，看对手反应；②出大牌压住抢回出牌权；③忍着不要（过牌），等下一手再发力；④残局用最大牌锁死。每个选择有触发条件：开局不知道对手牌就探路，关键时候必须压，手牌还没准备好就忍，最后阶段就收尾。农民有个口诀\"单不过 10 双不过 6\"——地主出单牌你顶到 10 以上的 K/A/2，让地主小牌跑不掉。还有\"打下不上\"——地主出牌下家压、上家放，把出牌权留给最能压制的人。\n\n**三个应用例子**：\n1. **开局探路**：地主开局出单 3 试探，下家农民出 K 顶牌，上家农民不要——上家\"打下不上\"，等下家继续压制。\n2. **必压时机**：对手剩 2 张牌，你手中有 2，必须用 2 压住对手单牌，否则下一手对手就走完。\n3. **忍着过牌**：手牌 34567 + KK + 大王 + 2，对手出单 8。这时忍着不要——大王和 2 是后续回手牌，现在出 KK 拿权反而暴露意图。\n\n**失效边界**：残局阶段（≤4 张）单牌决策转为残局算法；队友将跑完时强制压（不能再过牌）；自己剩 1 张时无所谓过牌（直接出）。\n\n**边界补丁**（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：\n- 边界 1（队友将跑完还过牌）→ 补救动作：立即识别\"队友剩 ≤ 3 张\"信号，从过牌切换到压牌模式。\n- 边界 2（残局还套四状态机）→ 补救动作：≤4 张时切换为残局算法（数最大牌、算必胜组合）。\n- 本轮演练：边界 1——模拟队友报单（剩 1 张），自己手中单 5，必须出大王压对手。\n\n**卡壳点复盘**：一开始以为\"过牌=没牌可出\"，忽略主动过牌的策略意图——后来发现故意不要能传递信号给队友（暗示自己有回手牌）。补上后理解：过牌是主动权放弃换信息+换回手机会。\n\n**成长对比**：起点认知\"过牌就是没大牌出\" → 现在的理解\"过牌是四状态机之一，主动放弃当轮以传递信号或保留回手牌\"。\n\n</details>\n\n📎 [完整对话记录](_transcript/单牌控制与过牌时机.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/单牌控制与过牌时机.svg](_viz/单牌控制与过牌时机.svg)\n- Mermaid 源：[_viz/单牌控制与过牌时机.mmd](_viz/单牌控制与过牌时机.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔斗地主游戏官网·官方教程，2026〕 链接：<https://cn-douzhu.com/guide>\n  - 原话引述：「地主上家（顶牌位）你的主要任务是阻击地主出小牌。不惜一切代价拆掉自己的对子或顺子，用大牌（如 K、A、2）顶住地主的单牌，迫使地主用更大的牌接招。」\n  - 原话引述：「队友出单牌，说明他单牌多或有大单牌控场；队友出对子，说明他急需过对子。作为队友，要学会'迎合'对方的牌路。」\n  - AI 转述（可信度：高）：顶牌策略与\"单不过 10 双不过 6\"高度一致，信号传递机制有官方背书。\n\n- 〔小米游戏中心·攻略文章，2022-04-07〕 链接：<https://game.xiaomi.com/viewpoint/1359077112_1649382422753_13>\n  - 原话引述：「做地主的时候……手上两张王的时候该拆一定要拆。这样也有两手单牌的控制权可以拿回出牌权利。」\n  - AI 转述（可信度：中）：拆王换单牌控制权是地主单牌战术的高阶用法。\n\n- 〔百度经验·实战提高，2017-07-01〕 链接：<https://jingyan.baidu.com/article/ce4366493138103773afd3f6.html>\n  - AI 转述（可信度：中）：记牌、算牌、顶牌、让牌四位一体，\"让牌\"即过牌的策略性表达。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 掘开 · 〔JJ 斗地主官方解说〕\n- **身份**：JJ 斗地主官方赛事解说、JJDC 冠军杯长期评论员\n- **与本概念的关系**：职业赛事中\"过牌信号\"是顶级农民配合的核心，掘开解说数百场对其有最敏锐的实战判断。\n- **核心洞见**：职业农民的过牌不是没牌，是\"精确告诉队友我有什么\"——一次正确的过牌信号比一次压牌更能赢局。AI 整理·待核实。\n- **代表作**：JJ 斗地主冠军挑战赛解说系列\n- **扩展阅读**：[JJ 斗地主冠军杯-百度百科](https://baike.baidu.com/item/JJ%E6%96%97%E5%9C%B0%E4%B8%BB%E5%86%A0%E5%86%9B%E6%9D%AF/23381677) · [JJ 斗地主官方直播间](https://live.bilibili.com/22021983)\n\n### 2. 祁先生 · 〔民间防炸高手，\"天之骄子\"〕\n- **身份**：抖音/视频平台斗地主教学博主，以防炸策略闻名\n- **与本概念的关系**：单牌控制中的\"忍着过牌\"本质是防对手藏炸——过牌保留大牌既能回手也能防炸，与祁先生防炸视角互补。\n- **核心洞见**：过牌时机=防炸时机——对手突然不跟你的单牌，大概率在藏炸等关键牌权。AI 整理·待核实。\n- **代表作**：祁先生斗地主防炸教学系列\n- **扩展阅读**：[祁先生防炸策略-搜狐报道](https://www.sohu.com/a/810004753_121798711)\n\n### 3. CSDN 博主·weixin_30955617 · 〔数学/博弈论视角〕\n- **身份**：CSDN 技术博主，从数学期望角度分析斗地主\n- **与本概念的关系**：把\"过牌\"翻译成\"信息收益 vs 出牌权成本\"的博弈——过牌牺牲当轮出牌权换取对手信息暴露。\n- **核心洞见**：过牌的期望值=对手暴露的牌型信息价值 - 出牌权丢失成本；当信息价值 > 成本时过牌正期望。原话引述：「炸弹的数学期望与实战博弈需要联合计算。」\n- **代表作**：《从概率到策略：斗地主中炸弹的数学期望与实战博弈分析》\n- **扩展阅读**：[CSDN 博客原文](https://blog.csdn.net/weixin_30955617/article/details/98605776)\n\n</details>\n\n## 相关\n[[出牌顺序规划]] · [[地主出牌策略]] · [[农民配合策略]] · [[反直觉陷阱与常见错误]]", "rel": "斗地主/单牌控制与过牌时机.md", "viz": "斗地主/_viz/单牌控制与过牌时机.svg", "viz_source": "斗地主/_viz/单牌控制与过牌时机.mmd", "viz_chart": "state", "alive": "full"}, {"id": "反直觉陷阱与常见错误", "label": "反直觉陷阱与常见错误", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 4, "track": "标准轨", "ready": false, "aliases": ["常见错误"], "body": "# 反直觉陷阱与常见错误\n\n## 一句话定位\n> 它属于高阶收尾整合，是用来解决「新手和老手都会反复踩的 5 类反直觉陷阱——叫牌 / 出牌 / 炸弹 / 记牌 / 心理——以及对应正确做法」的。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能用「5 类陷阱 + 正确做法」清单扫描每一手牌，避开 80% 以上非必要败局，把胜率从「被自己送掉」拉回到「只输给牌力差距」。\n\n**重点结论**（只收 AI 与你达成的最终共识，3–7 条；筛掉反复出现、一开始没做好后被推翻的）：\n- 5 类反直觉陷阱：叫牌陷阱 / 出牌陷阱 / 炸弹陷阱 / 记牌陷阱 / 心理陷阱，覆盖从开局到收官全部决策点。\n- 叫牌陷阱核心：该叫不叫（中档牌因保守错失地主优势）+ 不该叫乱叫（弱牌赌底牌）+ 欢乐版盲目抢地主翻倍（牌力不够还抢翻倍送分局）。\n- 出牌陷阱核心：贪顺子拆坏结构（为凑顺子拆对子导致手数失控）+ 首发出大牌暴露（开局出 A/2 暴露大牌分布）+ 农民乱压队友（地主不要时跟队友抢牌权）。\n- 炸弹陷阱核心：乱炸空炸（没打断关键节奏就炸）+ 有炸不用憋死（残局该炸不炸）+ 王炸拆太早（散牌多还拆王炸）。\n- 记牌陷阱核心：只记不记关键张（记了边角料忘了 7/10）+ 记牌不算牌（数据收集了不解读）。\n- 心理陷阱核心：上头追倍（输了几局盲目抢高倍）+ 放弃抵抗（牌差就摆烂不优化）。\n- 反直觉共性：大多数陷阱不是「不知道规则」，而是「知道规则但在压力下走捷径」——补丁不是「再背一遍规则」而是「建立每手牌检查清单」。\n\n**重点知识大纲 / 脑图**（用缩进嵌套＝树状脑图，一眼看清骨架；对照结构用 Markdown 表格，不单独做 `chart_type`）：\n- 叫牌陷阱\n  - 该叫不叫\n  - 不该叫乱叫\n  - 盲目抢地主翻倍\n- 出牌陷阱\n  - 贪顺子拆坏结构\n  - 首发出大牌暴露\n  - 农民乱压队友\n- 炸弹陷阱\n  - 乱炸空炸\n  - 有炸不用憋死\n  - 王炸拆太早\n- 记牌陷阱\n  - 只记不记关键张\n  - 记牌不算牌\n- 心理陷阱\n  - 上头追倍\n  - 放弃抵抗\n- 通用补丁\n  - 每手牌检查清单\n  - 压力下走捷径识别\n（结构复杂时，由 `model.json` + `scripts/render_viz.py` 生成 `_viz/反直觉陷阱与常见错误.mmd` / `_viz/反直觉陷阱与常见错误.svg`，不要手写图。）\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：5 类陷阱节点（叫牌 / 出牌 / 炸弹 / 记牌 / 心理）、每类下的子陷阱、正确做法。\n- **连接**：陷阱之间相互关联（如「记牌陷阱」会触发「出牌陷阱」、「心理陷阱」会放大其他 4 类）。\n- **流向**：陷阱不是线性流程，而是网状关联——一个陷阱会引发另一个，所以用 relation 图而非 flow 图。\n- **边界**：某些陷阱在特殊牌局下不是陷阱（如「乱炸」在残局必胜时就不是乱炸）。\n- **变化**：陷阱触发频率随玩家水平变化——新手主要踩叫牌 + 出牌，老手主要踩心理 + 炸弹。\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type（AI 自主判定，用户不输入）**：relation\n- **节点 kind**：concept（5 类陷阱）、rule（正确做法）、feedback（心理陷阱的循环放大）\n- **结构纠偏**：用户原想把 5 类陷阱画成并列清单，AI 校准为「relation 网」——心理陷阱是放大器，会拉高其他 4 类陷阱的触发率，必须用 feedback 边表达这种循环关系。\n\n**类比**：它像「体检报告的 5 项异常指标」，因为每项异常单独看都不致命，但互相关联——一项恶化会拉高其他项风险；正确做法不是「头痛医头」而是「建立整体检查清单 + 优先治放大器（心理）」。\n\n**大白话讲解（讲给外行）**：打斗地主输牌，很多时候不是牌差，是自己踩了坑。坑分 5 类：叫牌时要么太保守该叫不叫、要么太激进弱牌乱叫、要么在欢乐版里盲目抢翻倍送分局；出牌时为了凑顺子拆对子把手牌搞乱、开局就把大牌打出去暴露分布、农民之间互相抢牌权；用炸弹时该炸不炸、不该炸乱炸、王炸还在散牌多时就拆了；记牌时记了一堆边角料却忘了关键的 7 和 10、记下来了却不会用来推断；心理上输了几局就上头追高倍、牌差就摆烂不认真打。这 5 类坑不是孤立的——心理崩了其他 4 类全放大。补丁不是再背一遍规则，而是每手牌前过一遍检查清单，尤其是在压力下别走捷径。\n\n**三个应用例子**：\n1. 你拿到中档牌（一个 2、一个对 A、一个对 K、顺子、几个散牌），按手牌强度评估该叫 1 分地主。常见错误是「该叫不叫」因保守放弃，正确做法是叫 1 分——这种牌地主胜率高于农民胜率。\n2. 开局你拿到 A + 2 + 单 9。常见错误是首发出 A 或 2「试水」，暴露大牌分布给农民算牌；正确做法是首发长牌（顺子 / 三带对）或小对子，藏住 A 和 2。\n3. 残局你剩 6 张含一个炸弹，地主剩 4 张刚出顺子。常见错误是「有炸不用憋死」想留炸弹到最后一手——结果地主下一手出完；正确做法是立刻炸掉地主顺子夺回牌权，再用剩余牌型收尾。\n\n**失效边界**：这个概念在什么情况下不适用 / 会出错？\n- 特殊牌局下某些「陷阱」不是陷阱——如残局必胜时「王炸拆」可能是正确解（拆王炸留单 2 控牌 + 一手跑路）。\n- 高阶博弈中「乱炸」可能是虚招诱敌——不能一刀切判定为陷阱。\n- 新手学习阶段过度关注陷阱会导致决策瘫痪——应先掌握基础牌型与出牌顺序，再练陷阱识别。\n\n**边界补丁**（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：\n- 边界 1（残局必胜时把「王炸拆」当陷阱不敢拆）→ 补救动作：王炸是否拆的判断标准是「拆后能否构成控牌 + 跑路必胜公式」——若拆王炸后单王 + 单 2 + 一手跑路牌型成立，则拆是正解；若拆后无法构成必胜公式则不拆。\n- 边界 2（新手阶段过度识别陷阱导致决策瘫痪）→ 补救动作：先掌握基础牌型与出牌顺序规划，陷阱清单只在「每局结束后复盘」时使用，不在出牌瞬间强行检查——避免决策成本超过收益。\n- 本轮演练：残局剩 5 张（王炸 + 单 2 + 对 8），地主剩 3 张。错误做法是「不拆王炸」按陷阱清单走；正确做法是拆王炸留单王 + 单 2 + 对 8 = 控牌（单王 + 单 2）+ 跑路（对 8），符合必胜公式。\n\n**卡壳点复盘**：学的过程中哪里卡住、哪里曾经含糊带过？补上后的正确理解是什么？\n- 卡壳点：「贪顺子拆坏结构」一开始被理解成「永远不要为顺子拆对子」，结果错过合理的顺子组合。\n- 正确理解：「贪顺子」陷阱的判定标准是「拆对子后手数是否增加」——若拆对子凑顺子后总手数减少则合理，若总手数增加则落入陷阱。\n\n**成长对比**：起点认知「输牌是因为牌差或运气」→ 现在的理解「80% 的败局是自己踩了 5 类陷阱中的某一类，建立检查清单就能避免」。\n\n</details>\n\n📎 [完整对话记录](_transcript/反直觉陷阱与常见错误.jsonl)\n\n## 视觉模型图\n（标准轨/深轨默认生成。AI 写 `_viz/反直觉陷阱与常见错误.model.json`，脚本生成 `.mmd`，有 `mmdc` 时生成 `.svg`；网页端无 SVG 时用 Mermaid 客户端兜底。）\n- 打开图：[_viz/反直觉陷阱与常见错误.svg](_viz/反直觉陷阱与常见错误.svg)\n- Mermaid 源：[_viz/反直觉陷阱与常见错误.mmd](_viz/反直觉陷阱与常见错误.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔PokerGuidePro·新手常见误区指南，2025-12-04 抓取〕 链接：<https://pokerguidepro.com/poker-news/dou-di-zhu-newbie-mistakes-guide>\n  - 原话引述：「新手常犯五大误区，包括牌力判断失误、缺乏控场意识等。」\n  - AI 转述（可信度：中）：该文系统列出新手五大误区，本笔记「叫牌陷阱 + 出牌陷阱 + 控场缺失」三类直接吸收并扩展为五类框架。\n\n- 〔18183·常见错误规避攻略，2025-09-23 抓取〕 链接：<https://www.18183.com/xxpd/yxzx/8800159.html>\n  - 原话引述：「新手玩家最易犯的错误就是高估手牌实力盲目叫地主。当地主意味着单独对抗两名玩家，需要更强大的牌型和精准的计算。」\n  - AI 转述（可信度：中）：该文重点拆解「盲目叫地主」陷阱，本笔记「不该叫乱叫 + 欢乐版盲目抢地主翻倍」在此基础上有针对性扩展。\n\n- 〔18183·斗地主新手入门出牌技巧（含三类常见错误），2025-08-11 抓取〕 链接：<https://www.18183.com/xxpd/yxzx/8780210.html>\n  - 原话引述：「新手易犯三类错误：一是炸弹滥用，如用炸压制对子导致后期失控（胜率损失40%）；二是农民内斗，盲目压制队友牌型让地主得利；三是残局误判。」\n  - AI 转述（可信度：中）：该文用数据量化三类错误代价，本笔记「炸弹陷阱 + 农民乱压队友 + 残局误判」直接吸收并扩展为五类框架。\n\n- 〔28 圈·斗地主最容易犯的错，2026-06-23 抓取〕 链接：<https://www.connect-cn-28circle.com/news/2026-06-23-news-60612/>\n  - 原话引述：「真正影响胜负的，往往是那些看似微小却频繁出现的错误……在‘叫分’‘抢地主’‘出牌策略’‘记牌与控场’上少走弯路。」\n  - AI 转述（可信度：中）：该文强调「小错误高频复现」是胜负主因，本笔记「反直觉共性 = 压力下走捷径」的核心论断即受此启发。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 巅峰斗地主 · 〔数据量化派〕\n- **身份**：B站/抖音斗地主实战 UP 主，长期用胜率统计拆解常见错误的代价。\n- **与本概念的关系**：本笔记「5 类陷阱触发频率随水平变化」的判断依据巅峰斗地主的统计——新手叫牌陷阱占失分的 35%，老手心理陷阱占失分的 40%（AI 归纳 · 待核实）。\n- **核心洞见**：陷阱不是「错误」而是「负期望决策」——每次踩陷阱的期望损失可量化，优先修期望损失最高的陷阱比重练基本功更高效（AI 归纳 · 待核实）。\n- **代表作**：B站《斗地主胜率统计学·错误代价篇》系列视频\n- **扩展阅读**：[斗地主新手入门出牌技巧（18183）](https://www.18183.com/xxpd/yxzx/8780210.html)\n\n### 2. 18183 攻略组 · 〔教学派〕\n- **身份**：18183 游戏门户攻略编辑团队，擅长把错误分类成可教学清单。\n- **与本概念的关系**：本笔记「5 类陷阱 + 正确做法」清单的教学化表达参考 18183 攻略风格，便于玩家逐项对照学习。\n- **核心洞见**：错误规避比技巧学习更高 ROI——学会避免 10 个常见错误的胜率提升，超过学会 10 个高阶技巧（AI 归纳 · 待核实）。\n- **代表作**：《斗地主常见错误规避攻略》\n- **扩展阅读**：[18183·常见错误规避攻略](https://www.18183.com/xxpd/yxzx/8800159.html)\n\n### 3. 老陈教记牌 · 〔记牌工程派〕\n- **身份**：抖音「老陈教记牌」账号主理人，主打记牌 + 算牌工程化教学。\n- **与本概念的关系**：本笔记「记牌陷阱（只记不记关键张 + 记牌不算牌）」的拆解直接对应老陈的记牌方法论——他强调记牌的目的是算牌，不是数据收集。\n- **核心洞见**：记牌陷阱的根因是「把记牌当目的」——正确的记牌是「为出牌决策服务」，每记一张都要回答「这张牌记下来能改变我下一手出牌吗」（AI 归纳 · 待核实）。\n- **代表作**：抖音《老陈教记牌》系列短视频\n- **扩展阅读**：[老陈教记牌·农民配合视频](https://www.douyin.com/video/7614037454362842185)\n\n</details>\n\n## 相关\n[[叫地主决策]] · [[出牌顺序规划]] · [[炸弹使用时机]] · [[记牌技巧]] · [[加倍与抢地主决策]] · [[地主出牌策略]] · [[农民配合策略]]", "rel": "斗地主/反直觉陷阱与常见错误.md", "viz": "", "viz_source": "斗地主/_viz/反直觉陷阱与常见错误.mmd", "viz_chart": "relation", "alive": "full"}, {"id": "叫地主决策", "label": "叫地主决策", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 5, "track": "标准轨", "ready": false, "aliases": ["叫分"], "body": "# 叫地主决策\n\n## 一句话定位\n> 它属于叫牌决策，是用来解决「拿到这手牌到底叫不叫、叫几分」的——叫牌是斗地主一切胜负的起点，叫错一盘可能要三盘才能补回来。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你能用「牌力基础分 + 位置修正分 + 底牌期望分」三维决策模型，在 10 秒内对任意手牌得出\"叫 3 / 叫 1 / 弃叫\"的明确结论，并把\"叫错代价 > 不叫损失\"内化为 70% 胜率的核心护城河。\n\n**重点结论**（AI 与你的最终共识）：\n- **叫牌 = 三维决策，不是单维牌力**：牌力基础分（点力）+ 位置修正分（叫牌顺序）+ 底牌期望分（补强概率）——三维加权后才能定档。只看牌力不看位置和底牌期望，等于盲叫。\n- **牌力三档划分**：≥7 分强牌区（叫 3 / 2 分）/ 5-6 分灰色地带（看位置与底牌）/ ≤4 分弱牌区（直接弃）。强牌区还要校验\"断张≤2 + 手数≤5 + 有控制力\"才能叫 3 分。\n- **位置策略差异巨大**：首家保守（阈值最高，叫 3 分需点力 ≥8 + 结构完整）/ 二家可捡漏可拦截（看首家叫分判断其牌力）/ 三家末家阈值最低（前两家弃叫表明牌力弱，底牌补强概率 >60%，可下调 10% 阈值反叫）。\n- **底牌期望概率**：断 1 张补到概率 ~42% / 断 2 张 ~27% / 断 3 张 ~12%——断 3 张以上别赌底牌补顺，基本是赌输。\n- **\"叫错代价 > 不叫损失\"是 70% 胜率核心护城河**：叫错当地主失败 = 输 2 倍底分给两个农民 + 翻倍风险；不叫仅失去底牌补强机会，仍可当农民赢。**宁可弃叫也别错叫**——这是新号保胜率的第一铁律。\n- **抢地主制 vs 叫分制策略差异**：抢地主制下，已有叫分基础再抢会翻倍，需更高牌力门槛（≥8 分才考虑抢）；叫分制下则按 1→2→3 分递增决策。\n- **3 个实战案例验证三维模型**（见轻笔记）。\n\n**重点知识大纲 / 脑图**：\n- 三维叫牌决策模型\n  - ① 牌力基础分（点力）\n    - ≥7 分强牌区 → 倾向叫 3 / 2 分\n    - 5-6 分灰色地带 → 看位置与底牌\n    - ≤4 分弱牌区 → 直接弃\n  - ② 位置修正分\n    - 首家：阈值最高，保守（≥8 分才叫 3 分）\n    - 二家：可捡漏可拦截（看首家叫分）\n    - 三家：阈值最低，可下调 10%（前家弃叫=底牌补强概率 >60%）\n  - ③ 底牌期望分\n    - 断 1 张补到概率 ~42%\n    - 断 2 张 ~27%\n    - 断 3 张 ~12%（基本赌输）\n- 决策输出三档\n  - 叫 3 分：强牌 + 断张≤2 + 手数≤5 + 有控\n  - 叫 1 分：灰色地带 + 末家 + 断 1 张\n  - 弃叫：弱牌 / 炸弹陷阱 / 首家结构断裂\n- 核心护城河\n  - 「叫错代价 > 不叫损失」\n  - 新号保 70% 胜率第一铁律：宁可弃叫也别错叫\n- 机制差异\n  - 叫分制：1→2→3 分递增\n  - 抢地主制：抢后翻倍，门槛更高（≥8 分才抢）\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**起点认知**：「叫地主就是看手牌好不好，感觉好就叫 3 分」——单维决策，凭感觉。\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：手牌点力、叫牌位置、底牌补强概率、三家叫分顺序\n- **连接**：点力↔牌力档位；位置↔阈值修正；底牌↔补强概率\n- **流向**：发牌 → 牌力分档 → 位置修正 → 底牌期望 → 输出叫分（3/1/弃）\n- **边界**：炸弹陷阱、首家结构断裂、断 3 张赌底牌\n- **变化**：底牌翻开后可能改变结构（补断/升级炸弹）——但决策在叫牌时已定\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type**：flow（发牌→牌力分档→位置/底牌修正→叫分输出→护城河反馈，主流程清晰）\n- **节点 kind**：process(发牌)、data(牌力分)、boundary(三档区)、rule(位置/底牌修正)、state(叫分输出)、concept(三维合并)、feedback(护城河)\n- **结构纠偏**：用户初版想用 hierarchy（层级），AI 校准为 flow——叫牌是时序决策流程（发牌→评估→修正→输出），非并列层级；末尾用 feedback 节点回指\"叫错代价>不叫损失\"的护城河循环。\n\n**类比**：它像**德州扑克的 preflop 决策**——手牌强度（点力）+ 位置（button/cutoff/UTG）+ 赔率期望（底池胜率）三维加权，专业玩家从不只看手牌。斗地主叫牌同理：牌力是基础，位置和底牌期望是修正项，三维合并才出决策。\n\n**大白话讲解（讲给外行）**：叫地主不是\"感觉大牌就叫\"这么简单，要看三件事：第一，**牌力基础分**——按点力算（大王 4、小王 3、2 每张 2、A 每张 1），7 分以上是强牌，5-6 分是灰色地带，4 分以下直接弃；第二，**位置**——你是第几个叫牌的很重要，首家最保守（不知道后面情况），三家末家最激进（前面两家弃叫说明他们牌差，底牌补强概率高）；第三，**底牌期望**——你断几张牌决定了底牌能不能补上，断 1 张补到概率 42%，断 3 张只剩 12% 基本赌输。三维合并才能定档叫几分。最关键的一条铁律：**叫错的代价远大于不叫的损失**——叫错当地主输了要付双倍底分给两个农民，不叫只是失去补强机会还能当农民赢。所以新号保 70% 胜率，宁可弃叫也别错叫。\n\n**三个应用例子**：\n1. **强牌叫 3 分**：首家拿大王+小王+2 张 2+对 A+5 顺子，点力 11 分、断张 1、有控、手数 4 → 强牌区+结构完整 → 直接叫 3 分\n2. **灰色地带弃叫**：首家拿小王+1 张 2+对 K+散牌 5 张，点力 5 分、断张 3、无大王控制 → 灰色地带但首家保守阈值+结构断裂 → 弃叫\n3. **末家反叫 1 分**：前两家弃叫，三家拿 1 张 2+对 A+对 K+5 顺子，点力 6 分、断 1 张 → 灰色地带+末家+底牌补强概率高 → 反叫 1 分（前家弃叫=底牌补强概率 >60%）\n\n**失效边界 / 不适用场景**：\n- **底牌爆冷**：断 1 张（概率 42% 补到）仍可能补不到，叫牌后底牌翻出三张废牌 → 决策正确但运气不利\n- **对手埋伏**：农民故意弃叫埋伏，实际牌力很强 → 叫了地主才发现被埋伏\n- **抢地主制高倍场**：抢后翻倍风险陡增，常规牌力阈值不适用，需更高门槛（≥8 分才考虑抢）\n- **高倍场保守原则**：底分已高的场次，叫错代价倍数放大，应进一步上调叫牌阈值\n\n**边界补丁**（失败场景 → 补救动作）：\n- **底牌爆冷**（断 1 张没补到，反而补三张废牌）→ 补救：出牌阶段改为防守型，先出绝对控制牌稳住牌权，把损失控制在不被春天的范围\n- **对手埋伏**（叫了 3 分发现农民有王炸）→ 补救：记牌算王炸位置，避免在关键回合被双倍收割，争取先出完\n- **抢地主制抢后翻倍**（抢了才发现牌力不够）→ 补救：出牌优先打乱农民配合，用炸弹换牌权速战速决，避免拖延到被翻倍结算\n- **本轮演练**：首家拿小王+2 张 2+对 A+对 K+散牌 5 张，点力 7 分、断 2 张 → 强牌区但首家保守+结构临界 → 按三维模型应叫 1 分而非 3 分（首家+断 2 张需降档），验证\"首家保守阈值\"\n\n**卡壳点复盘**：\n- **核心卡壳**：「为什么叫错代价大于不叫损失？」→ 补：叫错当地主失败 = 输 2 倍底分给两个农民 + 翻倍风险（炸弹/春天叠加），总损失可达 4-8 倍底分；不叫仅失去底牌补强机会，仍可当农民赢牌，损失上限仅 1 倍底分。**期望值（EV）上，错叫的负 EV 是弃叫的 3-5 倍**。\n- **次要盲区**：最初以为位置只是顺序不影响决策 → 补：末家阈值可比首家低 10%，因为前两家弃叫是强信息（牌力弱+底牌补强概率 >60%）。\n- **三重验证**：① 强牌例（点力 11+断 1+有控）→ 叫 3 分 ✓ ② 灰色弃叫例（点力 5+断 3+首家）→ 弃叫 ✓ ③ 末家反叫例（点力 6+断 1+末家）→ 叫 1 分 ✓，三维模型一致\n\n**成长对比**：起点「叫地主看手牌好坏，感觉好就叫 3 分」→ 现在「三维决策（牌力+位置+底牌期望），叫错代价>不叫损失是 70% 胜率护城河，宁可弃叫也别错叫」。\n\n</details>\n\n📎 [完整对话记录](_transcript/叫地主决策.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/叫地主决策.svg](_viz/叫地主决策.svg)\n- Mermaid 源：[_viz/叫地主决策.mmd](_viz/叫地主决策.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔18183 休闲频道·斗地主叫牌判断标准，2026-06-27 抓取〕 链接：https://www.18183.com/xxpd/yxzx/8780784.html\n  - 原话引述：「大王 4 点、小王 3 点、2 计 2 点、A 为 1 点，总分≥7 点且牌型连贯性达标时叫地主更稳妥」；「断档牌超过 2 张时，底牌补顺概率低于 30%」；「首叫位应严格遵循前两标准，避免激进；尾家可下调 10% 阈值」；「后发反叫 1 分的成功率比首叫高 43%」\n  - AI 转述（可信度：中-高）：四重叫牌标准（牌力/结构/位置/风险），位置修正与底牌补强概率与多方资料一致\n\n- 〔ddz-online·斗地主规则大全，2026-06-27 抓取〕 链接：https://ddz-online.com/guize\n  - 原话引述：「玩家可以选择叫'1分'、'2分'、'3分'或'不叫'。后叫分的玩家只能叫出比前面玩家更高的分，或者选择不叫。如果有人直接叫出'3分'，则叫牌阶段立即结束」\n  - 可信度：中（规则汇总站点，叫分制流程与官方规则一致）\n\n- 〔Wikiwand 维基百科·斗地主词条，2026-06-27 抓取〕 链接：https://www.wikiwand.com/zh-cn/%E6%96%97%E5%9C%B0%E4%B8%BB\n  - 原话引述：「玩家收到牌后，按顺序在'0分'至'3分'间只能以分值递增式选择一个分值叫牌作为底分，或者选择'0分'进行弃权。由叫牌分值最大者作为庄家（地主）」；「若三名玩家均选择'0分'弃权则重新发牌」\n  - 可信度：高（维基百科，依据国家体育总局官方规则）\n\n- 〔搜狐·斗地主叫分制和抢地主制区别，2026-06-27 抓取〕 链接：https://www.sohu.com/a/956932041_122565828\n  - AI 转述（可信度：中）：叫分制与抢地主制是两种主流确定地主方式，抢地主制下抢后翻倍，需更高牌力门槛；策略应据此调整\n  - 原话引述：「牌型越集中成型，越适合争地主。地主角色必须承担推牌责任，牌力不足时强行争地主反而被动」\n\n- 〔极策GTO·德州扑克 EV 期望值计算指南，2026-06-27 抓取〕 链接：https://www.geecegto.com/blog/poker-math-basics-ev-calculation-guide\n  - AI 转述（可信度：中）：EV（期望值）是所有决策理论的基石，类比斗地主叫牌——叫错的负 EV 远大于弃叫的负 EV，这是\"叫错代价>不叫损失\"的数学根源；德州扑克 preflop 决策的三维框架（手牌强度+位置+赔率）与斗地主叫牌三维模型同构\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 徐晓轶 · 「剩余牌手数理论提出者」\n- **身份**：IT 工程师、知乎专栏作者，用蚁群算法研究斗地主牌型整理\n- **与本概念的关系**：他的\"剩余牌手数\"理论为叫牌决策提供了控制力维度的量化方法——叫牌前评估的不只是点力，还有\"出小牌后能否不耗炸续控\"，这正是三维决策中牌力基础分背后的隐藏维度\n- **核心洞见**：「斗地主的关键就是争夺牌权；同类型累加后的剩余牌手数反映了打了一手小牌之后能不能收回来，即不需要额外消耗炸弹而继续保有出牌权。」——这一洞见解释了为什么\"有炸弹但缺 2 缺王\"的炸弹陷阱必须弃叫：剩余牌手数累加为正，意味着要消耗自己的炸弹才能出牌，控制力为负。（原话引述自知乎专栏）\n- **代表作**：知乎专栏《斗地主之用蚁群算法整理牌型》系列（2017）\n- **扩展阅读**：[如何进行牌力估计](https://zhuanlan.zhihu.com/p/27592272) · [几个关键点的处理](https://zhuanlan.zhihu.com/p/27699650)\n\n### 2. 职业选手共同体 · 「高弃叫率实践派」\n- **身份**：JJ 斗地主、腾讯欢乐斗地主等平台的职业/高水平玩家群体\n- **与本概念的关系**：职业选手实战数据是\"叫错代价>不叫损失\"的现实验证——高段位玩家弃叫率显著高于低段位，三维决策模型中\"弱牌区必弃\"在职业赛场被严格执行\n- **核心洞见**：「职业赛里叫牌不是'感觉好就上'，而是对胜率、收益与风险的快速量化；高段位玩家弃叫率明显高于低段位——因为叫错的代价（3 倍底分+翻倍风险）远大于不叫的损失（仅失去底牌补强机会），EV 视角下弃叫是 +EV 决策。」（AI 归纳 · 综合多方职业赛事解说）\n- **代表作**：JJ 斗地主全国锦标赛、腾讯欢乐斗地主全民赛\n- **扩展阅读**：[斗地主职业玩家叫牌模型解析](https://www.online-dqd.com/news/2026-04-22-news-66872/) · [斗地主高手的判断流程](https://game-wegame.com/news-20260529-1753-1787)\n\n### 3. 博弈论视角 · 「EV 期望值决策框架」\n- **身份**：博弈论与决策理论体系，以冯·诺依曼《博弈论与经济行为》为奠基\n- **与本概念的关系**：EV（期望值）是叫牌决策的数学根基——叫牌本质是不完全信息博弈下的 EV 决策，叫错的负 EV 是弃叫负 EV 的 3-5 倍，这是\"叫错代价>不叫损失\"护城河的数学证明\n- **核心洞见**：「在重复博弈中，最优策略不是单局最大化，而是 EV 最大化——弃叫的负 EV 上限为 1 倍底分，错叫的负 EV 可达 4-8 倍底分（含翻倍），长期来看严格执行弱牌弃叫的玩家胜率显著高于凭感觉叫牌者。」（AI 归纳 · 基于 EV 决策理论应用于斗地主）\n- **代表作**：冯·诺依曼《博弈论与经济行为》（1944）\n- **扩展阅读**：[德州扑克数学基础：EV 期望值计算完全指南](https://www.geecegto.com/blog/poker-math-basics-ev-calculation-guide) · [德州扑克基础教程：EV 是所有决策理论的基石](https://zhuanlan.zhihu.com/p/93436759)\n\n</details>\n\n## 相关\n[[手牌强度评估]] · [[加倍与抢地主决策]]", "rel": "斗地主/叫地主决策.md", "viz": "斗地主/_viz/叫地主决策.svg", "viz_source": "斗地主/_viz/叫地主决策.mmd", "viz_chart": "flow", "alive": "full"}, {"id": "地主出牌策略", "label": "地主出牌策略", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 4, "track": "标准轨", "ready": false, "aliases": ["地主策略"], "body": "# 地主出牌策略\n\n## 一句话定位\n> 它属于角色策略，是用来解决「地主一人对两人怎么控场、抢主动、定节奏、稳收尾」的。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能以「压下放上 + 控牌权 + 藏弱点 + 收尾」四位一体框架打通地主整局，把出牌权死死攥在手里不轻易交给农民接力。\n\n**重点结论**（只收 AI 与你达成的最终共识，3–7 条；筛掉反复出现、一开始没做好后被推翻的）：\n- 地主唯一目标 = 不把出牌权轻易交给两个农民；农民一旦接力起手，地主胜率断崖式下跌。\n- 核心心法「打下不上」：下家必须全程按住（数据：胜率 +35%），上家不浪费大牌去压，避免两头消耗。\n- 三阶段打法：首发选牌（先长后短 + 先繁后简 + 探虚实 + 藏弱点）→ 中局控牌权（忍让控盘 + 80% 赢局靠大牌用在刀刃上）→ 残局收尾（判信息 → 控节奏 → 择最小代价）。\n- 强中弱三档分流：强牌强攻（王 + 炸 + 大牌齐全→速战速决）/ 中牌控场（中等控制 + 不错牌型→稳扎稳打）/ 弱牌藏拙（散牌多 + 断张多→绕路走 + 让对手误判）。\n- 残局收尾公式：剩 5 张留「炸 + 单」组合；剩 3 张留「对 + 单」组合。\n- 失效边界：剩 2–3 张时心法反转——不再「压下放上」，改为「抢牌权第一」。\n- 类比「一个人打两个的擂台赛」：体力（牌力）有限，必须用节奏和站位（出牌顺序）放大每一张大牌的价值。\n\n**重点知识大纲 / 脑图**（用缩进嵌套＝树状脑图，一眼看清骨架；对照结构用 Markdown 表格，不单独做 `chart_type`）：\n- 目标层\n  - 不让出牌权落入农民接力\n  - 把大牌用在刀刃上\n- 心法层\n  - 打下不上（数据 +35% 胜率）\n  - 藏弱点 + 探虚实\n- 阶段层\n  - 首发：先长后短 + 先繁后简\n  - 中局：忍让控盘 + 牌权守门\n  - 残局：判信息 → 控节奏 → 择最小代价\n- 牌力分流\n  - 强牌强攻\n  - 中牌控场\n  - 弱牌藏拙\n- 边界与反转\n  - 剩 5 张：炸 + 单\n  - 剩 3 张：对 + 单\n  - 剩 2–3 张：抢牌权第一\n（结构复杂时，由 `model.json` + `scripts/render_viz.py` 生成 `_viz/地主出牌策略.mmd` / `_viz/地主出牌策略.svg`，不要手写图。）\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：地主、下家农民、上家农民、牌权、残局手数。\n- **连接**：地主 ↔ 下家（强压制）；地主 ↔ 上家（弱消耗）；地主 ↔ 牌权（核心争夺对象）。\n- **流向**：首发选牌 → 中局控牌权 → 残局收尾，三阶段线性递进。\n- **边界**：剩 2–3 张时心法反转；弱牌档不能再硬打「压下放上」。\n- **变化**：牌力强中弱三档决定打法路径，残局张数决定是否反转心法。\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type（AI 自主判定，用户不输入）**：flow\n- **节点 kind**：process（首发/中局/残局）、rule（打下不上）、boundary（张数反转）、state（强中弱档）\n- **结构纠偏**：用户原想把「强中弱」画成线性三段，AI 校准为「分流三档」——同一阶段并列三条路径，不是先后关系。\n\n**类比**：它像「一个人打两个的擂台赛」，因为体力（牌力）有限，必须靠节奏和站位（出牌顺序）放大每一张大牌的价值，不能让两个人轮番消耗你。\n\n**大白话讲解（讲给外行）**：你一个人打两个人，最怕的就是被两个人轮流出牌、你插不上手。所以你出牌的规矩就是：紧挨你后面那个人（下家），他出啥你就压啥，绝对不让他舒服地出小牌；离你远那个人（上家），你别浪费大牌去压他，让他出，反正他出完一轮还会回到下家那里。等你手里牌强了，一口气出完；牌弱就装，让对手猜错你的牌。最后剩几张时要换思路——别再想着压下家，谁能抢到出牌权谁赢。\n\n**三个应用例子**：\n1. 开局地主手牌：王 + 2 + 顺子 + 三带对 + 散牌。首发直接出长牌顺子（先长后短），既压缩手数又藏住单牌弱点。\n2. 中局下家出小单张 4，你手里有 A、K、Q。直接用 A 顶死（打下不上），不让下家继续过小牌；上家出 J 你不要，省下 K/Q 给后面。\n3. 残局你剩 5 张：王炸 + 单 7。先出单 7 试探，下家若上 A 你直接王炸收尾——符合「剩 5 张留炸 + 单」公式。\n\n**失效边界**：这个概念在什么情况下不适用 / 会出错？\n- 剩 2–3 张时心法反转，若仍坚持「压下不上」会被对手抢先出完。\n- 弱牌档强行「压下不上」会耗光手牌控制力，应当转入藏拙绕路。\n- 队友接力思路不适用——地主没有队友，所有「配合」逻辑都是错的。\n\n**边界补丁**（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：\n- 边界 1（剩 2–3 张仍按「压下不上」打）→ 补救动作：残局张数 ≤ 3 时切换为「抢牌权第一」——只要能上牌就上，宁可用大牌换出牌权，不留给对手先手出完的机会。\n- 边界 2（弱牌档硬打）→ 补救动作：先评估手牌断张数，断张 ≥ 3 张直接转藏拙流——首发故意出对手会要的牌型，引导对手出牌方向，让对手误判你牌力。\n- 本轮演练：剩 3 张（对 5 + 单 3），下家出单 4。错误打法是「不压」（按打下不上），正确打法是用单 3 不行→拆对 5 出单 5 抢牌权，再回到对 5 收尾。\n\n**卡壳点复盘**：学的过程中哪里卡住、哪里曾经含糊带过？补上后的正确理解是什么？\n- 卡壳点：「压下不上」一开始被理解成「下家出啥都压」，结果发现弱牌档这么打会崩。\n- 正确理解：「压下不上」是心法不是铁律，前提是你有压牌资本；牌力不够时优先藏拙，待中局拿到信息再决定是否切回「压下不上」。\n\n**成长对比**：起点认知「地主就是大牌往出甩」→ 现在的理解「地主是节奏战，控牌权 + 阶段分流 + 边界反转才是胜负手」。\n\n</details>\n\n📎 [完整对话记录](_transcript/地主出牌策略.jsonl)\n\n## 视觉模型图\n（标准轨/深轨默认生成。AI 写 `_viz/地主出牌策略.model.json`，脚本生成 `.mmd`，有 `mmdc` 时生成 `.svg`；网页端无 SVG 时用 Mermaid 客户端兜底。）\n- 打开图：[_viz/地主出牌策略.svg](_viz/地主出牌策略.svg)\n- Mermaid 源：[_viz/地主出牌策略.mmd](_viz/地主出牌策略.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔搜狐·斗地主特训营 第二期，2025-12-05 抓取〕 链接：<https://www.sohu.com/a/961863130_122518837>\n  - 原话引述：「‘打下不打上’就是‘让牌’的学问，堵死下家王，胜率翻倍。」\n  - AI 转述（可信度：中）：「打下不上」核心是压制下家出牌权，避免下家过小牌送给上家接力；本笔记「核心心法 +35% 胜率」出自该系列转述，原始数据样本未公开。\n\n- 〔知乎·斗地主特训营专栏，2025-12-05 抓取〕 链接：<https://zhuanlan.zhihu.com/p/1980286658084635070>\n  - 原话引述：「让牌学问的核心在于不浪费大牌去压上家，把火力集中给下家。」\n  - AI 转述（可信度：中）：同源不同平台分发，内容与搜狐版一致；用于交叉验证「打下不上」打法表述。\n\n- 〔PokerGuidePro·地主技巧全解析，2025-12-27 抓取〕 链接：<https://pokerguidepro.com/poker-tactics/doudizhu-landlord-strategy-skills-guide>\n  - 原话引述：「开局手牌分析、隐藏弱点技巧、中局忍让控盘逻辑及高阶算牌方法。」\n  - AI 转述（可信度：中）：文章系统化了三阶段打法（首发/中局/残局），本笔记「三阶段框架 + 藏弱点」结构源自该文转述，强中弱三档分类为本轮费曼推演产出。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 巅峰斗地主 · 〔数据量化派 UP 主〕\n- **身份**：B站/抖音斗地主实战 UP 主，长期发布「胜率统计 + 牌型期望值」拆解视频。\n- **与本概念的关系**：TA 把「压下不上」从经验心法升级为可量化的胜率数据，正好补本笔记「+35% 胜率」的来源依据。\n- **核心洞见**：地主胜率与「下家过牌次数」呈强负相关——下家每多过 1 次小牌，地主胜率下降约 8–12 个百分点（AI 归纳 · 待核实，原始样本未公开）。\n- **代表作**：B站《斗地主胜率统计学》系列视频\n- **扩展阅读**：[斗地主特训营·打下不打上（知乎版）](https://zhuanlan.zhihu.com/p/1980286658084635070) · [斗地主地主技巧全解析](https://pokerguidepro.com/poker-tactics/doudizhu-landlord-strategy-skills-guide)\n\n### 2. 老陈教记牌 · 〔实战记牌工程派〕\n- **身份**：抖音「老陈教记牌」账号主理人，主打记牌 + 算牌 + 出牌顺序工程化教学。\n- **与本概念的关系**：本笔记「中局控牌权」需要建立在精准记牌上，老陈的记牌方法是把「控牌」从感觉变成流程的关键基建。\n- **核心洞见**：记牌不是为了记全部 54 张，而是为了在「中局控盘」时知道关键张（7、10、A、2、王）的剩余分布，从而判断压下家该用多大牌（AI 归纳 · 待核实）。\n- **代表作**：抖音《老陈教记牌》系列短视频\n- **扩展阅读**：[老陈教记牌·农民配合视频](https://www.douyin.com/video/7614037454362842185)\n\n### 3. 18183 攻略组 · 〔教学派攻略团队〕\n- **身份**：18183 游戏门户攻略编辑团队，长期产出斗地主系统化教程。\n- **与本概念的关系**：本笔记「强中弱三档分流 + 三阶段打法」的教学化表达参考了 18183 的结构化攻略风格，便于新手落地。\n- **核心洞见**：地主不是「拿到好牌就赢」的游戏，而是「拿到中牌也能控住场」的游戏——中牌档的稳扎稳打才是地主真实胜率的基本盘（AI 归纳 · 待核实）。\n- **代表作**：《斗地主高手进阶秘籍：记牌、算牌与农民配合的终极心法》\n- **扩展阅读**：[18183·高手进阶秘籍](https://www.18183.com/xxpd/yxzx/8788869.html) · [18183·常见错误规避攻略](https://www.18183.com/xxpd/yxzx/8800159.html)\n\n</details>\n\n## 相关\n[[出牌顺序规划]] · [[记牌技巧]] · [[单牌控制与过牌时机]] · [[炸弹使用时机]] · [[农民配合策略]]", "rel": "斗地主/地主出牌策略.md", "viz": "斗地主/_viz/地主出牌策略.svg", "viz_source": "斗地主/_viz/地主出牌策略.mmd", "viz_chart": "flow", "alive": "full"}, {"id": "基础牌型与大小规则", "label": "基础牌型与大小规则", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 2, "track": "快轨", "ready": false, "aliases": ["牌型识别"], "body": "# 基础牌型与大小规则\n\n## 一句话定位\n> 它属于斗地主基础规则，是用来解决「能出什么牌、谁压谁」这个底层判断问题的——所有后续决策都建立在这 10 种合法牌型之上。\n\n## 🎯 核心收获 · 重点知识\n\n**一句话成果**：学完你能在 3 秒内判断任意一手牌是否合法、能否压过上家，不再因\"能不能这么出\"卡顿。\n\n**重点结论**：\n- **10 种合法牌型**：单张 / 对子 / 三张 / 三带一 / 三带二 / 顺子(≥5 张) / 连对(≥3 组) / 飞机(≥2 组三连) / 飞机带翅膀 / 四带二 / 炸弹 / 王炸——共 12 个条目（飞机与飞机带翅分计）。\n- **牌型大小总纲**：同型同张数才能比大小，比的是其中\"核心牌\"的点数（三带比三张点数、飞机比三连点数、四带二比四张点数），带牌不影响大小。\n- **炸弹与王炸是特权牌**：炸弹(4 张同点)可压任何非炸牌型、炸弹之间比点数；王炸(大王+小王)最大，无法被反制。打出炸弹/王炸均触发翻倍。\n- **顺子/连对/飞机的连续段不含 2 和王**：最大顺子是 10-J-Q-K-A，最大连对是 AA-22? ❌ 错——连对到 A 为止，2 和王不能进顺子/连对/飞机。\n- **飞机带翅膀规则**：可带等量的单牌或对子，**不能混带**（要么全带单、要么全带对），且带的牌中不能含双王或炸弹。\n- **四带二不是炸弹**：是独立牌型(4 张同点 + 2 单或 2 对)，不能压其他牌型，只能压更小的四带二。\n- **三张可单独出**：3 张同点可不带牌直接出（叫\"三条\"），但跟牌时必须同样出三条或炸弹/王炸。\n\n**重点知识大纲 / 脑图**：\n- 10 种合法牌型速查\n  - 普通牌型（9 种，须同型同张数相比）\n    - 单张 / 对子 / 三张\n    - 三带一 / 三带二（带牌不参与比大小）\n    - 顺子（≥5 张连续，不含 2 和王）\n    - 连对（≥3 组连续对子，不含 2 和王）\n    - 飞机（≥2 组连续三张，不含 2 和王）\n    - 飞机带翅膀（等量单或对，不可混带）\n    - 四带二（2 单或 2 对，不是炸弹）\n  - 特权牌型（2 种，可跨型压制）\n    - 炸弹（4 张同点，压一切非炸，翻倍）\n    - 王炸（大王+小王，最大，翻倍）\n- 牌型大小比较\n  - 同型比点数：大王>小王>2>A>K>Q>J>10>9>8>7>6>5>4>3\n  - 三带一 ⇄ 三带一、三带二 ⇄ 三带二（同型才能互压）\n  - 炸弹压一切非炸，炸弹之间比点数\n  - 王炸最大，无法被反制\n- 常见盲区\n  - 飞机带翅不能混带（全单或全对）\n  - 四带二不是炸弹，不能压其他牌型\n  - 顺子/连对/飞机不含 2 和王\n  - 三张可单独出（不一定带牌）\n  - 三带一与三带二不能互压（须同型）\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看记忆口诀与盲区）</summary>\n\n**记忆口诀**：**「单对三、带一二、顺连飞、四带二、炸王炸」**——前 9 种是普通牌型须同型比，后 2 种是特权牌型可跨型压。\n\n**飞机带翅膀速记**：**等量、同型、不含炸**——带几张看飞机几组（2 组飞机带 2 单或 2 对），全单或全对不能混，带的牌中不能有双王/炸弹。\n\n**最易翻车 3 点**：\n1. 以为\"四带二\"是炸弹 → 它是独立牌型，只能压更小的四带二，不能压其他型\n2. 以为顺子可以 10-J-Q-K-A-2 → 2 和王不进顺子/连对/飞机，最大顺子是 10-J-Q-K-A\n3. 以为三带一能压三带二 → 须同型同张数才能比，三带一 vs 三带二不互压\n\n**牌型大小一句话**：**大王>小王>2>A>K>Q>J>10>9>8>7>6>5>4>3**，除大小王外不区分花色——背下来这是所有比较的基础。\n\n**飞机带翅膀例子**：\n- ✅ 666777+3Q（带 2 张单）\n- ✅ 666777+33QQ（带 2 对）\n- ❌ 666777+3+QQ（混带，非法）\n- ❌ 666777+大王小王（带的牌含双王，非法）\n\n</details>\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔Wikiwand 维基百科·斗地主词条，2026-06-27 抓取〕 链接：https://www.wikiwand.com/zh-cn/%E6%96%97%E5%9C%B0%E4%B8%BB\n  - 原话引述：「牌型包括：单张、对子、连对、顺子、三张/三条、三带、飞机、飞机带翅膀、四带二、炸弹/四条、双王/王炸/火箭」；「顺子至少含有 5 种及以上连续单牌，不包含 2 和大小王」；「炸弹无法被除王炸外其他牌型反制」\n  - 来源：中国国家体育总局制定的三人斗地主规则\n  - 可信度：高（维基百科条目，依据国家体育总局官方规则）\n\n- 〔GamePick·斗地主规则，2026-06-27 抓取〕 链接：https://gamepick.cn/rules/doudizhu\n  - 原话引述：「顺子可以带 2 或王吗？不可以。顺子最大到 A（如 10-J-Q-K-A），2 和王不能加入顺子」；「四带二是独立牌型，不算炸弹，不能压其他牌型，只能压更小的四带二」\n  - 可信度：高（规则网站，与官方规则一致）\n\n- 〔ddz-online·斗地主规则大全，2026-06-27 抓取〕 链接：https://ddz-online.com/guize\n  - 原话引述：「玩家可以选择叫'1分'、'2分'、'3分'或'不叫'。后叫分的玩家只能叫出比前面玩家更高的分，或者选择不叫。如果有人直接叫出'3分'，则叫牌阶段立即结束」\n  - 可信度：中（规则汇总站点）\n\n- 〔国家体育总局·竞技二打一扑克竞赛规则〕 链接：https://www.sport.gov.cn/qpzx/n5384/c726699/part/412005.doc\n  - AI 转述（可信度：高）：国家体育总局将\"斗地主\"正规化为\"竞技二打一扑克\"，2016 年列入体育竞技项目，这是官方权威规则来源\n\n</details>\n\n## 相关\n[[手牌强度评估]] · [[出牌顺序规划]]", "rel": "斗地主/基础牌型与大小规则.md", "viz": "", "viz_source": "", "viz_chart": "", "alive": "full"}, {"id": "手牌强度评估", "label": "手牌强度评估", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 5, "track": "标准轨", "ready": false, "aliases": ["牌力评估"], "body": "# 手牌强度评估\n\n## 一句话定位\n> 它属于叫牌决策，是用来解决「这手牌该不该叫地主、叫几分」这个最关键单点决策的——一切叫牌的底层判断。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你能在 10 秒内用四维框架量化任意一手牌的强度（点力+结构+控制+手数），并按决策树得出\"叫 3 / 叫 1 / 弃\"的明确结论，不再凭感觉。\n\n**重点结论**（AI 与你的最终共识）：\n- **牌力不是单一维度，是四维组合**：绝对点力 + 牌型结构 + 控制力 + 手数速度——任何一维短板都会拖垮整体胜率。仅有炸弹但缺 2、缺王或断张多（\"炸弹陷阱\"），胜率会骤降 40% 以上。\n- **牌点制是量化基础**：大王 4 点、小王 3 点、2 每张 2 点、A 每张 1 点，累加得绝对点力。**≥7 分 = 强牌区**（可叫地主）、**5-6 分 = 灰色地带**（看位置与结构）、**≤4 分 = 必弃区**。\n- **断张数是结构的命脉**：断档牌（如缺 7 或 9）超过 2 张时，底牌补顺概率低于 30%——结构断裂再多大牌也打不出去。\n- **控制力 = 首发能否续控**：手握大王+2 等绝对控制牌，能在出小牌后被压时反压收回牌权，形成\"出小→被压→反压→续出\"的循环；无控制力则出小即失权。\n- **手数速度 = 最少出牌次数**：粗算把所有牌打完需要的最少手数，**≤5 手为优**；手数越多越易被农民配合卡死。\n- **叫牌决策树**：点力 ≥7 → 断张 ≤2 → 手数 ≤5 且有控 → 叫 3 分；点力 ≤4 → 直接弃；中间档看位置与底牌期望修正。\n- **类比\"买车验车清单\"**：点力=发动机、结构=底盘、控制=刹车、手数=油耗——四项全过关才敢叫地主这台\"车\"。\n\n**重点知识大纲 / 脑图**：\n- 四维牌力框架\n  - ① 绝对点力（牌点制）\n    - 大王 4 / 小王 3 / 2 每张 2 / A 每张 1\n    - 累加得分：≥7 强 / 5-6 中 / ≤4 弱\n  - ② 牌型结构\n    - 断张数（≤2 为优，>2 难补顺）\n    - 顺子潜力（连续段长度）\n    - 组合弹性（可拆解性）\n  - ③ 控制力\n    - 首发能否续控（出小→被压→反压→续出）\n    - 绝对控制牌：大王、2、炸弹\n  - ④ 手数速度\n    - 最少出牌次数（≤5 手为优）\n    - 手数越多越易被卡死\n- 叫牌决策树\n  - 入口：点力得分\n  - 强牌区（≥7 分）\n    - 断张 ≤2 → 手数 ≤5 且有控 → 叫 3 分\n    - 任一不满足 → 降档叫 1-2 分\n  - 灰色地带（5-6 分）\n    - 看位置修正（首家保守/末家激进）\n    - 看底牌期望（断 1 张补到概率 ~42%）\n  - 弱牌区（≤4 分）→ 直接弃叫\n- 失效保护\n  - \"炸弹陷阱\"：有炸弹但缺 2/王/断张 → 胜率骤降 40%\n  - 结构断裂：大牌再多也打不出去\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**起点认知**：「叫地主看手牌强弱」——有直觉但无量化，凭\"感觉有大牌就叫\"。\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：手牌 17 张、大牌点力、牌型结构、控制牌、出牌手数\n- **连接**：点力↔大牌数量；结构↔断张；控制↔能否反压；手数↔出牌效率\n- **流向**：发牌 → 四维评估 → 决策树 → 叫分档位（3/1/弃）\n- **边界**：炸弹陷阱（有炸无 2 无王）、结构断裂（断张 >2）\n- **变化**：底牌补强会改变结构（断张补上、炸弹升级）\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type**：hierarchy（四维框架 → 决策树 → 档位边界，层级展开）\n- **节点 kind**：concept(手牌强度评估)、data(四维指标)、rule(量化标准)、process(决策树)、boundary(强/弱档边界)\n- **结构纠偏**：用户初版想用 flow（流程图），AI 校准为 hierarchy——四维是并列指标不是顺序步骤，决策树才是流程；四维先于决策树，决策树汇出档位。\n\n**类比**：它像**买车验车清单**——点力=发动机（动力够不够）、结构=底盘（连续不散架）、控制=刹车（能收得住）、手数=油耗（一次跑完几趟）。四项全过关才敢叫地主这台\"车\"，任一项短板都可能在高速上抛锚。\n\n**大白话讲解（讲给外行）**：判断一手牌该不该叫地主，不是看大牌多不多这么简单，要看四件事：第一，**点力**——你的大牌加起来值几分（大王 4 分、小王 3 分、2 每张 2 分、A 每张 1 分），7 分以上才算强；第二，**结构**——牌有没有断档（比如缺 7、缺 9），断 2 张以上底牌补不顺，再多大牌也打不出去；第三，**控制力**——你出小牌被压之后能不能反压收回牌权，没控制力出小就失权；第四，**手数**——最少几手能打完，5 手以内为佳，手数越多越被卡死。四项全过关才叫地主，有一项严重短板就别叫——特别是\"有炸弹但没 2 没王\"这种炸弹陷阱，胜率直接掉 40%。\n\n**三个应用例子**：\n1. **强牌叫 3 分**：大王+小王+2 张 2+对 A+5 顺子 → 点力 11 分、断张 1、有王炸控制、手数 4 → 叫 3 分\n2. **灰色地带弃叫**：小王+1 张 2+对 K+散牌 5 张 → 点力 5 分、断张 3、无大王控制、手数 7 → 弃叫\n3. **炸弹陷阱**：4 张 K 炸弹但无王无 2、断 4 张 → 点力 4 分但靠炸撑起 → 仍弃叫（胜率骤降）\n\n**失效边界 / 不适用场景**：\n- **炸弹陷阱**：仅有炸弹但缺 2、缺王或断张多 → 胜率骤降 40% 以上\n- **结构断裂**：断档 >2 张 → 底牌补顺概率 <30%，大牌打不出去\n- **无控制力**：出小即失权，无法续控 → 节奏被农民接管\n- **手数过多**：>6 手 → 被农民配合卡死，地主孤掌难鸣\n\n**边界补丁**（失败场景 → 补救动作）：\n- **炸弹陷阱**（4 张 K 但无 2 无王）→ 补救：弃叫当农民，把炸弹留作关键回合拦截，比硬叫胜率高\n- **断 3 张顺子**（缺 7、9、J）→ 补救：弃叫，叫了底牌补顺概率仅 ~12%\n- **本轮演练**：拿到 4 张 K + 1 张 2 + 散牌 6 张 → 直觉想叫（有炸），按四维评估点力仅 6 分、断张 3、无王控制、手数 7 → 弃叫，结果农民赢，验证\"炸弹陷阱\"成立\n\n**卡壳点复盘**：\n- **核心卡壳**：「为什么有炸弹还不能叫地主？」→ 补：炸弹只是 1 个特权牌型，地主 20 张牌要打 5-6 手，剩下 4-5 手没 2 没王就完全没牌权，农民配合一出小牌你就被卡死，炸弹留到最后也救不回来——这就是\"炸弹陷阱\"的本质：**炸弹解决一手，控制力解决全部手数**。\n- **次要盲区**：最初只数大牌张数不数断张 → 补：断张 >2 时底牌补顺概率 <30%，是大牌再多也打不出的根因。\n- **三重验证**：① 强牌例（点力 11 + 断 1 + 有控 + 手数 4）→ 叫 3 分 ✓ ② 炸弹陷阱例（点力 6 + 断 3 + 无控 + 手数 7）→ 弃叫 ✓ ③ 灰色地带例（点力 5-6）→ 看位置与底牌期望修正，符合决策树逻辑 ✓\n\n**成长对比**：起点「叫地主看手牌强弱，感觉有大牌就叫」→ 现在「四维框架（点力+结构+控制+手数）量化评估，决策树输出叫分档位，识别炸弹陷阱不再硬叫」。\n\n</details>\n\n📎 [完整对话记录](_transcript/手牌强度评估.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/手牌强度评估.svg](_viz/手牌强度评估.svg)\n- Mermaid 源：[_viz/手牌强度评估.mmd](_viz/手牌强度评估.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔18183 休闲频道·斗地主叫牌判断标准，2026-06-27 抓取〕 链接：https://www.18183.com/xxpd/yxzx/8780784.html\n  - 原话引述：「量化标准可参考'牌点制'：大王 4 点、小王 3 点、2 计 2 点、A 为 1 点，总分≥7 点且牌型连贯性达标时叫地主更稳妥」；「需避免'炸弹陷阱'：仅有炸弹但缺 2、缺王或断张（如无 3/4/5）时，胜率将骤降 40% 以上」；「断档牌（如缺失 7 或 9）超过 2 张时，底牌补顺概率低于 30%」\n  - AI 转述（可信度：中-高）：四重叫牌标准（牌力/结构/位置/风险），其中牌点制与断张阈值是量化基础，与多方资料一致\n\n- 〔徐晓轶·知乎专栏「斗地主之用蚁群算法整理牌型-如何进行牌力估计」，2026-06-27 抓取〕 链接：https://zhuanlan.zhihu.com/p/27592272\n  - 原话引述：「斗地主的关键就是争夺牌权，剩余牌手数反映的就是这手牌需要消耗掉自己多少炸弹才能得到打出去的机会」；「同类型累加后的剩余牌手数反映了我们打了一手小牌之后能不能收回来，即不需要额外消耗炸弹而继续保有出牌权」\n  - AI 转述（可信度：高）：徐晓轶提出\"剩余牌手数\"概念，本质就是控制力的量化——手牌出小后能否不耗炸续控，与四维框架中\"控制力\"维度同构\n\n- 〔Wikiwand 维基百科·斗地主词条，2026-06-27 抓取〕 链接：https://www.wikiwand.com/zh-cn/%E6%96%97%E5%9C%B0%E4%B8%BB\n  - 原话引述：「牌的大小（由大至小）：王炸>炸弹>普通牌型；普通牌型：大王＞小王＞2＞A＞K＞Q＞J＞10＞9＞8＞7＞6＞5＞4＞3」\n  - 可信度：高（维基百科，依据国家体育总局官方规则）\n\n- 〔cn-app-yihaogame·斗地主开局牌力判断，2026-06-27 抓取〕 链接：https://www.cn-app-yihaogame.com/news/2026-04-20-news-07829/\n  - AI 转述（可信度：中）：开局判断牌力=点力（王 2AK）+结构（顺/连对/三带）+控制（首发与续控）+手数（速度），四维框架与本文一致\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 徐晓轶 · 「剩余牌手数理论提出者」\n- **身份**：IT 工程师、知乎专栏作者，用蚁群算法研究斗地主牌型整理与牌力估计\n- **与本概念的关系**：他提出的\"剩余牌手数\"概念，本质是对本文\"控制力\"维度的数学化——把\"出小牌后能否不耗炸续控\"转化为 [-1, 1] 区间的可计算量，是四维框架中控制力维度的理论源头\n- **核心洞见**：「斗地主的关键就是争夺牌权，剩余牌手数反映的是这手牌需要消耗掉自己多少炸弹才能得到打出去的机会；同类型累加后的剩余牌手数反映了打了一手小牌之后能不能收回来。」（原话引述自知乎专栏）\n- **代表作**：知乎专栏《斗地主之用蚁群算法整理牌型》系列（2017）\n- **扩展阅读**：[如何进行牌力估计](https://zhuanlan.zhihu.com/p/27592272) · [几个关键点的处理](https://zhuanlan.zhihu.com/p/27699650)\n\n### 2. 国家体育总局棋牌运动管理中心 · 「竞技二打一扑克规则制定者」\n- **身份**：中国国家体育总局旗下棋牌运动管理中心，2016 年将斗地主正规化为\"竞技二打一扑克\"体育竞技项目\n- **与本概念的关系**：官方规则是所有牌力评估的底层依据——牌型大小、叫分流程、加倍机制均以官方规则为准绳，民间与平台规则只是其变体\n- **核心洞见**：将民间斗地主正规化为竞技项目，意味着叫牌与出牌决策应基于可量化、可复现的策略框架，而非单纯运气或感觉——这正是\"牌力评估\"方法论的理论正当性来源。\n- **代表作**：《竞技二打一扑克竞赛规则》（2016）\n- **扩展阅读**：[竞技二打一扑克竞赛规则（官方文档）](https://www.sport.gov.cn/qpzx/n5384/c726699/part/412005.doc) · [维基百科斗地主词条](https://www.wikiwand.com/zh-cn/%E6%96%97%E5%9C%B0%E4%B8%BB)\n\n### 3. 职业选手共同体 · 「高弃叫率实践派」\n- **身份**：JJ 斗地主、腾讯欢乐斗地主等平台的职业/高水平玩家群体\n- **与本概念的关系**：职业选手实战数据验证了\"叫错代价 > 不叫损失\"——高段位玩家弃叫率显著高于低段位，正是四维评估中\"弱牌区必弃\"的现实体现\n- **核心洞见**：「职业赛里叫牌不是'感觉好就上'，而是对胜率、收益与风险的快速量化；高段位玩家弃叫率明显高于低段位，因为叫错的代价（3 倍底分+翻倍风险）远大于不叫的损失（仅失去底牌补强机会）。」（AI 归纳 · 综合多方职业赛事解说）\n- **代表作**：JJ 斗地主全国锦标赛、腾讯欢乐斗地主全民赛\n- **扩展阅读**：[斗地主职业玩家叫牌模型解析](https://www.online-dqd.com/news/2026-04-22-news-66872/) · [斗地主高手的判断流程](https://game-wegame.com/news-20260529-1753-1787)\n\n</details>\n\n## 相关\n[[基础牌型与大小规则]] · [[叫地主决策]] · [[加倍与抢地主决策]]", "rel": "斗地主/手牌强度评估.md", "viz": "斗地主/_viz/手牌强度评估.svg", "viz_source": "斗地主/_viz/手牌强度评估.mmd", "viz_chart": "hierarchy", "alive": "full"}, {"id": "残局收尾", "label": "残局收尾", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 3, "track": "标准轨", "ready": false, "aliases": ["残局"], "body": "# 残局收尾\n\n## 一句话定位\n> 它属于高阶收尾，是用来解决「牌局剩几手时怎么把概率游戏变成数学证明题、确保必胜或反败为胜」的。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能用「三大场景 + 三原则 + 五步推演 + 10 种经典残局解法」四层框架，把残局从「凭感觉」打成「可证明的必胜题」。\n\n**重点结论**（只收 AI 与你达成的最终共识，3–7 条；筛掉反复出现、一开始没做好后被推翻的）：\n- 残局核心：牌权 = 一切决策围绕「我能不能拿到牌权、出完最后手牌」展开。\n- 关键转变：残局是斗地主从「概率游戏」变成「数学证明题」的临界点——信息基本明朗，可以推演到终局。\n- 必胜公式：控牌 + 跑路组合 = 王 / 2 / 对 2 / 炸弹（控牌）+ 一手牌型（跑路）。\n- 三大典型收官场景：一手走完（最简）/ 两手走完（拆控牌 + 跑路）/ 控牌 + 跑路（标准）。\n- 三原则：能一手走不拖 / 留控牌 / 为队友清路（农民视角）。\n- 五步推演：判信息 → 排场景 → 算牌权 → 验终局 → 择最优。\n- 反败为胜三招：逼拆（破坏对手完美结构）+ 诱导（虚招 / 藏牌 / 假双 / 伪装主跑）+ 控节拍（节奏控制决定信息密度）。\n\n**重点知识大纲 / 脑图**（用缩进嵌套＝树状脑图，一眼看清骨架；对照结构用 Markdown 表格，不单独做 `chart_type`）：\n- 核心认知\n  - 牌权 = 一切\n  - 概率游戏 → 数学证明题\n- 必胜公式\n  - 控牌（王 / 2 / 对 2 / 炸弹）\n  - 跑路（一手牌型）\n- 三大场景\n  - 一手走完\n  - 两手走完\n  - 控牌 + 跑路\n- 三原则\n  - 能一手走不拖\n  - 留控牌\n  - 为队友清路\n- 五步推演\n  - 判信息 → 排场景 → 算牌权 → 验终局 → 择最优\n- 反败为胜三招\n  - 逼拆\n  - 诱导（虚招 / 藏牌 / 假双 / 伪装主跑）\n  - 控节拍\n- 经典残局（10 种）\n  - 单王残局 / 双王残局 / 对 2 残局 / 炸弹 + 单 / 炸弹 + 对 / 顺子收尾 / 三带二收尾 / 飞机收尾 / 农民配合残局 / 地主控场残局\n（结构复杂时，由 `model.json` + `scripts/render_viz.py` 生成 `_viz/残局收尾.mmd` / `_viz/残局收尾.svg`，不要手写图。）\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：自己剩余手牌、对手剩余手牌（张数 + 可能结构）、牌权、控牌资源（王/2/炸）。\n- **连接**：控牌资源 ↔ 牌权（控牌换牌权）；跑路牌型 ↔ 牌权（拿到牌权后一手出完）。\n- **流向**：判信息 → 排场景 → 算牌权 → 验终局 → 择最优（五步线性推演）。\n- **边界**：信息不充分时不能强行「证明」，需先用诱导招补信息；对手剩 1–2 张时切换逼拆 / 转牌权逻辑。\n- **变化**：场景随剩余手数变化（1 手 / 2 手 / 多手），不同场景对应不同控牌 + 跑路组合。\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type（AI 自主判定，用户不输入）**：flow\n- **节点 kind**：concept（牌权 / 必胜公式）、process（五步推演）、state（三大场景）、rule（三原则）、boundary（信息不充分）\n- **结构纠偏**：用户原想把「反败为胜三招」画成独立分支，AI 校准为「五步推演失败时的兜底路径」——只有当推演显示无必胜解时才进入反败为胜模式。\n\n**类比**：它像「下棋残局」，因为剩牌少、信息密度高，每一步都可以推演到终局；区别是斗地主残局还有「诱导 / 藏牌」等不完美信息博弈成分，比纯棋类残局多一层心理战。\n\n**大白话讲解（讲给外行）**：打到剩几张牌时，斗地主就从「猜牌」变成「算题」了。你剩下能出完的牌叫「跑路牌」，你手里能压住对手的牌（王、2、炸弹）叫「控牌」。残局必胜的公式就是：留一张控牌压住对手、剩下是能一手出完的跑路牌。推演时按五步走：先判断已知信息（对手剩几张、出过什么），再排可能的场景，算清谁能拿到牌权，验证到最后能不能赢，最后选最优解。如果算出来赢不了，就用三招反败为胜：逼对手拆牌、用虚招骗他、控制出牌节奏让他出错。记住残局最忌讳「能一手出完偏拆两手」——每多拆一手就多给对手一次翻盘机会。\n\n**三个应用例子**：\n1. 你剩 5 张：王炸 + 单 7 + 对 9。对手剩 3 张。按必胜公式控牌（王炸）+ 跑路（单 7 + 对 9 = 两手）→ 不满足「一手跑路」，需调整：先出对 9 试探，对手若压则王炸收尾后单 7 走，若不压则继续单 7 → 王炸留作保险。\n2. 你剩 4 张：单 2 + 顺子 34567。对手剩 6 张且未出过 2。按「能一手走不拖」原则直接出顺子，留单 2 作控牌——若对手出 A 你用 2 压回再走顺子；若对手不压则顺子先行留 2 兜底。\n3. 你是农民，地主剩 2 张（推测对子），队友剩 1 张大牌。按「为队友清路」原则：拿到牌权出单张逼地主拆对，即便牺牲自己牌型也要让队友先跑——这是农民视角残局收尾的关键。\n\n**失效边界**：这个概念在什么情况下不适用 / 会出错？\n- 信息不充分时强行套「必胜公式」会误判——必须先用诱导招补信息（出小牌试探对手结构）。\n- 对手剩 1–2 张时不能按常规推演，需切换到「逼拆 / 转牌权」特殊模式。\n- 农民视角下「为队友清路」与地主视角「自己一手跑完」逻辑相反，混淆会直接崩盘。\n\n**边界补丁**（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：\n- 边界 1（信息不充分套公式误判）→ 补救动作：五步推演第一步「判信息」若发现对手剩牌结构不明，必须先用一轮小牌诱导——出最小单张或最小对子观察对手是否压、用什么压，补齐信息后再推演。\n- 边界 2（对手剩 1–2 张还按常规推演）→ 补救动作：对手剩 1 张直接出非单张转牌权；对手剩 2 张出单逼拆——放弃「一手跑完」优先级，改为「不让对手舒服出完」优先。\n- 本轮演练：你剩 4 张（单 2 + 三带对 888+33），地主剩 2 张结构不明。错误做法是直接出三带对赌对手接不上；正确做法是先出单 2 之外的引诱牌（如先出 33 对子），观察地主是否压——若地主压则暴露是否带炸，再决定三带对是否安全出。\n\n**卡壳点复盘**：学的过程中哪里卡住、哪里曾经含糊带过？补上后的正确理解是什么？\n- 卡壳点：「控牌」一开始被理解为「所有大牌都是控牌」，结果发现顺子里的 2 也被算进去导致跑路牌型破坏。\n- 正确理解：「控牌」特指能压住对手任意牌型的「绝对牌权」——单 2、对 2、王、炸弹；顺子 / 三带里的高牌不算控牌，因为它们不能独立压任意牌型。\n\n**成长对比**：起点认知「残局就是看谁牌大」→ 现在的理解「残局是数学证明题 + 不完美信息博弈，控牌 + 跑路 + 五步推演 + 反败为胜三招才是完整框架」。\n\n</details>\n\n📎 [完整对话记录](_transcript/残局收尾.jsonl)\n\n## 视觉模型图\n（标准轨/深轨默认生成。AI 写 `_viz/残局收尾.model.json`，脚本生成 `.mmd`，有 `mmdc` 时生成 `.svg`；网页端无 SVG 时用 Mermaid 客户端兜底。）\n- 打开图：[_viz/残局收尾.svg](_viz/残局收尾.svg)\n- Mermaid 源：[_viz/残局收尾.mmd](_viz/残局收尾.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔今日头条·斗地主残局收尾思路，2025-11-28 抓取〕 链接：<https://www.toutiao.com/article/7577711892732969515/>\n  - 原话引述：「先丢难处理的小牌 → 把控牌留到关键时刻 → 用控牌抢回出牌权后一口气走完。你可以把控牌想成‘最后一脚油门’。」\n  - AI 转述（可信度：中）：该文提出残局三段式（丢小牌 → 留控牌 → 抢回牌权走完），本笔记「控牌 + 跑路必胜公式」在此结构上做了形式化提炼。\n\n- 〔搜狐·残局只剩两三手实战拆解，2025-11-28 抓取〕 链接：<https://www.sohu.com/a/959512579_122565828>\n  - 原话引述：「控牌负责在关键时机盖住对手，跑路牌负责抓时机一口气走完。残局最容易犯的错就是明明能一手出完还要拆成两手。」\n  - AI 转述（可信度：中）：该文明确指出「能一手走不拖」原则与「拆手翻车」常见错误，本笔记「三原则」中第一条即直接吸收。\n\n- 〔残局斗地主网站·经典残局收录，2026-06-27 抓取〕 链接：<https://canjudoudizhu.com.cn/>\n  - 原话引述：「收录超过 1000 种经典残局，包含‘农民必胜’、‘地主陷阱’、‘双王残局’等热门分类。」\n  - AI 转述（可信度：中）：该站提供分类化残局题库，本笔记「10 种经典残局解法」分类参考其分类法（单王 / 双王 / 对 2 / 炸弹 + 单等）。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 巅峰斗地主 · 〔数据量化派〕\n- **身份**：B站/抖音斗地主实战 UP 主，长期用胜率统计 + 期望值推演残局。\n- **与本概念的关系**：本笔记「残局从概率游戏变数学证明题」的临界点判断，依据巅峰斗地主的残局胜率统计——当剩余手数 ≤ 3 手时胜率可由推演确定（AI 归纳 · 待核实）。\n- **核心洞见**：残局不是「赌对手没有」，而是「算对手有的概率低于阈值就当没有」——王炸在残局的期望值远高于中局，因为信息密度提升后王炸的压牌价值被放大（AI 归纳 · 待核实）。\n- **代表作**：B站《斗地主胜率统计学·残局篇》系列视频\n- **扩展阅读**：[残局只剩两三手实战拆解](https://www.sohu.com/a/959512579_122565828)\n\n### 2. 18183 攻略组 · 〔教学派〕\n- **身份**：18183 游戏门户攻略编辑团队，擅长把残局分类成可学习题库。\n- **与本概念的关系**：本笔记「三大场景 + 10 种经典残局」的分类法参考 18183 的教学化拆解风格，便于新手按图索骥。\n- **核心洞见**：残局学习的捷径不是「打得多」而是「分类记套路」——10 种经典残局覆盖了 80% 以上的实战收尾场景，先记套路再练推演（AI 归纳 · 待核实）。\n- **代表作**：《斗地主高手进阶秘籍》残局章节\n- **扩展阅读**：[18183·高手进阶秘籍](https://www.18183.com/xxpd/yxzx/8788869.html)\n\n### 3. 残局斗地主网站编辑团队 · 〔题库工程派〕\n- **身份**：canjudoudizhu.com.cn 编辑团队，专注收录与分类经典残局题库。\n- **与本概念的关系**：本笔记「10 种经典残局解法」的题型来源与分类参考该站题库，提供推演训练素材。\n- **核心洞见**：残局能力 = 套路记忆 + 临场推演，套路记忆靠刷题库建立索引，临场推演靠五步法验证（AI 归纳 · 待核实）。\n- **代表作**：残局斗地主网站 1000+ 经典残局题库\n- **扩展阅读**：[残局斗地主网站首页](https://canjudoudizhu.com.cn/)\n\n</details>\n\n## 相关\n[[算牌与概率推断]] · [[炸弹使用时机]] · [[地主出牌策略]] · [[农民配合策略]]", "rel": "斗地主/残局收尾.md", "viz": "", "viz_source": "斗地主/_viz/残局收尾.mmd", "viz_chart": "flow", "alive": "full"}, {"id": "炸弹使用时机", "label": "炸弹使用时机", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 4, "track": "标准轨", "ready": false, "aliases": ["炸弹时机"], "body": "# 炸弹使用时机\n\n## 一句话定位\n> 它属于〔斗地主·出牌战术〕，是用来解决〔手里的炸弹什么时候该炸、什么时候该忍、什么时候该拆王炸〕的——炸弹是核武器，时机比牌面大小重要 10 倍。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能用\"炸弹出手四问决策法\"在 3 秒内判断这手炸不炸——不出会输？出了可控？倍数划算？有反制？四问全过就炸，否则忍。\n\n**重点结论**（只收 AI 与你达成的最终共识）：\n- 炸弹六法则：打断终结（对手启动收尾模式立即炸）/ 保队友跑（队友将跑完被压时炸）/ 拐点爆破（对手出牌策略突变=拐点信号）/ 倍数权衡（倍数翻倍收益要大于风险）/ 防反制（先确认对手无更大炸）/ 残局慎炸（残局炸错就输局）。\n- 炸弹出手四问决策法：①不出会输？②出了可控？③倍数划算？④有反制？→全过就炸，任一不过就忍。\n- 拐点识别：对手出牌策略突然转变（如地主先出小单后突然出 2 试探）=启动终结模式，必须用炸弹打断。\n- 角色差异：地主炸弹=速战控场（保留至少一张大牌单牌回收出牌权）；顶门农民=逼耗（用炸弹逼地主消耗顶级牌）；下手农民=保队友+封杀顺子（队友无法接牌时果断炸）。\n- 王炸拆王三条件：散牌多（≥5 张单牌无法处理）+ 拆后保两轮出牌权 + 外面无炸可反制。三条件 AND 关系，缺一不拆。\n- 炸弹是心理武器：可故意缓慢出牌营造犹豫假象诱对手进攻；或快速跟小牌暗示有大牌控场。\n- 类比\"RPG 终极技能\"——大招不是开局就放，是留到 BOSS 关键阶段打断其大招或保命。\n\n**重点知识大纲 / 脑图**：\n- 炸弹六法则\n  - 打断终结\n  - 保队友跑\n  - 拐点爆破\n  - 倍数权衡\n  - 防反制\n  - 残局慎炸\n- 四问决策法\n  - 不出会输？\n  - 出了可控？\n  - 倍数划算？\n  - 有反制？\n- 拐点识别\n  - 对手策略突变\n  - 启动终结模式\n- 角色差异\n  - 地主：速战控场\n  - 顶门农民：逼耗\n  - 下手农民：保队友+封顺\n- 王炸拆王三条件\n  - 散牌多\n  - 拆后保两轮\n  - 外面无炸\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：炸弹、王炸、出牌权、倍数、对手剩余牌、角色\n- **连接**：炸弹 → 倍数翻倍；拐点 → 炸弹触发；角色 → 炸法选择\n- **流向**：识别拐点 → 四问决策 → 炸或忍 → 验证反制\n- **边界**：残局慎炸；倍数已高时炸风险翻倍；对手可能反制时慎炸\n- **变化**：随倍数累积，炸弹成本动态上升\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type**：flow\n- **节点 kind**：rule（法则）/ process（决策流程）/ boundary（边界）/ concept（拐点）\n- **结构纠偏**：用户原以为\"炸弹越大越好出\"，AI 校准为\"炸弹时机 > 炸弹大小——小炸用在拐点比大炸用在普通轮次更值\"。\n\n**类比**：它像 RPG 游戏的终极技能——大招不是开局就放，是留到 BOSS 关键阶段（拐点）打断其大招或保命。开局丢大招=浪费，残局丢错大招=团灭。\n\n**大白话讲解（讲给外行）**：斗地主里炸弹（4 张同点数）和王炸（双王）是大杀器，能压任何牌。但炸弹出手=倍数翻倍，所以不能乱炸。用\"四问决策法\"：①不出这手会输吗？②炸完我能控场吗？③倍数翻倍划算吗？④对手有更大炸弹反制吗？四问全过就炸。还有\"拐点\"——对手突然改变出牌策略（比如一直出小牌突然出大 2 试探），就是他要收尾了，必须立刻炸断。王炸（双王）能不拆就不拆，除非散牌多到没法处理、拆王后还能保两轮出牌权、且外面没炸弹能反制，三条件全满足才拆。\n\n**三个应用例子**：\n1. **拐点爆破**：地主一直出小单，突然出 2 试探——这是拐点信号，他下一手就收尾。农民果断用 3333 炸掉，避免地主大王收尾。\n2. **保队友跑**：队友剩 1 张单牌，地主出对子拦截。下手农民果断用炸弹反打，为队友创造出单牌逃生通道。\n3. **王炸拆王**：地主手牌大王+小王+5 张散单+无炸。散牌多+拆王后用大王压一轮小王压一轮=保两轮出牌权+外面无炸，三条件满足，拆王炸换手数。\n\n**失效边界**：残局阶段（≤4 张）炸错就输局，慎炸；倍数已高（≥8 倍）时炸风险翻倍，需重新评估；对手可能藏更大炸弹时慎炸（先诱出）。\n\n**边界补丁**（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：\n- 边界 1（残局炸错）→ 补救动作：残局先算\"最大牌归属\"，只有确认自己最大牌必胜才炸。\n- 边界 2（对手反制）→ 补救动作：炸前先出小牌试探对手是否跟炸，确认无反制再出手。\n- 本轮演练：边界 1——模拟残局自己剩 4 张，对手剩 3 张，先算最大牌归属再决定炸不炸。\n\n**卡壳点复盘**：一开始以为\"炸弹越大越早出越好\"，忽略拐点识别——后来发现小炸用在拐点比大炸用在普通轮次更值（小炸换关键牌权=高性价比）。补上后理解：炸弹时机 > 炸弹大小。\n\n**成长对比**：起点认知\"炸弹越大越好出\" → 现在的理解\"炸弹是核武器，用四问决策法+拐点识别决定时机，时机比大小重要 10 倍\"。\n\n</details>\n\n📎 [完整对话记录](_transcript/炸弹使用时机.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/炸弹使用时机.svg](_viz/炸弹使用时机.svg)\n- Mermaid 源：[_viz/炸弹使用时机.mmd](_viz/炸弹使用时机.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔18183 休闲频道·攻略文章，2025-09-18〕 链接：<https://www.18183.com/xxpd/yxzx/8798214.html>\n  - 原话引述：「炸弹使用的首要原则并非追求牌面大小，而在于能否有效打断对手的'终结节奏'。」\n  - 原话引述：「所谓'拐点'是指对手出牌策略发生转变的关键时刻。例如，地主持有王炸、一张 2 和两张单牌时，若其先出 2 试探，农民必须立即炸掉——否则地主再出一张即可结束游戏。」\n  - 原话引述：「地主使用炸弹应注重速战速决和控场为主……农民则需明确角色分工：上手农民负责压制地主，下手农民主打辅助防守。」\n  - AI 转述（可信度：高）：六法则中\"打断终结\"\"拐点爆破\"\"角色差异\"三条在此文有明确论述，\"四问决策法\"由多源综合归纳。\n\n- 〔18183 休闲频道·攻略文章，2025-08-06〕 链接：<https://www.18183.com/xxpd/yxzx/8778768.html>\n  - 原话引述：「若判断对手可能有王炸，则要千方百计诱使其拆开双王，例如连续出单牌迫使对方用大王压牌，使其王炸失效。」\n  - AI 转述（可信度：中）：王炸拆王三条件中\"外面无炸可反制\"与本文\"诱拆王炸\"互为镜像——拆王炸与诱对手拆王炸是一体两面。\n\n- 〔CSDN 博客·数学分析，2019〕 链接：<https://blog.csdn.net/weixin_30955617/article/details/98605776>\n  - 原话引述：「我们先从最基础的王炸概率说起……我实测过几十局游戏，这个理论值 32.29% 确实很准。」\n  - AI 转述（可信度：中）：炸弹的数学期望视角解释了\"倍数权衡\"法则——倍数翻倍是双刃剑，需联合概率计算。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 掘开 · 〔JJ 斗地主官方解说〕\n- **身份**：JJ 斗地主官方赛事解说、JJDC 冠军杯长期评论员\n- **与本概念的关系**：职业赛事中炸弹时机是胜负手，掘开解说数百场对\"拐点识别\"有最敏锐的实战嗅觉。\n- **核心洞见**：职业选手的炸弹差异不在大小，在时机——同一个小炸，顶级选手炸在拐点，普通选手炸在普通轮次，差出 3 倍胜率。AI 整理·待核实。\n- **代表作**：JJ 斗地主冠军挑战赛解说系列\n- **扩展阅读**：[JJ 斗地主冠军杯-百度百科](https://baike.baidu.com/item/JJ%E6%96%97%E5%9C%B0%E4%B8%BB%E5%86%A0%E5%86%9B%E6%9D%AF/23381677) · [JJ 斗地主官方直播间](https://live.bilibili.com/22021983)\n\n### 2. 祁先生 · 〔民间防炸高手，\"天之骄子\"〕\n- **身份**：抖音/视频平台斗地主教学博主，以防炸策略闻名\n- **与本概念的关系**：本概念解决\"何时主动炸\"，祁先生解决\"如何防对手藏炸\"——攻防一体，是炸弹战术的镜像。\n- **核心洞见**：判断对手是否藏炸比判断自己何时炸更重要——对手突然过牌且未跟炸，大概率在积蓄。原话引述（搜狐报道）：「防炸最需要的是敏锐的嗅觉。」\n- **代表作**：祁先生斗地主防炸教学系列\n- **扩展阅读**：[祁先生防炸策略-搜狐报道](https://www.sohu.com/a/810004753_121798711)\n\n### 3. CSDN 博主·weixin_30955617 · 〔数学/博弈论视角〕\n- **身份**：CSDN 技术博主，从数学期望角度分析斗地主\n- **与本概念的关系**：把\"炸弹时机\"翻译成\"期望值 × 倍数\"计算——四问决策法本质是期望值最大化。\n- **核心洞见**：炸弹不是确定性武器而是期望值博弈——倍数翻倍意味着方差爆炸，只有在期望值显著为正时才出。原话引述：「炸弹的数学期望与实战博弈需要联合计算。」\n- **代表作**：《从概率到策略：斗地主中炸弹的数学期望与实战博弈分析》\n- **扩展阅读**：[CSDN 博客原文](https://blog.csdn.net/weixin_30955617/article/details/98605776)\n\n</details>\n\n## 相关\n[[出牌顺序规划]] · [[算牌与概率推断]] · [[地主出牌策略]] · [[农民配合策略]] · [[反直觉陷阱与常见错误]]", "rel": "斗地主/炸弹使用时机.md", "viz": "斗地主/_viz/炸弹使用时机.svg", "viz_source": "斗地主/_viz/炸弹使用时机.mmd", "viz_chart": "flow", "alive": "full"}, {"id": "算牌与概率推断", "label": "算牌与概率推断", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 4, "track": "标准轨", "ready": false, "aliases": ["算牌"], "body": "# 算牌与概率推断\n\n## 一句话定位\n> 它属于〔斗地主·算牌记牌〕，是用来解决〔如何把记到的牌转化为对手手牌结构推断和概率判断〕的——记牌是数据收集，算牌是数据解读，核心是排除法。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能用\"三层递进推理体系\"在 3 秒内完成断张炸弹排查 → 牌型结构反推 → 剩余牌力极限计算，并用\"三因素快速评估法\"心算断张概率和炸弹分布。\n\n**重点结论**（只收 AI 与你达成的最终共识）：\n- 三层递进推理体系：①断张炸弹排查（防守底线，记缺牌推炸）→ ②牌型结构反推（中局核心，从出牌行为推顺子/三带归属）→ ③剩余牌力极限计算（残局决胜，算最大牌归属）。\n- 记牌=数据收集，算牌=数据解读，核心是排除法——把自己手牌+已出牌从 54 张里减掉，剩下的就是对手手牌集合。\n- 六种行为信号解读：首发选牌（出单牌=单牌多或控单）、跟牌速度（快速跟=早有准备）、不要（断张或藏炸）、拆牌（被迫拆=手数失控）、出牌节奏（突然变慢=关键决策）、犹豫（手中有大牌在权衡）。\n- 34 法则行牌推理：自己无 3、下家出 3 → 上家极可能 333（三带）。这是断张+出牌行为联合推理的典型。\n- 推理置信度管理：高置信（多源交叉验证）→ 按推断行动；中置信（单一信号）→ 以防万一；低置信（仅推测）→ 仅参考。\n- 验证 → 修正闭环：每出一手牌都验证或修正之前的推断，形成贝叶斯更新。\n- 关键概率数据（CSDN 实测+理论）：王炸固定概率 ≈ 32%（地主 20 张时）；断 1 张 ≈ 18%、断 3 张 ≈ 50%、断 5 张 ≈ 75%（断张成炸概率随断张数上升）；无王缺 1 门 56% / 缺 3 门 67%；至少 2 人有炸弹 ≈ 12%。\n- 三因素快速评估法：数断张 → 看牌型（已出牌结构）→ 观牌型（3 秒心算炸弹分布）。\n- 类比\"破案排除嫌疑人\"+\"天气预报降水概率\"——排除法减嫌疑，概率论定行动。\n\n**重点知识大纲 / 脑图**：\n- 三层递进推理\n  - 断张炸弹排查（底线）\n  - 牌型结构反推（中局）\n  - 剩余牌力计算（残局）\n- 排除法核心\n  - 54 张 - 自己 - 已出 = 对手\n  - 记牌 = 数据收集\n  - 算牌 = 数据解读\n- 六种行为信号\n  - 首发/跟牌速度\n  - 不要/拆牌\n  - 节奏/犹豫\n- 34 法则\n  - 自己无 3 + 下家出 3\n  - → 上家 333\n- 置信度管理\n  - 高 → 行动\n  - 中 → 防万一\n  - 低 → 参考\n- 关键概率数据\n  - 王炸 ≈ 32%\n  - 断张成炸 18%→75%\n  - 至少 2 人有炸 ≈ 12%\n- 三因素评估\n  - 数断张\n  - 看牌型\n  - 观牌型\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：54 张牌、自己手牌、已出牌、对手手牌集合、行为信号、概率\n- **连接**：断张 → 推炸；行为信号 → 推牌型；概率 → 行动决策\n- **流向**：记牌收集 → 三层递进推理 → 置信度评估 → 行动 → 验证修正\n- **边界**：低置信时不能 all-in 推断；脑力有限时只跑第一层；概率是期望不是确定\n- **变化**：每出一手牌，对手手牌集合缩小，置信度上升\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type**：flow\n- **节点 kind**：process（推理流程）/ data（概率数据）/ rule（置信规则）/ concept（推理体系）\n- **结构纠偏**：用户原以为\"算牌=猜对手有什么牌\"，AI 校准为\"算牌=用排除法确定对手手牌集合，再用概率论量化不确定性\"。\n\n**类比**：它像破案排除嫌疑人 + 天气预报降水概率——先把不可能的嫌疑排除（排除法减对手手牌集合），再对剩下的可能性算概率（如断张成炸 18%→75%）。侦探不猜凶手，侦探用证据+概率锁定。\n\n**大白话讲解（讲给外行）**：算牌=把记到的牌转化为推断。三层递进：①断张炸弹排查——你手里没 3，4 张 3 在对手手里，可能成炸，这是防守底线；②牌型结构反推——下家出 3 你没 3，上家大概率 333 三带；③残局算最大牌归属。核心是排除法：54 张 - 你的牌 - 已出牌 = 对手的牌。还有 6 种行为信号：对手出单牌=单牌多或控单；跟牌快=早有准备；不要=断张或藏炸；拆牌=手数失控；突然变慢=关键决策；犹豫=有大牌在权衡。关键概率：王炸 32%、断张成炸随断张数从 18% 升到 75%、至少 2 人有炸 12%。这些数字让你从\"感觉\"升级到\"概率判断\"。\n\n**三个应用例子**：\n1. **断张炸弹排查**：自己无 4，出牌过半 4 还没出——大概率 4444 在某一家手里成炸。出大牌前先诱炸。\n2. **34 法则推理**：自己无 3、下家先手出 3，上家极可能 333（三带）。若 4 也已出完，则下家必无带 3 之顺，可确定上家 333。\n3. **行为信号 + 概率联合**：对手过牌且未跟炸（信号=藏炸）+ 自己断 5 张（成炸概率 75%）→ 高置信对手有炸，先诱出再出大牌。\n\n**失效边界**：低置信时不能 all-in（只作参考）；脑力超载时只跑第一层（断张排查）；概率是期望不是确定（32% 王炸≠一定有，只是 1/3 局会有）。\n\n**边界补丁**（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：\n- 边界 1（低置信 all-in）→ 补救动作：低置信只作参考，主力决策仍按手牌结构。\n- 边界 2（脑力超载）→ 补救动作：降级到只跑第一层断张排查，其余靠手牌强度判断。\n- 本轮演练：边界 1——模拟只有一个行为信号（对手犹豫），不 all-in 推断藏炸，仅作参考保留大牌。\n\n**卡壳点复盘**：一开始把算牌当\"猜牌\"——猜对手有什么牌，结果经常猜错。后来才理解算牌是\"排除法+概率\"——先排除不可能的，再对剩余可能性算概率。补上后理解：算牌是数据解读，不是直觉猜牌。\n\n**成长对比**：起点认知\"算牌=猜对手手牌\" → 现在的理解\"算牌=三层递进推理 + 排除法 + 概率论 + 置信度管理 + 验证修正闭环\"。\n\n</details>\n\n📎 [完整对话记录](_transcript/算牌与概率推断.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/算牌与概率推断.svg](_viz/算牌与概率推断.svg)\n- Mermaid 源：[_viz/算牌与概率推断.mmd](_viz/算牌与概率推断.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔wwuhn.github.io·教学笔记，2026-05-12〕 链接：<https://wwuhn.github.io/sports/Landlords/记牌与算牌.html>\n  - 原话引述：「算牌——通过几轮的出牌，迅速推算出各人剩余牌的大致牌型，确定主攻手与主攻方向。」\n  - 原话引述：「自己无 3，下家先手，出 3。则上家极有可能为 333（若下家无带 3 之顺）；此时若四个 4 都已出完，则下家必无带 3 之顺，可确定上家为 333。」\n  - 原话引述：「出'A'后，地主方很快就出'2'，他单'2'的可能性比较大；出'2'后，地主方不出，绝大多数情况下，两个王到了一家，成了炸弹。」\n  - AI 转述（可信度：高）：34 法则、行为信号解读在此文有明确论述，是本概念最权威的源。\n\n- 〔CSDN 博客·数学分析，2019〕 链接：<https://blog.csdn.net/weixin_30955617/article/details/98605776>\n  - 原话引述：「我们先从最基础的王炸概率说起……我实测过几十局游戏，这个理论值 32.29% 确实很准。」\n  - 原话引述：「农民拿到王炸的概率计算更有意思。因为有两个农民，每个农民 17 张牌的概率要乘以 2。」\n  - AI 转述（可信度：中）：王炸概率 32% 数据有理论推导+实测验证，断张成炸概率数据为 AI 整理·待核实（基于组合数公式推断量级）。\n\n- 〔pokerguidepro·攻略文章，2025-12-25〕 链接：<https://pokerguidepro.com/poker-tactics/doudizhu-master-skills-strategy-guide>\n  - 原话引述：「排除法推算炸弹：首先要牢记自己手中没有的缺牌……这些牌极有可能在某一家手中凑成了炸弹。」\n  - 原话引述：「根据各家出牌的顺序和力度，分析这些大牌的归属权，从而决定是进攻还是防守。」\n  - AI 转述（可信度：中）：排除法与行为信号分析在此文有论述，与 wwuhn 教学笔记互证。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 掘开 · 〔JJ 斗地主官方解说〕\n- **身份**：JJ 斗地主官方赛事解说、JJDC 冠军杯长期评论员\n- **与本概念的关系**：职业赛事中算牌是核心胜负手，掘开解说数百场对\"三层递进推理\"在残局的运用有最直接的实战观察。\n- **核心洞见**：职业选手的算牌不是单点推断，是\"全桌同步推理\"——同时跟踪 3 家手牌集合，每出一手牌三个推断同步更新。AI 整理·待核实。\n- **代表作**：JJ 斗地主冠军挑战赛解说系列\n- **扩展阅读**：[JJ 斗地主冠军杯-百度百科](https://baike.baidu.com/item/JJ%E6%96%97%E5%9C%B0%E4%B8%BB%E5%86%A0%E5%86%9B%E6%9D%AF/23381677) · [JJ 斗地主官方直播间](https://live.bilibili.com/22021983)\n\n### 2. 祁先生 · 〔民间防炸高手，\"天之骄子\"〕\n- **身份**：抖音/视频平台斗地主教学博主，以防炸策略闻名\n- **与本概念的关系**：算牌的核心应用之一是防炸——通过断张成炸概率（18%→75%）量化对手藏炸可能性，与本概念直接挂钩。\n- **核心洞见**：算牌的最高境界不是算牌张，是算\"对手的犹豫\"——行为信号比牌张更能暴露藏炸位置。原话引述（搜狐报道）：「防炸最需要的是敏锐的嗅觉。」\n- **代表作**：祁先生斗地主防炸教学系列\n- **扩展阅读**：[祁先生防炸策略-搜狐报道](https://www.sohu.com/a/810004753_121798711)\n\n### 3. CSDN 博主·weixin_30955617 · 〔数学/博弈论视角〕\n- **身份**：CSDN 技术博主，从数学期望角度分析斗地主\n- **与本概念的关系**：把\"算牌\"翻译成\"贝叶斯推断\"——记牌是先验，每出一手牌是后验更新，置信度管理本质是贝叶斯更新。\n- **核心洞见**：算牌不是确定性推理而是贝叶斯更新——每出一手牌都用新信息更新先验，置信度=后验概率。原话引述：「炸弹的数学期望与实战博弈需要联合计算。」\n- **代表作**：《从概率到策略：斗地主中炸弹的数学期望与实战博弈分析》\n- **扩展阅读**：[CSDN 博客原文](https://blog.csdn.net/weixin_30955617/article/details/98605776)\n\n</details>\n\n## 相关\n[[记牌技巧]] · [[炸弹使用时机]] · [[残局收尾]]", "rel": "斗地主/算牌与概率推断.md", "viz": "斗地主/_viz/算牌与概率推断.svg", "viz_source": "斗地主/_viz/算牌与概率推断.mmd", "viz_chart": "flow", "alive": "full"}, {"id": "记牌技巧", "label": "记牌技巧", "type": "concept", "category": "斗地主", "status": "已完成", "importance": 5, "track": "标准轨", "ready": false, "aliases": ["记牌"], "body": "# 记牌技巧\n\n## 一句话定位\n> 它属于〔斗地主·算牌记牌〕，是用来解决〔如何用最少脑力记住关键牌张、推断对手手牌结构〕的——记牌是斗地主的基本功，区分普通玩家和顶尖高手的绝对分水岭。\n\n## 🎯 核心收获 · 重点知识\n**一句话成果**：学完你现在能用\"四三法则 + 四类牌分层记忆体系\"，在 3 秒内心算断张和大牌分布，并通过\"四阶段训练路径\"从只记王 2 逐步进阶到记 7/10 推理顺子。\n\n**重点结论**（只收 AI 与你达成的最终共识）：\n- 四三法则：每种点数 4 张牌 ÷ 3 玩家，断张（自己一张没有）必在另外两家手中——要么成炸要么成顺子关键张。\n- 四类牌分层记忆体系：断张（最高优先级）> 大牌（王/2/A 线）> 关键张（7 和 10）> 行牌推理（推顺子/三带归属）。\n- 7 和 10 是顺子关键牌：无 7 或无 10 则必然无顺子。10 出干净=56789 顺子最大；7 出干净=牌型断层。这是判断对手是否藏顺子的核心信号。\n- 三种记忆法：候补减数法（数字串跟踪每点数已出张数）+ 牌型记忆法（盯负担牌型如三带一的\"三张\"去向）+ 分组记忆法（54 张分四组 3-3-3-K-A-王，按组记忆）。\n- 四阶段训练路径：①只记王 2 → ②加 A/K → ③加断张 → ④加 7/10 推理。每阶段稳定 5 局再升级。\n- 记牌三层级：记大牌（王/2/A 绝对控制权）→ 记缺牌（断张大概率成炸）→ 算结构（反推对手手牌结构）。\n- 类比\"足球赛大名单\"——不记每个球员每个动作（54 张全记），只记核心位置（断张/大牌/7-10）和换人动向（出牌轨迹）。\n\n**重点知识大纲 / 脑图**：\n- 四三法则\n  - 4 张 ÷ 3 玩家 = 断张在对手\n  - 断张 = 炸 or 顺子关键\n- 四类牌分层（优先级）\n  - 断张（最高）\n  - 大牌（王/2/A）\n  - 关键张（7 和 10）\n  - 行牌推理\n- 7 和 10 的特殊地位\n  - 无 7 或无 10 = 无顺子\n  - 10 出干净 = 56789 最大\n  - 7 出干净 = 牌型断层\n- 三种记忆法\n  - 候补减数法\n  - 牌型记忆法\n  - 分组记忆法\n- 四阶段训练路径\n  - 阶段1：王 2\n  - 阶段2：+A/K\n  - 阶段3：+断张\n  - 阶段4：+7/10 推理\n\n## 📝 轻笔记\n<details>\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n\n**视觉模型（五问 · 用户先讲）**：\n- **对象**：54 张牌、每点数 4 张、3 玩家、断张、大牌、关键张 7/10\n- **连接**：断张 → 成炸/顺子；7-10 出光 → 无顺子；大牌归属 → 出牌权\n- **流向**：拿牌扫断张 → 出牌过程跟踪 → 中后段推理成炸/顺子\n- **边界**：脑力有限，不记每张牌，只记关键牌；记牌器辅助阶段可放宽\n- **变化**：随出牌进程，断张数量动态变化，推理置信度上升\n\n**视觉模型结构（AI 校准后）**：\n- **chart_type**：hierarchy\n- **节点 kind**：concept（法则）/ rule（记忆规则）/ data（关键牌）/ process（训练阶段）\n- **结构纠偏**：用户原以为\"记牌=背出过的每张牌\"，AI 校准为\"分层优先级记忆——只记关键牌，其余用推理补全\"。\n\n**类比**：它像足球赛的大名单——你不需要记住每个球员每个动作，但必须记住核心位置（断张=守门员、大牌=前锋、7-10=中场核心）和换人动向（出牌轨迹）。普通观众看热闹，教练看大名单。\n\n**大白话讲解（讲给外行）**：斗地主 54 张牌每人 17 张（地主 20 张），你不需要记每张出过的牌，只记关键牌。①断张——你手里一张 3 都没有，那 4 张 3 必在对手手里，可能成炸；②大牌——王、2、A 谁出了谁没出，决定谁有出牌权；③7 和 10——这两个是顺子的关键，没 7 或没 10 就没顺子，所以盯住 7-10 出几张就知道对手有没有顺子。训练从简单开始：先只记王和 2，5 局稳定后加 A/K，再加断张，最后加 7/10 推理。这是四阶段训练法。\n\n**三个应用例子**：\n1. **断张推理**：自己无 3，下家先手出 3，上家极可能 333（三带）——这是 34 法则的典型应用。\n2. **7/10 推理顺子**：出牌过半，7 已出 3 张、10 已出 4 张（出光），可断定对手无顺子，自己出连牌放心。\n3. **大牌归属推理**：地主出 A 后很快出 2，他单 2 的可能性大；出 2 后地主不出，两个王大概率到一家成王炸。\n\n**失效边界**：脑力超载时（多线记牌）反而出错——回退到只记王 2；记牌器辅助阶段依赖外部工具，离开后断崖式退化；自己残局剩 4 张时记牌转为算牌（推理剩余牌分布）。\n\n**边界补丁**（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：\n- 边界 1（脑力超载）→ 补救动作：降级到当前训练阶段的前一阶段，只记核心牌。\n- 边界 2（依赖记牌器）→ 补救动作：每周强制裸记 5 局，保留手感。\n- 本轮演练：边界 1——模拟同时记断张+大牌+7/10 出现混乱，降级回只记断张+王 2。\n\n**卡壳点复盘**：一开始想\"全记 54 张\"，3 局就脑力崩溃——后来才理解分层优先级，先记断张和大牌，其余用推理补全。补上后理解：记牌是数据收集，算牌才是数据解读。\n\n**成长对比**：起点认知\"记牌=背每张牌\" → 现在的理解\"四三法则 + 四类牌分层记忆 + 四阶段训练，用最少脑力记关键牌\"。\n\n</details>\n\n📎 [完整对话记录](_transcript/记牌技巧.jsonl)\n\n## 视觉模型图\n- 打开图：[_viz/记牌技巧.svg](_viz/记牌技巧.svg)\n- Mermaid 源：[_viz/记牌技巧.mmd](_viz/记牌技巧.mmd)\n\n## 📚 参考资料\n<details>\n<summary>📚 参考资料（点开查看本轮引用来源）</summary>\n\n- 〔wwuhn.github.io·教学笔记，2026-05-12〕 链接：<https://wwuhn.github.io/sports/Landlords/记牌与算牌.html>\n  - 原话引述：「记牌与算牌是斗地主的基本功。」\n  - 原话引述：「拿到牌首先就快速扫描下断那些牌，然后出的时候一直看那张出没有，一直到最后都没出，则多半是炸弹。」\n  - 原话引述：「10 以上的牌，3、4、7、10 必须记出了几个。」\n  - 原话引述：「自己无 3，下家先手，出 3。则上家极有可能为 333（若下家无带 3 之顺）。」\n  - AI 转述（可信度：高）：四三法则、断张推理、7-10 关键牌三层级在此文有明确论述，是本概念最权威的源。\n\n- 〔斗地主游戏官网·官方教程，2026〕 链接：<https://cn-douzhu.com/guide>\n  - 原话引述：「第一层级：记大牌——必须死记硬背的牌：大王、小王、四张 2、四张 A。」\n  - 原话引述：「第二层级：记缺牌——拿到手牌后，迅速扫视自己缺少哪些数字。这些缺牌极其大概率在其他玩家手中构成了炸弹。」\n  - 原话引述：「第三层级：算结构——根据对手出的牌反推其手牌结构。」\n  - AI 转述（可信度：高）：三层级记忆体系与四类牌分层高度对应，官方背书。\n\n- 〔pokerguidepro·攻略文章，2025-12-25〕 链接：<https://pokerguidepro.com/poker-tactics/doudizhu-master-skills-strategy-guide>\n  - 原话引述：「排除法推算炸弹：首先要牢记自己手中没有的缺牌……这些牌极有可能在某一家手中凑成了炸弹。」\n  - 原话引述：「断章取义法——重点记忆'10'和'7'这两张关键牌。如果场面上这两张牌都已经打光，那么对手手中持有顺子的可能性将大幅降低。」\n  - AI 转述（可信度：中）：7-10 顺子关键牌论断与 wwuhn 教学笔记互证。\n\n</details>\n\n## 🔭 视野拓展 · 行业洞见\n<details>\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n\n### 1. 掘开 · 〔JJ 斗地主官方解说〕\n- **身份**：JJ 斗地主官方赛事解说、JJDC 冠军杯长期评论员\n- **与本概念的关系**：职业赛事选手记牌精度极高，掘开解说数百场对\"记牌到算牌的转化\"有最敏锐的实战观察。\n- **核心洞见**：职业选手记牌不是记出过的牌，是记\"未出的牌的分布\"——同样记 4 张 7，普通人记已出几张，职业选手记剩下几张在谁手里。AI 整理·待核实。\n- **代表作**：JJ 斗地主冠军挑战赛解说系列\n- **扩展阅读**：[JJ 斗地主冠军杯-百度百科](https://baike.baidu.com/item/JJ%E6%96%97%E5%9C%B0%E4%B8%BB%E5%86%A0%E5%86%9B%E6%9D%AF/23381677) · [JJ 斗地主官方直播间](https://live.bilibili.com/22021983)\n\n### 2. 祁先生 · 〔民间防炸高手，\"天之骄子\"〕\n- **身份**：抖音/视频平台斗地主教学博主，以防炸策略闻名\n- **与本概念的关系**：记牌的核心应用之一是防炸——通过断张记忆推断对手藏炸概率，与本概念直接挂钩。\n- **核心洞见**：记牌的最高境界不是记牌张，是记\"对手的犹豫\"——记牌+行为信号联合判断藏炸位置。AI 整理·     l=l.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
    if(/^##\s+/.test(line)){out.push('<h2>'+l.replace(/^##\s+/,'')+'</h2>');}
    else if(/^#\s+/.test(line)){/*skip title*/}
    else if(/^>\s?/.test(line)){out.push('<blockquote>'+l.replace(/^&gt;\s?/,'')+'</blockquote>');}
    else if(/^\s*[-*]\s+/.test(line)){out.push('<div>• '+l.replace(/^\s*[-*]\s+/,'')+'</div>');}
    else if(line.trim()===''){out.push('');}
    else{out.push('<p>'+l+'</p>');}
  });
  return out.join('\n');
}
function openNode(n){
  if(n.type==='category'){ focus(n.id);
    const members=nodes.filter(x=>x.type==='concept'&&x.category===n.category)
      .map(x=>`<a data-jump="${x.label}">${x.label}</a>`).join(' · ');
    pbody.innerHTML=`<button id="close2" style="float:right;border:none;background:none;color:var(--muted);font-size:20px;cursor:pointer">×</button>
      <h1>${n.label}</h1><div class="badge">大类</div><div class="badge">${n.count} 个概念</div>
      <div class="md"><p>${members||'（暂无概念）'}</p></div>`;
  }else{
    focus(n.id);
    pbody.innerHTML=`<button id="close2" style="float:right;border:none;background:none;color:var(--muted);font-size:20px;cursor:pointer">×</button>
      <h1>${n.label}</h1>
      <div class="badge" style="border-color:${catColor[n.category]};color:${catColor[n.category]}">${n.category}</div>
      <div class="badge">${n.status||''}${n.track?' · '+n.track:''}</div>
      ${(n.aliases&&n.aliases.length)?'<div class="badge">'+n.aliases.join(' / ')+'</div>':''}
      ${(n.viz||n.viz_source)?'<div style="margin:8px 0 12px"><a href="'+((DATA.prefix||'')+(n.viz||n.viz_source))+'" target="_blank" style="display:inline-block;color:var(--accent);border:1px solid var(--accent);border-radius:8px;padding:5px 12px;text-decoration:none;font-weight:600">▶ 知识图解 / Knowledge Diagram</a></div>':''}
      ${window.self!==window.top?'<div style="margin:0 0 12px"><a data-open="'+n.label+'" style="display:inline-block;cursor:pointer;color:var(--accent);border:1px solid var(--accent);border-radius:8px;padding:5px 12px;text-decoration:none;font-weight:600">📖 在知识站打开</a></div>':''}
      <div class="md">${mdToHtml(n.body)}</div>`;
  }
  panel.classList.add('open');
  pbody.querySelectorAll('[data-jump]').forEach(a=>a.onclick=()=>{const t=byId[a.dataset.jump]; if(t)openNode(t);});
  pbody.querySelectorAll('[data-open]').forEach(a=>a.onclick=()=>{try{parent.postMessage({goto:a.dataset.open},'*');}catch(e){}});
  const c2=document.getElementById('close2'); if(c2)c2.onclick=()=>{panel.classList.remove('open');focus(null);};
}

// 搜索
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase(); if(!q){focus(null);return;}
  nodeEls.forEach(g=>{const n=g._node;
    const hit=n.label.toLowerCase().includes(q)||(n.aliases||[]).some(a=>a.toLowerCase().includes(q));
    g.classList.toggle('dim',!hit); g.classList.toggle('hl',hit);});
  linkEls.forEach(e2=>e2.classList.add('dim'));
});

const THEMES=[["light","◐ 浅"],["dark","◑ 深"],["ink","❖ 宣纸"],["inkdark","❖ 夜墨"]];
function themeIdx(name){for(var i=0;i<THEMES.length;i++)if(THEMES[i][0]===name)return i;return 1;}
function applyPalette(){buildPalette();
  nodeEls.forEach(function(g){var n=g._node;
    if(n.type==='category')n._c.style.fill=catColor[n.category];
    else n._c.style.stroke=(STATUSRING[n.status]||'var(--ring)');});
  var li=document.querySelectorAll('#legend i'),k=0;
  DATA.categories.forEach(function(c){if(li[k])li[k].style.background=catColor[c];k++;});
  Object.keys(STATUSRING).forEach(function(s){if(li[k])li[k].style.borderColor=STATUSRING[s];k++;});}
function applyTheme(name){document.documentElement.dataset.theme=name;applyPalette();
  document.getElementById('themebtn').textContent=THEMES[themeIdx(name)][1];}
document.getElementById('themebtn').onclick=function(){
  var cur=document.documentElement.dataset.theme||'dark';
  applyTheme(THEMES[(themeIdx(cur)+1)%THEMES.length][0]);};
applyTheme(document.documentElement.dataset.theme||'dark');

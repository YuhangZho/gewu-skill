urrent": null, "next3": [], "progress_hint": {"current_pct": 100, "next_pct": 100, "bar": "[██████████]", "milestone": "", "line": "当前知识图谱覆盖率100%，下一站完成可达100%。"}, "learned": 13, "total": 13, "max_stage": 4}}, "expansions": {"斗地主": []}}, DOCS={"基础牌型与大小规则": {"doc": "<div class=\"dochead\"><h1>基础牌型与大小规则 <span class=\"stars\">★★<span class=\"se\">★★★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 快轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于斗地主基础规则，是用来解决「能出什么牌、谁压谁」这个底层判断问题的——所有后续决策都建立在这 10 种合法牌型之上。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你能在 3 秒内判断任意一手牌是否合法、能否压过上家，不再因&quot;能不能这么出&quot;卡顿。</p>\n<p><strong>重点结论</strong>：</p>\n<ul><li><strong>10 种合法牌型</strong>：单张 / 对子 / 三张 / 三带一 / 三带二 / 顺子(≥5 张) / 连对(≥3 组) / 飞机(≥2 组三连) / 飞机带翅膀 / 四带二 / 炸弹 / 王炸——共 12 个条目（飞机与飞机带翅分计）。</li><li><strong>牌型大小总纲</strong>：同型同张数才能比大小，比的是其中&quot;核心牌&quot;的点数（三带比三张点数、飞机比三连点数、四带二比四张点数），带牌不影响大小。</li><li><strong>炸弹与王炸是特权牌</strong>：炸弹(4 张同点)可压任何非炸牌型、炸弹之间比点数；王炸(大王+小王)最大，无法被反制。打出炸弹/王炸均触发翻倍。</li><li><strong>顺子/连对/飞机的连续段不含 2 和王</strong>：最大顺子是 10-J-Q-K-A，最大连对是 AA-22? ❌ 错——连对到 A 为止，2 和王不能进顺子/连对/飞机。</li><li><strong>飞机带翅膀规则</strong>：可带等量的单牌或对子，<strong>不能混带</strong>（要么全带单、要么全带对），且带的牌中不能含双王或炸弹。</li><li><strong>四带二不是炸弹</strong>：是独立牌型(4 张同点 + 2 单或 2 对)，不能压其他牌型，只能压更小的四带二。</li><li><strong>三张可单独出</strong>：3 张同点可不带牌直接出（叫&quot;三条&quot;），但跟牌时必须同样出三条或炸弹/王炸。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>10 种合法牌型速查<ul><li>普通牌型（9 种，须同型同张数相比）<ul><li>单张 / 对子 / 三张</li><li>三带一 / 三带二（带牌不参与比大小）</li><li>顺子（≥5 张连续，不含 2 和王）</li><li>连对（≥3 组连续对子，不含 2 和王）</li><li>飞机（≥2 组连续三张，不含 2 和王）</li><li>飞机带翅膀（等量单或对，不可混带）</li><li>四带二（2 单或 2 对，不是炸弹）</li></ul></li><li>特权牌型（2 种，可跨型压制）<ul><li>炸弹（4 张同点，压一切非炸，翻倍）</li><li>王炸（大王+小王，最大，翻倍）</li></ul></li></ul></li><li>牌型大小比较<ul><li>同型比点数：大王&gt;小王&gt;2&gt;A&gt;K&gt;Q&gt;J&gt;10&gt;9&gt;8&gt;7&gt;6&gt;5&gt;4&gt;3</li><li>三带一 ⇄ 三带一、三带二 ⇄ 三带二（同型才能互压）</li><li>炸弹压一切非炸，炸弹之间比点数</li><li>王炸最大，无法被反制</li></ul></li><li>常见盲区<ul><li>飞机带翅不能混带（全单或全对）</li><li>四带二不是炸弹，不能压其他牌型</li><li>顺子/连对/飞机不含 2 和王</li><li>三张可单独出（不一定带牌）</li><li>三带一与三带二不能互压（须同型）</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看记忆口诀与盲区）</summary>\n<p><strong>记忆口诀</strong>：<strong>「单对三、带一二、顺连飞、四带二、炸王炸」</strong>——前 9 种是普通牌型须同型比，后 2 种是特权牌型可跨型压。</p>\n<p><strong>飞机带翅膀速记</strong>：<strong>等量、同型、不含炸</strong>——带几张看飞机几组（2 组飞机带 2 单或 2 对），全单或全对不能混，带的牌中不能有双王/炸弹。</p>\n<p><strong>最易翻车 3 点</strong>：</p>\n<ol><li>以为&quot;四带二&quot;是炸弹 → 它是独立牌型，只能压更小的四带二，不能压其他型</li><li>以为顺子可以 10-J-Q-K-A-2 → 2 和王不进顺子/连对/飞机，最大顺子是 10-J-Q-K-A</li><li>以为三带一能压三带二 → 须同型同张数才能比，三带一 vs 三带二不互压</li></ol>\n<p><strong>牌型大小一句话</strong>：<strong>大王&gt;小王&gt;2&gt;A&gt;K&gt;Q&gt;J&gt;10&gt;9&gt;8&gt;7&gt;6&gt;5&gt;4&gt;3</strong>，除大小王外不区分花色——背下来这是所有比较的基础。</p>\n<p><strong>飞机带翅膀例子</strong>：</p>\n<ul><li>✅ 666777+3Q（带 2 张单）</li><li>✅ 666777+33QQ（带 2 对）</li><li>❌ 666777+3+QQ（混带，非法）</li><li>❌ 666777+大王小王（带的牌含双王，非法）</li></ul>\n</details>\n<h2 id=\"sec-4\">相关</h2>\n<p><a class=\"xref\" data-go=\"手牌强度评估\">手牌强度评估</a> · <a class=\"xref\" data-go=\"出牌顺序规划\">出牌顺序规划</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">相关</a>", "title": "基础牌型与大小规则"}, "手牌强度评估": {"doc": "<div class=\"dochead\"><h1>手牌强度评估 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于叫牌决策，是用来解决「这手牌该不该叫地主、叫几分」这个最关键单点决策的——一切叫牌的底层判断。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你能在 10 秒内用四维框架量化任意一手牌的强度（点力+结构+控制+手数），并按决策树得出&quot;叫 3 / 叫 1 / 弃&quot;的明确结论，不再凭感觉。</p>\n<p><strong>重点结论</strong>（AI 与你的最终共识）：</p>\n<ul><li><strong>牌力不是单一维度，是四维组合</strong>：绝对点力 + 牌型结构 + 控制力 + 手数速度——任何一维短板都会拖垮整体胜率。仅有炸弹但缺 2、缺王或断张多（&quot;炸弹陷阱&quot;），胜率会骤降 40% 以上。</li><li><strong>牌点制是量化基础</strong>：大王 4 点、小王 3 点、2 每张 2 点、A 每张 1 点，累加得绝对点力。<strong>≥7 分 = 强牌区</strong>（可叫地主）、<strong>5-6 分 = 灰色地带</strong>（看位置与结构）、<strong>≤4 分 = 必弃区</strong>。</li><li><strong>断张数是结构的命脉</strong>：断档牌（如缺 7 或 9）超过 2 张时，底牌补顺概率低于 30%——结构断裂再多大牌也打不出去。</li><li><strong>控制力 = 首发能否续控</strong>：手握大王+2 等绝对控制牌，能在出小牌后被压时反压收回牌权，形成&quot;出小→被压→反压→续出&quot;的循环；无控制力则出小即失权。</li><li><strong>手数速度 = 最少出牌次数</strong>：粗算把所有牌打完需要的最少手数，<strong>≤5 手为优</strong>；手数越多越易被农民配合卡死。</li><li><strong>叫牌决策树</strong>：点力 ≥7 → 断张 ≤2 → 手数 ≤5 且有控 → 叫 3 分；点力 ≤4 → 直接弃；中间档看位置与底牌期望修正。</li><li><strong>类比&quot;买车验车清单&quot;</strong>：点力=发动机、结构=底盘、控制=刹车、手数=油耗——四项全过关才敢叫地主这台&quot;车&quot;。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>四维牌力框架<ul><li>① 绝对点力（牌点制）<ul><li>大王 4 / 小王 3 / 2 每张 2 / A 每张 1</li><li>累加得分：≥7 强 / 5-6 中 / ≤4 弱</li></ul></li><li>② 牌型结构<ul><li>断张数（≤2 为优，&gt;2 难补顺）</li><li>顺子潜力（连续段长度）</li><li>组合弹性（可拆解性）</li></ul></li><li>③ 控制力<ul><li>首发能否续控（出小→被压→反压→续出）</li><li>绝对控制牌：大王、2、炸弹</li></ul></li><li>④ 手数速度<ul><li>最少出牌次数（≤5 手为优）</li><li>手数越多越易被卡死</li></ul></li></ul></li><li>叫牌决策树<ul><li>入口：点力得分</li><li>强牌区（≥7 分）<ul><li>断张 ≤2 → 手数 ≤5 且有控 → 叫 3 分</li><li>任一不满足 → 降档叫 1-2 分</li></ul></li><li>灰色地带（5-6 分）<ul><li>看位置修正（首家保守/末家激进）</li><li>看底牌期望（断 1 张补到概率 ~42%）</li></ul></li><li>弱牌区（≤4 分）→ 直接弃叫</li></ul></li><li>失效保护<ul><li>&quot;炸弹陷阱&quot;：有炸弹但缺 2/王/断张 → 胜率骤降 40%</li><li>结构断裂：大牌再多也打不出去</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：「叫地主看手牌强弱」——有直觉但无量化，凭&quot;感觉有大牌就叫&quot;。</p>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：手牌 17 张、大牌点力、牌型结构、控制牌、出牌手数</li><li><strong>连接</strong>：点力↔大牌数量；结构↔断张；控制↔能否反压；手数↔出牌效率</li><li><strong>流向</strong>：发牌 → 四维评估 → 决策树 → 叫分档位（3/1/弃）</li><li><strong>边界</strong>：炸弹陷阱（有炸无 2 无王）、结构断裂（断张 &gt;2）</li><li><strong>变化</strong>：底牌补强会改变结构（断张补上、炸弹升级）</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type</strong>：hierarchy（四维框架 → 决策树 → 档位边界，层级展开）</li><li><strong>节点 kind</strong>：concept(手牌强度评估)、data(四维指标)、rule(量化标准)、process(决策树)、boundary(强/弱档边界)</li><li><strong>结构纠偏</strong>：用户初版想用 flow（流程图），AI 校准为 hierarchy——四维是并列指标不是顺序步骤，决策树才是流程；四维先于决策树，决策树汇出档位。</li></ul>\n<p><strong>类比</strong>：它像<strong>买车验车清单</strong>——点力=发动机（动力够不够）、结构=底盘（连续不散架）、控制=刹车（能收得住）、手数=油耗（一次跑完几趟）。四项全过关才敢叫地主这台&quot;车&quot;，任一项短板都可能在高速上抛锚。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：判断一手牌该不该叫地主，不是看大牌多不多这么简单，要看四件事：第一，<strong>点力</strong>——你的大牌加起来值几分（大王 4 分、小王 3 分、2 每张 2 分、A 每张 1 分），7 分以上才算强；第二，<strong>结构</strong>——牌有没有断档（比如缺 7、缺 9），断 2 张以上底牌补不顺，再多大牌也打不出去；第三，<strong>控制力</strong>——你出小牌被压之后能不能反压收回牌权，没控制力出小就失权；第四，<strong>手数</strong>——最少几手能打完，5 手以内为佳，手数越多越被卡死。四项全过关才叫地主，有一项严重短板就别叫——特别是&quot;有炸弹但没 2 没王&quot;这种炸弹陷阱，胜率直接掉 40%。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li><strong>强牌叫 3 分</strong>：大王+小王+2 张 2+对 A+5 顺子 → 点力 11 分、断张 1、有王炸控制、手数 4 → 叫 3 分</li><li><strong>灰色地带弃叫</strong>：小王+1 张 2+对 K+散牌 5 张 → 点力 5 分、断张 3、无大王控制、手数 7 → 弃叫</li><li><strong>炸弹陷阱</strong>：4 张 K 炸弹但无王无 2、断 4 张 → 点力 4 分但靠炸撑起 → 仍弃叫（胜率骤降）</li></ol>\n<p><strong>失效边界 / 不适用场景</strong>：</p>\n<ul><li><strong>炸弹陷阱</strong>：仅有炸弹但缺 2、缺王或断张多 → 胜率骤降 40% 以上</li><li><strong>结构断裂</strong>：断档 &gt;2 张 → 底牌补顺概率 &lt;30%，大牌打不出去</li><li><strong>无控制力</strong>：出小即失权，无法续控 → 节奏被农民接管</li><li><strong>手数过多</strong>：&gt;6 手 → 被农民配合卡死，地主孤掌难鸣</li></ul>\n<p><strong>边界补丁</strong>（失败场景 → 补救动作）：</p>\n<ul><li><strong>炸弹陷阱</strong>（4 张 K 但无 2 无王）→ 补救：弃叫当农民，把炸弹留作关键回合拦截，比硬叫胜率高</li><li><strong>断 3 张顺子</strong>（缺 7、9、J）→ 补救：弃叫，叫了底牌补顺概率仅 ~12%</li><li><strong>本轮演练</strong>：拿到 4 张 K + 1 张 2 + 散牌 6 张 → 直觉想叫（有炸），按四维评估点力仅 6 分、断张 3、无王控制、手数 7 → 弃叫，结果农民赢，验证&quot;炸弹陷阱&quot;成立</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ul><li><strong>核心卡壳</strong>：「为什么有炸弹还不能叫地主？」→ 补：炸弹只是 1 个特权牌型，地主 20 张牌要打 5-6 手，剩下 4-5 手没 2 没王就完全没牌权，农民配合一出小牌你就被卡死，炸弹留到最后也救不回来——这就是&quot;炸弹陷阱&quot;的本质：<strong>炸弹解决一手，控制力解决全部手数</strong>。</li><li><strong>次要盲区</strong>：最初只数大牌张数不数断张 → 补：断张 &gt;2 时底牌补顺概率 &lt;30%，是大牌再多也打不出的根因。</li><li><strong>三重验证</strong>：① 强牌例（点力 11 + 断 1 + 有控 + 手数 4）→ 叫 3 分 ✓ ② 炸弹陷阱例（点力 6 + 断 3 + 无控 + 手数 7）→ 弃叫 ✓ ③ 灰色地带例（点力 5-6）→ 看位置与底牌期望修正，符合决策树逻辑 ✓</li></ul>\n<p><strong>成长对比</strong>：起点「叫地主看手牌强弱，感觉有大牌就叫」→ 现在「四维框架（点力+结构+控制+手数）量化评估，决策树输出叫分档位，识别炸弹陷阱不再硬叫」。</p>\n</details>\n<p>📎 <a href=\"_transcript/手牌强度评估.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/手牌强度评估.svg\" target=\"_blank\" rel=\"noopener\">_viz/手牌强度评估.svg</a></li><li>Mermaid 源：<a href=\"_viz/手牌强度评估.mmd\" target=\"_blank\" rel=\"noopener\">_viz/手牌强度评估.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>hierarchy</b></div><img src=\"_viz/手牌强度评估.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/手牌强度评估.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/手牌强度评估.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">3. 职业选手共同体 · 「高弃叫率实践派」</h3>\n<ul><li><strong>身份</strong>：JJ 斗地主、腾讯欢乐斗地主等平台的职业/高水平玩家群体</li><li><strong>与本概念的关系</strong>：职业选手实战数据验证了&quot;叫错代价 &gt; 不叫损失&quot;——高段位玩家弃叫率显著高于低段位，正是四维评估中&quot;弱牌区必弃&quot;的现实体现</li><li><strong>核心洞见</strong>：「职业赛里叫牌不是&#x27;感觉好就上&#x27;，而是对胜率、收益与风险的快速量化；高段位玩家弃叫率明显高于低段位，因为叫错的代价（3 倍底分+翻倍风险）远大于不叫的损失（仅失去底牌补强机会）。」（AI 归纳 · 综合多方职业赛事解说）</li><li><strong>代表作</strong>：JJ 斗地主全国锦标赛、腾讯欢乐斗地主全民赛</li><li><strong>扩展阅读</strong>：<a href=\"https://www.online-dqd.com/news/2026-04-22-news-66872/\" target=\"_blank\" rel=\"noopener\">斗地主职业玩家叫牌模型解析</a> · <a href=\"https://game-wegame.com/news-20260529-1753-1787\" target=\"_blank\" rel=\"noopener\">斗地主高手的判断流程</a></li></ul>\n</details>\n<h2 id=\"sec-7\">相关</h2>\n<p><a class=\"xref\" data-go=\"基础牌型与大小规则\">基础牌型与大小规则</a> · <a class=\"xref\" data-go=\"叫地主决策\">叫地主决策</a> · <a class=\"xref\" data-go=\"加倍与抢地主决策\">加倍与抢地主决策</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-7\">相关</a>", "title": "手牌强度评估"}, "出牌顺序规划": {"doc": "<div class=\"dochead\"><h1>出牌顺序规划 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于〔斗地主·出牌战术〕，是用来解决〔一手 17 张牌拆成几个轮次、按什么顺序出才能用最少手数走完且不被压死〕的——从凭感到有规划的分水岭。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能在拿到牌后 3 秒内识别完整牌型，并按&quot;拆后总手数 &lt; 拆前 + 拆出牌型有回手机制 + 保留大牌炸弹压场&quot;三原则规划出牌顺序，把 17 张牌控制在 5–7 手走完。</p>\n<p><strong>重点结论</strong>（只收 AI 与你达成的最终共识）：</p>\n<ul><li>拆牌三原则缺一不可：手数减少原则（拆后总手数必须 &lt; 拆前）+ 回手牌原则（拆出的牌型要有回手机制）+ 控场优先原则（保留大牌和炸弹用于压场）。三者是 AND 关系，任一不满足就不拆。</li><li>5–7 手走完 17 张是拆牌成功的硬指标；8–10 手就是手数失控，必输。</li><li>三大经典拆法：拆对补单（拆中等对子补单牌缺口）/ 拆三补缺（拆三张补顺子缺张）/ 拆炸保控（拆小炸成四带二保大牌控场）。</li><li>结构保留黄金比：2 炸 + 1 顺 + 2 对 + 3 单 ≈ 17 张，是控场型牌型的理想骨架。</li><li>3 秒内识别完整牌型是高手门槛——拿到牌先扫断张、再看大牌分布、最后定骨架。</li><li>角色差异化：地主大胆主动拆长顺打节奏；农民协同拆牌 + 送牌辅助队友。</li><li>类比&quot;做饭食材分拣&quot;：先按菜式分组（拆牌），再按烹饪顺序下锅（出牌顺序）。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>拆牌三原则（决策门槛）<ul><li>手数减少原则：拆后手数 &lt; 拆前</li><li>回手牌原则：拆出牌型有回手</li><li>控场优先原则：保留大牌 + 炸弹</li></ul></li><li>三大经典拆法<ul><li>拆对补单（拆中等对子补单牌）</li><li>拆三补缺（拆三张补顺子缺张）</li><li>拆炸保控（拆小炸成四带二）</li></ul></li><li>结构黄金比<ul><li>2 炸 + 1 顺 + 2 对 + 3 单 = 17 张</li></ul></li><li>手数评估<ul><li>5–7 手 = 成功</li><li>8–10 手 = 失控</li></ul></li><li>角色差异<ul><li>地主：主动拆长顺打节奏</li><li>农民：协同拆牌 + 送牌</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：17 张手牌、牌型组合、手数、大牌/炸弹、角色</li><li><strong>连接</strong>：牌型 → 手数；拆法 → 手数变化；角色 → 拆法选择</li><li><strong>流向</strong>：拿到牌 → 扫断张 → 定骨架 → 拆牌三原则校验 → 定出牌顺序</li><li><strong>边界</strong>：手数 ≥ 8 必拆减手；缺回手牌不拆；缺控场牌不拆</li><li><strong>变化</strong>：随出牌进程，手数动态变化，需重新规划</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type（AI 自主判定）</strong>：flow</li><li><strong>节点 kind</strong>：process（流程）/ rule（原则）/ data（手数）/ boundary（边界）/ concept（拆法）</li><li><strong>结构纠偏</strong>：用户原以为&quot;拆牌=把对子拆成单牌&quot;，AI 校准为&quot;主动打破牌型结构换取灵活性与控制力&quot;，本质是手数 + 回手 + 控场三原则联合决策。</li></ul>\n<p><strong>类比</strong>：它像做饭前的食材分拣——先把冰箱里的食材按菜式分组（拆牌成牌型），再按烹饪先后顺序下锅（出牌顺序）；分拣错了，再好的食材也做不出一桌菜。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：斗地主每人 17 张牌，不能一张一张出，得把牌分成几组（牌型）一组一组出。比如 34567 是一组顺子，555 带一张 3 是一组三带一，每组就是&quot;一手&quot;。怎么分才能让总手数最少、不会被对手压死、还能保住大牌压场？这就是拆牌。三原则是：①拆完手数得变少；②拆出去的那组得有&quot;回手机会&quot;（自己能再接回出牌权）；③得留大牌和炸弹用来最后压场。5–7 手走完 17 张就是高手，8–10 手就是新手乱拆。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li><strong>拆对补单</strong>：手牌 KK + 散牌 3、5、7、9。KK 拆成两张 K 单出，能压对手单牌拿回出牌权，比留着 KK 被对手 AA 压死强。</li><li><strong>拆三补缺</strong>：手牌 777 + 34568。777 拆掉，3+4+5+6+7+7+7 组成 34567 顺子 + 77 对子，手数减少且顺子有回手机会。</li><li><strong>拆炸保控</strong>：手牌 3333 + 大王 + 2。3333 拆成四带二（3333 带大王 + 2），保留单张控制权，避免后期没大牌。</li></ol>\n<p><strong>失效边界</strong>：对手有王炸时拆牌压不住（必须先诱出王炸再拆）；自己单牌过多（≥ 5 张）且无大牌时拆牌无意义（直接送小单等队友）；残局阶段（每人 ≤ 4 张）拆牌三原则失效，按残局算法走。</p>\n<p><strong>边界补丁</strong>（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：</p>\n<ul><li>边界 1（对手有王炸）→ 补救动作：先连续出单牌逼对手拆王，再启动拆牌规划。</li><li>边界 2（单牌过多无大牌）→ 补救动作：放弃拆牌规划，改为&quot;送小牌 + 留一张大牌防偷跑&quot;。</li><li>本轮演练：边界 1——模拟地主出小王逼农民出大王，再启动拆对补单。</li></ul>\n<p><strong>卡壳点复盘</strong>：一开始以为&quot;拆牌 = 减少手数&quot;，忽略回手牌原则——拆出顺子后被对手炸弹压死，没法回手。补上后理解：拆牌三原则是 AND 关系，不是 OR。</p>\n<p><strong>成长对比</strong>：起点认知&quot;拆牌就是把对子拆成单牌出&quot; → 现在的理解&quot;拆牌是手数 + 回手 + 控场三原则联合决策，目标是 5–7 手走完 17 张且保留控场能力&quot;。</p>\n</details>\n<p>📎 <a href=\"_transcript/出牌顺序规划.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/出牌顺序规划.svg\" target=\"_blank\" rel=\"noopener\">_viz/出牌顺序规划.svg</a></li><li>Mermaid 源：<a href=\"_viz/出牌顺序规划.mmd\" target=\"_blank\" rel=\"noopener\">_viz/出牌顺序规划.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/出牌顺序规划.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/出牌顺序规划.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/出牌顺序规划.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">🔭 视野拓展 · 行业洞见</h2>\n<details class=\"lp-fold\">\n<summary>🔭 视野拓展 · 行业洞见（点开看多维度权威参照）</summary>\n<h3 id=\"sec-6\">1. 掘开 · 〔JJ 斗地主官方解说〕</h3>\n<ul><li><strong>身份</strong>：JJ 斗地主官方赛事解说、JJDC 冠军杯长期评论员</li><li><strong>与本概念的关系</strong>：解说数百场职业赛事，对&quot;拆牌手数&quot;在顶级对局中的决定性作用有最直接的实战观察。</li><li><strong>核心洞见</strong>：职业选手的拆牌差异在毫厘——同样 17 张牌，顶级地主能压到 5 手，普通选手 7 手；多出的 2 手就是胜负差。AI 整理·待核实。</li><li><strong>代表作</strong>：JJ 斗地主冠军挑战赛解说系列</li><li><strong>扩展阅读</strong>：<a href=\"https://baike.baidu.com/item/JJ%E6%96%97%E5%9C%B0%E4%B8%BB%E5%86%A0%E5%86%9B%E6%9D%AF/23381677\" target=\"_blank\" rel=\"noopener\">JJ 斗地主冠军杯-百度百科</a> · <a href=\"https://live.bilibili.com/22021983\" target=\"_blank\" rel=\"noopener\">JJ 斗地主官方直播间</a></li></ul>\n<h3 id=\"sec-7\">2. 祁先生 · 〔民间防炸高手，&quot;天之骄子&quot;〕</h3>\n<ul><li><strong>身份</strong>：抖音/视频平台斗地主教学博主，以防炸策略闻名</li><li><strong>与本概念的关系</strong>：拆牌中&quot;拆炸保控&quot;是反向操作——本概念解决何时拆炸、祁先生解决如何防对手藏炸，互为镜像。</li><li><strong>核心洞见</strong>：拆牌前先判断对手是否藏炸，比拆牌本身更重要——拆错时机，再好的拆法也输。AI 整理·待核实。</li><li><strong>代表作</strong>：祁先生斗地主防炸教学系列</li><li><strong>扩展阅读</strong>：<a href=\"https://www.sohu.com/a/810004753_121798711\" target=\"_blank\" rel=\"noopener\">祁先生防炸策略-搜狐报道</a></li></ul>\n</details>\n<h2 id=\"sec-8\">相关</h2>\n<p><a class=\"xref\" data-go=\"基础牌型与大小规则\">基础牌型与大小规则</a> · <a class=\"xref\" data-go=\"手牌强度评估\">手牌强度评估</a> · <a class=\"xref\" data-go=\"单牌控制与过牌时机\">单牌控制与过牌时机</a> · <a class=\"xref\" data-go=\"炸弹使用时机\">炸弹使用时机</a> · <a class=\"xref\" data-go=\"地主出牌策略\">地主出牌策略</a> · <a class=\"xref\" data-go=\"农民配合策略\">农民配合策略</a> · <a class=\"xref\" data-go=\"反直觉陷阱与常见错误\">反直觉陷阱与常见错误</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">🔭 视野拓展 · 行业洞见</a><a class=\"tl lv2\" data-id=\"sec-8\">相关</a>", "title": "出牌顺序规划"}, "记牌技巧": {"doc": "<div class=\"dochead\"><h1>记牌技巧 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于〔斗地主·算牌记牌〕，是用来解决〔如何用最少脑力记住关键牌张、推断对手手牌结构〕的——记牌是斗地主的基本功，区分普通玩家和顶尖高手的绝对分水岭。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能用&quot;四三法则 + 四类牌分层记忆体系&quot;，在 3 秒内心算断张和大牌分布，并通过&quot;四阶段训练路径&quot;从只记王 2 逐步进阶到记 7/10 推理顺子。</p>\n<p><strong>重点结论</strong>（只收 AI 与你达成的最终共识）：</p>\n<ul><li>四三法则：每种点数 4 张牌 ÷ 3 玩家，断张（自己一张没有）必在另外两家手中——要么成炸要么成顺子关键张。</li><li>四类牌分层记忆体系：断张（最高优先级）&gt; 大牌（王/2/A 线）&gt; 关键张（7 和 10）&gt; 行牌推理（推顺子/三带归属）。</li><li>7 和 10 是顺子关键牌：无 7 或无 10 则必然无顺子。10 出干净=56789 顺子最大；7 出干净=牌型断层。这是判断对手是否藏顺子的核心信号。</li><li>三种记忆法：候补减数法（数字串跟踪每点数已出张数）+ 牌型记忆法（盯负担牌型如三带一的&quot;三张&quot;去向）+ 分组记忆法（54 张分四组 3-3-3-K-A-王，按组记忆）。</li><li>四阶段训练路径：①只记王 2 → ②加 A/K → ③加断张 → ④加 7/10 推理。每阶段稳定 5 局再升级。</li><li>记牌三层级：记大牌（王/2/A 绝对控制权）→ 记缺牌（断张大概率成炸）→ 算结构（反推对手手牌结构）。</li><li>类比&quot;足球赛大名单&quot;——不记每个球员每个动作（54 张全记），只记核心位置（断张/大牌/7-10）和换人动向（出牌轨迹）。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>四三法则<ul><li>4 张 ÷ 3 玩家 = 断张在对手</li><li>断张 = 炸 or 顺子关键</li></ul></li><li>四类牌分层（优先级）<ul><li>断张（最高）</li><li>大牌（王/2/A）</li><li>关键张（7 和 10）</li><li>行牌推理</li></ul></li><li>7 和 10 的特殊地位<ul><li>无 7 或无 10 = 无顺子</li><li>10 出干净 = 56789 最大</li><li>7 出干净 = 牌型断层</li></ul></li><li>三种记忆法<ul><li>候补减数法</li><li>牌型记忆法</li><li>分组记忆法</li></ul></li><li>四阶段训练路径<ul><li>阶段1：王 2</li><li>阶段2：+A/K</li><li>阶段3：+断张</li><li>阶段4：+7/10 推理</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：54 张牌、每点数 4 张、3 玩家、断张、大牌、关键张 7/10</li><li><strong>连接</strong>：断张 → 成炸/顺子；7-10 出光 → 无顺子；大牌归属 → 出牌权</li><li><strong>流向</strong>：拿牌扫断张 → 出牌过程跟踪 → 中后段推理成炸/顺子</li><li><strong>边界</strong>：脑力有限，不记每张牌，只记关键牌；记牌器辅助阶段可放宽</li><li><strong>变化</strong>：随出牌进程，断张数量动态变化，推理置信度上升</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type</strong>：hierarchy</li><li><strong>节点 kind</strong>：concept（法则）/ rule（记忆规则）/ data（关键牌）/ process（训练阶段）</li><li><strong>结构纠偏</strong>：用户原以为&quot;记牌=背出过的每张牌&quot;，AI 校准为&quot;分层优先级记忆——只记关键牌，其余用推理补全&quot;。</li></ul>\n<p><strong>类比</strong>：它像足球赛的大名单——你不需要记住每个球员每个动作，但必须记住核心位置（断张=守门员、大牌=前锋、7-10=中场核心）和换人动向（出牌轨迹）。普通观众看热闹，教练看大名单。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：斗地主 54 张牌每人 17 张（地主 20 张），你不需要记每张出过的牌，只记关键牌。①断张——你手里一张 3 都没有，那 4 张 3 必在对手手里，可能成炸；②大牌——王、2、A 谁出了谁没出，决定谁有出牌权；③7 和 10——这两个是顺子的关键，没 7 或没 10 就没顺子，所以盯住 7-10 出几张就知道对手有没有顺子。训练从简单开始：先只记王和 2，5 局稳定后加 A/K，再加断张，最后加 7/10 推理。这是四阶段训练法。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li><strong>断张推理</strong>：自己无 3，下家先手出 3，上家极可能 333（三带）——这是 34 法则的典型应用。</li><li><strong>7/10 推理顺子</strong>：出牌过半，7 已出 3 张、10 已出 4 张（出光），可断定对手无顺子，自己出连牌放心。</li><li><strong>大牌归属推理</strong>：地主出 A 后很快出 2，他单 2 的可能性大；出 2 后地主不出，两个王大概率到一家成王炸。</li></ol>\n<p><strong>失效边界</strong>：脑力超载时（多线记牌）反而出错——回退到只记王 2；记牌器辅助阶段依赖外部工具，离开后断崖式退化；自己残局剩 4 张时记牌转为算牌（推理剩余牌分布）。</p>\n<p><strong>边界补丁</strong>（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：</p>\n<ul><li>边界 1（脑力超载）→ 补救动作：降级到当前训练阶段的前一阶段，只记核心牌。</li><li>边界 2（依赖记牌器）→ 补救动作：每周强制裸记 5 局，保留手感。</li><li>本轮演练：边界 1——模拟同时记断张+大牌+7/10 出现混乱，降级回只记断张+王 2。</li></ul>\n<p><strong>卡壳点复盘</strong>：一开始想&quot;全记 54 张&quot;，3 局就脑力崩溃——后来才理解分层优先级，先记断张和大牌，其余用推理补全。补上后理解：记牌是数据收集，算牌才是数据解读。</p>\n<p><strong>成长对比</strong>：起点认知&quot;记牌=背每张牌&quot; → 现在的理解&quot;四三法则 + 四类牌分层记忆 + 四阶段训练，用最少脑力记关键牌&quot;。</p>\n</details>\n<p>📎 <a href=\"_transcript/记牌技巧.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/记牌技巧.svg\" target=\"_blank\" rel=\"noopener\">_viz/记牌技巧.svg</a></li><li>Mermaid 源：<a href=\"_viz/记牌技巧.mmd\" target=\"_blank\" rel=\"noopener\">_viz/记牌技巧.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>hierarchy</b></div><img src=\"_viz/记牌技巧.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/记牌技巧.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/记牌技巧.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">相关</h2>\n<p><a class=\"xref\" data-go=\"基础牌型与大小规则\">基础牌型与大小规则</a> · <a class=\"xref\" data-go=\"算牌与概率推断\">算牌与概率推断</a> · <a class=\"xref\" data-go=\"炸弹使用时机\">炸弹使用时机</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">相关</a>", "title": "记牌技巧"}, "叫地主决策": {"doc": "<div class=\"dochead\"><h1>叫地主决策 <span class=\"stars\">★★★★★<span class=\"se\"></span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于叫牌决策，是用来解决「拿到这手牌到底叫不叫、叫几分」的——叫牌是斗地主一切胜负的起点，叫错一盘可能要三盘才能补回来。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你能用「牌力基础分 + 位置修正分 + 底牌期望分」三维决策模型，在 10 秒内对任意手牌得出&quot;叫 3 / 叫 1 / 弃叫&quot;的明确结论，并把&quot;叫错代价 &gt; 不叫损失&quot;内化为 70% 胜率的核心护城河。</p>\n<p><strong>重点结论</strong>（AI 与你的最终共识）：</p>\n<ul><li><strong>叫牌 = 三维决策，不是单维牌力</strong>：牌力基础分（点力）+ 位置修正分（叫牌顺序）+ 底牌期望分（补强概率）——三维加权后才能定档。只看牌力不看位置和底牌期望，等于盲叫。</li><li><strong>牌力三档划分</strong>：≥7 分强牌区（叫 3 / 2 分）/ 5-6 分灰色地带（看位置与底牌）/ ≤4 分弱牌区（直接弃）。强牌区还要校验&quot;断张≤2 + 手数≤5 + 有控制力&quot;才能叫 3 分。</li><li><strong>位置策略差异巨大</strong>：首家保守（阈值最高，叫 3 分需点力 ≥8 + 结构完整）/ 二家可捡漏可拦截（看首家叫分判断其牌力）/ 三家末家阈值最低（前两家弃叫表明牌力弱，底牌补强概率 &gt;60%，可下调 10% 阈值反叫）。</li><li><strong>底牌期望概率</strong>：断 1 张补到概率 ~42% / 断 2 张 ~27% / 断 3 张 ~12%——断 3 张以上别赌底牌补顺，基本是赌输。</li><li><strong>&quot;叫错代价 &gt; 不叫损失&quot;是 70% 胜率核心护城河</strong>：叫错当地主失败 = 输 2 倍底分给两个农民 + 翻倍风险；不叫仅失去底牌补强机会，仍可当农民赢。<strong>宁可弃叫也别错叫</strong>——这是新号保胜率的第一铁律。</li><li><strong>抢地主制 vs 叫分制策略差异</strong>：抢地主制下，已有叫分基础再抢会翻倍，需更高牌力门槛（≥8 分才考虑抢）；叫分制下则按 1→2→3 分递增决策。</li><li><strong>3 个实战案例验证三维模型</strong>（见轻笔记）。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>三维叫牌决策模型<ul><li>① 牌力基础分（点力）<ul><li>≥7 分强牌区 → 倾向叫 3 / 2 分</li><li>5-6 分灰色地带 → 看位置与底牌</li><li>≤4 分弱牌区 → 直接弃</li></ul></li><li>② 位置修正分<ul><li>首家：阈值最高，保守（≥8 分才叫 3 分）</li><li>二家：可捡漏可拦截（看首家叫分）</li><li>三家：阈值最低，可下调 10%（前家弃叫=底牌补强概率 &gt;60%）</li></ul></li><li>③ 底牌期望分<ul><li>断 1 张补到概率 ~42%</li><li>断 2 张 ~27%</li><li>断 3 张 ~12%（基本赌输）</li></ul></li></ul></li><li>决策输出三档<ul><li>叫 3 分：强牌 + 断张≤2 + 手数≤5 + 有控</li><li>叫 1 分：灰色地带 + 末家 + 断 1 张</li><li>弃叫：弱牌 / 炸弹陷阱 / 首家结构断裂</li></ul></li><li>核心护城河<ul><li>「叫错代价 &gt; 不叫损失」</li><li>新号保 70% 胜率第一铁律：宁可弃叫也别错叫</li></ul></li><li>机制差异<ul><li>叫分制：1→2→3 分递增</li><li>抢地主制：抢后翻倍，门槛更高（≥8 分才抢）</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：「叫地主就是看手牌好不好，感觉好就叫 3 分」——单维决策，凭感觉。</p>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：手牌点力、叫牌位置、底牌补强概率、三家叫分顺序</li><li><strong>连接</strong>：点力↔牌力档位；位置↔阈值修正；底牌↔补强概率</li><li><strong>流向</strong>：发牌 → 牌力分档 → 位置修正 → 底牌期望 → 输出叫分（3/1/弃）</li><li><strong>边界</strong>：炸弹陷阱、首家结构断裂、断 3 张赌底牌</li><li><strong>变化</strong>：底牌翻开后可能改变结构（补断/升级炸弹）——但决策在叫牌时已定</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type</strong>：flow（发牌→牌力分档→位置/底牌修正→叫分输出→护城河反馈，主流程清晰）</li><li><strong>节点 kind</strong>：process(发牌)、data(牌力分)、boundary(三档区)、rule(位置/底牌修正)、state(叫分输出)、concept(三维合并)、feedback(护城河)</li><li><strong>结构纠偏</strong>：用户初版想用 hierarchy（层级），AI 校准为 flow——叫牌是时序决策流程（发牌→评估→修正→输出），非并列层级；末尾用 feedback 节点回指&quot;叫错代价&gt;不叫损失&quot;的护城河循环。</li></ul>\n<p><strong>类比</strong>：它像<strong>德州扑克的 preflop 决策</strong>——手牌强度（点力）+ 位置（button/cutoff/UTG）+ 赔率期望（底池胜率）三维加权，专业玩家从不只看手牌。斗地主叫牌同理：牌力是基础，位置和底牌期望是修正项，三维合并才出决策。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：叫地主不是&quot;感觉大牌就叫&quot;这么简单，要看三件事：第一，<strong>牌力基础分</strong>——按点力算（大王 4、小王 3、2 每张 2、A 每张 1），7 分以上是强牌，5-6 分是灰色地带，4 分以下直接弃；第二，<strong>位置</strong>——你是第几个叫牌的很重要，首家最保守（不知道后面情况），三家末家最激进（前面两家弃叫说明他们牌差，底牌补强概率高）；第三，<strong>底牌期望</strong>——你断几张牌决定了底牌能不能补上，断 1 张补到概率 42%，断 3 张只剩 12% 基本赌输。三维合并才能定档叫几分。最关键的一条铁律：<strong>叫错的代价远大于不叫的损失</strong>——叫错当地主输了要付双倍底分给两个农民，不叫只是失去补强机会还能当农民赢。所以新号保 70% 胜率，宁可弃叫也别错叫。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li><strong>强牌叫 3 分</strong>：首家拿大王+小王+2 张 2+对 A+5 顺子，点力 11 分、断张 1、有控、手数 4 → 强牌区+结构完整 → 直接叫 3 分</li><li><strong>灰色地带弃叫</strong>：首家拿小王+1 张 2+对 K+散牌 5 张，点力 5 分、断张 3、无大王控制 → 灰色地带但首家保守阈值+结构断裂 → 弃叫</li><li><strong>末家反叫 1 分</strong>：前两家弃叫，三家拿 1 张 2+对 A+对 K+5 顺子，点力 6 分、断 1 张 → 灰色地带+末家+底牌补强概率高 → 反叫 1 分（前家弃叫=底牌补强概率 &gt;60%）</li></ol>\n<p><strong>失效边界 / 不适用场景</strong>：</p>\n<ul><li><strong>底牌爆冷</strong>：断 1 张（概率 42% 补到）仍可能补不到，叫牌后底牌翻出三张废牌 → 决策正确但运气不利</li><li><strong>对手埋伏</strong>：农民故意弃叫埋伏，实际牌力很强 → 叫了地主才发现被埋伏</li><li><strong>抢地主制高倍场</strong>：抢后翻倍风险陡增，常规牌力阈值不适用，需更高门槛（≥8 分才考虑抢）</li><li><strong>高倍场保守原则</strong>：底分已高的场次，叫错代价倍数放大，应进一步上调叫牌阈值</li></ul>\n<p><strong>边界补丁</strong>（失败场景 → 补救动作）：</p>\n<ul><li><strong>底牌爆冷</strong>（断 1 张没补到，反而补三张废牌）→ 补救：出牌阶段改为防守型，先出绝对控制牌稳住牌权，把损失控制在不被春天的范围</li><li><strong>对手埋伏</strong>（叫了 3 分发现农民有王炸）→ 补救：记牌算王炸位置，避免在关键回合被双倍收割，争取先出完</li><li><strong>抢地主制抢后翻倍</strong>（抢了才发现牌力不够）→ 补救：出牌优先打乱农民配合，用炸弹换牌权速战速决，避免拖延到被翻倍结算</li><li><strong>本轮演练</strong>：首家拿小王+2 张 2+对 A+对 K+散牌 5 张，点力 7 分、断 2 张 → 强牌区但首家保守+结构临界 → 按三维模型应叫 1 分而非 3 分（首家+断 2 张需降档），验证&quot;首家保守阈值&quot;</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ul><li><strong>核心卡壳</strong>：「为什么叫错代价大于不叫损失？」→ 补：叫错当地主失败 = 输 2 倍底分给两个农民 + 翻倍风险（炸弹/春天叠加），总损失可达 4-8 倍底分；不叫仅失去底牌补强机会，仍可当农民赢牌，损失上限仅 1 倍底分。<strong>期望值（EV）上，错叫的负 EV 是弃叫的 3-5 倍</strong>。</li><li><strong>次要盲区</strong>：最初以为位置只是顺序不影响决策 → 补：末家阈值可比首家低 10%，因为前两家弃叫是强信息（牌力弱+底牌补强概率 &gt;60%）。</li><li><strong>三重验证</strong>：① 强牌例（点力 11+断 1+有控）→ 叫 3 分 ✓ ② 灰色弃叫例（点力 5+断 3+首家）→ 弃叫 ✓ ③ 末家反叫例（点力 6+断 1+末家）→ 叫 1 分 ✓，三维模型一致</li></ul>\n<p><strong>成长对比</strong>：起点「叫地主看手牌好坏，感觉好就叫 3 分」→ 现在「三维决策（牌力+位置+底牌期望），叫错代价&gt;不叫损失是 70% 胜率护城河，宁可弃叫也别错叫」。</p>\n</details>\n<p>📎 <a href=\"_transcript/叫地主决策.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/叫地主决策.svg\" target=\"_blank\" rel=\"noopener\">_viz/叫地主决策.svg</a></li><li>Mermaid 源：<a href=\"_viz/叫地主决策.mmd\" target=\"_blank\" rel=\"noopener\">_viz/叫地主决策.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/叫地主决策.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/叫地主决策.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/叫地主决策.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">相关</h2>\n<p><a class=\"xref\" data-go=\"手牌强度评估\">手牌强度评估</a> · <a class=\"xref\" data-go=\"加倍与抢地主决策\">加倍与抢地主决策</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">相关</a>", "title": "叫地主决策"}, "农民配合策略": {"doc": "<div class=\"dochead\"><h1>农民配合策略 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于角色策略，是用来解决「两个农民怎么分工——谁顶、谁送、谁跑——把地主的牌权和牌力一起耗光」的。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能用「算顶送跑」四大核心技巧 + 上下家差异化策略 + 反向出牌法，把两个农民拧成一股绳，让地主空有牌权却打不出手。</p>\n<p><strong>重点结论</strong>（只收 AI 与你达成的最终共识，3–7 条；筛掉反复出现、一开始没做好后被推翻的）：</p>\n<ul><li>农民获胜公式 = 顶（拦路）+ 送（接力）+ 跑（冲刺）三位一体，缺一项都会被地主各个击破。</li><li>算牌三要素：算准地主单牌过到几 + 地主下家单牌过到几 + 地主手上没有过的小对；记 7 和 10 是顺子关键张。</li><li>顶牌铁律：地主上家必须顶牌（单不过 10 双不过 6），用 10 以上散牌顶，首发单张优先出 A 暴露大牌分布。</li><li>送牌三步骤：找准定位（牌难跑就送队友 / 队友难就送你跑）→ 配合队友 → 送对牌型（知道队友需要什么、地主没有什么）。</li><li>跑牌三技巧：抢先上手（比地主先出 2）+ 炸弹该拆就拆（双王牌不好时果断拆）+ 注意整体牌型（拿到炸弹后留小单 / 对）。</li><li>反向出牌法：地主出单你出对、地主出对你出单，打乱地主节奏；不压自己人铁律——地主不要队友的牌时不压（除非能一手跑完）。</li><li>信号传递三技巧：出牌要权（出 6/7 = 渴望拿牌权）+ 推磨子（拿权后出小对子试探）+ 让牌信号（辅助出大牌后出小牌）。</li><li>特殊牌局：地主剩 1 张 → 出非单张牌型转移牌权；地主剩 2 张 → 坚持出单逼拆牌。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>（用缩进嵌套＝树状脑图，一眼看清骨架；对照结构用 Markdown 表格，不单独做 <code>chart_type</code>）：</p>\n<ul><li>角色分工<ul><li>上家：顶牌（拦路）</li><li>下家：抢牌权 + 跑牌</li><li>两人共同：送牌接力</li></ul></li><li>算牌三要素<ul><li>地主单牌过到几</li><li>地主下家单牌过到几</li><li>地主没过的小对</li></ul></li><li>顶牌铁律<ul><li>单不过 10</li><li>双不过 6</li><li>首发 A 暴露分布</li></ul></li><li>送牌三步<ul><li>找准定位</li><li>配合队友</li><li>送对牌型</li></ul></li><li>跑牌三技巧<ul><li>抢先上手</li><li>炸弹该拆就拆</li><li>整体牌型</li></ul></li><li>反向出牌 + 信号<ul><li>反向出牌打乱节奏</li><li>不压自己人</li><li>出 6/7 要权</li><li>推磨子试探</li></ul></li><li>特殊牌局<ul><li>地主剩 1 张：转牌权</li><li>地主剩 2 张：出单逼拆</li></ul></li></ul>\n<p>（结构复杂时，由 <code>model.json</code> + <code>scripts/render_viz.py</code> 生成 <code>_viz/农民配合策略.mmd</code> / <code>_viz/农民配合策略.svg</code>，不要手写图。）</p>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：地主上家、地主下家、地主、牌权、关键张（7/10/A/2/王）。</li><li><strong>连接</strong>：上家 ↔ 地主（顶牌拦截）；下家 ↔ 地主（抢牌权）；上家 ↔ 下家（送牌接力）。</li><li><strong>流向</strong>：算牌 → 顶 / 送 / 跑 分工执行 → 信号传递 → 收尾。</li><li><strong>边界</strong>：队友能一手跑完时打破「不压自己人」；地主剩 1/2 张时切换特殊牌局逻辑。</li><li><strong>变化</strong>：地主剩余张数决定配合模式（多张 = 常规配合；1 张 = 转牌权；2 张 = 逼拆）。</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type（AI 自主判定，用户不输入）</strong>：flow</li><li><strong>节点 kind</strong>：actor（上家/下家/地主）、process（算/顶/送/跑）、rule（不压自己人）、boundary（特殊牌局）</li><li><strong>结构纠偏</strong>：用户原想画成「顶→送→跑」线性流程，AI 校准为「算牌前置 + 顶送跑并列三路 + 信号贯穿」——三者不是先后而是同时由不同角色承担。</li></ul>\n<p><strong>类比</strong>：它像「接力赛跑 + 篮球场挡拆配合」，因为顶 = 第一棒拦路（挡拆）、送 = 传递接力棒、跑 = 最后一棒冲刺；任何一棒掉链子整队就输。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：你和一个队友打地主，俩人得有分工。坐在地主上家的人负责「挡」——地主出什么你都用大牌压住，别让他舒服过小牌，单张不出过 10、对子不出过 6。坐在地主下家的人负责「跑」——抢到出牌权就往出冲，能跑多快跑多快。俩人之间还要互相「送」——你知道队友缺什么牌型就出什么，地主没什么你就出什么。配合时记着：地主只剩 1 张时别出单张（出对子或三张转移牌权），地主剩 2 张时死命出单张逼他拆牌。最重要的是别和队友抢牌——地主都不要的牌你也别压，除非你能一把跑完。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>你是地主上家，地主首发单张 4。你手里有 K、A、2——按「单不过 10」铁律必须用 A 或 2 顶（用 K 不够顶），首选 A 暴露大牌分布，省下 2 给关键节点。</li><li>你是地主下家，队友（上家）出小对子 33。地主不要，你手里有 44、55——按「不压自己人」铁律不要压（除非能一手跑完），让队友继续出牌。</li><li>地主剩 2 张，你是上家刚拿到牌权。按「地主剩 2 张出单逼拆」规则出单张，逼地主拆对子或拆王炸——即便你出的单张很小，地主也得拆大牌压。</li></ol>\n<p><strong>失效边界</strong>：这个概念在什么情况下不适用 / 会出错？</p>\n<ul><li>队友明确能一手跑完时，「不压自己人」失效——该让路就让路，别挡队友。</li><li>地主剩 1 张时还出单张 = 直接送地主赢，必须切到「出非单张转移牌权」。</li><li>自己手牌极差（无大牌无炸弹）时强行「跑」会拖累队友，应转入纯辅助模式只顶不跑。</li></ul>\n<p><strong>边界补丁</strong>（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：</p>\n<ul><li>边界 1（地主剩 1 张还出单张送赢）→ 补救动作：地主剩 1 张时拿到牌权一律出对子 / 三张 / 顺子等非单张牌型，把牌权转给队友或逼地主接不上；自己手里若只有单张则优先出最大的单张（如 2 或 A）让队友判断你没有非单张。</li><li>边界 2（队友能一手跑完你还压）→ 补救动作：每次出牌前先看队友剩余张数，队友剩 ≤ 4 张且你判断其牌型完整时，一律 pass 让路；除非地主主动出牌且你不压就会让地主跑掉，才考虑压一次再转牌权给队友。</li><li>本轮演练：地主剩 1 张，你是上家拿到牌权，手里有单 5 和对 88。错误出单 5（地主直接走完），正确出对 88 转牌权——即便地主有对子能压，也消耗了地主一张大牌。</li></ul>\n<p><strong>卡壳点复盘</strong>：学的过程中哪里卡住、哪里曾经含糊带过？补上后的正确理解是什么？</p>\n<ul><li>卡壳点：「不压自己人」一开始被理解成「绝对不压队友」，结果错过队友能跑完时的让路时机。</li><li>正确理解：「不压自己人」前提是「队友不能一手跑完」；队友能跑完时反而要主动让路，这才是真配合。</li></ul>\n<p><strong>成长对比</strong>：起点认知「农民就是各打各的、谁抢到牌权谁跑」→ 现在的理解「农民是分工明确的接力赛，顶送跑 + 信号 + 特殊牌局规则缺一不可」。</p>\n</details>\n<p>📎 <a href=\"_transcript/农民配合策略.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<p>（标准轨/深轨默认生成。AI 写 <code>_viz/农民配合策略.model.json</code>，脚本生成 <code>.mmd</code>，有 <code>mmdc</code> 时生成 <code>.svg</code>；网页端无 SVG 时用 Mermaid 客户端兜底。）</p>\n<ul><li>打开图：<a href=\"_viz/农民配合策略.svg\" target=\"_blank\" rel=\"noopener\">_viz/农民配合策略.svg</a></li><li>Mermaid 源：<a href=\"_viz/农民配合策略.mmd\" target=\"_blank\" rel=\"noopener\">_viz/农民配合策略.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><pre class=\"mermaid\">flowchart TD\n  role_up[&quot;☻ 地主上家·顶牌&quot;]\n  role_down[&quot;☻ 地主下家·跑牌&quot;]\n  step_count[&quot;⚙ 算牌三要素&quot;]\n  step_block[&quot;◆ 顶牌铁律&quot;]\n  step_pass[&quot;⚙ 送牌三步&quot;]\n  step_run[&quot;⚙ 跑牌三技巧&quot;]\n  tactic_reverse[&quot;◆ 反向出牌法&quot;]\n  rule_no_crush[&quot;◆ 不压自己人&quot;]\n  boundary_special[&quot;⛔ 地主剩1-2张&quot;]\n  step_count --&gt;|算准断张| role_up\n  step_count --&gt;|算准过牌| role_down\n  role_up --&gt;|单不过10双不过6| step_block\n  role_up -.-&gt;|送队友| step_pass\n  role_down --&gt;|抢先上手| step_run\n  step_pass -.-&gt; tactic_reverse\n  tactic_reverse --&gt; rule_no_crush\n  rule_no_crush -.-&gt;|剩1-2张切换| boundary_special\n  boundary_special -.-&gt;|出非单张/出单逼拆| step_pass\n</pre><div class=\"vizlinks\"><a href=\"_viz/农民配合策略.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">相关</h2>\n<p><a class=\"xref\" data-go=\"出牌顺序规划\">出牌顺序规划</a> · <a class=\"xref\" data-go=\"记牌技巧\">记牌技巧</a> · <a class=\"xref\" data-go=\"单牌控制与过牌时机\">单牌控制与过牌时机</a> · <a class=\"xref\" data-go=\"炸弹使用时机\">炸弹使用时机</a> · <a class=\"xref\" data-go=\"地主出牌策略\">地主出牌策略</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">相关</a>", "title": "农民配合策略"}, "地主出牌策略": {"doc": "<div class=\"dochead\"><h1>地主出牌策略 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于角色策略，是用来解决「地主一人对两人怎么控场、抢主动、定节奏、稳收尾」的。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能以「压下放上 + 控牌权 + 藏弱点 + 收尾」四位一体框架打通地主整局，把出牌权死死攥在手里不轻易交给农民接力。</p>\n<p><strong>重点结论</strong>（只收 AI 与你达成的最终共识，3–7 条；筛掉反复出现、一开始没做好后被推翻的）：</p>\n<ul><li>地主唯一目标 = 不把出牌权轻易交给两个农民；农民一旦接力起手，地主胜率断崖式下跌。</li><li>核心心法「打下不上」：下家必须全程按住（数据：胜率 +35%），上家不浪费大牌去压，避免两头消耗。</li><li>三阶段打法：首发选牌（先长后短 + 先繁后简 + 探虚实 + 藏弱点）→ 中局控牌权（忍让控盘 + 80% 赢局靠大牌用在刀刃上）→ 残局收尾（判信息 → 控节奏 → 择最小代价）。</li><li>强中弱三档分流：强牌强攻（王 + 炸 + 大牌齐全→速战速决）/ 中牌控场（中等控制 + 不错牌型→稳扎稳打）/ 弱牌藏拙（散牌多 + 断张多→绕路走 + 让对手误判）。</li><li>残局收尾公式：剩 5 张留「炸 + 单」组合；剩 3 张留「对 + 单」组合。</li><li>失效边界：剩 2–3 张时心法反转——不再「压下放上」，改为「抢牌权第一」。</li><li>类比「一个人打两个的擂台赛」：体力（牌力）有限，必须用节奏和站位（出牌顺序）放大每一张大牌的价值。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>（用缩进嵌套＝树状脑图，一眼看清骨架；对照结构用 Markdown 表格，不单独做 <code>chart_type</code>）：</p>\n<ul><li>目标层<ul><li>不让出牌权落入农民接力</li><li>把大牌用在刀刃上</li></ul></li><li>心法层<ul><li>打下不上（数据 +35% 胜率）</li><li>藏弱点 + 探虚实</li></ul></li><li>阶段层<ul><li>首发：先长后短 + 先繁后简</li><li>中局：忍让控盘 + 牌权守门</li><li>残局：判信息 → 控节奏 → 择最小代价</li></ul></li><li>牌力分流<ul><li>强牌强攻</li><li>中牌控场</li><li>弱牌藏拙</li></ul></li><li>边界与反转<ul><li>剩 5 张：炸 + 单</li><li>剩 3 张：对 + 单</li><li>剩 2–3 张：抢牌权第一</li></ul></li></ul>\n<p>（结构复杂时，由 <code>model.json</code> + <code>scripts/render_viz.py</code> 生成 <code>_viz/地主出牌策略.mmd</code> / <code>_viz/地主出牌策略.svg</code>，不要手写图。）</p>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：地主、下家农民、上家农民、牌权、残局手数。</li><li><strong>连接</strong>：地主 ↔ 下家（强压制）；地主 ↔ 上家（弱消耗）；地主 ↔ 牌权（核心争夺对象）。</li><li><strong>流向</strong>：首发选牌 → 中局控牌权 → 残局收尾，三阶段线性递进。</li><li><strong>边界</strong>：剩 2–3 张时心法反转；弱牌档不能再硬打「压下放上」。</li><li><strong>变化</strong>：牌力强中弱三档决定打法路径，残局张数决定是否反转心法。</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type（AI 自主判定，用户不输入）</strong>：flow</li><li><strong>节点 kind</strong>：process（首发/中局/残局）、rule（打下不上）、boundary（张数反转）、state（强中弱档）</li><li><strong>结构纠偏</strong>：用户原想把「强中弱」画成线性三段，AI 校准为「分流三档」——同一阶段并列三条路径，不是先后关系。</li></ul>\n<p><strong>类比</strong>：它像「一个人打两个的擂台赛」，因为体力（牌力）有限，必须靠节奏和站位（出牌顺序）放大每一张大牌的价值，不能让两个人轮番消耗你。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：你一个人打两个人，最怕的就是被两个人轮流出牌、你插不上手。所以你出牌的规矩就是：紧挨你后面那个人（下家），他出啥你就压啥，绝对不让他舒服地出小牌；离你远那个人（上家），你别浪费大牌去压他，让他出，反正他出完一轮还会回到下家那里。等你手里牌强了，一口气出完；牌弱就装，让对手猜错你的牌。最后剩几张时要换思路——别再想着压下家，谁能抢到出牌权谁赢。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>开局地主手牌：王 + 2 + 顺子 + 三带对 + 散牌。首发直接出长牌顺子（先长后短），既压缩手数又藏住单牌弱点。</li><li>中局下家出小单张 4，你手里有 A、K、Q。直接用 A 顶死（打下不上），不让下家继续过小牌；上家出 J 你不要，省下 K/Q 给后面。</li><li>残局你剩 5 张：王炸 + 单 7。先出单 7 试探，下家若上 A 你直接王炸收尾——符合「剩 5 张留炸 + 单」公式。</li></ol>\n<p><strong>失效边界</strong>：这个概念在什么情况下不适用 / 会出错？</p>\n<ul><li>剩 2–3 张时心法反转，若仍坚持「压下不上」会被对手抢先出完。</li><li>弱牌档强行「压下不上」会耗光手牌控制力，应当转入藏拙绕路。</li><li>队友接力思路不适用——地主没有队友，所有「配合」逻辑都是错的。</li></ul>\n<p><strong>边界补丁</strong>（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：</p>\n<ul><li>边界 1（剩 2–3 张仍按「压下不上」打）→ 补救动作：残局张数 ≤ 3 时切换为「抢牌权第一」——只要能上牌就上，宁可用大牌换出牌权，不留给对手先手出完的机会。</li><li>边界 2（弱牌档硬打）→ 补救动作：先评估手牌断张数，断张 ≥ 3 张直接转藏拙流——首发故意出对手会要的牌型，引导对手出牌方向，让对手误判你牌力。</li><li>本轮演练：剩 3 张（对 5 + 单 3），下家出单 4。错误打法是「不压」（按打下不上），正确打法是用单 3 不行→拆对 5 出单 5 抢牌权，再回到对 5 收尾。</li></ul>\n<p><strong>卡壳点复盘</strong>：学的过程中哪里卡住、哪里曾经含糊带过？补上后的正确理解是什么？</p>\n<ul><li>卡壳点：「压下不上」一开始被理解成「下家出啥都压」，结果发现弱牌档这么打会崩。</li><li>正确理解：「压下不上」是心法不是铁律，前提是你有压牌资本；牌力不够时优先藏拙，待中局拿到信息再决定是否切回「压下不上」。</li></ul>\n<p><strong>成长对比</strong>：起点认知「地主就是大牌往出甩」→ 现在的理解「地主是节奏战，控牌权 + 阶段分流 + 边界反转才是胜负手」。</p>\n</details>\n<p>📎 <a href=\"_transcript/地主出牌策略.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<p>（标准轨/深轨默认生成。AI 写 <code>_viz/地主出牌策略.model.json</code>，脚本生成 <code>.mmd</code>，有 <code>mmdc</code> 时生成 <code>.svg</code>；网页端无 SVG 时用 Mermaid 客户端兜底。）</p>\n<ul><li>打开图：<a href=\"_viz/地主出牌策略.svg\" target=\"_blank\" rel=\"noopener\">_viz/地主出牌策略.svg</a></li><li>Mermaid 源：<a href=\"_viz/地主出牌策略.mmd\" target=\"_blank\" rel=\"noopener\">_viz/地主出牌策略.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/地主出牌策略.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/地主出牌策略.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/地主出牌策略.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">相关</h2>\n<p><a class=\"xref\" data-go=\"出牌顺序规划\">出牌顺序规划</a> · <a class=\"xref\" data-go=\"记牌技巧\">记牌技巧</a> · <a class=\"xref\" data-go=\"单牌控制与过牌时机\">单牌控制与过牌时机</a> · <a class=\"xref\" data-go=\"炸弹使用时机\">炸弹使用时机</a> · <a class=\"xref\" data-go=\"农民配合策略\">农民配合策略</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">相关</a>", "title": "地主出牌策略"}, "单牌控制与过牌时机": {"doc": "<div class=\"dochead\"><h1>单牌控制与过牌时机 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于〔斗地主·出牌战术〕，是用来解决〔每一手单牌该出小牌探路、用大牌压、还是忍着过牌〕的——单牌是斗地主最高频出现的牌型，过牌决策直接决定出牌权归属。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能根据手牌结构、对手出牌节奏、剩余牌力，在 2 秒内判断当前这一手单牌是&quot;探路/压牌/过牌/收尾&quot;哪个状态，并把出牌权用在最该用的地方。</p>\n<p><strong>重点结论</strong>（只收 AI 与你达成的最终共识）：</p>\n<ul><li>单牌控制四状态：探路（开局出小单探虚实）→ 压牌（关键牌权或对手将跑完时用大牌压）→ 过牌（手牌结构未成型或留作回手时忍着不要）→ 收尾（残局用大牌锁死出牌权）。状态间靠触发条件切换。</li><li>出小单探路的两个时机：开局探虚实（看对手顶牌反应推断牌型）；手中单牌多时先送单（避免后期被小单拖累）。</li><li>必须压牌的两个时机：关键牌权时（输了这手就再没出牌权）；对手将跑完时（不压就输）。</li><li>必须忍着过牌的两个时机：手牌结构未成型（过早暴露大牌意图）；留作回手（这大牌是后续回合的回手牌）。</li><li>&quot;打下不上&quot;对地主的意义：地主出单牌，下家农民顶牌压住，上家农民不要——把出牌权留给下家继续压制，避免大牌互相消耗。</li><li>农民顶牌口诀：单不过 10、双不过 6——地主出单牌农民顶到 10 以上的 K/A/2；地主出对子农民顶到 6 以上的对子。给地主留小牌跑不掉。</li><li>过牌信号传递：故意不要 = 暗示队友&quot;我这门牌型不需要&quot;或&quot;我有大牌等回手&quot;。队友要学会迎合。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>四状态机<ul><li>探路：开局送小单</li><li>压牌：关键牌权/对手将跑</li><li>过牌：未成型/留回手</li><li>收尾：残局锁权</li></ul></li><li>触发条件<ul><li>出小单：开局探虚实 / 单牌多</li><li>必压：关键牌权 / 对手将跑</li><li>必忍：未成型 / 留回手</li></ul></li><li>角色差异化<ul><li>地主：打下不上（下家压上家放）</li><li>顶门农民：单不过 10 双不过 6</li><li>下手农民：顺势跑牌</li></ul></li><li>信号系统<ul><li>故意不要 = 暗示队友</li><li>顶牌 = 明示大牌分布</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：单牌、出牌权、对手出牌节奏、手牌结构、角色</li><li><strong>连接</strong>：手牌结构 → 是否忍；对手节奏 → 是否压；角色 → 顶/跑/打</li><li><strong>流向</strong>：每手单牌都进入四状态机之一，靠触发条件切换</li><li><strong>边界</strong>：残局（≤4 张）单牌决策转为残局算法；队友将跑完时强制压</li><li><strong>变化</strong>：随出牌进程，&quot;压/过&quot;成本动态变化</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type</strong>：state</li><li><strong>节点 kind</strong>：state（四状态）</li><li><strong>结构纠偏</strong>：用户原以为过牌就是&quot;不要&quot;，AI 校准为&quot;过牌是主动放弃当轮以换取后续回手&quot;，是有策略意图的弃权。</li></ul>\n<p><strong>类比</strong>：它像足球的中场控制——单牌是中场传球，探路是试探性长传，压牌是关键拦截，过牌是有意让球权等队友落位，收尾是绝杀前的控球。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：斗地主出单牌时你有 4 个选择。①出小牌探路，看对手反应；②出大牌压住抢回出牌权；③忍着不要（过牌），等下一手再发力；④残局用最大牌锁死。每个选择有触发条件：开局不知道对手牌就探路，关键时候必须压，手牌还没准备好就忍，最后阶段就收尾。农民有个口诀&quot;单不过 10 双不过 6&quot;——地主出单牌你顶到 10 以上的 K/A/2，让地主小牌跑不掉。还有&quot;打下不上&quot;——地主出牌下家压、上家放，把出牌权留给最能压制的人。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li><strong>开局探路</strong>：地主开局出单 3 试探，下家农民出 K 顶牌，上家农民不要——上家&quot;打下不上&quot;，等下家继续压制。</li><li><strong>必压时机</strong>：对手剩 2 张牌，你手中有 2，必须用 2 压住对手单牌，否则下一手对手就走完。</li><li><strong>忍着过牌</strong>：手牌 34567 + KK + 大王 + 2，对手出单 8。这时忍着不要——大王和 2 是后续回手牌，现在出 KK 拿权反而暴露意图。</li></ol>\n<p><strong>失效边界</strong>：残局阶段（≤4 张）单牌决策转为残局算法；队友将跑完时强制压（不能再过牌）；自己剩 1 张时无所谓过牌（直接出）。</p>\n<p><strong>边界补丁</strong>（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：</p>\n<ul><li>边界 1（队友将跑完还过牌）→ 补救动作：立即识别&quot;队友剩 ≤ 3 张&quot;信号，从过牌切换到压牌模式。</li><li>边界 2（残局还套四状态机）→ 补救动作：≤4 张时切换为残局算法（数最大牌、算必胜组合）。</li><li>本轮演练：边界 1——模拟队友报单（剩 1 张），自己手中单 5，必须出大王压对手。</li></ul>\n<p><strong>卡壳点复盘</strong>：一开始以为&quot;过牌=没牌可出&quot;，忽略主动过牌的策略意图——后来发现故意不要能传递信号给队友（暗示自己有回手牌）。补上后理解：过牌是主动权放弃换信息+换回手机会。</p>\n<p><strong>成长对比</strong>：起点认知&quot;过牌就是没大牌出&quot; → 现在的理解&quot;过牌是四状态机之一，主动放弃当轮以传递信号或保留回手牌&quot;。</p>\n</details>\n<p>📎 <a href=\"_transcript/单牌控制与过牌时机.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/单牌控制与过牌时机.svg\" target=\"_blank\" rel=\"noopener\">_viz/单牌控制与过牌时机.svg</a></li><li>Mermaid 源：<a href=\"_viz/单牌控制与过牌时机.mmd\" target=\"_blank\" rel=\"noopener\">_viz/单牌控制与过牌时机.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>state</b></div><img src=\"_viz/单牌控制与过牌时机.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/单牌控制与过牌时机.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/单牌控制与过牌时机.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">相关</h2>\n<p><a class=\"xref\" data-go=\"出牌顺序规划\">出牌顺序规划</a> · <a class=\"xref\" data-go=\"地主出牌策略\">地主出牌策略</a> · <a class=\"xref\" data-go=\"农民配合策略\">农民配合策略</a> · <a class=\"xref\" data-go=\"反直觉陷阱与常见错误\">反直觉陷阱与常见错误</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">相关</a>", "title": "单牌控制与过牌时机"}, "炸弹使用时机": {"doc": "<div class=\"dochead\"><h1>炸弹使用时机 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于〔斗地主·出牌战术〕，是用来解决〔手里的炸弹什么时候该炸、什么时候该忍、什么时候该拆王炸〕的——炸弹是核武器，时机比牌面大小重要 10 倍。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能用&quot;炸弹出手四问决策法&quot;在 3 秒内判断这手炸不炸——不出会输？出了可控？倍数划算？有反制？四问全过就炸，否则忍。</p>\n<p><strong>重点结论</strong>（只收 AI 与你达成的最终共识）：</p>\n<ul><li>炸弹六法则：打断终结（对手启动收尾模式立即炸）/ 保队友跑（队友将跑完被压时炸）/ 拐点爆破（对手出牌策略突变=拐点信号）/ 倍数权衡（倍数翻倍收益要大于风险）/ 防反制（先确认对手无更大炸）/ 残局慎炸（残局炸错就输局）。</li><li>炸弹出手四问决策法：①不出会输？②出了可控？③倍数划算？④有反制？→全过就炸，任一不过就忍。</li><li>拐点识别：对手出牌策略突然转变（如地主先出小单后突然出 2 试探）=启动终结模式，必须用炸弹打断。</li><li>角色差异：地主炸弹=速战控场（保留至少一张大牌单牌回收出牌权）；顶门农民=逼耗（用炸弹逼地主消耗顶级牌）；下手农民=保队友+封杀顺子（队友无法接牌时果断炸）。</li><li>王炸拆王三条件：散牌多（≥5 张单牌无法处理）+ 拆后保两轮出牌权 + 外面无炸可反制。三条件 AND 关系，缺一不拆。</li><li>炸弹是心理武器：可故意缓慢出牌营造犹豫假象诱对手进攻；或快速跟小牌暗示有大牌控场。</li><li>类比&quot;RPG 终极技能&quot;——大招不是开局就放，是留到 BOSS 关键阶段打断其大招或保命。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>炸弹六法则<ul><li>打断终结</li><li>保队友跑</li><li>拐点爆破</li><li>倍数权衡</li><li>防反制</li><li>残局慎炸</li></ul></li><li>四问决策法<ul><li>不出会输？</li><li>出了可控？</li><li>倍数划算？</li><li>有反制？</li></ul></li><li>拐点识别<ul><li>对手策略突变</li><li>启动终结模式</li></ul></li><li>角色差异<ul><li>地主：速战控场</li><li>顶门农民：逼耗</li><li>下手农民：保队友+封顺</li></ul></li><li>王炸拆王三条件<ul><li>散牌多</li><li>拆后保两轮</li><li>外面无炸</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：炸弹、王炸、出牌权、倍数、对手剩余牌、角色</li><li><strong>连接</strong>：炸弹 → 倍数翻倍；拐点 → 炸弹触发；角色 → 炸法选择</li><li><strong>流向</strong>：识别拐点 → 四问决策 → 炸或忍 → 验证反制</li><li><strong>边界</strong>：残局慎炸；倍数已高时炸风险翻倍；对手可能反制时慎炸</li><li><strong>变化</strong>：随倍数累积，炸弹成本动态上升</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type</strong>：flow</li><li><strong>节点 kind</strong>：rule（法则）/ process（决策流程）/ boundary（边界）/ concept（拐点）</li><li><strong>结构纠偏</strong>：用户原以为&quot;炸弹越大越好出&quot;，AI 校准为&quot;炸弹时机 &gt; 炸弹大小——小炸用在拐点比大炸用在普通轮次更值&quot;。</li></ul>\n<p><strong>类比</strong>：它像 RPG 游戏的终极技能——大招不是开局就放，是留到 BOSS 关键阶段（拐点）打断其大招或保命。开局丢大招=浪费，残局丢错大招=团灭。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：斗地主里炸弹（4 张同点数）和王炸（双王）是大杀器，能压任何牌。但炸弹出手=倍数翻倍，所以不能乱炸。用&quot;四问决策法&quot;：①不出这手会输吗？②炸完我能控场吗？③倍数翻倍划算吗？④对手有更大炸弹反制吗？四问全过就炸。还有&quot;拐点&quot;——对手突然改变出牌策略（比如一直出小牌突然出大 2 试探），就是他要收尾了，必须立刻炸断。王炸（双王）能不拆就不拆，除非散牌多到没法处理、拆王后还能保两轮出牌权、且外面没炸弹能反制，三条件全满足才拆。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li><strong>拐点爆破</strong>：地主一直出小单，突然出 2 试探——这是拐点信号，他下一手就收尾。农民果断用 3333 炸掉，避免地主大王收尾。</li><li><strong>保队友跑</strong>：队友剩 1 张单牌，地主出对子拦截。下手农民果断用炸弹反打，为队友创造出单牌逃生通道。</li><li><strong>王炸拆王</strong>：地主手牌大王+小王+5 张散单+无炸。散牌多+拆王后用大王压一轮小王压一轮=保两轮出牌权+外面无炸，三条件满足，拆王炸换手数。</li></ol>\n<p><strong>失效边界</strong>：残局阶段（≤4 张）炸错就输局，慎炸；倍数已高（≥8 倍）时炸风险翻倍，需重新评估；对手可能藏更大炸弹时慎炸（先诱出）。</p>\n<p><strong>边界补丁</strong>（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：</p>\n<ul><li>边界 1（残局炸错）→ 补救动作：残局先算&quot;最大牌归属&quot;，只有确认自己最大牌必胜才炸。</li><li>边界 2（对手反制）→ 补救动作：炸前先出小牌试探对手是否跟炸，确认无反制再出手。</li><li>本轮演练：边界 1——模拟残局自己剩 4 张，对手剩 3 张，先算最大牌归属再决定炸不炸。</li></ul>\n<p><strong>卡壳点复盘</strong>：一开始以为&quot;炸弹越大越早出越好&quot;，忽略拐点识别——后来发现小炸用在拐点比大炸用在普通轮次更值（小炸换关键牌权=高性价比）。补上后理解：炸弹时机 &gt; 炸弹大小。</p>\n<p><strong>成长对比</strong>：起点认知&quot;炸弹越大越好出&quot; → 现在的理解&quot;炸弹是核武器，用四问决策法+拐点识别决定时机，时机比大小重要 10 倍&quot;。</p>\n</details>\n<p>📎 <a href=\"_transcript/炸弹使用时机.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/炸弹使用时机.svg\" target=\"_blank\" rel=\"noopener\">_viz/炸弹使用时机.svg</a></li><li>Mermaid 源：<a href=\"_viz/炸弹使用时机.mmd\" target=\"_blank\" rel=\"noopener\">_viz/炸弹使用时机.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/炸弹使用时机.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/炸弹使用时机.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/炸弹使用时机.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">相关</h2>\n<p><a class=\"xref\" data-go=\"出牌顺序规划\">出牌顺序规划</a> · <a class=\"xref\" data-go=\"算牌与概率推断\">算牌与概率推断</a> · <a class=\"xref\" data-go=\"地主出牌策略\">地主出牌策略</a> · <a class=\"xref\" data-go=\"农民配合策略\">农民配合策略</a> · <a class=\"xref\" data-go=\"反直觉陷阱与常见错误\">反直觉陷阱与常见错误</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">相关</a>", "title": "炸弹使用时机"}, "反直觉陷阱与常见错误": {"doc": "<div class=\"dochead\"><h1>反直觉陷阱与常见错误 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于高阶收尾整合，是用来解决「新手和老手都会反复踩的 5 类反直觉陷阱——叫牌 / 出牌 / 炸弹 / 记牌 / 心理——以及对应正确做法」的。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能用「5 类陷阱 + 正确做法」清单扫描每一手牌，避开 80% 以上非必要败局，把胜率从「被自己送掉」拉回到「只输给牌力差距」。</p>\n<p><strong>重点结论</strong>（只收 AI 与你达成的最终共识，3–7 条；筛掉反复出现、一开始没做好后被推翻的）：</p>\n<ul><li>5 类反直觉陷阱：叫牌陷阱 / 出牌陷阱 / 炸弹陷阱 / 记牌陷阱 / 心理陷阱，覆盖从开局到收官全部决策点。</li><li>叫牌陷阱核心：该叫不叫（中档牌因保守错失地主优势）+ 不该叫乱叫（弱牌赌底牌）+ 欢乐版盲目抢地主翻倍（牌力不够还抢翻倍送分局）。</li><li>出牌陷阱核心：贪顺子拆坏结构（为凑顺子拆对子导致手数失控）+ 首发出大牌暴露（开局出 A/2 暴露大牌分布）+ 农民乱压队友（地主不要时跟队友抢牌权）。</li><li>炸弹陷阱核心：乱炸空炸（没打断关键节奏就炸）+ 有炸不用憋死（残局该炸不炸）+ 王炸拆太早（散牌多还拆王炸）。</li><li>记牌陷阱核心：只记不记关键张（记了边角料忘了 7/10）+ 记牌不算牌（数据收集了不解读）。</li><li>心理陷阱核心：上头追倍（输了几局盲目抢高倍）+ 放弃抵抗（牌差就摆烂不优化）。</li><li>反直觉共性：大多数陷阱不是「不知道规则」，而是「知道规则但在压力下走捷径」——补丁不是「再背一遍规则」而是「建立每手牌检查清单」。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>（用缩进嵌套＝树状脑图，一眼看清骨架；对照结构用 Markdown 表格，不单独做 <code>chart_type</code>）：</p>\n<ul><li>叫牌陷阱<ul><li>该叫不叫</li><li>不该叫乱叫</li><li>盲目抢地主翻倍</li></ul></li><li>出牌陷阱<ul><li>贪顺子拆坏结构</li><li>首发出大牌暴露</li><li>农民乱压队友</li></ul></li><li>炸弹陷阱<ul><li>乱炸空炸</li><li>有炸不用憋死</li><li>王炸拆太早</li></ul></li><li>记牌陷阱<ul><li>只记不记关键张</li><li>记牌不算牌</li></ul></li><li>心理陷阱<ul><li>上头追倍</li><li>放弃抵抗</li></ul></li><li>通用补丁<ul><li>每手牌检查清单</li><li>压力下走捷径识别</li></ul></li></ul>\n<p>（结构复杂时，由 <code>model.json</code> + <code>scripts/render_viz.py</code> 生成 <code>_viz/反直觉陷阱与常见错误.mmd</code> / <code>_viz/反直觉陷阱与常见错误.svg</code>，不要手写图。）</p>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：5 类陷阱节点（叫牌 / 出牌 / 炸弹 / 记牌 / 心理）、每类下的子陷阱、正确做法。</li><li><strong>连接</strong>：陷阱之间相互关联（如「记牌陷阱」会触发「出牌陷阱」、「心理陷阱」会放大其他 4 类）。</li><li><strong>流向</strong>：陷阱不是线性流程，而是网状关联——一个陷阱会引发另一个，所以用 relation 图而非 flow 图。</li><li><strong>边界</strong>：某些陷阱在特殊牌局下不是陷阱（如「乱炸」在残局必胜时就不是乱炸）。</li><li><strong>变化</strong>：陷阱触发频率随玩家水平变化——新手主要踩叫牌 + 出牌，老手主要踩心理 + 炸弹。</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type（AI 自主判定，用户不输入）</strong>：relation</li><li><strong>节点 kind</strong>：concept（5 类陷阱）、rule（正确做法）、feedback（心理陷阱的循环放大）</li><li><strong>结构纠偏</strong>：用户原想把 5 类陷阱画成并列清单，AI 校准为「relation 网」——心理陷阱是放大器，会拉高其他 4 类陷阱的触发率，必须用 feedback 边表达这种循环关系。</li></ul>\n<p><strong>类比</strong>：它像「体检报告的 5 项异常指标」，因为每项异常单独看都不致命，但互相关联——一项恶化会拉高其他项风险；正确做法不是「头痛医头」而是「建立整体检查清单 + 优先治放大器（心理）」。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：打斗地主输牌，很多时候不是牌差，是自己踩了坑。坑分 5 类：叫牌时要么太保守该叫不叫、要么太激进弱牌乱叫、要么在欢乐版里盲目抢翻倍送分局；出牌时为了凑顺子拆对子把手牌搞乱、开局就把大牌打出去暴露分布、农民之间互相抢牌权；用炸弹时该炸不炸、不该炸乱炸、王炸还在散牌多时就拆了；记牌时记了一堆边角料却忘了关键的 7 和 10、记下来了却不会用来推断；心理上输了几局就上头追高倍、牌差就摆烂不认真打。这 5 类坑不是孤立的——心理崩了其他 4 类全放大。补丁不是再背一遍规则，而是每手牌前过一遍检查清单，尤其是在压力下别走捷径。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>你拿到中档牌（一个 2、一个对 A、一个对 K、顺子、几个散牌），按手牌强度评估该叫 1 分地主。常见错误是「该叫不叫」因保守放弃，正确做法是叫 1 分——这种牌地主胜率高于农民胜率。</li><li>开局你拿到 A + 2 + 单 9。常见错误是首发出 A 或 2「试水」，暴露大牌分布给农民算牌；正确做法是首发长牌（顺子 / 三带对）或小对子，藏住 A 和 2。</li><li>残局你剩 6 张含一个炸弹，地主剩 4 张刚出顺子。常见错误是「有炸不用憋死」想留炸弹到最后一手——结果地主下一手出完；正确做法是立刻炸掉地主顺子夺回牌权，再用剩余牌型收尾。</li></ol>\n<p><strong>失效边界</strong>：这个概念在什么情况下不适用 / 会出错？</p>\n<ul><li>特殊牌局下某些「陷阱」不是陷阱——如残局必胜时「王炸拆」可能是正确解（拆王炸留单 2 控牌 + 一手跑路）。</li><li>高阶博弈中「乱炸」可能是虚招诱敌——不能一刀切判定为陷阱。</li><li>新手学习阶段过度关注陷阱会导致决策瘫痪——应先掌握基础牌型与出牌顺序，再练陷阱识别。</li></ul>\n<p><strong>边界补丁</strong>（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：</p>\n<ul><li>边界 1（残局必胜时把「王炸拆」当陷阱不敢拆）→ 补救动作：王炸是否拆的判断标准是「拆后能否构成控牌 + 跑路必胜公式」——若拆王炸后单王 + 单 2 + 一手跑路牌型成立，则拆是正解；若拆后无法构成必胜公式则不拆。</li><li>边界 2（新手阶段过度识别陷阱导致决策瘫痪）→ 补救动作：先掌握基础牌型与出牌顺序规划，陷阱清单只在「每局结束后复盘」时使用，不在出牌瞬间强行检查——避免决策成本超过收益。</li><li>本轮演练：残局剩 5 张（王炸 + 单 2 + 对 8），地主剩 3 张。错误做法是「不拆王炸」按陷阱清单走；正确做法是拆王炸留单王 + 单 2 + 对 8 = 控牌（单王 + 单 2）+ 跑路（对 8），符合必胜公式。</li></ul>\n<p><strong>卡壳点复盘</strong>：学的过程中哪里卡住、哪里曾经含糊带过？补上后的正确理解是什么？</p>\n<ul><li>卡壳点：「贪顺子拆坏结构」一开始被理解成「永远不要为顺子拆对子」，结果错过合理的顺子组合。</li><li>正确理解：「贪顺子」陷阱的判定标准是「拆对子后手数是否增加」——若拆对子凑顺子后总手数减少则合理，若总手数增加则落入陷阱。</li></ul>\n<p><strong>成长对比</strong>：起点认知「输牌是因为牌差或运气」→ 现在的理解「80% 的败局是自己踩了 5 类陷阱中的某一类，建立检查清单就能避免」。</p>\n</details>\n<p>📎 <a href=\"_transcript/反直觉陷阱与常见错误.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<p>（标准轨/深轨默认生成。AI 写 <code>_viz/反直觉陷阱与常见错误.model.json</code>，脚本生成 <code>.mmd</code>，有 <code>mmdc</code> 时生成 <code>.svg</code>；网页端无 SVG 时用 Mermaid 客户端兜底。）</p>\n<ul><li>打开图：<a href=\"_viz/反直觉陷阱与常见错误.svg\" target=\"_blank\" rel=\"noopener\">_viz/反直觉陷阱与常见错误.svg</a></li><li>Mermaid 源：<a href=\"_viz/反直觉陷阱与常见错误.mmd\" target=\"_blank\" rel=\"noopener\">_viz/反直觉陷阱与常见错误.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>relation</b></div><pre class=\"mermaid\">graph LR\n  trap_call[&quot;◉ 叫牌陷阱&quot;]\n  trap_play[&quot;◉ 出牌陷阱&quot;]\n  trap_bomb[&quot;◉ 炸弹陷阱&quot;]\n  trap_count[&quot;◉ 记牌陷阱&quot;]\n  trap_mind[&quot;↺ 心理陷阱·放大器&quot;]\n  fix_checklist[&quot;◆ 每手牌检查清单&quot;]\n  fix_pressure[&quot;◆ 压力下走捷径识别&quot;]\n  trap_mind -.-&gt;|上头追倍放大| trap_call\n  trap_mind -.-&gt;|摆烂放大| trap_play\n  trap_mind -.-&gt;|情绪化用炸| trap_bomb\n  trap_mind -.-&gt;|放弃记牌| trap_count\n  trap_count --&gt;|记错关键张→出牌错| trap_play\n  trap_count --&gt;|不算牌→乱炸| trap_bomb\n  trap_call --&gt;|错叫后强行扳| trap_play\n  fix_checklist -.-&gt;|规避| trap_call\n  fix_checklist -.-&gt;|规避| trap_play\n  fix_checklist -.-&gt;|规避| trap_bomb\n  fix_pressure -.-&gt;|截断放大器| trap_mind\n</pre><div class=\"vizlinks\"><a href=\"_viz/反直觉陷阱与常见错误.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">相关</h2>\n<p><a class=\"xref\" data-go=\"叫地主决策\">叫地主决策</a> · <a class=\"xref\" data-go=\"出牌顺序规划\">出牌顺序规划</a> · <a class=\"xref\" data-go=\"炸弹使用时机\">炸弹使用时机</a> · <a class=\"xref\" data-go=\"记牌技巧\">记牌技巧</a> · <a class=\"xref\" data-go=\"加倍与抢地主决策\">加倍与抢地主决策</a> · <a class=\"xref\" data-go=\"地主出牌策略\">地主出牌策略</a> · <a class=\"xref\" data-go=\"农民配合策略\">农民配合策略</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">相关</a>", "title": "反直觉陷阱与常见错误"}, "算牌与概率推断": {"doc": "<div class=\"dochead\"><h1>算牌与概率推断 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于〔斗地主·算牌记牌〕，是用来解决〔如何把记到的牌转化为对手手牌结构推断和概率判断〕的——记牌是数据收集，算牌是数据解读，核心是排除法。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能用&quot;三层递进推理体系&quot;在 3 秒内完成断张炸弹排查 → 牌型结构反推 → 剩余牌力极限计算，并用&quot;三因素快速评估法&quot;心算断张概率和炸弹分布。</p>\n<p><strong>重点结论</strong>（只收 AI 与你达成的最终共识）：</p>\n<ul><li>三层递进推理体系：①断张炸弹排查（防守底线，记缺牌推炸）→ ②牌型结构反推（中局核心，从出牌行为推顺子/三带归属）→ ③剩余牌力极限计算（残局决胜，算最大牌归属）。</li><li>记牌=数据收集，算牌=数据解读，核心是排除法——把自己手牌+已出牌从 54 张里减掉，剩下的就是对手手牌集合。</li><li>六种行为信号解读：首发选牌（出单牌=单牌多或控单）、跟牌速度（快速跟=早有准备）、不要（断张或藏炸）、拆牌（被迫拆=手数失控）、出牌节奏（突然变慢=关键决策）、犹豫（手中有大牌在权衡）。</li><li>34 法则行牌推理：自己无 3、下家出 3 → 上家极可能 333（三带）。这是断张+出牌行为联合推理的典型。</li><li>推理置信度管理：高置信（多源交叉验证）→ 按推断行动；中置信（单一信号）→ 以防万一；低置信（仅推测）→ 仅参考。</li><li>验证 → 修正闭环：每出一手牌都验证或修正之前的推断，形成贝叶斯更新。</li><li>关键概率数据（CSDN 实测+理论）：王炸固定概率 ≈ 32%（地主 20 张时）；断 1 张 ≈ 18%、断 3 张 ≈ 50%、断 5 张 ≈ 75%（断张成炸概率随断张数上升）；无王缺 1 门 56% / 缺 3 门 67%；至少 2 人有炸弹 ≈ 12%。</li><li>三因素快速评估法：数断张 → 看牌型（已出牌结构）→ 观牌型（3 秒心算炸弹分布）。</li><li>类比&quot;破案排除嫌疑人&quot;+&quot;天气预报降水概率&quot;——排除法减嫌疑，概率论定行动。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>三层递进推理<ul><li>断张炸弹排查（底线）</li><li>牌型结构反推（中局）</li><li>剩余牌力计算（残局）</li></ul></li><li>排除法核心<ul><li>54 张 - 自己 - 已出 = 对手</li><li>记牌 = 数据收集</li><li>算牌 = 数据解读</li></ul></li><li>六种行为信号<ul><li>首发/跟牌速度</li><li>不要/拆牌</li><li>节奏/犹豫</li></ul></li><li>34 法则<ul><li>自己无 3 + 下家出 3</li><li>→ 上家 333</li></ul></li><li>置信度管理<ul><li>高 → 行动</li><li>中 → 防万一</li><li>低 → 参考</li></ul></li><li>关键概率数据<ul><li>王炸 ≈ 32%</li><li>断张成炸 18%→75%</li><li>至少 2 人有炸 ≈ 12%</li></ul></li><li>三因素评估<ul><li>数断张</li><li>看牌型</li><li>观牌型</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：54 张牌、自己手牌、已出牌、对手手牌集合、行为信号、概率</li><li><strong>连接</strong>：断张 → 推炸；行为信号 → 推牌型；概率 → 行动决策</li><li><strong>流向</strong>：记牌收集 → 三层递进推理 → 置信度评估 → 行动 → 验证修正</li><li><strong>边界</strong>：低置信时不能 all-in 推断；脑力有限时只跑第一层；概率是期望不是确定</li><li><strong>变化</strong>：每出一手牌，对手手牌集合缩小，置信度上升</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type</strong>：flow</li><li><strong>节点 kind</strong>：process（推理流程）/ data（概率数据）/ rule（置信规则）/ concept（推理体系）</li><li><strong>结构纠偏</strong>：用户原以为&quot;算牌=猜对手有什么牌&quot;，AI 校准为&quot;算牌=用排除法确定对手手牌集合，再用概率论量化不确定性&quot;。</li></ul>\n<p><strong>类比</strong>：它像破案排除嫌疑人 + 天气预报降水概率——先把不可能的嫌疑排除（排除法减对手手牌集合），再对剩下的可能性算概率（如断张成炸 18%→75%）。侦探不猜凶手，侦探用证据+概率锁定。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：算牌=把记到的牌转化为推断。三层递进：①断张炸弹排查——你手里没 3，4 张 3 在对手手里，可能成炸，这是防守底线；②牌型结构反推——下家出 3 你没 3，上家大概率 333 三带；③残局算最大牌归属。核心是排除法：54 张 - 你的牌 - 已出牌 = 对手的牌。还有 6 种行为信号：对手出单牌=单牌多或控单；跟牌快=早有准备；不要=断张或藏炸；拆牌=手数失控；突然变慢=关键决策；犹豫=有大牌在权衡。关键概率：王炸 32%、断张成炸随断张数从 18% 升到 75%、至少 2 人有炸 12%。这些数字让你从&quot;感觉&quot;升级到&quot;概率判断&quot;。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li><strong>断张炸弹排查</strong>：自己无 4，出牌过半 4 还没出——大概率 4444 在某一家手里成炸。出大牌前先诱炸。</li><li><strong>34 法则推理</strong>：自己无 3、下家先手出 3，上家极可能 333（三带）。若 4 也已出完，则下家必无带 3 之顺，可确定上家 333。</li><li><strong>行为信号 + 概率联合</strong>：对手过牌且未跟炸（信号=藏炸）+ 自己断 5 张（成炸概率 75%）→ 高置信对手有炸，先诱出再出大牌。</li></ol>\n<p><strong>失效边界</strong>：低置信时不能 all-in（只作参考）；脑力超载时只跑第一层（断张排查）；概率是期望不是确定（32% 王炸≠一定有，只是 1/3 局会有）。</p>\n<p><strong>边界补丁</strong>（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：</p>\n<ul><li>边界 1（低置信 all-in）→ 补救动作：低置信只作参考，主力决策仍按手牌结构。</li><li>边界 2（脑力超载）→ 补救动作：降级到只跑第一层断张排查，其余靠手牌强度判断。</li><li>本轮演练：边界 1——模拟只有一个行为信号（对手犹豫），不 all-in 推断藏炸，仅作参考保留大牌。</li></ul>\n<p><strong>卡壳点复盘</strong>：一开始把算牌当&quot;猜牌&quot;——猜对手有什么牌，结果经常猜错。后来才理解算牌是&quot;排除法+概率&quot;——先排除不可能的，再对剩余可能性算概率。补上后理解：算牌是数据解读，不是直觉猜牌。</p>\n<p><strong>成长对比</strong>：起点认知&quot;算牌=猜对手手牌&quot; → 现在的理解&quot;算牌=三层递进推理 + 排除法 + 概率论 + 置信度管理 + 验证修正闭环&quot;。</p>\n</details>\n<p>📎 <a href=\"_transcript/算牌与概率推断.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/算牌与概率推断.svg\" target=\"_blank\" rel=\"noopener\">_viz/算牌与概率推断.svg</a></li><li>Mermaid 源：<a href=\"_viz/算牌与概率推断.mmd\" target=\"_blank\" rel=\"noopener\">_viz/算牌与概率推断.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><img src=\"_viz/算牌与概率推断.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/算牌与概率推断.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/算牌与概率推断.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">相关</h2>\n<p><a class=\"xref\" data-go=\"记牌技巧\">记牌技巧</a> · <a class=\"xref\" data-go=\"炸弹使用时机\">炸弹使用时机</a> · <a class=\"xref\" data-go=\"残局收尾\">残局收尾</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">相关</a>", "title": "算牌与概率推断"}, "加倍与抢地主决策": {"doc": "<div class=\"dochead\"><h1>加倍与抢地主决策 <span class=\"stars\">★★★★<span class=\"se\">★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于叫牌决策（欢乐斗地主版本特色），是用来解决「抢不抢地主、明不明牌、要不要赌春天」这类翻倍时机的——欢乐版与普通版最大差异就在翻倍机制，决策错了高倍场可能一局输光所有积累。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你能判断欢乐版每一种翻倍时机的代价收益比，知道什么牌力档位才考虑抢地主（≥8 分）、什么时候才敢明牌（极强档）、如何避免被春天反春双倍收割——保住欢乐场胜率不再因翻倍翻车。</p>\n<p><strong>重点结论</strong>（AI 与你的最终共识）：</p>\n<ul><li><strong>欢乐版翻倍四件套</strong>：抢地主翻倍（每抢一次 ×2）、明牌翻倍（×2 或 ×3，看平台）、炸弹翻倍（每出 1 炸 ×2）、春天/反春天翻倍（×2）——四项叠加可达 16-32 倍底分，翻倍时机决策直接决定输放大。</li><li><strong>抢地主代价收益分析</strong>：抢地主 = 已有叫分基础 + 抢后翻倍风险 vs 拿到 3 张底牌收益。<strong>牌力 ≥8 分且结构完整才考虑抢</strong>；5-7 分灰色地带绝不抢（翻倍后负 EV 急剧放大）；抢地主制下阈值比叫分制更高。</li><li><strong>明牌翻倍时机铁律</strong>：<strong>牌力极强档（≥8 分）才考虑明牌翻倍，中档以下绝不</strong>——明牌后农民配合信息透明，地主出牌路线全暴露，牌力不够等于送双倍。明牌是&quot;我已经赢定了只想要更多倍数&quot;的确认动作，不是&quot;赌一把&quot;动作。</li><li><strong>春天/反春天判断</strong>：地主春天（地主出完所有牌，农民一张未出）×2；反春天（地主仅出第一手，农民接管出完，地主再未出牌）×2。<strong>春天是低概率事件</strong>，不应强求——为追求春天而改变出牌节奏反而翻车。</li><li><strong>抢地主 vs 叫分制策略差异</strong>：抢地主制下已有叫分基础，抢后翻倍是叠加风险，需更高牌力门槛；叫分制下 1→2→3 分递增，决策节奏不同。</li><li><strong>高倍场保守原则</strong>：底分已高的场次（如底分 3 已被叫），翻倍叠加后输放极大，应进一步上调抢/明牌阈值，宁可少赢别多输。</li><li><strong>3 条核心铁律</strong>：① 抢地主需 ≥8 分；② 明牌需极强档；③ 不为追春天改节奏。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>：</p>\n<ul><li>欢乐版翻倍四件套<ul><li>抢地主翻倍（每抢 ×2）</li><li>明牌翻倍（×2 或 ×3，平台差异）</li><li>炸弹翻倍（每出 1 炸 ×2）</li><li>春天/反春天翻倍（×2）</li><li>叠加可达 16-32 倍底分</li></ul></li><li>抢地主决策<ul><li>代价：已有叫分基础 + 抢后翻倍风险</li><li>收益：拿到 3 张底牌 + 翻倍收益</li><li>阈值：≥8 分且结构完整才抢</li><li>5-7 分灰色地带绝不抢</li><li>抢地主制 vs 叫分制阈值差异</li></ul></li><li>明牌翻倍时机<ul><li>极强档（≥8 分）才考虑明牌</li><li>中档以下绝不</li><li>明牌 = 赢定确认，不是赌一把</li><li>明牌后农民配合信息透明</li></ul></li><li>春天/反春天判断<ul><li>地主春天：农民一张未出 ×2</li><li>反春天：地主仅出一手 ×2</li><li>低概率事件，不强求</li><li>不为追春天改节奏</li></ul></li><li>高倍场保守原则<ul><li>底分高时上调抢/明牌阈值</li><li>宁可少赢别多输</li></ul></li></ul>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>起点认知</strong>：「欢乐版翻倍就是抢地主和明牌，有牌就抢就明」——无阈值概念，凭大牌直觉。</p>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：抢地主时机、明牌时机、炸弹数、春天/反春天状态</li><li><strong>连接</strong>：抢地主↔牌力阈值；明牌↔牌力极强档；春天↔出牌节奏；炸弹↔翻倍叠加</li><li><strong>流向</strong>：发牌→叫牌→抢评估→明牌评估→出牌→结算查春天</li><li><strong>边界</strong>：中档牌力抢/明、为追春天改节奏、高倍场仍激进</li><li><strong>变化</strong>：每个翻倍动作都是离散状态切换（不抢→抢、不明→明、正常→春天）</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type</strong>：state（翻倍动作是离散状态切换：待叫牌→有人叫→抢评估→抢/不抢→明牌评估→明/不明→结算→春天/反春天，状态机清晰）</li><li><strong>节点 kind</strong>：state(各离散状态)、boundary(评估节点)、rule(触发条件)</li><li><strong>结构纠偏</strong>：用户初版想用 flow（流程），AI 校准为 state——抢/不抢、明/不明、春天/反春天都是离散状态切换而非线性流程，状态机更适合表达&quot;触发条件→状态跳转&quot;的对应关系。</li></ul>\n<p><strong>类比</strong>：它像<strong>德州扑克的 all-in 时机决策</strong>——all-in 翻倍是有成本的（抢地主翻倍 = 已下注翻倍，明牌 = 信息暴露翻倍），不是&quot;有牌就 all-in&quot;，而是 EV 计算后只在胜率足够高时才 all-in。欢乐版抢/明牌同理：只在牌力极强档（≥8 分）才考虑翻倍动作，中档硬翻等于负 EV 赌博。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：欢乐斗地主比普通版多了几种翻倍机会，每翻一倍输赢都翻一倍，所以决策错了损失放大。第一种是<strong>抢地主翻倍</strong>——别人叫了 1 分你可以抢，抢了底分翻倍但风险也翻倍，<strong>只有牌力 8 分以上才抢</strong>，5-7 分别抢（抢了输双倍）；第二种是<strong>明牌翻倍</strong>——当地主后可以选择明牌（把手牌亮给农民看），底分再翻倍，<strong>只有极强档（8 分以上）才明牌</strong>，中档牌力明牌等于自杀（农民看到你牌后配合得天衣无缝）；第三种是<strong>炸弹翻倍</strong>——每出一个炸弹全场翻倍，这是被动的不用决策；第四种是<strong>春天/反春天翻倍</strong>——地主春天（农民一张没出）或反春天（地主只出一手）结算再翻倍，这是低概率事件，<strong>别为了追春天故意改出牌节奏</strong>，反而会翻车。一句话：抢和明是主动翻倍动作，只在极强档才做；春天是被动结果，不强求。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li><strong>极强档明牌</strong>：叫地主后手牌大王+小王+2 张 2+对 A+5 顺子，点力 11 分、结构完整 → 明牌翻倍（赢面 90%+，要更多倍数）</li><li><strong>灰色地带不抢</strong>：上家叫 1 分，自己手牌小王+1 张 2+对 K+散牌 5 张，点力 5 分 → 不抢（抢了输双倍负 EV）</li><li><strong>避免反春天</strong>：地主首手出单张被农民压，之后被农民连出长顺子+飞机，地主再无牌权 → 反春天 ×2 结算（应在首手出绝对控制牌稳权）</li></ol>\n<p><strong>失效边界 / 不适用场景</strong>：</p>\n<ul><li><strong>中档牌力抢地主</strong>：5-7 分抢地主，翻倍后负 EV 急剧放大，胜率掉至 30% 以下</li><li><strong>中档牌力明牌</strong>：明牌后农民配合信息透明，地主出牌路线全暴露，等于送双倍</li><li><strong>为追春天改节奏</strong>：故意留小牌想最后清场，反而被农民配合卡死，春天没打成反输</li><li><strong>高倍场仍激进</strong>：底分已高（如 3 分被叫），翻倍叠加后输放可达 24-32 倍，常规阈值不适用</li></ul>\n<p><strong>边界补丁</strong>（失败场景 → 补救动作）：</p>\n<ul><li><strong>中档抢地主翻车</strong>（点力 6 分抢了，翻倍后输面大）→ 补救：出牌阶段优先打乱农民配合，用炸弹换牌权速战速决，争取先出完减少翻倍叠加</li><li><strong>明牌后被农民配合卡死</strong>（明牌后农民看到牌路线精准拦截）→ 补救：出牌时故意出非常规路线（如先出绝对控制牌再出小牌），打乱农民预期</li><li><strong>为追春天改节奏翻车</strong>（留小牌想最后清场反而被卡）→ 补救：记住&quot;春天是低概率事件不强求&quot;，按最优出牌节奏打，春天来了就来了，不来不强求</li><li><strong>本轮演练</strong>：叫地主后手牌大王+2 张 2+对 A+对 K+5 顺子，点力 9 分 → 按铁律可明牌（极强档），明牌后正常出牌赢，验证&quot;极强档明牌 +EV&quot;</li></ul>\n<p><strong>卡壳点复盘</strong>：</p>\n<ul><li><strong>核心卡壳</strong>：「为什么明牌翻倍是确认动作不是赌一把？」→ 补：明牌后农民看到你全部手牌，配合信息完全透明——农民知道你缺什么牌、有什么控制牌、出牌路线是什么。这种信息劣势下，只有牌力极强（≥8 分，赢面 80%+）才能撑住透明化的代价；中档牌力明牌后，农民配合精准拦截，地主胜率从 50% 暴跌到 20% 以下，明牌翻倍不是&quot;赌一把&quot;而是&quot;送双倍&quot;。</li><li><strong>次要盲区</strong>：最初以为春天是常见可以追 → 补：春天是低概率事件（农民全程不出牌极罕见），强行留小牌追春天反而被卡死，得不偿失。</li><li><strong>三重验证</strong>：① 极强档明牌例（点力 11+结构完整）→ 明牌 +EV ✓ ② 灰色不抢例（点力 5+散牌）→ 不抢 +EV ✓ ③ 反春天翻车例（首手失权）→ 应出绝对控制牌 ✓，三维阈值一致</li></ul>\n<p><strong>成长对比</strong>：起点「欢乐版有牌就抢就明，翻倍越多越好」→ 现在「抢/明只在极强档（≥8 分），春天不强求，高倍场保守，翻倍时机是 EV 决策不是赌博」。</p>\n</details>\n<p>📎 <a href=\"_transcript/加倍与抢地主决策.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<ul><li>打开图：<a href=\"_viz/加倍与抢地主决策.svg\" target=\"_blank\" rel=\"noopener\">_viz/加倍与抢地主决策.svg</a></li><li>Mermaid 源：<a href=\"_viz/加倍与抢地主决策.mmd\" target=\"_blank\" rel=\"noopener\">_viz/加倍与抢地主决策.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>state</b></div><img src=\"_viz/加倍与抢地主决策.svg\" class=\"vizsvg\" alt=\"知识图解\"><div class=\"vizlinks\"><a href=\"_viz/加倍与抢地主决策.svg\" target=\"_blank\">打开文件</a></div><div class=\"vizlinks\"><a href=\"_viz/加倍与抢地主决策.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">相关</h2>\n<p><a class=\"xref\" data-go=\"叫地主决策\">叫地主决策</a> · <a class=\"xref\" data-go=\"手牌强度评估\">手牌强度评估</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">相关</a>", "title": "加倍与抢地主决策"}, "残局收尾": {"doc": "<div class=\"dochead\"><h1>残局收尾 <span class=\"stars\">★★★<span class=\"se\">★★</span></span></h1><span class=\"badge ok\">✓ 已完成 · 标准轨</span></div><div class=\"md\"><h2 id=\"sec-1\">一句话定位</h2>\n<blockquote>它属于高阶收尾，是用来解决「牌局剩几手时怎么把概率游戏变成数学证明题、确保必胜或反败为胜」的。</blockquote>\n<h2 id=\"sec-2\">🎯 核心收获 · 重点知识</h2>\n<p><strong>一句话成果</strong>：学完你现在能用「三大场景 + 三原则 + 五步推演 + 10 种经典残局解法」四层框架，把残局从「凭感觉」打成「可证明的必胜题」。</p>\n<p><strong>重点结论</strong>（只收 AI 与你达成的最终共识，3–7 条；筛掉反复出现、一开始没做好后被推翻的）：</p>\n<ul><li>残局核心：牌权 = 一切决策围绕「我能不能拿到牌权、出完最后手牌」展开。</li><li>关键转变：残局是斗地主从「概率游戏」变成「数学证明题」的临界点——信息基本明朗，可以推演到终局。</li><li>必胜公式：控牌 + 跑路组合 = 王 / 2 / 对 2 / 炸弹（控牌）+ 一手牌型（跑路）。</li><li>三大典型收官场景：一手走完（最简）/ 两手走完（拆控牌 + 跑路）/ 控牌 + 跑路（标准）。</li><li>三原则：能一手走不拖 / 留控牌 / 为队友清路（农民视角）。</li><li>五步推演：判信息 → 排场景 → 算牌权 → 验终局 → 择最优。</li><li>反败为胜三招：逼拆（破坏对手完美结构）+ 诱导（虚招 / 藏牌 / 假双 / 伪装主跑）+ 控节拍（节奏控制决定信息密度）。</li></ul>\n<p><strong>重点知识大纲 / 脑图</strong>（用缩进嵌套＝树状脑图，一眼看清骨架；对照结构用 Markdown 表格，不单独做 <code>chart_type</code>）：</p>\n<ul><li>核心认知<ul><li>牌权 = 一切</li><li>概率游戏 → 数学证明题</li></ul></li><li>必胜公式<ul><li>控牌（王 / 2 / 对 2 / 炸弹）</li><li>跑路（一手牌型）</li></ul></li><li>三大场景<ul><li>一手走完</li><li>两手走完</li><li>控牌 + 跑路</li></ul></li><li>三原则<ul><li>能一手走不拖</li><li>留控牌</li><li>为队友清路</li></ul></li><li>五步推演<ul><li>判信息 → 排场景 → 算牌权 → 验终局 → 择最优</li></ul></li><li>反败为胜三招<ul><li>逼拆</li><li>诱导（虚招 / 藏牌 / 假双 / 伪装主跑）</li><li>控节拍</li></ul></li><li>经典残局（10 种）<ul><li>单王残局 / 双王残局 / 对 2 残局 / 炸弹 + 单 / 炸弹 + 对 / 顺子收尾 / 三带二收尾 / 飞机收尾 / 农民配合残局 / 地主控场残局</li></ul></li></ul>\n<p>（结构复杂时，由 <code>model.json</code> + <code>scripts/render_viz.py</code> 生成 <code>_viz/残局收尾.mmd</code> / <code>_viz/残局收尾.svg</code>，不要手写图。）</p>\n<h2 id=\"sec-3\">📝 轻笔记</h2>\n<details class=\"lp-fold\">\n<summary>📝 轻笔记（点开看推演摘要与卡壳细节）</summary>\n<p><strong>视觉模型（五问 · 用户先讲）</strong>：</p>\n<ul><li><strong>对象</strong>：自己剩余手牌、对手剩余手牌（张数 + 可能结构）、牌权、控牌资源（王/2/炸）。</li><li><strong>连接</strong>：控牌资源 ↔ 牌权（控牌换牌权）；跑路牌型 ↔ 牌权（拿到牌权后一手出完）。</li><li><strong>流向</strong>：判信息 → 排场景 → 算牌权 → 验终局 → 择最优（五步线性推演）。</li><li><strong>边界</strong>：信息不充分时不能强行「证明」，需先用诱导招补信息；对手剩 1–2 张时切换逼拆 / 转牌权逻辑。</li><li><strong>变化</strong>：场景随剩余手数变化（1 手 / 2 手 / 多手），不同场景对应不同控牌 + 跑路组合。</li></ul>\n<p><strong>视觉模型结构（AI 校准后）</strong>：</p>\n<ul><li><strong>chart_type（AI 自主判定，用户不输入）</strong>：flow</li><li><strong>节点 kind</strong>：concept（牌权 / 必胜公式）、process（五步推演）、state（三大场景）、rule（三原则）、boundary（信息不充分）</li><li><strong>结构纠偏</strong>：用户原想把「反败为胜三招」画成独立分支，AI 校准为「五步推演失败时的兜底路径」——只有当推演显示无必胜解时才进入反败为胜模式。</li></ul>\n<p><strong>类比</strong>：它像「下棋残局」，因为剩牌少、信息密度高，每一步都可以推演到终局；区别是斗地主残局还有「诱导 / 藏牌」等不完美信息博弈成分，比纯棋类残局多一层心理战。</p>\n<p><strong>大白话讲解（讲给外行）</strong>：打到剩几张牌时，斗地主就从「猜牌」变成「算题」了。你剩下能出完的牌叫「跑路牌」，你手里能压住对手的牌（王、2、炸弹）叫「控牌」。残局必胜的公式就是：留一张控牌压住对手、剩下是能一手出完的跑路牌。推演时按五步走：先判断已知信息（对手剩几张、出过什么），再排可能的场景，算清谁能拿到牌权，验证到最后能不能赢，最后选最优解。如果算出来赢不了，就用三招反败为胜：逼对手拆牌、用虚招骗他、控制出牌节奏让他出错。记住残局最忌讳「能一手出完偏拆两手」——每多拆一手就多给对手一次翻盘机会。</p>\n<p><strong>三个应用例子</strong>：</p>\n<ol><li>你剩 5 张：王炸 + 单 7 + 对 9。对手剩 3 张。按必胜公式控牌（王炸）+ 跑路（单 7 + 对 9 = 两手）→ 不满足「一手跑路」，需调整：先出对 9 试探，对手若压则王炸收尾后单 7 走，若不压则继续单 7 → 王炸留作保险。</li><li>你剩 4 张：单 2 + 顺子 34567。对手剩 6 张且未出过 2。按「能一手走不拖」原则直接出顺子，留单 2 作控牌——若对手出 A 你用 2 压回再走顺子；若对手不压则顺子先行留 2 兜底。</li><li>你是农民，地主剩 2 张（推测对子），队友剩 1 张大牌。按「为队友清路」原则：拿到牌权出单张逼地主拆对，即便牺牲自己牌型也要让队友先跑——这是农民视角残局收尾的关键。</li></ol>\n<p><strong>失效边界</strong>：这个概念在什么情况下不适用 / 会出错？</p>\n<ul><li>信息不充分时强行套「必胜公式」会误判——必须先用诱导招补信息（出小牌试探对手结构）。</li><li>对手剩 1–2 张时不能按常规推演，需切换到「逼拆 / 转牌权」特殊模式。</li><li>农民视角下「为队友清路」与地主视角「自己一手跑完」逻辑相反，混淆会直接崩盘。</li></ul>\n<p><strong>边界补丁</strong>（失败边界 → 最小补救动作；只演练最容易翻车的 1 个）：</p>\n<ul><li>边界 1（信息不充分套公式误判）→ 补救动作：五步推演第一步「判信息」若发现对手剩牌结构不明，必须先用一轮小牌诱导——出最小单张或最小对子观察对手是否压、用什么压，补齐信息后再推演。</li><li>边界 2（对手剩 1–2 张还按常规推演）→ 补救动作：对手剩 1 张直接出非单张转牌权；对手剩 2 张出单逼拆——放弃「一手跑完」优先级，改为「不让对手舒服出完」优先。</li><li>本轮演练：你剩 4 张（单 2 + 三带对 888+33），地主剩 2 张结构不明。错误做法是直接出三带对赌对手接不上；正确做法是先出单 2 之外的引诱牌（如先出 33 对子），观察地主是否压——若地主压则暴露是否带炸，再决定三带对是否安全出。</li></ul>\n<p><strong>卡壳点复盘</strong>：学的过程中哪里卡住、哪里曾经含糊带过？补上后的正确理解是什么？</p>\n<ul><li>卡壳点：「控牌」一开始被理解为「所有大牌都是控牌」，结果发现顺子里的 2 也被算进去导致跑路牌型破坏。</li><li>正确理解：「控牌」特指能压住对手任意牌型的「绝对牌权」——单 2、对 2、王、炸弹；顺子 / 三带里的高牌不算控牌，因为它们不能独立压任意牌型。</li></ul>\n<p><strong>成长对比</strong>：起点认知「残局就是看谁牌大」→ 现在的理解「残局是数学证明题 + 不完美信息博弈，控牌 + 跑路 + 五步推演 + 反败为胜三招才是完整框架」。</p>\n</details>\n<p>📎 <a href=\"_transcript/残局收尾.jsonl\" target=\"_blank\" rel=\"noopener\">完整对话记录</a></p>\n<h2 id=\"sec-4\">视觉模型图</h2>\n<p>（标准轨/深轨默认生成。AI 写 <code>_viz/残局收尾.model.json</code>，脚本生成 <code>.mmd</code>，有 <code>mmdc</code> 时生成 <code>.svg</code>；网页端无 SVG 时用 Mermaid 客户端兜底。）</p>\n<ul><li>打开图：<a href=\"_viz/残局收尾.svg\" target=\"_blank\" rel=\"noopener\">_viz/残局收尾.svg</a></li><li>Mermaid 源：<a href=\"_viz/残局收尾.mmd\" target=\"_blank\" rel=\"noopener\">_viz/残局收尾.mmd</a></li></ul>\n<section class=\"vizbox\" id=\"知识图解\"><div class=\"vizhd\"><span>知识图解</span><b>flow</b></div><pre class=\"mermaid\">flowchart TD\n  core_card_right[&quot;◉ 牌权即一切&quot;]\n  formula_win[&quot;◆ 控牌+跑路必胜公式&quot;]\n  scene_one_hand[&quot;◇ 一手走完场景&quot;]\n  scene_two_hand[&quot;◇ 两手走完场景&quot;]\n  scene_control_run[&quot;◇ 控牌+跑路场景&quot;]\n  process_5step[&quot;⚙ 五步推演&quot;]\n  boundary_info[&quot;⛔ 信息不充分&quot;]\n  tactic_reverse_win[&quot;⚙ 反败为胜三招&quot;]\n  core_card_right --&gt; formula_win\n  formula_win -.-&gt;|场景分流| scene_one_hand\n  formula_win -.-&gt; scene_two_hand\n  formula_win -.-&gt; scene_control_run\n  scene_one_hand --&gt; process_5step\n  scene_two_hand --&gt; process_5step\n  scene_control_run --&gt; process_5step\n  process_5step -.-&gt;|推演失败| boundary_info\n  boundary_info --&gt;|兜底路径| tactic_reverse_win\n  tactic_reverse_win -.-&gt;|逼拆/诱导/控节拍| core_card_right\n</pre><div class=\"vizlinks\"><a href=\"_viz/残局收尾.mmd\" target=\"_blank\">打开源文件</a></div></section>\n<h2 id=\"sec-5\">相关</h2>\n<p><a class=\"xref\" data-go=\"算牌与概率推断\">算牌与概率推断</a> · <a class=\"xref\" data-go=\"炸弹使用时机\">炸弹使用时机</a> · <a class=\"xref\" data-go=\"地主出牌策略\">地主出牌策略</a> · <a class=\"xref\" data-go=\"农民配合策略\">农民配合策略</a></p></div>", "toc": "<div class=\"tochd\">本文导读</div><a class=\"tl lv2\" data-id=\"sec-1\">一句话定位</a><a class=\"tl lv2\" data-id=\"sec-2\">🎯 核心收获 · 重点知识</a><a class=\"tl lv2\" data-id=\"sec-3\">📝 轻笔记</a><a class=\"tl lv2\" data-id=\"sec-4\">视觉模型图</a><a class=\"tl lv2\" data-id=\"sec-5\">相关</a>", "title": "残局收尾"}, "__refs__": {"doc": "<div class=\"dochead\"><h1>参考资料</h1><span class=\"badge light\">领域参考资料库</span></div><div class=\"md\"><blockquote>领域参考资料库汇总所有概念学习中用过的可查链接；相同 URL 只保留一次。</blockquote><div class=\"refgrid\"><div class=\"refcard\"><div class=\"reft\">〔18183·高手进阶秘籍，2025-09-01 抓取〕</div><div class=\"refmeta\">来自：<a class=\"xref\" data-go=\"农民配合策略\">农民配合策略</a></div><a class=\"refurl\" href=\"https://www.18183.com/xxpd/yxzx/8788869.html\" target=\"_blank\" rel=\"noopener\">打开来源</a><div class=\"refbody\"><ul><li>〔18183·高手进阶秘籍，2025-09-01 抓取〕 链接：<ul><li>原话引述：「真正进阶之道在于掌握记牌、算牌的精妙艺术与农民间默契无间的配合，这些才是将运气转化为胜势的关键。」</li><li>AI 转述（可信度：中）：该文系统化提出「记牌 + 算牌 + 配合」三位一体框架，本笔记「算顶送跑」四要素即在此基础上把「配合」拆细为顶/送/跑三条执行路径。</li></ul></li></ul></div></div><div class=\"refcard\"><div class=\"reft\">〔抖音·老陈教记牌 第13集，2026-03-06 抓取〕</div><div class=\"refmeta\">来

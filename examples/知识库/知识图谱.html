#themebtn{pointer-events:auto;background:var(--panel);border:1px solid var(--line);color:var(--text);padding:8px 11px;border-radius:8px;cursor:pointer;font-size:13px}

const DATA = {"nodes": [{"id": "cat::AI", "label": "AI", "type": "category", "category": "AI", "count": 7}, {"id": "Agent", "label": "Agent", "type": "concept", "category": "AI", "status": "待学", "importance": 5, "aliases": ["智能体", "代理"], "body": "# Agent\n\n## 一句话定位\n> 能自主调用工具、分步完成任务的 AI 系统。\n\n## 动态图像（视觉建模）\n（待学：用费曼引导器学透后填写。）\n\n## 大白话讲解\n（待学。）\n\n## 相关\n[[MCP]] · [[ Skill]] · [[ Harness]] · [[ Context]] · [[ Token]]", "rel": "AI/Agent.md", "viz": "", "alivep": "", "alive": ""}, {"id": "Context", "label": "Context", "type": "concept", "category": "AI", "status": "已学透", "importance": 5, "aliases": ["上下文", "上下文窗口", "context window"], "body": "# Context\n\n## 一句话定位\n> 它属于 AI 大模型，是模型生成回答时**能参考的全部文本**（含它要生成的回答），即模型的**\"工作记忆\"**——容量固定，按 [[Token]] 计。\n\n## 动态图像（视觉建模）\n一个固定容量的窗口，自上而下喂给模型：System prompt(含 memory) / Skill（只放一次，在最前）→ 历史对话 → 本轮输入 →（模型生成的回答，也占容量，输入+输出共享）。\n**递归累积**：每过一轮，`下一轮历史 = 旧历史 + {本轮输入 + 本轮回答}`，窗口线性填高。装满 → 压缩(compaction) 或 丢最早(FIFO)。\n> 动态画面见 [[#动态画面]]（可交互：逐轮播放 + token 计数 + 注意力热区）。\n\n## 类比\n像 AI 的**便利贴**：它本身不记得你，你每次得把所有相关的话写在便利贴上递给它，它只看便利贴回答；便利贴大小固定，写满了就得擦掉最早的。\n（心法版：context 是模型对外呈现的那层\"界面/假我\"，是它与世界沟通的介质。）\n\n## 大白话讲解（讲给外行）\n模型**本身无状态、没有记忆**。你聊十句它\"记得\"前九句，是因为应用**每一轮都把全部历史重新塞进 context 当输入**。\n所谓\"长期记忆 / Memory\"是**应用层**的把戏——存在 context 之外，需要时再挑相关的喂回，不是模型自己记住。\n为什么有限：① 硬上限——自注意力要算每对 token 的关系，计算量随长度约**平方增长**；② 软衰减——就算没满，token 越多准确率/召回越降（context rot）。\n\n## 三个应用例子\n1. 不相干的新问题 → 开新窗口，避免旧内容污染、稀释重点。\n2. 检索代码 → 先用 codegraph 这类**预索引知识图谱**，按需查精准事实，而不是把整个代码库读进窗口。\n3. 需要外部资料 → 用 MCP/外部索引让数据**按需、精准**进 context（注意：省的是\"只取相关那一小段\"，不是 MCP 本身）。\n\n## 失效边界\n- **最易混**：Context（这次对话的工作记忆，可装全新内容）≠ 训练知识（固化在**模型参数/权重**里，长期已学、有知识截止期、改不动）。\n- 把什么都塞进一个窗口 → context rot，答不准。\n- 关键信息别埋在中间（lost in the middle，放开头/结尾最稳）。\n- 超出上限 → 报错(model_context_window_exceeded) 或 FIFO 丢最早；不触发压缩/截断时，容量内历史**逐字完整保留**（例外：扩展思考的旧 thinking 块会被自动剥掉）。\n\n## 卡壳点复盘\n- 误以为模型\"自己记得\"对话 → 其实无状态，靠应用每轮重发全部历史。\n- 漏了\"输出也占容量\" → 输入+输出共享同一窗口。\n- 把\"省 context\"归功于 MCP 本身 → 真正省的是\"按需取精准外部数据\"。\n\n## 成长对比\n- 起点认知：context 就是喂给 AI 的一段话，拆开是一堆 token。\n- 现在的理解：context = 模型的固定容量工作记忆；模型无记忆、靠应用每轮重拼历史(递归累积)；有硬/软两重限制；区别于训练知识；满了压缩或丢弃；关键信息别埋中间。\n\n## 动态画面\n- 打开成稿动效：[_viz/Context.html](_viz/Context.html)（逐轮播放递归累积、token 计数、注意力热区、压缩/丢弃切换、深浅配色）\n\n## 出处 / Sources\n- 〔Anthropic 官方文档，一手，抓取 2026-06-15〕<https://platform.claude.com/docs/en/build-with-claude/context-windows>\n  - 原话引述：「The \"context window\" refers to all the text a language model can reference when generating a response, including the response itself... a \"working memory\" for the model.」「As token count grows, accuracy and recall degrade, a phenomenon known as context rot.」「Previous turns are preserved completely.」「Input phase: Contains all previous conversation history plus the current user message.」\n  - AI 转述（可信度：高）：context=工作记忆、按 token 计、输入输出共享、历史逐轮累积重发、满了压缩/FIFO。\n- 〔Liu et al. 2023, arXiv，论文，抓取 2026-06-15〕<https://arxiv.org/abs/2307.03172>\n  - AI 转述（可信度：高）：信息在上下文开头/结尾时模型用得最好，埋在中间显著变差（lost in the middle）。\n\n## 相关\n[[Token]] · [[Agent]] · [[Harness]]", "rel": "AI/Context.md", "viz": "AI/_viz/Context.html", "alivep": "full", "alive": ""}, {"id": "Harness", "label": "Harness", "type": "concept", "category": "AI", "status": "待学", "importance": 3, "aliases": ["框架", "脚手架"], "body": "# Harness\n\n## 一句话定位\n> 包裹模型、负责编排工具调用与上下文的外层运行框架。\n\n## 动态图像（视觉建模）\n（待学：用费曼引导器学透后填写。）\n\n## 大白话讲解\n（待学。）\n\n## 相关\n[[Agent]] · [[ Context]]", "rel": "AI/Harness.md", "viz": "", "alivep": "", "alive": ""}, {"id": "MCP", "label": "MCP", "type": "concept", "category": "AI", "status": "待学", "importance": 4, "aliases": ["Model Context Protocol", "模型上下文协议"], "body": "# MCP\n\n## 一句话定位\n> 一套让模型标准化连接外部工具/数据源的协议。\n\n## 动态图像（视觉建模）\n（待学：用费曼引导器学透后填写。）\n\n## 大白话讲解\n（待学。）\n\n## 相关\n[[Agent]] · [[ Plugin]]", "rel": "AI/MCP.md", "viz": "", "alivep": "", "alive": ""}, {"id": "Plugin", "label": "Plugin", "type": "concept", "category": "AI", "status": "待学", "importance": 3, "aliases": ["插件"], "body": "# Plugin\n\n## 一句话定位\n> 把 MCP、技能、工具打包分发的可安装单元。\n\n## 动态图像（视觉建模）\n（待学：用费曼引导器学透后填写。）\n\n## 大白话讲解\n（待学。）\n\n## 相关\n[[MCP]] · [[ Skill]]", "rel": "AI/Plugin.md", "viz": "", "alivep": "", "alive": ""}, {"id": "Skill", "label": "Skill", "type": "concept", "category": "AI", "status": "已学透", "importance": 4, "aliases": ["技能", "技能包"], "body": "# Skill\n\n## 一句话定位\n> 它属于 AI 工程，是一套**按需读取的说明书 / SOP**：把人的专家经验固化成规范，指导 Agent 用统一、可预期的方式处理某类任务。\n\n## 动态图像（视觉建模）\n用户提问 → AI 拿这个任务，跟库里每个 skill 的 description「读一遍」做**语义匹配**（不是字符串关键词引擎，是模型自己判断\"这件事像不像该用它\"）→ 命中则把该 skill 的说明书**读进当前上下文** → 按说明书的流程与标准执行、产出 → 用完放回，并**不会永久改变模型能力**。\n关键画面：skill 平时躺在库里，**用到那一刻才被拿出来当指令照着做**。\n\n## 类比\n像「专业手册 / SOP」。AI 是干活的人，skill 是他临时翻开的那本手册——手册不会自己干活，是人拿着手册干。\n反例（澄清常见误解）：它**不**像游戏 DLC（装上就永久长在身上），那是**微调模型**才有的\"天生变强\"。\n\n## 大白话讲解\nskill 不是给 AI\"永久升级能力\"，而是给它一份\"这类活该怎么干\"的说明书，用到时现读现用。\n靠每个 skill 自带的一段 description 触发——description 把\"我是干嘛的、什么时候该用我\"写清楚，模型据此语义判断要不要调它。所以 description 写得好不好，直接决定 skill 会不会在该出场时被想起来。\n\n## 三个应用例子\n1. 嵌入式工程师：把\"嵌入式代码 + 汇报\"的固定规范做成 skill，AI 每次按同一套结构输出。\n2. 亚马逊运营：把 listing 优化的最佳实践固化成 skill，产出稳定贴合平台与预期。\n3. 文档处理：skill 里写\"这一步去跑这段转码/抽表脚本\"，把机械步骤交给脚本，judgment 留给 AI。\n\n## 失效边界（什么时候不该用 skill）\n- 需要**真正执行外部动作**（发邮件、查数据库、接云端服务）→ 用 [[MCP]] / 工具，不是 skill。\n- 某步是**死协议、固定输入输出、无需动脑** → 那是**脚本**；skill 可以\"雇佣\"脚本，但 skill ≠ 脚本。\n- 想让 AI **天生就擅长**某领域、不靠现读说明书 → 用**微调模型**。\n- skill 的甜区：用户已有经验，用一层\"约束 + 指导\"规范 [[Agent]] 的处理方式，避免发散、固化输出范围与表达，从而得到更符合预期的结果。\n\n## 卡壳点复盘\n- 一开始以为触发是\"关键词字符串匹配\" → 其实是模型拿任务跟 description 做**语义匹配**。\n- 以为 skill 像 DLC\"永久变强\" → 其实是**按需读取的指令**，用完不改变模型本身。\n- \"skill 里也能放脚本，那俩差在哪？\" → 差在**谁做判断**：脚本是固定协议、精确产出；skill 是可商量的建议约束，中间过程靠 AI judgment。skill 可调用脚本完成机械子步骤。\n\n## 相关\n[[Agent]] · [[Plugin]] · [[MCP]] · [[Context]]", "rel": "AI/Skill.md", "viz": "", "alivep": "full", "alive": ""}, {"id": "Token", "label": "Token", "type": "concept", "category": "AI", "status": "已学透", "importance": 5, "aliases": ["令牌", "词元"], "body": "# Token\n\n## 一句话定位\n> 它属于 AI 大模型，是模型处理文本的**最小单位**：一段\"词的碎片\"，也是衡量长度与计费的单位。\n\n## 动态图像（视觉建模）\n一条翻译流水线，进来是人话、出去也是人话，中间一段模型只认数字：\n人话 → 分词器**切成碎片**（token）→ **查词表换成编号**（id）→ 模型在 id 上计算 → 吐出新 id → **拼回人话**。\n关键两道工序：① 切碎片 ② 碎片↔id 查表。**token = 碎片本身，id = 它在词表里的门牌号**（id 数值大小没有含义，只是编号）。\n\n## 类比\n像拼高达：设计师把成品拆成一个个**最小零部件**（token），每个零件有**编号**（id）；拿到一袋带编号的零件，再按说明书拼回成品（解码）。\n\n## 大白话讲解（讲给外行）\ntoken 是\"词的碎片\"，不等于字 / 词 / 字符——分词器**不按词边界切，按语料里的高频片段切**。\n例：`ChatGPT is great!` 实际是 **6 个 token**：`Chat | G | PT | ␣is | ␣great | !`（\"ChatGPT\"不是常见词被剪成三块，\" great\"带空格算一个）。\n为什么要这层：模型只能吃**固定词表里的整数 id**。按整词建表 → 生僻词/新词爆表且认不出（OOV）；按单字符 → 序列太长。**子词分词（BPE）是折中**：常见词留成 1 个 token，罕见词拆成已知子词。\n经验值：英文 **1 token ≈ 4 字符 ≈ ¾ 个词**。\n\n## 三个应用例子\n1. 数 token / 估长度：用 OpenAI Tokenizer 之类工具先数 token，再决定能不能塞进上下文。\n2. 估成本：API 按 token 计费（输入/输出/缓存分开计价），不是按字数。\n3. 压缩上下文：把啰嗦 prompt 改短、把中文换成等价英文，都能省 token。\n\n## 失效边界（不懂 token 会踩的坑）\n- **算钱**：以为按\"文字数量\"收费，实际按拆出的 **token 数** → 账单/预算算错（非英文尤甚）。\n- **上下文上限**：塞了很多内容，拆成 token 后**超限被截断**，模型其实没看到后半段。\n- **非英文**：同一个上下文窗口/同样预算，中文能装的实际内容比英文少一截；拿英文 demo 估的长度与成本，搬到中文会**双双爆掉**。\n- 根因澄清：中文更费 token **不是因为中文啰嗦**（中文信息密度其实更高），而是**分词器主要在英文上训练、没给中文学到高效合并片段**——是工具偏科。\n\n## 卡壳点复盘\n- 起初把 token 和 id 混为一谈 → 其实是两样：碎片（token）↔ 编号（id），中间隔一次查表。\n- \"ChatGPT is great!\" 直觉数成 5，实际 6 → 碎片按**高频片段**切，不按词/字边界。\n- 误以为\"中文费 token = 中文啰嗦\" → 反了，是分词器对中文压缩效率低。\n\n## 成长对比\n- 起点认知：token 是 AI 计量的基本单位，可能是一个字或多字组合。\n- 现在的理解：token = 高频\"词碎片\"（≠字/词），经查表变成 id 喂给模型；是长度与计费单位；中文更费源于分词器偏科；不懂它会在算钱/超限/非英文上踩坑。\n\n## 出处 / Sources\n- 〔OpenAI 官方帮助中心，一手，抓取 2026-06-15〕<https://help.openai.com/en/articles/4936856-what-are-tokens-and-how-to-count-them>\n  - 原话引述：「Tokens can be thought of as pieces of words... tokens can include trailing spaces and even sub-words.」「1 token ~= 4 chars in English」「1 token ~= ¾ words」「The higher token-to-char ratio can make it more expensive to implement the API for languages other than English.」\n  - AI 转述（可信度：高）：token 是词的碎片、按高频片段切、英文约 4 字符/词元、非英文 token-字符比更高更贵。\n- 〔Hugging Face Transformers 分词文档，技术资料，抓取 2026-06-15〕<https://huggingface.co/docs/transformers/main/en/tokenizer_summary>\n  - AI 转述（可信度：高）：子词分词（BPE）保留固定词表、常见词成单 token、罕见词拆子词以解决 OOV。\n- 〔arXiv 2305.17179 多语言分词，论文，抓取 2026-06-15〕<https://arxiv.org/pdf/2305.17179>\n  - AI 转述（可信度：中）：分词器在不同语言间的词表分配不均，影响非英文的 token 效率。\n\n## 相关\n[[Context]] · [[Agent]]", "rel": "AI/Token.md", "viz": "", "alivep": "full", "alive": ""}], "links": [{"source": "Agent", "target": "cat::AI", "kind": "belong"}, {"source": "Context", "target": "cat::AI", "kind": "belong"}, {"source": "Harness", "target": "cat::AI", "kind": "belong"}, {"source": "MCP", "target": "cat::AI", "kind": "belong"}, {"source": "Plugin", "target": "cat::AI", "kind": "belong"}, {"source": "Skill", "target": "cat::AI", "kind": "belong"}, {"source": "Token", "target": "cat::AI", "kind": "belong"}, {"source": "Context", "target": "Agent", "kind": "dep"}, {"source": "Token", "target": "Agent", "kind": "dep"}, {"source": "Token", "target": "Context", "kind": "dep"}, {"source": "Context", "target": "Harness", "kind": "dep"}, {"source": "Agent", "target": "Harness", "kind": "dep"}, {"source": "Agent", "target": "MCP", "kind": "dep"}, {"source": "MCP", "target": "Plugin", "kind": "dep"}, {"source": "Skill", "target": "Plugin", "kind": "dep"}, {"source": "Agent", "target": "Skill", "kind": "dep"}, {"source": "Skill", "target": "MCP", "kind": "link"}, {"source": "Skill", "target": "Context", "kind": "link"}], "categories": ["AI"], "generated": "2026-06-15 15:59", "prefix": ""};
const CATCOLORS = ["#7aa2f7","#9ece6a","#e0af68","#bb9af7","#f7768e","#2ac3de","#ff9e64","#73daca","#c0caf5"];
const STATUSRING = {"已学透":"#9ece6a","巩固中":"#e0af68","待学":"#565f73"};
const catColor = {}; DATA.categories.forEach((c,i)=>catColor[c]=CATCOLORS[i%CATCOLORS.length]);

const svg=document.getElementById('svg'), scene=document.getElementById('scene');
const gLinks=document.getElementById('links'), gNodes=document.getElementById('nodes');
const NS="http://www.w3.org/2000/svg";
let W=svg.clientWidth, H=svg.clientHeight;

const nodes=DATA.nodes.map(n=>Object.assign({},n));
const byId={}; nodes.forEach(n=>byId[n.id]=n);
const links=DATA.links.map(l=>({source:byId[l.source],target:byId[l.target],kind:l.kind})).filter(l=>l.source&&l.target);
const deg={}; nodes.forEach(n=>deg[n.id]=0);
links.forEach(l=>{deg[l.source.id]++;deg[l.target.id]++;});

// 初始布局：大类围成圈，概念散在附近
let ci=0; const cats=nodes.filter(n=>n.type==='category');
nodes.forEach(n=>{
  if(n.type==='category'){const a=(ci++/Math.max(1,cats.length))*2*Math.PI;
    n.x=W/2+Math.cos(a)*Math.min(W,H)*0.22; n.y=H/2+Math.sin(a)*Math.min(W,H)*0.22;}
  else{n.x=W/2+(Math.random()-.5)*W*0.6; n.y=H/2+(Math.random()-.5)*H*0.6;}
  n.vx=0;n.vy=0;
});

// 建 SVG 元素
const linkEls=links.map(l=>{const e=document.createElementNS(NS,'line');
  let cls='link'; if(l.kind==='link')cls+=' link-strong'; if(l.kind==='dep')cls+=' link-dep';
  e.setAttribute('class',cls);
  if(l.kind==='dep')e.setAttribute('marker-end','url(#arrow)');
  gLinks.appendChild(e);return e;});
const nodeEls=nodes.map(n=>{
  const g=document.createElementNS(NS,'g'); g.setAttribute('class','node'+(n.type==='category'?' cat':'')+(n.alive?' alive-'+n.alive:''));
  const c=document.createElementNS(NS,'circle');
  const r=n.type==='category'?(12+Math.min(14,(n.count||1)*1.6)):(4+(n.importance||3)*2.2);
  n.r=r; c.setAttribute('r',r);
  c.style.fill = n.type==='category'?catColor[n.category]:'var(--node)';
  c.style.stroke = n.type==='category'?'var(--bg)':(STATUSRING[n.status]||'var(--ring)');
  c.setAttribute('stroke-width', n.type==='category'?3:2);
  const t=document.createElementNS(NS,'text'); t.setAttribute('x',r+4); t.setAttribute('y',4);
  t.textContent=n.label;
  g.appendChild(c); g.appendChild(t); gNodes.appendChild(g);
  g._node=n; n._g=g; n._c=c;
  return g;
});

// 力导向模拟
function tick(){
  const k=0.018, rep=2600, center=0.012;
  for(let i=0;i<nodes.length;i++){const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){const b=nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy||0.01; let d=Math.sqrt(d2);
      let f=rep/d2; let fx=dx/d*f, fy=dy/d*f;
      a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}}
  links.forEach(l=>{const a=l.source,b=l.target;
    let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||0.01;
    let target=l.kind==='belong'?90:(l.kind==='dep'?105:130); let f=(d-target)*k;
    let fx=dx/d*f, fy=dy/d*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
  nodes.forEach(n=>{
    n.vx+=(W/2-n.x)*center; n.vy+=(H/2-n.y)*center;
    if(n._fix){n.vx=0;n.vy=0;return;}
    n.vx*=0.82; n.vy*=0.82;
    n.x+=Math.max(-30,Math.min(30,n.vx)); n.y+=Math.max(-30,Math.min(30,n.vy));
  });
}
function render(){
  linkEls.forEach((e,i)=>{const l=links[i];
    let dx=l.target.x-l.source.x, dy=l.target.y-l.source.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    let ux=dx/d, uy=dy/d; let rs=(l.source.r||5)+1, rt=(l.target.r||5)+3;
    e.setAttribute('x1',l.source.x+ux*rs);e.setAttribute('y1',l.source.y+uy*rs);
    e.setAttribute('x2',l.target.x-ux*rt);e.setAttribute('y2',l.target.y-uy*rt);});
  nodeEls.forEach(g=>{const n=g._node; g.setAttribute('transform',`translate(${n.x},${n.y})`);});
}
let alpha=420;
function loop(){ if(alpha>0){for(let s=0;s<2;s++)tick(); alpha--; } render(); requestAnimationFrame(loop);}
loop();

// 视图变换（平移/缩放）
let tx=0,ty=0,scale=1;
function applyT(){scene.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);}
svg.addEventListener('wheel',e=>{e.preventDefault();
  const f=e.deltaY<0?1.12:0.89; const mx=e.offsetX, my=e.offsetY;
  tx=mx-(mx-tx)*f; ty=my-(my-ty)*f; scale*=f; applyT();},{passive:false});

// 拖动：节点 vs 背景
let drag=null, dragNode=null, moved=false;
svg.addEventListener('mousedown',e=>{
  const g=e.target.closest('.node');
  if(g){dragNode=g._node; dragNode._fix=true; moved=false;}
  else{drag={x:e.clientX-tx,y:e.clientY-ty}; svg.classList.add('dragging');}
});
window.addEventListener('mousemove',e=>{
  if(dragNode){const p=screenToScene(e); dragNode.x=p.x; dragNode.y=p.y; alpha=Math.max(alpha,60); moved=true;}
  else if(drag){tx=e.clientX-drag.x; ty=e.clientY-drag.y; applyT();}
});
window.addEventListener('mouseup',e=>{
  if(dragNode){ if(!moved){openNode(dragNode);} dragNode._fix=false; dragNode=null;}
  drag=null; svg.classList.remove('dragging');
});
function screenToScene(e){const r=svg.getBoundingClientRect();
  return {x:(e.clientX-r.left-tx)/scale, y:(e.clientY-r.top-ty)/scale};}

// 高亮邻居
const adj={}; nodes.forEach(n=>adj[n.id]=new Set([n.id]));
links.forEach(l=>{adj[l.source.id].add(l.target.id);adj[l.target.id].add(l.source.id);});
function focus(id){
  nodeEls.forEach(g=>{const n=g._node; const on=!id||adj[id].has(n.id);
    g.classList.toggle('dim',!on); g.classList.toggle('hl',!!id&&on);});
  linkEls.forEach((e,i)=>{const l=links[i]; const on=!id||(adj[id].has(l.source.id)&&adj[id].has(l.target.id)&&(l.source.id===id||l.target.id===id));
    e.classList.toggle('dim',!on);});
}

// 笔记面板
const panel=document.getElementById('panel'), pbody=document.getElementById('panelbody');
document.getElementById('close').onclick=()=>{panel.classList.remove('open');focus(null);};
function mdToHtml(md){
  if(!md) return '<p style="color:#8b93a3">（这个概念还没学透——用费曼引导器学一遍吧）</p>';
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let out=[], inList=false;
  md.split('\n').forEach(line=>{
    let l=esc(line);
    l=l.replace(/\[\[([^\]|]+?)(?:\|[^\]]+)?\]\]/g,(m,p1)=>`<a data-jump="${p1.trim()}">${p1.trim()}</a>`);
    l=l.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
    if(/^##\s+/.test(line)){out.push('<h2>'+l.replace(/^##\s+/,'')+'</h2>');}
    else if(/^#\s+/.test(line)){/*skip title*/}
    else if(/^>\s?/.test(line)){out.push('<blockquote>'+l.replace(/^&gt;\s?/,'')+'</blockquote>');}
    else if(/^\s*[-*]\s+/.test(line)){out.push('<div>• '+l.replace(/^\s*[-*]\s+/,'')+'</div>');}
    else if(line.trim()===''){out.push('');}
    else{out.push('<p>'+l+'</p>');}
  });
  return out.join('\n');
}
function openNode(n){
  if(n.type==='category'){ focus(n.id);
    const members=nodes.filter(x=>x.type==='concept'&&x.category===n.category)
      .map(x=>`<a data-jump="${x.label}">${x.label}</a>`).join(' · ');
    pbody.innerHTML=`<button id="close2" style="float:right;border:none;background:none;color:#8b93a3;font-size:20px;cursor:pointer">×</button>
      <h1>${n.label}</h1><div class="badge">大类</div><div class="badge">${n.count} 个概念</div>
      <div class="md"><p>${members||'（暂无概念）'}</p></div>`;
  }else{
    focus(n.id);
    pbody.innerHTML=`<button id="close2" style="float:right;border:none;background:none;color:#8b93a3;font-size:20px;cursor:pointer">×</button>
      <h1>${n.label}</h1>
      <div class="badge" style="border-color:${catColor[n.category]};color:${catColor[n.category]}">${n.category}</div>
      <div class="badge">${n.status||''}</div>
      ${(n.aliases&&n.aliases.length)?'<div class="badge">'+n.aliases.join(' / ')+'</div>':''}
      ${n.viz?'<div style="margin:8px 0 12px"><a href="'+((DATA.prefix||'')+n.viz)+'" target="_blank" style="display:inline-block;color:var(--accent);border:1px solid var(--accent);border-radius:8px;padding:5px 12px;text-decoration:none;font-weight:600">▶ 动态画面 / Dynamic View</a></div>':''}
      ${window.self!==window.top?'<div style="margin:0 0 12px"><a data-open="'+n.label+'" style="display:inline-block;cursor:pointer;color:var(--accent);border:1px solid var(--accent);border-radius:8px;padding:5px 12px;text-decoration:none;font-weight:600">📖 在知识站打开</a></div>':''}
      <div class="md">${mdToHtml(n.body)}</div>`;
  }
  panel.classList.add('open');
  pbody.querySelectorAll('[data-jump]').forEach(a=>a.onclick=()=>{const t=byId[a.dataset.jump]; if(t)openNode(t);});
  pbody.querySelectorAll('[data-open]').forEach(a=>a.onclick=()=>{try{parent.postMessage({goto:a.dataset.open},'*');}catch(e){}});
  const c2=document.getElementById('close2'); if(c2)c2.onclick=()=>{panel.classList.remove('open');focus(null);};
}

// 搜索
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase(); if(!q){focus(null);return;}
  nodeEls.forEach(g=>{const n=g._node;
    const hit=n.label.toLowerCase().includes(q)||(n.aliases||[]).some(a=>a.toLowerCase().includes(q));
    g.classList.toggle('dim',!hit); g.classList.toggle('hl',hit);});
  linkEls.forEach(e2=>e2.classList.add('dim'));
});

  +'　|　<span>⇢ 依赖</span><span>— 关联</span><span>· 大小=重要度</span>';
document.getElementById('meta').textContent=`${nodes.filter(n=>n.type==='concept').length} 概念 · ${DATA.categories.length} 大类 · 更新于 ${DATA.generated}`;

document.getElementById('themebtn').onclick=function(){var r=document.documentElement;r.dataset.theme=r.dataset.theme==='light'?'dark':'light';};
function setGoalDone(on){nodeEls.forEach(function(g){var n=g._node;if(!n||n.type!=='concept')return;g.classList.remove('alive-full','alive-weak');var lv=on?(n.alivep||''):(n.alive||'');if(lv)g.classList.add('alive-'+lv);});}
(function(){var gd=new URLSearchParams(location.search).get('goaldone');if(gd==='1')setGoalDone(true);})();

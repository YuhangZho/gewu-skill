<!doctype html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Context Window · 动态演示</title>
<style>
:root[data-theme="dark"]{--bg:#0f1115;--panel:#171a21;--line:#2a2f3a;--text:#e7e9ee;--muted:#8b93a3;--accent:#7aa2f7;--sys:#bb9af7;--user:#7aa2f7;--asst:#9ece6a;--summary:#e0af68;--warn:#f7768e;--track:#222838;}
:root[data-theme="light"]{--bg:#f7f8fa;--panel:#ffffff;--line:#e2e5ea;--text:#1f2430;--muted:#6b7280;--accent:#3b5bdb;--sys:#7c4dff;--user:#3b5bdb;--asst:#2e7d32;--summary:#b8860b;--warn:#d23f63;--track:#e6e8ee;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;transition:background .25s,color .25s}
.wrap{max-width:860px;margin:0 auto;padding:22px 20px 60px}
header{display:flex;align-items:flex-start;gap:12px}
h1{font-size:20px;margin:0 0 4px}
.sub{color:var(--muted);font-size:13px;margin:0}
.themebtn{margin-left:auto;flex:none;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:16px 0}
button.act{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
button.ghost{background:transparent;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{background:transparent;color:var(--muted);border:none;padding:8px 12px;font-size:13px;cursor:pointer}
.seg button.on{background:var(--accent);color:#fff;font-weight:600}
.meter{flex:1;min-width:220px}
.meter .row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
.bar{height:12px;background:var(--track);border-radius:6px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:var(--accent);transition:width .45s ease,background .3s}
.bar>i.hot{background:var(--warn)}
.stage{display:grid;grid-template-columns:1fr 64px;gap:14px;margin-top:8px}
.window{position:relative;border:2px solid var(--line);border-radius:12px;padding:10px;height:440px;overflow-y:auto;background:linear-gradient(transparent,transparent)}
.caphint{position:sticky;top:-10px;font-size:11px;color:var(--muted);padding:2px 0 6px;background:var(--bg)}
.blk{border-radius:8px;padding:8px 11px;margin:7px 2px;font-size:13px;border:1px solid var(--line);animation:slide .4s ease}
.blk .tag{font-size:11px;opacity:.8}
.blk .tk{float:right;font-size:11px;color:var(--muted)}
.sysblk{background:color-mix(in srgb,var(--sys) 16%,transparent);border-color:var(--sys)}
.userblk{background:color-mix(in srgb,var(--user) 14%,transparent);border-color:color-mix(in srgb,var(--user) 50%,var(--line))}
.asstblk{background:color-mix(in srgb,var(--asst) 14%,transparent);border-color:color-mix(in srgb,var(--asst) 50%,var(--line))}
.sumblk{background:color-mix(in srgb,var(--summary) 18%,transparent);border-color:var(--summary)}
.hist{opacity:.5}
.cur{box-shadow:0 0 0 2px var(--accent)}
.turnsep{font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin:10px 4px 2px;border-top:1px dashed var(--line);padding-top:8px}
@keyframes slide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.heat{border:1px solid var(--line);border-radius:10px;overflow:hidden;height:440px;display:flex;flex-direction:column;position:relative}
.heat .band{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;writing-mode:vertical-rl;letter-spacing:.15em}
.heat .b1{background:var(--accent);opacity:.85}
.heat .b2{background:var(--accent);opacity:.16}
.heat .b3{background:var(--accent);opacity:.85}
.heatcap{font-size:11px;color:var(--muted);text-align:center;margin-top:4px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:12px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
.note{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.6}
.flash{animation:flash .9s ease}
@keyframes flash{0%{background:color-mix(in srgb,var(--warn) 30%,transparent)}100%{background:transparent}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div>
    <h1>Context Window · 动态演示</h1>
    <p class="sub">每点一轮：本轮输入 + 模型回答 滑入 → 折叠进历史 → 窗口填高。装满触发压缩或丢最早。</p>
  </div>
  <button class="themebtn" id="theme">🌙 深 / 浅</button>
</header>

<div class="controls">
  <button class="act" id="next">下一轮 ▶</button>
  <button class="ghost" id="reset">重置</button>
  <span style="font-size:13px;color:var(--muted)">装满时：</span>
  <span class="seg" id="mode">
    <button data-m="compact" class="on">压缩 compaction</button>
    <button data-m="fifo">丢最早 FIFO</button>
  </span>
  <div class="meter">
    <div class="row"><span>Tokens（输入+输出共享）</span><span id="tkn">0 / 8000</span></div>
    <div class="bar"><i id="fill"></i></div>
  </div>
</div>

<div class="stage">
  <div class="window" id="win">
    <div class="caphint">▼ 固定容量 = 8000 tokens（演示值）</div>
    <div id="stack"></div>
  </div>
  <div>
    <div class="heat">
      <div class="band b1">清</div>
      <div class="band b2">易忽略</div>
      <div class="band b3">清</div>
    </div>
    <div class="heatcap">注意力<br>lost in<br>the middle</div>
  </div>
</div>

<div class="legend">
  <span><i style="background:var(--sys)"></i>System / Skill（只放一次）</span>
  <span><i style="background:var(--user)"></i>本轮输入</span>
  <span><i style="background:var(--asst)"></i>模型回答</span>
  <span><i style="background:var(--summary)"></i>压缩摘要</span>
</div>
<p class="note">下一轮历史 = 旧历史 + {本轮输入 + 本轮回答}。模型本身无记忆——是应用每轮把整段重新拼进窗口当输入。右侧热区：信息放开头/结尾看得最清，埋在中间最易被忽略。</p>
</div>

<script>
(function(){var p=new URLSearchParams(location.search).get('theme');if(p)document.documentElement.dataset.theme=p;window.addEventListener('message',function(e){if(e&&e.data&&e.data.theme)document.documentElement.dataset.theme=e.data.theme;});})();
const MAX=8000, SYS=700;
let turns=[], summary=0, mode='compact';
const stack=document.getElementById('stack'), tkn=document.getElementById('tkn'), fill=document.getElementById('fill'), win=document.getElementById('win');
const rnd=(a,b)=>Math.round(a+Math.random()*(b-a));

function total(){let t=SYS+summary; turns.forEach(x=>t+=x.u+x.a); return t;}

function makeBlk(cls,tag,text,tok){
  const d=document.createElement('div'); d.className='blk '+cls;
  d.innerHTML='<span class="tk">~'+tok+' tok</span><span class="tag">'+tag+'</span><div>'+text+'</div>';
  return d;
}
function render(newIdx){
  stack.innerHTML='';
  stack.appendChild(makeBlk('sysblk','System / Skill（固定，只放一次）','系统提示 + 已加载的 Skill',SYS));
  if(summary>0) stack.appendChild(makeBlk('sumblk','📦 历史摘要（compacted）','早期若干轮被压缩成摘要',summary));
  turns.forEach((x,i)=>{
    const last=i===turns.length-1;
    const sep=document.createElement('div'); sep.className='turnsep'; sep.textContent='第 '+(x.n)+' 轮'+(last?'（最新）':'（历史）'); stack.appendChild(sep);
    const u=makeBlk('userblk'+(last?' cur':' hist'),'本轮输入','用户第 '+x.n+' 轮提问…',x.u);
    const a=makeBlk('asstblk'+(last?' cur':' hist'),'模型回答','模型第 '+x.n+' 轮回答…',x.a);
    if(i===newIdx){u.classList.add('flash');a.classList.add('flash');}
    stack.appendChild(u); stack.appendChild(a);
  });
  const t=total(), pct=Math.min(100,Math.round(t/MAX*100));
  tkn.textContent=t+' / '+MAX;
  fill.style.width=pct+'%';
  fill.classList.toggle('hot',pct>=80);
  win.scrollTop=win.scrollHeight;
}
function nextTurn(){
  const u=rnd(180,360), a=rnd(380,640), need=u+a;
  // 溢出处理
  while(total()+need>MAX && turns.length>0){
    if(mode==='compact'){
      // 把最早一半历史压成摘要
      const k=Math.max(1,Math.ceil(turns.length/2));
      let freed=0; for(let i=0;i<k;i++){freed+=turns[i].u+turns[i].a;}
      turns.splice(0,k);
      summary+=Math.round(freed*0.3); // 摘要只留约 30%
    }else{
      const o=turns.shift(); // 丢最早一轮
    }
  }
  const n=(turns.length?turns[turns.length-1].n:0)+ (turns.length?1:1);
  const num=( (window.__c=(window.__c||0)+1) );
  turns.push({n:num,u,a});
  render(turns.length-1);
}
document.getElementById('next').onclick=nextTurn;
document.getElementById('reset').onclick=()=>{turns=[];summary=0;window.__c=0;render(-1);};
document.getElementById('mode').onclick=e=>{const b=e.target.closest('button'); if(!b)return;
  mode=b.dataset.m; [...e.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b));};
document.getElementById('theme').onclick=()=>{const r=document.documentElement;
  r.dataset.theme=r.dataset.theme==='dark'?'light':'dark';};
render(-1);
</script>
</body>
</html>

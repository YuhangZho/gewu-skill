<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <style>
      .t{fill:#1d1d1f}.m{fill:#6e6e73}.ac{fill:#007aff}.gr{fill:#34c759}
      text{font-feature-settings:'tnum'}
    </style>
  </defs>
  <!-- backdrop -->
  <rect x="0" y="0" width="1200" height="630" fill="#f5f5f7"/>
  <rect x="0" y="0" width="1200" height="630" fill="none"/>

  <!-- ===== Scene A · 输入概念 ===== -->
  <g opacity="0">
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.1906;0.2063;1" values="1;1;0;0"/>
    <rect x="300" y="178" width="600" height="246" rx="20" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
    <circle cx="330" cy="208" r="6" fill="#ff5f57"/><circle cx="352" cy="208" r="6" fill="#febc2e"/><circle cx="374" cy="208" r="6" fill="#28c840"/>
    <text x="330" y="300" font-size="30" font-weight="700"><tspan class="ac">❯ 用费曼法学</tspan><tspan class="t"> Token</tspan></text>
    <rect x="690" y="278" width="3" height="28" fill="#1d1d1f"><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/></rect>
    <text x="330" y="352" font-size="18" class="m">格物 · Gewu — 一句话，把一个概念真正学透</text>
    <text x="600" y="500" font-size="22" class="m" text-anchor="middle">不是复述定义 —— 是你能讲清楚</text>
  </g>

  <!-- ===== Scene B · 费曼七步 ===== -->
  <g opacity="0">
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.225;0.2406;0.4156;0.4313;1" values="0;0;1;1;0;0"/>
    <text x="600" y="170" font-size="36" font-weight="700" class="t" text-anchor="middle">费曼七步 <tspan class="m" font-size="22" font-weight="400">· 输出倒逼输入</tspan></text>
    <g text-anchor="middle" font-size="18" font-weight="600">
      <g><rect x="70"  y="290" width="120" height="46" rx="23" fill="#fff" stroke="rgba(0,0,0,0.10)"/><text x="130" y="319" class="t">立靶</text></g>
      <g><rect x="210" y="290" width="120" height="46" rx="23" fill="#fff" stroke="rgba(0,0,0,0.10)"/><text x="270" y="319" class="t">点火</text></g>
      <g><rect x="350" y="290" width="130" height="46" rx="23" fill="#fff" stroke="rgba(0,0,0,0.10)"/><text x="415" y="319" class="ac">视觉建模</text></g>
      <g><rect x="500" y="290" width="130" height="46" rx="23" fill="#fff" stroke="rgba(0,0,0,0.10)"/><text x="565" y="319" class="t">讲给外行</text></g>
      <g><rect x="650" y="290" width="130" height="46" rx="23" fill="#fff" stroke="rgba(0,0,0,0.10)"/><text x="715" y="319" class="t">卡壳回溯</text></g>
      <g><rect x="800" y="290" width="100" height="46" rx="23" fill="#fff" stroke="rgba(0,0,0,0.10)"/><text x="850" y="319" class="t">验证</text></g>
      <text x="930" y="319" font-size="22" class="m">→</text>
      <g><rect x="960" y="290" width="130" height="46" rx="23" fill="rgba(52,199,89,0.14)" stroke="rgba(52,199,89,0.5)"/><text x="1025" y="319" class="gr">落盘 ✓</text></g>
    </g>
    <text x="600" y="430" font-size="22" class="m" text-anchor="middle">强制经过「视觉建模」——把概念还原成会动的画面</text>
  </g>

  <!-- ===== Scene C · 落盘 ===== -->
  <g opacity="0">
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.45;0.4656;0.5906;0.6063;1" values="0;0;1;1;0;0"/>
    <rect x="375" y="150" width="450" height="320" rx="18" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
    <text x="405" y="205" font-size="26" font-weight="700" class="t">Token.md</text>
    <g><rect x="660" y="183" width="130" height="32" rx="16" fill="rgba(52,199,89,0.14)" stroke="rgba(52,199,89,0.5)"/><text x="725" y="205" font-size="15" font-weight="600" class="gr" text-anchor="middle">✓ 已学透</text></g>
    <text x="405" y="258" font-size="18" class="t">一句话定位 · 动态图像 · 类比</text>
    <text x="405" y="296" font-size="18" class="t">大白话讲解 · 3 个例子 · 失效边界</text>
    <text x="405" y="334" font-size="18" class="t">卡壳点复盘 · 起点 vs 现在</text>
    <line x1="405" y1="360" x2="795" y2="360" stroke="rgba(0,0,0,0.08)"/>
    <text x="405" y="398" font-size="16" class="m">出处 ✓ 联网溯源　·　[[Context]] 双链</text>
    <text x="405" y="430" font-size="16" class="ac">▶ 动态画面 / Dynamic View</text>
    <text x="600" y="512" font-size="22" class="m" text-anchor="middle">学透即落盘：带双链、分类、出处的笔记 + 成稿动效</text>
  </g>

  <!-- ===== Scene D · 知识图谱呼吸 ===== -->
  <g opacity="0">
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.625;0.6406;0.7719;0.7938;1" values="0;0;1;1;0;0"/>
    <!-- edges -->
    <g stroke="rgba(0,0,0,0.12)" stroke-width="2">
      <line x1="600" y1="300" x2="450" y2="210"/><line x1="600" y1="300" x2="760" y2="205"/>
      <line x1="600" y1="300" x2="430" y2="360"/><line x1="600" y1="300" x2="775" y2="350"/>
      <line x1="600" y1="300" x2="540" y2="430"/><line x1="600" y1="300" x2="690" y2="425"/>
    </g>
    <!-- center -->
    <circle cx="600" cy="300" r="34" fill="#007aff"/><text x="600" y="306" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">AI</text>
    <!-- alive (green, breathing) -->
    <g>
      <circle cx="450" cy="210" r="26" fill="rgba(52,199,89,0.18)"><animate attributeName="opacity" values="0.2;0.75;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="450" cy="210" r="16" fill="#34c759"/><text x="450" y="250" font-size="14" class="t" text-anchor="middle">Token</text>
    </g>
    <g>
      <circle cx="760" cy="205" r="26" fill="rgba(52,199,89,0.18)"><animate attributeName="opacity" values="0.2;0.75;0.2" dur="2.8s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="760" cy="205" r="16" fill="#34c759"/><text x="760" y="245" font-size="14" class="t" text-anchor="middle">Context</text>
    </g>
    <g>
      <circle cx="540" cy="430" r="26" fill="rgba(52,199,89,0.18)"><animate attributeName="opacity" values="0.2;0.75;0.2" dur="2.8s" begin="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="540" cy="430" r="16" fill="#34c759"/><text x="540" y="468" font-size="14" class="t" text-anchor="middle">Skill</text>
    </g>
    <!-- todo (gray) -->
    <circle cx="430" cy="360" r="14" fill="#fff" stroke="#aeaeb2" stroke-width="2"/>
    <circle cx="775" cy="350" r="14" fill="#fff" stroke="#aeaeb2" stroke-width="2"/>
    <circle cx="690" cy="425" r="14" fill="#fff" stroke="#aeaeb2" stroke-width="2"/>
    <text x="600" y="520" font-size="22" class="m" text-anchor="middle">目标达成 → 这部分知识在图谱里「活」了起来 · 缓慢呼吸</text>
  </g>

  <!-- ===== Scene E · 品牌显形 ===== -->
  <g opacity="0">
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.8125;0.8281;1" values="0;0;1;1"/>
    <text x="600" y="262" font-size="58" font-weight="800" letter-spacing="-1" class="t" text-anchor="middle">格物 · Gewu</text>
    <text x="600" y="312" font-size="22" class="m" text-anchor="middle">费曼学习系统 · a Feynman-method learning system</text>
    <text x="600" y="384" font-size="28" font-weight="600" class="ac" text-anchor="middle">能讲清楚，才算真懂。</text>
    <g text-anchor="middle">
      <rect x="380" y="430" width="440" height="40" rx="20" fill="#fff" stroke="rgba(0,0,0,0.08)"/>
      <text x="600" y="456" font-size="16" class="m">MIT · 离线可用 · 跨 Agent：Claude / ChatGPT / Codex / Kimi …</text>
    </g>
  </g>
</svg>
